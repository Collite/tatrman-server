apiVersion: v2
name: postgres
description: |
  The Kantheon postgres service — an env-agnostic Helm chart. Holds no cluster knowledge:
  image, replicas, resources, telemetry endpoint and downstream wiring are all values.
  Per-environment values live in the deploying repo (Olymp clusters via ArgoCD multi-source
  D3'; test contexts via the Olymp scripted harness D23). Mirrors workers/mssql/k8s.
type: application
# Chart version: the packaging. appVersion tracks the default image tag.
version: 0.1.0
appVersion: "dev"
# Common Deployment/Service shape from the ttr-service library chart (D1).
dependencies:
  - name: ttr-service
    version: 0.1.0
    repository: "file://../../../shared/charts/ttr-service"
