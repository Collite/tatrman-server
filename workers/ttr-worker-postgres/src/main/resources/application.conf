ktor {
    deployment {
        port = 7302
        port = ${?POSTGRES_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.worker.postgres.ApplicationKt.module ]
    }
}

grpc {
    port = 7303
    port = ${?POSTGRES_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per Round 4 wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

worker {
    engine = "postgres"
    engine-version = "PostgreSQL"
    engine-version = ${?POSTGRES_ENGINE_VERSION}
    # Tests and local smoke contexts skip both pool init and translator wiring.
    use-fixture = false
    use-fixture = ${?POSTGRES_USE_FIXTURE}
}

# Translate — the lang ↔ RelNode ↔ SQL translator (services/translate, gRPC 7276).
# Postgres calls Translate.UnparseFromRelNode to turn the validated RelNode plan into
# PostgreSQL it can execute.
translate {
    host = "translate"
    host = ${?TRANSLATE_SERVER}
    port = 7276
    port = ${?TRANSLATE_SERVER_GRPC_PORT}
    # Deadline for UnparseFromRelNode. Translate is usually warm by the time the worker
    # unparses (Query parsed first), but on a truly cold path the Calcite warmup can
    # still bite — 120s.
    timeout-seconds = 120
    timeout-seconds = ${?TRANSLATE_TIMEOUT_SECONDS}
}

# Per-connection JDBC pool config (the named-connection idiom; charon/architecture §6).
# Each `id` is what arrives in ExecuteRequest.connection_id; the pool is opened lazily on
# the first request that targets it. Credentials are NEVER in the request and NEVER
# hardcoded here — they arrive via env vars from K8s sealed secrets. An empty connections
# block boots Postgres with zero connections (Ready only in fixture mode); a real connection
# is activated by an overlay that sets the env vars below.
#
# pg-midas is the v1 operational connection: the Midas Postgres, read through the non-owner
# `midas_app_readonly` role so RLS policies apply. `requires-tenant-id = true` gates the RLS
# session contract (SET LOCAL app.tenant_id per query; enforced Stage 1.3). It stays commented
# until its env vars are present (it has no safe defaults — pure env).
#
# pg-tpcds is the TPC-DS warehouse connection (WS-T2, contracts §4.5): read through the SELECT-only
# `tpcds_readonly` role (mirrors midas_app_readonly). TPC-DS is NOT multi-tenant, so
# `requires-tenant-id = false` — Postgres skips the RLS envelope (no SET LOCAL app.tenant_id) for it.
# Defaults let local/CI boot cleanly; the deployed chart's extraEnv overrides host/user/password
# (password from the pg-tpcds-ro-cred ExternalSecret). Pools open lazily, so an unreachable
# warehouse never blocks boot.
connections {
    pg-tpcds {
        host = "test-pg.data.svc.cluster.local"
        host = ${?POSTGRES_PG_TPCDS_HOST}
        port = 5432
        database = "tpc-ds-1g"
        default-schema = "public"
        username = "tpcds_readonly"
        username = ${?POSTGRES_PG_TPCDS_USER}
        password = ""
        password = ${?POSTGRES_PG_TPCDS_PASSWORD}
        max-pool-size = 10
        read-only = true
        requires-tenant-id = false
        # built URL: jdbc:postgresql://<host>:<port>/<database>
    }

    # pg-midas {
    #   host = ${?POSTGRES_PG_MIDAS_HOST}
    #   port = 5432
    #   database = "midas"
    #   default-schema = "public"
    #   username = ${?POSTGRES_PG_MIDAS_USER}      # midas_app_readonly
    #   password = ${?POSTGRES_PG_MIDAS_PASSWORD}
    #   max-pool-size = 10
    #   read-only = true
    #   requires-tenant-id = true
    #   # built URL: jdbc:postgresql://<host>:<port>/<database>
    # }
}

execution {
    default-batch-size-rows = 10000
    max-batch-size-rows = 100000
    default-timeout-seconds = 300
    max-timeout-seconds = 600
    max-blob-bytes-per-cell = 8388608  // 8 MiB per Round 6.C decision
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_POSTGRES}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
