ktor {
    deployment {
        port = 7302
        port = ${?ARGES_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.kantheon.arges.ApplicationKt.module ]
    }
}

grpc {
    port = 7303
    port = ${?ARGES_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per Round 4 wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

worker {
    engine = "postgres"
    engine-version = "PostgreSQL"
    engine-version = ${?ARGES_ENGINE_VERSION}
    # Tests and local smoke contexts skip both pool init and translator wiring.
    use-fixture = false
    use-fixture = ${?ARGES_USE_FIXTURE}
}

# Proteus — the lang ↔ RelNode ↔ SQL translator (services/proteus, gRPC 7276).
# Arges calls Proteus.UnparseFromRelNode to turn the validated RelNode plan into
# PostgreSQL it can execute.
proteus {
    host = "proteus"
    host = ${?PROTEUS_SERVER}
    port = 7276
    port = ${?PROTEUS_SERVER_GRPC_PORT}
    # Deadline for UnparseFromRelNode. Proteus is usually warm by the time the worker
    # unparses (Theseus parsed first), but on a truly cold path the Calcite warmup can
    # still bite — 120s.
    timeout-seconds = 120
    timeout-seconds = ${?PROTEUS_TIMEOUT_SECONDS}
}

# Per-connection JDBC pool config (the named-connection idiom; charon/architecture §6).
# Each `id` is what arrives in ExecuteRequest.connection_id; the pool is opened lazily on
# the first request that targets it. Credentials are NEVER in the request and NEVER
# hardcoded here — they arrive via env vars from K8s sealed secrets. An empty connections
# block boots Arges with zero connections (Ready only in fixture mode); a real connection
# is activated by an overlay that sets the env vars below.
#
# pg-midas is the v1 connection: the Midas operational Postgres, read through the non-owner
# `midas_app_readonly` role so RLS policies apply. `requires-tenant-id = true` gates the RLS
# session contract (SET LOCAL app.tenant_id per query; enforced Stage 1.3). The block stays
# commented until the env vars are present so local builds boot cleanly.
connections {
    # pg-midas {
    #   host = ${?ARGES_PG_MIDAS_HOST}
    #   port = 5432
    #   database = "midas"
    #   default-schema = "public"
    #   username = ${?ARGES_PG_MIDAS_USER}      # midas_app_readonly
    #   password = ${?ARGES_PG_MIDAS_PASSWORD}
    #   max-pool-size = 10
    #   read-only = true
    #   requires-tenant-id = true
    #   # built URL: jdbc:postgresql://<host>:<port>/<database>
    # }
}

execution {
    default-batch-size-rows = 10000
    max-batch-size-rows = 100000
    default-timeout-seconds = 300
    max-timeout-seconds = 600
    max-blob-bytes-per-cell = 8388608  // 8 MiB per Round 6.C decision
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_ARGES}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
