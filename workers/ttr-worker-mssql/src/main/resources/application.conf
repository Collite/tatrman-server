ktor {
    deployment {
        port = 7295
        port = ${?BRONTES_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.kantheon.brontes.ApplicationKt.module ]
    }
}

grpc {
    port = 7296
    port = ${?BRONTES_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per Round 4 wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

worker {
    engine = "mssql"
    engine-version = "MS SQL Server"
    engine-version = ${?BRONTES_ENGINE_VERSION}
    # Tests and local smoke contexts skip both pool init and translator wiring.
    use-fixture = false
    use-fixture = ${?BRONTES_USE_FIXTURE}
}

# Proteus — the lang ↔ RelNode ↔ SQL translator (services/proteus, gRPC 7276).
# Brontes calls Proteus.UnparseFromRelNode to turn the validated RelNode plan
# into MSSQL it can execute.
proteus {
    host = "proteus"
    host = ${?PROTEUS_SERVER}
    port = 7276
    port = ${?PROTEUS_SERVER_GRPC_PORT}
    # Deadline for UnparseFromRelNode. Proteus is usually warm by the time the
    # worker unparses (Theseus parsed first), but on a truly cold path the
    # Calcite warmup can still bite — 120s.
    timeout-seconds = 120
    timeout-seconds = ${?PROTEUS_TIMEOUT_SECONDS}
}

# Per-connection JDBC pool config (the named-connection idiom; charon/architecture §6).
# Production overlays add connection blocks matching the World config Kyklop routes
# against. Each `id` is what arrives in ExecuteRequest.connection_id; the pool is
# opened lazily on the first request that targets it. Credentials are NEVER in the
# request and NEVER hardcoded here — they arrive via env vars from K8s sealed secrets.
connections {
    # `df-test` is a shipped, env-driven template: it is INERT unless an overlay supplies
    # BRONTES_DB_HOST (ConnectionPoolManager.fromConfig skips a host-less block), so every
    # deployment that leaves these env vars unset boots with zero connections (fixture-Ready),
    # exactly as an empty block did. An overlay that sets BRONTES_DB_HOST/… (sealed secret or
    # test-harness per-run secret) activates a real pool, opened lazily on the first request.
    df-test {
      host = ${?BRONTES_DB_HOST}
      port = ${?BRONTES_DB_PORT}
      database = ${?BRONTES_DB_NAME}
      username = ${?BRONTES_DB_USER}
      password = ${?BRONTES_DB_PASSWORD}
      max-pool-size = 10
    }
}

execution {
    default-batch-size-rows = 10000
    max-batch-size-rows = 100000
    default-timeout-seconds = 300
    max-timeout-seconds = 600
    max-blob-bytes-per-cell = 8388608  // 8 MiB per Round 6.C decision
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_BRONTES}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
