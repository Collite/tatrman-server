workers-steropes {
    grpc {
        # Bind address. Must be a local interface (e.g. 0.0.0.0 in K8s, 127.0.0.1
        # locally) — NOT the cluster DNS name. The DNS name `steropes.*` is
        # for clients to reach this worker; the worker itself cannot bind to it.
        # Override with STEROPES_BIND_HOST if you need a specific interface.
        host = "0.0.0.0"
        host = ${?STEROPES_BIND_HOST}
        port = 7301
        port = ${?STEROPES_SERVER_GRPC_PORT}
        max-message-bytes = 33554432   # 32 MiB
    }

    http {
        host = "0.0.0.0"
        host = ${?STEROPES_BIND_HOST}
        port = 7300
        port = ${?STEROPES_SERVER_PORT}
    }

    workspace {
        # Per-session caps. Hard rejection on put() if exceeded.
        max-sessions          = 1000
        max-dfs-per-session   = 50
        max-bytes-per-df      = 536870912        # 512 MiB
        max-total-bytes       = 8589934592       # 8 GiB

        # TTL eviction. Matches the Dispatcher's sticky-session TTL so a
        # stale workspace and a stale sticky binding both expire together.
        idle-ttl-seconds          = 3600         # 60 min
        sweeper-interval-seconds  = 60
    }

    capability {
        engine-name                  = "polars"
        engine-version               = "polars 1.13"
        supports-stateful-sessions   = true
        max-concurrent-sessions      = 1000
        session-idle-timeout-seconds = 3600
        max-session-memory-mb        = 8192
    }

    limits {
        max-rows-per-result      = 1000000
        execute-timeout-seconds  = 300
        default-batch-size-rows  = 10000
        max-batch-size-rows      = 100000
        max-blob-bytes-per-cell  = 8388608       # 8 MiB
    }

    metadata {
        # Steropes could pull the model snapshot from Ariadne (the model-graph
        # service) for label-propagation, but labels are decorated downstream
        # (not written into Arrow field metadata here), so the metadata client
        # is unused at v1. Plumbing kept (repointed to Ariadne) for forward-compat.
        host = "ariadne"
        host = ${?ARIADNE_SERVER}
        port = 7261
        port = ${?ARIADNE_GRPC_PORT}
        poll-interval-seconds = 60
    }

    telemetry {
        enabled = false
        enabled = ${?OTEL_ENABLED_STEROPES}
        otlp {
            endpoint = "http://localhost:4317"
            endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
        }
    }
}
