apiVersion: v2
name: steropes
description: |
  The Kantheon steropes worker (Polars worker — one of the Kyklops, Python + Polars + gRPC) — an
  env-agnostic Helm chart. Holds no cluster knowledge: image, replicas, resources, telemetry
  endpoint are all values. Per-environment values live in the deploying repo (Olymp clusters via
  ArgoCD multi-source D3'; test contexts via the Olymp scripted harness). Converted from the
  kustomize base/overlays, mirroring services/theseus/k8s (OTLP-endpoint OTel idiom). The image is
  built via `build-py` (not Jib); the chart itself is identical in shape to a backend chart.
type: application
version: 0.1.0
appVersion: "dev"
# Common Deployment/Service shape from the kantheon-service library chart (D1).
dependencies:
  - name: kantheon-service
    version: 0.1.0
    repository: "file://../../../shared/charts/kantheon-service"
