apiVersion: apps/v1
kind: Deployment
metadata:
  name: polars
  namespace: kantheon
  labels:
    app: polars
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polars
  template:
    metadata:
      labels:
        app: polars
    spec:
      containers:
        - name: polars
          image: polars:dev
          ports:
            - name: http
              containerPort: 7300
            - name: grpc
              containerPort: 7301
          env:
            - name: POLARS_SERVER_PORT
              value: "7300"
            - name: POLARS_SERVER_GRPC_PORT
              value: "7301"
            - name: OTEL_ENABLED_POLARS
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4317
          readinessProbe:
            httpGet:
              path: /ready
              port: 7300
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 7300
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              # Stateful workspace store — give it headroom for in-session DataFrames.
              memory: 4Gi
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: polars
  namespace: kantheon
  labels:
    app: polars
spec:
  selector:
    app: polars
  ports:
    - name: http
      port: 7300
      targetPort: 7300
    - name: grpc
      port: 7301
      targetPort: 7301
