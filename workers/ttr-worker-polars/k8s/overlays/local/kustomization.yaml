apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kantheon

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: steropes
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: STEROPES_SERVER_PORT
            value: "7300"
          - name: STEROPES_SERVER_GRPC_PORT
            value: "7301"
          # Local cluster: no Alloy collector — disable OTel export to avoid
          # connection-refused noise (standard OTel kill-switch).
          - name: OTEL_SDK_DISABLED
            value: "true"
