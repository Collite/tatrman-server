capability_id: "theseus.query:v1"
category: "theseus"
version: "1.0.0"
description: |
  Run a query against the kantheon platform. Source language may be SQL,
  TransDSL, or DataFrame DSL. Returns formatted result data (json | csv | tsv |
  markdown) plus a structured envelope with row counts, columns, warnings, and
  pipeline messages. Orchestrated by Theseus: Proteus (translate) → Argos
  (validate, RLS) → Kyklop (dispatch) → a worker (Brontes / Steropes).
service_endpoint: "http://theseus-mcp.kantheon.svc.cluster.local:7307"
search_tags:
  - theseus
  - query
  - sql
  - transdsl
  - dfdsl
  - run
cost_hints:
  typical_latency_ms: 4000
  typical_cost_usd: 0.0
  is_idempotent: true
  max_concurrent: 8
