ktor {
    deployment {
        host = "0.0.0.0"
        port = "7307"
        port = ${?THESEUS_MCP_SERVER_PORT}
    }
}

server {
    port = "7307"
    port = ${?THESEUS_MCP_SERVER_PORT}
    shutdownUrlPath = "/shutdown"
}

theseus-mcp {
    mcp {
        transport = "streamable-http"
        path = "/mcp"
    }
    # Upstream constellation services. Defaults are the in-repo gRPC ports; a
    # deployment overlay sets the *_SERVER / *_SERVER_GRPC_PORT env names.
    upstream {
        theseus {
            host = "theseus"
            host = ${?THESEUS_SERVER}
            port = "7306"
            port = ${?THESEUS_SERVER_GRPC_PORT}
            # Whole-pipeline deadline on Theseus's Run (translate‚Üívalidate‚Üídispatch‚Üí
            # worker‚ÜíDB). 240s so a cold-Proteus first query (Calcite warmup) isn't
            # cancelled mid-Run.
            deadline-seconds = 240
            deadline-seconds = ${?THESEUS_DEADLINE_SECONDS}
        }
        proteus {
            host = "proteus"
            host = ${?PROTEUS_SERVER}
            port = "7276"
            port = ${?PROTEUS_SERVER_GRPC_PORT}
            deadline-seconds = 30
        }
        argos {
            host = "argos"
            host = ${?ARGOS_SERVER}
            port = "7286"
            port = ${?ARGOS_SERVER_GRPC_PORT}
            deadline-seconds = 30
        }
        ariadne {
            host = "ariadne"
            host = ${?ARIADNE_SERVER}
            port = "7261"
            port = ${?ARIADNE_SERVER_GRPC_PORT}
            deadline-seconds = 10
            # DF-ME02-CACHE: TTL (seconds) for in-memory caching of attribute decorations.
            # Within this window subsequent `query`/`compile` calls skip GetSnapshot; after
            # TTL a conditional GET with the cached etag still avoids full re-serialisation.
            # 0 disables the TTL fast-path (etag-only).
            decoration-cache-ttl-seconds = 30
            decoration-cache-ttl-seconds = ${?ARIADNE_DECORATION_CACHE_TTL_SECONDS}
        }
    }
    limits {
        # row-limit-max is a soft cap a caller can raise; row-limit-default stays
        # modest so callers opt into bigger results explicitly.
        row-limit-default = 500
        row-limit-max = 100000
        row-limit-max = ${?THESEUS_MCP_ROW_LIMIT_MAX}
        request-timeout-seconds = 240
        request-timeout-seconds = ${?THESEUS_MCP_REQUEST_TIMEOUT_SECONDS}
        max-message-bytes = 33554432
    }
    security {
        require-identity = false
        require-identity = ${?THESEUS_MCP_REQUIRE_IDENTITY}
    }
    tool-timeouts {
        # Must be ‚Č• the Theseus Run deadline (240s) so the MCP tool wrapper doesn't
        # fire before the pipeline's own deadline on a cold first query.
        query = 240000
        compile = 60000
    }
}

# capabilities-mcp registration endpoint. Empty by default (warn-and-continue);
# a deployment overlay sets CAPABILITIES_MCP_URL to enable registration.
capabilities-mcp {
    url = ""
    url = ${?CAPABILITIES_MCP_URL}
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_THESEUS_MCP}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
