apiVersion: v2
name: nlp-mcp
description: |
  The Kantheon nlp-mcp wrapper — the MCP edge over Nlp (the NLP foundation). Env-agnostic
  Helm chart: image, replicas, resources, telemetry endpoint and the downstream HTTP wiring to
  Nlp are all values. Per-environment values live in the deploying repo. Converted from the
  kustomize base/overlays, mirroring query-mcp (D2).
type: application
# Chart version: the packaging. appVersion tracks the default image tag.
version: 0.1.0
appVersion: "dev"
# Common Deployment/Service shape from the kantheon-service library chart (D1).
dependencies:
  - name: kantheon-service
    version: 0.1.0
    repository: "file://../../../shared/charts/kantheon-service"
