apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kantheon

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: kadmos-mcp
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: MCP_KADMOS_SERVER_PORT
            value: "7272"
          # Local cluster: point at the kadmos service's port-forward
          # (`kubectl port-forward svc/kadmos 7270:7270`).
          - name: KADMOS_HTTP_HOST
            value: localhost
          - name: KADMOS_HTTP_PORT
            value: "7270"
          - name: OTEL_SERVICE_NAME
            value: kadmos-mcp
          - name: OTEL_ENABLED_KADMOS_MCP
            value: "false"
