ktor {
    deployment {
        host = "0.0.0.0"
        port = "7272"
        port = ${?MCP_KADMOS_SERVER_PORT}
    }
}

kadmos {
    # kadmos service URL (HTTP, POST /v1/analyze). A blank host disables the
    # client (local no-backend mode) and the analyze tool returns "not wired".
    host = "localhost"
    host = ${?KADMOS_HTTP_HOST}

    port = "7270"
    port = ${?KADMOS_HTTP_PORT}

    # Request timeout in milliseconds.
    timeout = 30000
    timeout = ${?KADMOS_HTTP_TIMEOUT}
}

server {
    port = "7272"
    port = ${?MCP_KADMOS_SERVER_PORT}
}

telemetry {
    otlp {
        protocol = ${?KADMOS_MCP_OTEL_PROTOCOL}
    }
}
