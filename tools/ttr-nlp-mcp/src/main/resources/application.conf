ktor {
    deployment {
        host = "0.0.0.0"
        port = "7272"
        port = ${?MCP_NLP_SERVER_PORT}
    }
}

nlp {
    # nlp service gRPC target (NlpService.Analyze — gRPC is the service contract
    # at RG-P1.S1). A blank host disables the client (local no-backend mode) and
    # the analyze tool returns "not wired".
    host = "localhost"
    host = ${?NLP_GRPC_HOST}

    # gRPC port (the REST mirror is 7270; the contract is on 7271).
    port = "7271"
    port = ${?NLP_GRPC_PORT}

    # Call deadline in milliseconds.
    timeout = 30000
    timeout = ${?NLP_GRPC_TIMEOUT}
}

server {
    port = "7272"
    port = ${?MCP_NLP_SERVER_PORT}
}

# capabilities-mcp registration endpoint. Empty by default (warn-and-continue);
# a deployment overlay sets CAPABILITIES_MCP_URL to enable registration. Without this
# root block registerWithCapabilities() throws ConfigException$Missing when the env is unset.
capabilities-mcp {
    url = ""
    url = ${?CAPABILITIES_MCP_URL}
}

telemetry {
    otlp {
        protocol = ${?NLP_MCP_OTEL_PROTOCOL}
    }
}
