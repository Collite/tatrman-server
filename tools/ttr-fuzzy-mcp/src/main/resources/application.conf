ktor {
    deployment {
        host = "0.0.0.0"
        port = "7267"
        port = ${?MCP_ECHO_SERVER_PORT}
    }
}

echo {
    client {
        # gRPC is the default transport to echo. REST stays opt-in (set
        # MCP_ECHO_CLIENT_PROTOCOL=REST) and mirrors the Ktor REST surface
        # exposed by the echo service (POST /match).
        protocol = "gRPC"
        protocol = ${?MCP_ECHO_CLIENT_PROTOCOL}

        host = "localhost"
        host = ${?ECHO_GRPC_HOST}

        grpc {
            port = "7266"
            port = ${?ECHO_GRPC_PORT}
        }

        rest {
            port = "7265"
            port = ${?ECHO_REST_PORT}
        }
    }
}

server {
    port = "7267"
    port = ${?MCP_ECHO_SERVER_PORT}
}

# capabilities-mcp registration endpoint. Empty by default (warn-and-continue);
# a deployment overlay sets CAPABILITIES_MCP_URL to enable registration. Without this
# root block registerWithCapabilities() throws ConfigException$Missing when the env is unset.
capabilities-mcp {
    url = ""
    url = ${?CAPABILITIES_MCP_URL}
}

telemetry {
    otlp {
        protocol = ${?ECHO_MCP_OTEL_PROTOCOL}
    }
}

security {
    enabled = false
    enabled = ${?SECURITY_ENABLED}
    api-keys = ${?API_KEYS}
    keycloak {
        url = ${?KEYCLOAK_URL}
        realm = ${?KEYCLOAK_REALM}
    }
    service {
        name = "echo-mcp"
        name = ${?SECURITY_SERVICE_NAME}
        keycloak-client-id = ${?ECHO_MCP_KEYCLOAK_CLIENT_ID}
        keycloak-client-secret = ${?ECHO_MCP_KEYCLOAK_CLIENT_SECRET}
    }
}
