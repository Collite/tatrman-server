apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kantheon

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: echo-mcp
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: MCP_ECHO_SERVER_PORT
            value: "7267"
          # Local cluster: point at the echo service's port-forward
            # (`kubectl port-forward svc/echo 7266:7266`).
          - name: ECHO_GRPC_HOST
            value: localhost
          - name: ECHO_GRPC_PORT
            value: "7266"
          - name: OTEL_SERVICE_NAME
            value: echo-mcp
          - name: OTEL_ENABLED_ECHO_MCP
            value: "false"
