apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kantheon

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: veles-mcp
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: VELES_MCP_SERVER_PORT
            value: "7262"
          - name: VELES_PROTOCOL
            value: grpc
          # Local cluster: point at the veles service's NodePort/port-forward.
          # Default to localhost:7261 which works with `kubectl port-forward svc/veles 7261:7261`.
          - name: VELES_GRPC_HOST
            value: localhost
          - name: VELES_GRPC_PORT
            value: "7261"
          - name: OTEL_SERVICE_NAME
            value: veles-mcp
          - name: OTEL_ENABLED_VELES_MCP
            value: "false"
