capability_id: "ariadne.list_objects:v1"
category: "ariadne"
version: "1.0.0"
description: |
  List ariadne objects (tables, views, entities, attributes, relations,
  queries, …) filtered by kind, package, and binding. Paginated; the MCP
  wrapper drains every page server-side and returns a single `objects[]`
  array.
service_endpoint: "http://ariadne-mcp.kantheon.svc.cluster.local:7262"
search_tags:
  - ariadne
  - model
  - list
cost_hints:
  typical_latency_ms: 500
  typical_cost_usd: 0.0
  is_idempotent: true
  max_concurrent: 16
