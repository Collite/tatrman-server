capability_id: "veles.get_object:v1"
category: "veles"
version: "1.0.0"
description: |
  Fetch a single veles object by qualified name. The MCP wrapper takes the
  `id` argument (e.g. "er.entity.artikl" or "db.table.dodaci_misto"), parses it
  into a `QualifiedName` proto, and returns the typed detail (table / view /
  column / entity / attribute / relation / role / procedure / etc.).
