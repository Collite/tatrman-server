capability_id: "veles.search:v1"
category: "veles"
version: "1.0.0"
description: |
  Fuzzy search across veles objects. The `query` argument is matched
  against the model object's `name`, `localized labels`, `aliases`, and
  search-keyword tables. Returns the top-N `SearchResult`s with relevance
  scores and snippets.
service_endpoint: "http://veles-mcp.kantheon.svc.cluster.local:7262"
search_tags:
  - veles
  - search
  - fuzzy
cost_hints:
  typical_latency_ms: 800
  typical_cost_usd: 0.0
  is_idempotent: true
  max_concurrent: 16
