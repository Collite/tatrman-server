server {
    port = "7262"
    port = ${?VELES_MCP_SERVER_PORT}
    shutdownUrlPath = "/shutdown"
}

metadata {
    # Phase 2.1 (fork) — veles-mcp gRPC target.
    # `metadata.host` / `metadata.port` are the veles service's gRPC host/port;
    # defaults to the in-cluster service name. Override with `VELES_GRPC_HOST`
    # and `VELES_GRPC_PORT` to point at a dev cluster / port-forward.
    protocol = grpc
    protocol = ${?VELES_PROTOCOL}
    host = "veles"
    host = ${?VELES_GRPC_HOST}
    port = "7261"
    port = ${?VELES_GRPC_PORT}
    path = ""
}

# capabilities-mcp registration endpoint. Empty by default (warn-and-continue);
# a deployment overlay sets CAPABILITIES_MCP_URL to enable registration. Without this
# root block registerWithCapabilities() throws ConfigException$Missing when the env is unset.
capabilities-mcp {
    url = ""
    url = ${?CAPABILITIES_MCP_URL}
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_VELES_MCP}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
