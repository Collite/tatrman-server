ktor {
    deployment {
        port = 7275
        port = ${?RESOLVER_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.resolver.ApplicationKt.module ]
    }
}

grpc {
    port = 7276
    port = ${?RESOLVER_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

# RG-P6.S1 — the `resolve.bind:v1` MCP door (streamable HTTP), co-hosted in-process
# on its own port. `require-identity` = H-2 fail-closed: with it on, a call with no
# resolvable OBO identity is refused before any resolution work. Default ON; the
# dev-network path sets it false.
mcp {
    port = 7277
    port = ${?RESOLVER_MCP_PORT}
    # Bind host. Loopback by default (RG-P6 review D): the JWT is decoded, NOT
    # signature-verified here, so the door must not be off-host-reachable unless a
    # deployment fronts it with an auth-terminating ingress and sets 0.0.0.0.
    host = "127.0.0.1"
    host = ${?RESOLVER_MCP_HOST}
    require-identity = true
    require-identity = ${?RESOLVER_MCP_REQUIRE_IDENTITY}
    # Identity-source trust (RG-P6 review A). false (default) = TOKEN-ONLY: only an
    # OBO Bearer token is an identity; the `X-User-Id` header, the `user_id` arg, and
    # the `admin:` role convention are all ignored (they can neither satisfy
    # require-identity nor self-grant admin). true = dev / behind-a-terminator: re-open
    # those trusted-network shortcuts.
    trust-network = false
    trust-network = ${?RESOLVER_MCP_TRUST_NETWORK}
}

# ttr-nlp — the parse (Analyze) + capability matrix (GetStatus). ZERO LLM here.
nlp {
    host = "nlp"
    host = ${?NLP_HOST}
    port = 7226
    port = ${?NLP_GRPC_PORT}
    deadline-seconds = 30
    deadline-seconds = ${?NLP_GRPC_DEADLINE_SECONDS}
}

# ttr-fuzzy — the vocabulary matcher (BatchMatch). One RPC per resolve (B-T1).
fuzzy {
    host = "fuzzy"
    host = ${?FUZZY_HOST}
    port = 7266
    port = ${?FUZZY_GRPC_PORT}
    deadline-seconds = 30
    deadline-seconds = ${?FUZZY_GRPC_DEADLINE_SECONDS}
}

# Gating thresholds — ported from the live ENTITIES_ONLY config (ResolverGraph:38-48).
resolver {
    threshold-bind = 0.5
    threshold-ambiguity-gap = 0.05
    threshold-exact = 0.9999
    max-options = 20

    # HMAC resume-token keys (RS-26 / S-3). Map key_id -> base64url secret (>=32B,
    # enforced at boot); `active-key-id` signs new tokens, every listed key verifies
    # (rotation window). An empty key set is FAIL-CLOSED (the service refuses to boot)
    # unless `allow-ephemeral-key = true` is set for local dev — the ephemeral key
    # breaks stateless resume across replicas/restarts (RG-P6 review L).
    resume-token {
        active-key-id = ${?RESOLVER_RESUME_ACTIVE_KEY_ID}
        # Replay window: a signed pin is honoured only within this many seconds of its
        # `issued_at` (bounds a leaked/logged token). A missing value falls back to 1h
        # in code — never "no expiry" (RG-P6 review K). Verified only after the HMAC clears.
        max-age-seconds = 3600
        max-age-seconds = ${?RESOLVER_RESUME_MAX_AGE_SECONDS}
        # Local-dev only: allow booting with no configured key (ephemeral, per-process).
        allow-ephemeral-key = false
        allow-ephemeral-key = ${?RESOLVER_RESUME_ALLOW_EPHEMERAL_KEY}
        keys {
            # k1 = ${?RESOLVER_RESUME_KEY_K1}
        }
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_RESOLVER}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
