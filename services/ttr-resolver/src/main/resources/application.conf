ktor {
    deployment {
        port = 7275
        port = ${?RESOLVER_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.resolver.ApplicationKt.module ]
    }
}

grpc {
    port = 7276
    port = ${?RESOLVER_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

# ttr-nlp — the parse (Analyze) + capability matrix (GetStatus). ZERO LLM here.
nlp {
    host = "nlp"
    host = ${?NLP_HOST}
    port = 7226
    port = ${?NLP_GRPC_PORT}
    deadline-seconds = 30
    deadline-seconds = ${?NLP_GRPC_DEADLINE_SECONDS}
}

# ttr-fuzzy — the vocabulary matcher (BatchMatch). One RPC per resolve (B-T1).
fuzzy {
    host = "fuzzy"
    host = ${?FUZZY_HOST}
    port = 7266
    port = ${?FUZZY_GRPC_PORT}
    deadline-seconds = 30
    deadline-seconds = ${?FUZZY_GRPC_DEADLINE_SECONDS}
}

# Gating thresholds — ported from the live ENTITIES_ONLY config (ResolverGraph:38-48).
resolver {
    threshold-bind = 0.5
    threshold-ambiguity-gap = 0.05
    threshold-exact = 0.9999
    max-options = 20
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_RESOLVER}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
