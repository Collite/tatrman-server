# Default values for ttr-resolver (RG-P5/P6 · the deterministic resolve core + the
# `resolve.bind:v1` MCP door). Env-agnostic: sane defaults, NO cluster knowledge. Deploying
# environments override image, telemetry, the nlp/fuzzy gRPC targets, and the resume-token keys.

replicaCount: 1

image:
  repository: ghcr.io/collite/ttr-resolver
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# HTTP port (probes + REST) and gRPC port (the resolve RPC). Container ports match
# services/ttr-resolver/src/main/resources/application.conf.
ports:
  http: 7275
  grpc: 7276

# The `resolve.bind:v1` MCP door. Loopback by default (RG-P6 review D: the door decodes but
# does NOT signature-verify the OBO JWT, so it must not be off-host-reachable unless a
# deployment fronts it with an auth-terminating ingress and sets host=0.0.0.0). require-identity
# is H-2 fail-closed (a call with no resolvable OBO identity is refused). trust-network=false is
# TOKEN-ONLY (X-User-Id header / user_id arg / admin: role convention all ignored). NOT exposed
# as a Service port — reach it via port-forward or an ingress the deploying env adds.
mcp:
  port: 7277
  host: "127.0.0.1"
  requireIdentity: true
  trustNetwork: false

service:
  type: ClusterIP

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: "1"

telemetry:
  enabled: false
  endpoint: ""
  serviceName: resolver

# ttr-nlp — the parse (Analyze) + capability matrix (GetStatus). ZERO LLM here.
nlp:
  host: nlp
  grpcPort: 7226
  deadlineSeconds: 30

# ttr-fuzzy — the vocabulary matcher (BatchMatch). One RPC per resolve (B-T1).
fuzzy:
  host: fuzzy
  grpcPort: 7266
  deadlineSeconds: 30

# HMAC resume-token keys (RS-26 / S-3). `activeKeyId` signs new tokens; the key material is
# injected via secretEnv (RESOLVER_RESUME_KEY_<ID>). An empty key set is FAIL-CLOSED — the
# service refuses to boot — unless `allowEphemeralKey: true` (local/test only: the ephemeral
# per-process key breaks stateless resume across replicas/restarts, RG-P6 review L).
resumeToken:
  activeKeyId: ""
  maxAgeSeconds: 3600
  allowEphemeralKey: false

# Secret-backed env (valueFrom.secretKeyRef) — the resume-token key material for prod, e.g.
#   - { name: RESOLVER_RESUME_KEY_K1, secretName: resolver-resume-keys, secretKey: k1 }
secretEnv: []

# Any other env (a deploying env REPLACES this list).
extraEnv: []

readinessProbe:
  path: /ready
  initialDelaySeconds: 2
  periodSeconds: 3
  failureThreshold: 20
livenessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
