# Row-level security policies (DF-S01) — default set, merged in from the policies dir.
# An external file (k8s ConfigMap mount) overrides via VALIDATE_POLICIES_FILE (Application.kt).
include classpath("policies/policies.conf")

ktor {
    deployment {
        port = 7285
        port = ${?VALIDATE_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.validate.ApplicationKt.module ]
    }
}

grpc {
    port = 7286
    port = ${?VALIDATE_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per Round 4 wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

# Policy evaluation is IN-PROCESS since the Stage 3.2 fold (sql-security folded into
# Validate; contracts §1) — there is no policy-service gRPC client. Row-level policies are
# loaded from HOCON `validate.policies` (see the `policies/policies.conf` include at the top
# of this file and the VALIDATE_POLICIES_FILE external override in Application.kt). Roles key
# on the bearer (`PipelineContext.auth_roles`), not whois (default roleSource = bearer).

# Veles (metadata/model-graph) gRPC client. Validate polls current modelVersion (schema
# version check, Section F); the in-process policy engine also uses it for metadata-aware
# warnings (unknown_table / model_version_mismatch).
veles {
    host = "veles"
    host = ${?VELES_HOST}
    host = ${?VELES_SERVER}
    port = 7261
    port = ${?VELES_GRPC_PORT}
    port = ${?VELES_SERVER_GRPC_PORT}
    # GetSnapshot deadline (Section F version check). Temporarily 30s while
    # debugging metadata connectivity; the check degrades to a warning on
    # timeout, so a longer deadline only delays that fallback.
    deadline-seconds = 30
    deadline-seconds = ${?VELES_GRPC_DEADLINE_SECONDS}
    poll-interval-seconds = 60
    poll-interval-seconds = ${?VELES_POLL_INTERVAL_SECONDS}
}

validate {
    # Fork Stage 5.3 — role source for RLS + admin-bypass (additive; Phase-3 default unchanged).
    #   bearer (default): roles come solely from the forwarded JWT's realm_access.roles
    #                     (PipelineContext.auth_roles). No whois dependency, no per-query hop.
    #   whois:            additionally enrich those roles via the forked whois service, keyed by the
    #                     bearer-trusted user_id, expanding the ERP role hierarchy the token omits.
    # Identity is ALWAYS bearer-only (query-mcp edge); whois enriches roles, never asserts identity.
    roleSource = "bearer"
    roleSource = ${?VALIDATE_ROLE_SOURCE}
    whois {
        baseUrl = "http://whois:7110"   # only read when roleSource = "whois"
        baseUrl = ${?VALIDATE_WHOIS_BASE_URL}
        cacheTtlSeconds = 300
        cacheTtlSeconds = ${?VALIDATE_WHOIS_CACHE_TTL_SECONDS}
    }

    # DF-V04 / Phase 06 B1 — LLM-as-judge semantic review of the validated plan. Off by default;
    # set VALIDATE_LLM_GUARD_ENABLED=true and point gateway-url at the in-repo LLM gateway to activate.
    # When enabled but gateway-url is empty, the guard logs a warning and approves with the v1
    # skeleton warning so dev environments boot without a gateway running.
    llm-guard {
        enabled = false
        enabled = ${?VALIDATE_LLM_GUARD_ENABLED}
        # LLM-gateway base URL (e.g. http://llm-gateway:7280).
        gateway-url = ""
        gateway-url = ${?VALIDATE_LLM_GUARD_GATEWAY_URL}
        # Default model to ask. Maps to a `models.yaml` entry in the LLM gateway. Haiku is fast/cheap
        # for a per-query guard; switch to sonnet for stricter review.
        model = "claude-haiku-4-5"
        model = ${?VALIDATE_LLM_GUARD_MODEL}
        timeout-ms = 10000
        timeout-ms = ${?VALIDATE_LLM_GUARD_TIMEOUT_MS}
        # Optional API key for the gateway. Sent as `Authorization: Bearer <key>`.
        api-key = ""
        api-key = ${?VALIDATE_LLM_GUARD_API_KEY}
        # FAIL_CLOSED (default): gateway down / non-2xx / malformed verdict -> reject. Safer for
        # a guard. FAIL_OPEN: same scenarios -> approve with an llm_guard_unavailable warning.
        failure-posture = "FAIL_CLOSED"
        failure-posture = ${?VALIDATE_LLM_GUARD_FAILURE_POSTURE}
    }
    # Readiness gate for the hard dependencies (metadata + sql-security). The background
    # DependencyMonitor probes both via their GetStatus RPC; /ready returns 503 while either
    # is down, and the monitor keeps retrying with exponential backoff (base → max) so the pod
    # re-readies automatically on recovery.
    dependency-monitor {
        poll-interval-seconds = 30
        poll-interval-seconds = ${?VALIDATE_DEP_POLL_INTERVAL_SECONDS}
        backoff-base-ms = 1000
        backoff-base-ms = ${?VALIDATE_DEP_BACKOFF_BASE_MS}
        backoff-max-ms = 60000
        backoff-max-ms = ${?VALIDATE_DEP_BACKOFF_MAX_MS}
    }

    # TopN enforcement defaults — overridable per request via ValidationOptions.
    default-top-n = 30
    default-top-n = ${?VALIDATE_DEFAULT_TOP_N}
    enforce-top-n = true
    enforce-top-n = ${?VALIDATE_ENFORCE_TOP_N}
    # Boots without a metadata gRPC client when true. Tests and local
    # smoke-only contexts use this; production deployments must flip false.
    use-fixture-model = false
    use-fixture-model = ${?VALIDATE_USE_FIXTURE_MODEL}

    # DF-V02 — apply_security = false is honoured only when the caller's
    # PipelineContext.auth_roles contains this role (upstream-populated from the JWT's
    # realm_access.roles by the MCP edge). Defaults to the canonical "query-platform-admin"
    # role name; override per deployment if your Keycloak realm uses a different role.
    security-bypass {
        admin-role = "query-platform-admin"
        admin-role = ${?VALIDATE_ADMIN_ROLE}
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_VALIDATE}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
