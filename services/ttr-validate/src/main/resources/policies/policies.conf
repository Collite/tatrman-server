# Validate row-level security policies (DF-S01), folded from ai-platform sql-security (Stage 3.2).
#
# Authoring workflow (architecture §6): policies are HOCON, version-controlled in this file.
# Edit here, commit, redeploy. For per-environment overrides without a rebuild, mount a HOCON
# file into the pod and point VALIDATE_POLICIES_FILE at it — its `validate.policies` replaces this
# default set (Application.kt loads it over application.conf).
#
# Schema (parsed by PolicyConfigLoader):
#   { id, description?, match { type = namespace|exact|all, schema, namespace }, predicate {...},
#     column-rules = [ { column, action = deny|mask, mask-value? } ] }
# Predicate value source: { kind = literal|user-attr, attribute }. user-attr "roles" resolves to
# the caller's bearer roles (PipelineContext.auth_roles); "tenant_id"/"user_id" from the user_id split.

validate.policies = [
  {
    id = "tenant_isolation"
    description = "Restrict rows to the calling user's tenant"
    match { type = "namespace", schema = "db", namespace = "dbo" }
    predicate {
      type = "eq"
      column = "tenant_id"
      value { kind = "user-attr", attribute = "tenant_id" }
    }
  }
]
