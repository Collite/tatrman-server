apiVersion: v2
name: kadmos
description: |
  The Kantheon kadmos service (NLP foundation, Python/FastAPI) — an env-agnostic Helm chart.
  Holds no cluster knowledge: image, replicas, resources, telemetry endpoint are all values.
  Per-environment values live in the deploying repo (Olymp clusters via ArgoCD multi-source D3';
  test contexts via the Olymp scripted harness). Converted from the kustomize base/overlays,
  mirroring services/theseus/k8s (HTTP-only — uvicorn, no gRPC port).
type: application
version: 0.1.0
appVersion: "dev"
