{{/*
RG-P1.S2.T6 — self-hosted UFAL engine backends (MorphoDiTa, NameTag 3).

Separate Deployments + Services from the engine-free front. These are UFAL
servers (not ttr-service-shaped: no /readyz, native protocols), so they render
as plain manifests with tcpSocket probes. Q-10 §5 resource requests + a
generous NameTag readiness for the ~5 s cold start.
*/}}
{{- range $name, $b := .Values.backends }}
{{- if $b.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $name }}
  labels:
    app.kubernetes.io/name: ttr-nlp-{{ $name }}
    app.kubernetes.io/part-of: ttr-nlp
    app.kubernetes.io/component: engine-backend
spec:
  replicas: {{ $b.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ttr-nlp-{{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ttr-nlp-{{ $name }}
        app.kubernetes.io/part-of: ttr-nlp
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $b.image.repository }}:{{ $b.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $b.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ $b.port }}
          # tcpSocket — the UFAL servers expose no GET health path.
          readinessProbe:
            tcpSocket: { port: {{ $b.port }} }
            initialDelaySeconds: {{ if eq $name "nametag3" }}15{{ else }}3{{ end }}
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket: { port: {{ $b.port }} }
            initialDelaySeconds: {{ if eq $name "nametag3" }}30{{ else }}10{{ end }}
            periodSeconds: 15
          resources: {{- toYaml $b.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ttr-nlp-{{ $name }}
  labels:
    app.kubernetes.io/name: ttr-nlp-{{ $name }}
    app.kubernetes.io/part-of: ttr-nlp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ttr-nlp-{{ $name }}
  ports:
    - name: http
      port: {{ $b.port }}
      targetPort: {{ $b.port }}
{{- end }}
{{- end }}
