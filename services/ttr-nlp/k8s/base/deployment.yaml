apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp
  namespace: kantheon
  labels:
    app: nlp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nlp
  template:
    metadata:
      labels:
        app: nlp
    spec:
      containers:
        - name: nlp
          image: nlp:dev
          ports:
            - name: http
              containerPort: 7270
          env:
            # The Dockerfile CMD binds uvicorn to UVICORN_PORT (default 7270).
            - name: UVICORN_PORT
              value: "7270"
            - name: NLP_SERVICE_PORT
              value: "7270"
            - name: OTEL_EXPORTER_OTLP_HOST
              value: alloy.observability.svc.cluster.local
            - name: OTEL_EXPORTER_OTLP_GRPC_PORT
              value: "4317"
            - name: NLP_SERVICE_OTEL_PROTOCOL
              value: grpc
          readinessProbe:
            httpGet:
              path: /readyz
              port: 7270
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7270
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: 1Gi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: nlp
  namespace: kantheon
  labels:
    app: nlp
spec:
  selector:
    app: nlp
  ports:
    - name: http
      port: 7270
      targetPort: 7270
