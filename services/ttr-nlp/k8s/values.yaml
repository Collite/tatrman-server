# Default values for nlp (Python/FastAPI, HTTP-only). Env-agnostic: sane defaults, NO cluster
# knowledge. Deploying environments override image, telemetry, and any extra wiring.

replicaCount: 1

image:
  repository: ghcr.io/collite/ttr-nlp
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Front ports: gRPC is the service contract (RG-P1.S1); HTTP is the dev/health
# mirror (uvicorn).
ports:
  http: 7270
  grpc: 7271

service:
  type: ClusterIP

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: "1"

# OpenTelemetry — nlp uses a host + gRPC-port + protocol triple (not a single endpoint URL).
# Rendered only when enabled + otlpHost set; leave disabled for test runs.
telemetry:
  enabled: false
  otlpHost: ""
  otlpGrpcPort: 4317
  protocol: grpc

# Secret-backed env (valueFrom.secretKeyRef) — none by default.
secretEnv: []

# Any other env (a deploying env REPLACES this list).
extraEnv: []

# Probes — FastAPI exposes /readyz + /healthz.
readinessProbe:
  path: /readyz
  initialDelaySeconds: 2
  periodSeconds: 3
  failureThreshold: 20
livenessProbe:
  path: /healthz
  initialDelaySeconds: 5
  periodSeconds: 10

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

# ── RG-P1.S2/S3 self-hosted engine backends ────────────────────────────────
# Separate workloads (own images, models baked, independent scaling). The front
# is engine-free and reaches these over the uniform / native HTTP protocols;
# the front's httpx client is OTel-instrumented, so front→backend calls are
# traced without the backends self-instrumenting. Resource requests are the
# Q-10 §5 sizing (arm64 dev numbers — re-baseline on the x86 cluster).
backends:
  # MorphoDiTa (S2) — cs tokenize/lemma/POS. C++, featherweight, scales with
  # concurrency. --max_request_size raised for BatchLemmatize.
  morphodita:
    enabled: true
    image:
      repository: ghcr.io/collite/ttr-nlp-morphodita
      tag: ""
      pullPolicy: IfNotPresent
    port: 8080
    replicaCount: 1
    resources:
      requests: { cpu: 250m, memory: 384Mi }
      limits: { memory: 512Mi }
  # NameTag 3 (S2) — cs/en NER. torch CPU, thread-bound (~12 rps/replica) →
  # scale by replicas; generous readiness for the ~5 s cold start.
  nametag3:
    enabled: true
    image:
      repository: ghcr.io/collite/ttr-nlp-nametag3
      tag: ""
      pullPolicy: IfNotPresent
    port: 8001
    replicaCount: 2
    resources:
      requests: { cpu: "1", memory: 1536Mi }
      limits: { memory: 2Gi }
  # Stanza (S3) — cs DEP_PARSE (resolver span-proposal hot path) + en
  # tokenize/lemma/POS/dep/NER. torch CPU; generous readiness for cold start.
  stanza:
    enabled: true
    image:
      repository: ghcr.io/collite/ttr-nlp-stanza
      tag: ""
      pullPolicy: IfNotPresent
    port: 8090
    replicaCount: 1
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits: { memory: 2Gi }
  # spaCy (S3) — en tokenize + NER fallback. Lightweight, no torch.
  spacy:
    enabled: true
    image:
      repository: ghcr.io/collite/ttr-nlp-spacy
      tag: ""
      pullPolicy: IfNotPresent
    port: 8091
    replicaCount: 1
    resources:
      requests: { cpu: 250m, memory: 384Mi }
      limits: { memory: 768Mi }
