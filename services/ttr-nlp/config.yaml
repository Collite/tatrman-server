# ttr-nlp front configuration (RG-P1.S1)
#
# The front is ENGINE-FREE: every model-bearing engine is an HTTP-adapter client
# to its own backend image (`url`), launched with an EXPLICIT model id (`model`,
# S-1). Only `langid` (lingua) runs in-process. Each backend declares its
# pinning `tier`: SELF_HOSTED_PINNED (in-cluster, conformant) or REMOTE_UNPINNED
# (Lindat dev/eval — RG-NLP-002).
#
# NOTE (S1): the self-hosted MorphoDiTa + NameTag 3 backend IMAGES land in
# RG-P1.S2 and Stanza + spaCy in RG-P1.S3. The in-cluster URLs below are the
# target state; the Lindat dev endpoints (commented) are the selectable
# REMOTE_UNPINNED tier the S2.T4 repoint toggles between.

service:
  host: "0.0.0.0"
  port: 7270        # REST mirror (dev/health only)
  grpc_port: 7271   # gRPC — the service contract

engines:
  # ---- self-hosted backends (models baked, digest-pinned; RG-P1.S2/S3) ----
  morphodita:
    enabled: true
    url: "http://ttr-nlp-morphodita:8080/tag"
    model: "czech-morfflex2.0-pdtc1.0-220710"   # = czech-morfflex2.0+pdtc (Q-10)
    model_version: "czech-morfflex2.0-pdtc1.0-220710"
    tier: "SELF_HOSTED_PINNED"
    timeout_seconds: 30
    max_retries: 3
    # Dev/eval REMOTE_UNPINNED tier (S2.T4 env-toggle):
    #   url: "https://lindat.mff.cuni.cz/services/morphodita/api/tag"
    #   tier: "REMOTE_UNPINNED"
    #   rate_limit_per_minute: 5

  nametag3:
    enabled: true
    url: "http://ttr-nlp-nametag3:8001/recognize"
    model: "nametag3-czech-cnec2.0-240830"       # Q-10
    model_version: "nametag3-czech-cnec2.0-240830"
    tier: "SELF_HOSTED_PINNED"
    timeout_seconds: 60      # torch CPU; generous per Q-10 cold-start
    max_retries: 3
    # Dev/eval REMOTE_UNPINNED tier:
    #   url: "https://lindat.mff.cuni.cz/services/nametag/api/recognize"
    #   tier: "REMOTE_UNPINNED"
    #   rate_limit_per_minute: 5

  stanza:
    enabled: true
    url: "http://ttr-nlp-stanza:8090"
    model: "stanza-cs-en"
    model_version: "stanza-1.10.0"
    tier: "SELF_HOSTED_PINNED"
    timeout_seconds: 60

  spacy:
    enabled: true
    url: "http://ttr-nlp-spacy:8091"
    model: "en_core_web_md"
    model_version: "en_core_web_md-3.8.0"
    tier: "SELF_HOSTED_PINNED"
    timeout_seconds: 30

  langid:
    enabled: true
    model: "lingua"
    model_version: "lingua-2.0"

# Per-op-per-language routing: {op}.{lang} -> engine name (+ optional .fallback).
op_routing:
  # Czech (cs) — UFAL stack; Stanza's cs bundle has no NER head, so NER routes
  # to NameTag 3 and DEP_PARSE (the resolver's span-proposal feed) to Stanza.
  TOKENIZE.cs: "morphodita"
  SENTENCE_SPLIT.cs: "morphodita"
  LEMMATIZE.cs: "morphodita"
  POS_TAG.cs: "morphodita"
  DEP_PARSE.cs: "stanza"
  NER.cs: "nametag3"

  # English (en)
  TOKENIZE.en: "stanza"
  LEMMATIZE.en: "stanza"
  POS_TAG.en: "stanza"
  DEP_PARSE.en: "stanza"
  NER.en: "stanza"
  NER.en.fallback: "spacy"

  DETECT_LANGUAGE: "langid"

default_language: "cs"
log_level: "INFO"
