ktor {
    deployment {
        port = 7122
        port = ${?MONEY_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.money.ApplicationKt.module ]
    }
}

grpc {
    port = 7222
    port = ${?MONEY_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

# metadata gRPC client. money discovers amount / amount_domestic / currency_code columns and the
# fx_rate table per package via the A3 SemanticHints accessors (ListObjects semantic_role/kind,
# GetObject). Legacy/canonical env-name duality mirrors the other services (canonical wins, last).
metadata {
    host = "metadata"
    host = ${?METADATA_HOST}
    host = ${?METADATA_SERVER}
    port = 7212
    port = ${?METADATA_GRPC_PORT}
    port = ${?METADATA_SERVER_GRPC_PORT}
    deadline-seconds = 30
    deadline-seconds = ${?METADATA_GRPC_DEADLINE_SECONDS}
}

money {
    # Below this confidence the rules path defers to the llm-gateway fallback (source: LLM).
    confidence-threshold = 0.6
    confidence-threshold = ${?MONEY_CONFIDENCE_THRESHOLD}

    # Fallback currency when the request context carries no default_currency (DF v1 reality: CZK).
    default-currency = "CZK"
    default-currency = ${?MONEY_DEFAULT_CURRENCY}

    # Fallback tolerance half-width (%) for "around X" when context.tolerance_pct is unset.
    default-tolerance-pct = 10.0
    default-tolerance-pct = ${?MONEY_DEFAULT_TOLERANCE_PCT}

    # llm-gateway fallback for spans the rules path can't ground. Off (empty url) => rules-only.
    llm-fallback {
        enabled = false
        enabled = ${?MONEY_LLM_FALLBACK_ENABLED}
        gateway-url = ""
        gateway-url = ${?MONEY_LLM_FALLBACK_GATEWAY_URL}
        model = "claude-haiku-4-5"
        model = ${?MONEY_LLM_FALLBACK_MODEL}
        timeout-ms = 10000
        timeout-ms = ${?MONEY_LLM_FALLBACK_TIMEOUT_MS}
        api-key = ""
        api-key = ${?MONEY_LLM_FALLBACK_API_KEY}
    }

    # Boots without a metadata gRPC client when true (tests / smoke-only). Production leaves false.
    use-fixture-model = false
    use-fixture-model = ${?MONEY_USE_FIXTURE_MODEL}
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_MONEY}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
