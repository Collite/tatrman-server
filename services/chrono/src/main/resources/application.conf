ktor {
    deployment {
        port = 7120
        port = ${?CHRONO_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.chrono.ApplicationKt.module ]
    }
}

grpc {
    port = 7220
    port = ${?CHRONO_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

# metadata gRPC client. chrono discovers period tables + date-role columns per package
# via the A3 SemanticHints accessors (ListObjects semantic_role/semantic_kind, GetObject).
# Legacy/canonical env-name duality mirrors the other services (canonical wins, listed last).
metadata {
    host = "metadata"
    host = ${?METADATA_HOST}
    host = ${?METADATA_SERVER}
    port = 7212
    port = ${?METADATA_GRPC_PORT}
    port = ${?METADATA_SERVER_GRPC_PORT}
    deadline-seconds = 30
    deadline-seconds = ${?METADATA_GRPC_DEADLINE_SECONDS}
}

chrono {
    # Below this confidence the rules path defers to the llm-gateway fallback (source: LLM).
    confidence-threshold = 0.6
    confidence-threshold = ${?CHRONO_CONFIDENCE_THRESHOLD}
    # Default period code_format when a period_table's PERIOD_CODE column carries no code_format param.
    default-code-format = "yyyyMM"
    default-code-format = ${?CHRONO_DEFAULT_CODE_FORMAT}

    # llm-gateway fallback for spans the rules path can't ground. Off (empty url) => rules-only:
    # below-threshold spans return UNGROUNDABLE instead of calling the gateway.
    llm-fallback {
        enabled = false
        enabled = ${?CHRONO_LLM_FALLBACK_ENABLED}
        gateway-url = ""
        gateway-url = ${?CHRONO_LLM_FALLBACK_GATEWAY_URL}
        model = "claude-haiku-4-5"
        model = ${?CHRONO_LLM_FALLBACK_MODEL}
        timeout-ms = 10000
        timeout-ms = ${?CHRONO_LLM_FALLBACK_TIMEOUT_MS}
        api-key = ""
        api-key = ${?CHRONO_LLM_FALLBACK_API_KEY}
    }

    # Boots without a metadata gRPC client when true (tests / smoke-only). Production leaves false.
    use-fixture-model = false
    use-fixture-model = ${?CHRONO_USE_FIXTURE_MODEL}
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_CHRONO}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
