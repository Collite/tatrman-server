ktor {
    deployment {
        port = 7275
        port = ${?TRANSLATE_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.translate.ApplicationKt.module ]
    }
}

grpc {
    port = 7276
    port = ${?TRANSLATE_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per Round 4 wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

// Veles (the model-graph service, formerly "metadata") — Translate polls its
// GetSnapshot for the model and calls GetQuery for saved-query bodies.
veles {
    host = "localhost"
    host = ${?VELES_GRPC_HOST}
    port = 7261
    port = ${?VELES_GRPC_PORT}
    poll-interval-seconds = 600
    poll-interval-seconds = ${?VELES_POLL_INTERVAL_SECONDS}
    // Deadline for the GetSnapshot fetch. The snapshot is the full model and the
    // first fetch races a cold JVM (class-load/Calcite warmup) + cold gRPC
    // channel, so 10s was too tight (DEADLINE_EXCEEDED while the call was still
    // buffered, before Veles even saw it). 30s default; tune via env.
    snapshot-deadline-seconds = 30
    snapshot-deadline-seconds = ${?VELES_SNAPSHOT_DEADLINE_SECONDS}
    // Retry cadence while the FIRST load is still pending (Translate is on the
    // boot fixture → schema_object_unknown). Much shorter than the steady-state
    // poll so a cold-start blip doesn't strand Translate for one full poll.
    initial-retry-seconds = 5
    initial-retry-seconds = ${?VELES_INITIAL_RETRY_SECONDS}
}

translate {
    // For local + test contexts when no Veles service is reachable, the
    // service can boot with a static fixture model and serve requests against
    // it. Production deployments leave this false; the Veles-client wiring
    // takes over.
    use-fixture-model = false
    use-fixture-model = ${?TRANSLATE_USE_FIXTURE_MODEL}
}

telemetry {
    // Only `enabled` is read from HOCON (KtorConfigFactory). The OTLP endpoint
    // and protocol come straight from the standard env vars
    // (OTEL_EXPORTER_OTLP_ENDPOINT / TRANSLATE_OTEL_PROTOCOL) via OtelEndpointConfig.
    enabled = false
    enabled = ${?OTEL_ENABLED_TRANSLATE}
}
