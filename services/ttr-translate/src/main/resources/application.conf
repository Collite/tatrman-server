ktor {
    deployment {
        port = 7275
        port = ${?PROTEUS_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.kantheon.proteus.ApplicationKt.module ]
    }
}

grpc {
    port = 7276
    port = ${?PROTEUS_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per Round 4 wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

// Ariadne (the model-graph service, formerly "metadata") — Proteus polls its
// GetSnapshot for the model and calls GetQuery for saved-query bodies.
ariadne {
    host = "localhost"
    host = ${?ARIADNE_GRPC_HOST}
    port = 7261
    port = ${?ARIADNE_GRPC_PORT}
    poll-interval-seconds = 600
    poll-interval-seconds = ${?ARIADNE_POLL_INTERVAL_SECONDS}
    // Deadline for the GetSnapshot fetch. The snapshot is the full model and the
    // first fetch races a cold JVM (class-load/Calcite warmup) + cold gRPC
    // channel, so 10s was too tight (DEADLINE_EXCEEDED while the call was still
    // buffered, before Ariadne even saw it). 30s default; tune via env.
    snapshot-deadline-seconds = 30
    snapshot-deadline-seconds = ${?ARIADNE_SNAPSHOT_DEADLINE_SECONDS}
    // Retry cadence while the FIRST load is still pending (Proteus is on the
    // boot fixture → schema_object_unknown). Much shorter than the steady-state
    // poll so a cold-start blip doesn't strand Proteus for one full poll.
    initial-retry-seconds = 5
    initial-retry-seconds = ${?ARIADNE_INITIAL_RETRY_SECONDS}
}

proteus {
    // For local + test contexts when no Ariadne service is reachable, the
    // service can boot with a static fixture model and serve requests against
    // it. Production deployments leave this false; the Ariadne-client wiring
    // takes over.
    use-fixture-model = false
    use-fixture-model = ${?PROTEUS_USE_FIXTURE_MODEL}
}

telemetry {
    // Only `enabled` is read from HOCON (KtorConfigFactory). The OTLP endpoint
    // and protocol come straight from the standard env vars
    // (OTEL_EXPORTER_OTLP_ENDPOINT / PROTEUS_OTEL_PROTOCOL) via OtelEndpointConfig.
    enabled = false
    enabled = ${?OTEL_ENABLED_PROTEUS}
}
