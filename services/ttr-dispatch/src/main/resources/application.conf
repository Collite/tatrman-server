ktor {
    deployment {
        port = 7290
        port = ${?DISPATCH_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.dispatch.ApplicationKt.module ]
    }
}

grpc {
    port = 7291
    port = ${?DISPATCH_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per Round 4 wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

dispatch {
    # DF-D04 / Phase 06 C1 — declared worker slots (the Dispatchs). Each entry needs an
    # env-var-backed endpoint; entries with an empty endpoint are skipped at boot so the
    # same conf works in local dev (no env vars set → no workers wired) and in deployments
    # (overlay sets the env vars to activate the targets). Add more slots here when new
    # engines come online.
    workers = [
        {
            # Mssql — the MSSQL worker (workers/mssql; default gRPC port 7296).
            endpoint = ${?DISPATCH_WORKER_MSSQL_ENDPOINT}
            role-hint = "mssql"
        }
        {
            # Polars — the Polars worker (workers/polars; default gRPC 7301).
            # Supports stateful sessions (workspace dfs); sticky routing pins
            # workspace queries to a specific pod. Activated in Stage 3.4.
            endpoint = ${?DISPATCH_WORKER_POLARS_ENDPOINT}
            role-hint = "polars"
        }
        {
            # Postgres — the Postgres worker (workers/postgres; default gRPC 7303). Stateless;
            # reads under per-tenant RLS. Activated by the overlay that sets the endpoint;
            # `pg-midas` table/qname patterns route here via world.table-connections.
            endpoint = ${?DISPATCH_WORKER_POSTGRES_ENDPOINT}
            role-hint = "postgres"
        }
    ]
    capability-refresh {
        interval-seconds = 60
        interval-seconds = ${?DISPATCH_CAP_REFRESH_INTERVAL}
        timeout-seconds = 5
        timeout-seconds = ${?DISPATCH_CAP_REFRESH_TIMEOUT}
        degraded-after-failures = 2
        unreachable-after-failures = 5
    }
    sticky {
        idle-timeout-seconds = 3600
        idle-timeout-seconds = ${?DISPATCH_STICKY_IDLE_SECONDS}
        sweep-interval-seconds = 60
        max-entries = 10000
        # DF-D02: when the pinned worker is no longer in the healthy candidate set, fall over to
        # the first healthy candidate and emit a `sticky_failover` pipeline-warning instead of
        # throwing `session_lost`. Default off (strict) — flip on once multi-pod sticky routing
        # (DF-D03, Phase 06) makes failover safe for session state.
        allow-failover = false
        allow-failover = ${?DISPATCH_STICKY_ALLOW_FAILOVER}
    }
    # Skips the capability poller when true. Tests and local smoke contexts
    # use this; production deployments leave it false.
    use-fixture = false
    use-fixture = ${?DISPATCH_USE_FIXTURE}
}

world {
    default-connection = "df-test"
    default-connection = ${?WORLD_DEFAULT_CONNECTION}
    table-connections {
        # Pattern → connection_id; supports trailing-* prefixes.
        # EMPTY BY DEFAULT — single-connection deployments route via `default-connection`
        # (WORLD_DEFAULT_CONNECTION per deployment). Do NOT bake context-specific table→connection
        # entries here: the base image is shared by every deployment, so any concrete table name
        # baked in hijacks routing for *any* model that reuses that name.
        #
        # (2026-07-19) The former WS-T2 TPC-DS block — `db.dbo.{store_sales,catalog_sales,web_sales,
        # date_dim,item,customer,store} = pg-tpcds` — was removed for exactly this reason: it assumed
        # those names were "distinct from real models", but the Hartland demo model reuses the TPC-DS
        # schema verbatim, so every Hartland query derived `pg-tpcds` and failed with
        # `no_worker_for_connection`. Single-warehouse contexts (tpcds-query, hartland) now set
        # `WORLD_DEFAULT_CONNECTION` per deployment instead. A future multi-connection deployment that
        # genuinely needs table-level routing should inject entries via an overlay-provided config
        # (values-driven mount/env), not the base conf.
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_DISPATCH}
}
