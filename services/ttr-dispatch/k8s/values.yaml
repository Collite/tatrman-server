# Default values for dispatch. Env-agnostic: sane defaults, NO cluster knowledge. Deploying
# environments (Olymp cluster values, or test-context values) override image, telemetry,
# and the downstream wiring in extraEnv.

replicaCount: 1

image:
  repository: dispatch
  # Defaults to .Chart.appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# The service listens on an HTTP port and a gRPC port (other constellation services call it
# over gRPC). These are the container ports AND the service ports AND the probe target.
ports:
  http: 7290
  grpc: 7291

service:
  type: ClusterIP

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: "1"

# OpenTelemetry. These services read a single OTLP endpoint URL (OTEL_EXPORTER_OTLP_ENDPOINT)
# plus the per-service OTEL_ENABLED_DISPATCH flag. Point `endpoint` at a collector (e.g. the
# cluster's Alloy) and set enabled; leave disabled where no collector exists (e.g. test runs).
telemetry:
  enabled: false
  # e.g. http://alloy.observability.svc.cluster.local:4317
  endpoint: ""
  serviceName: dispatch

# Downstream constellation wiring + any other env. Defaults match the constellation's stable
# in-cluster service names (env-agnostic — every cluster names them the same). A deploying
# env REPLACES this list to retarget (e.g. a test context points the LLM upstream at WireMock).
extraEnv:
  - { name: DISPATCH_WORKER_MSSQL_ENDPOINT, value: "mssql:7296" }
  - { name: DISPATCH_WORKER_POLARS_ENDPOINT, value: "polars:7301" }
  # Postgres — the Postgres worker (gRPC 7303). A permanent worker since 2026-06-23, so it
  # ships wired by default (the application.conf slot skips an unset endpoint). Gates MP-1.
  - { name: DISPATCH_WORKER_POSTGRES_ENDPOINT, value: "postgres:7303" }

# Probes (HTTP on the http port).
readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30
livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
