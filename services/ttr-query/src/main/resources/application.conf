ktor {
    deployment {
        port = 7305
        port = ${?THESEUS_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.kantheon.theseus.ApplicationKt.module ]
    }
}

grpc {
    port = 7306
    port = ${?THESEUS_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per Round 4 wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

# Proteus — the translator (lang ↔ RelNode ↔ SQL), gRPC 7276.
proteus {
    host = "proteus"
    host = ${?PROTEUS_SERVER}
    port = 7276
    port = ${?PROTEUS_SERVER_GRPC_PORT}
    # The FIRST parse after a (re)start pays Calcite planner cold-start
    # (~30-40s; warm parses are ~2s), which blew the old 30s deadline → CANCELLED
    # + retry. 120s gives the cold parse room to finish in one shot.
    deadline-seconds = 120
    deadline-seconds = ${?PROTEUS_DEADLINE_SECONDS}
}

# Argos — the validator (RLS + TopN + column rules), gRPC 7286.
argos {
    host = "argos"
    host = ${?ARGOS_SERVER}
    port = 7286
    port = ${?ARGOS_SERVER_GRPC_PORT}
    deadline-seconds = 120
    deadline-seconds = ${?ARGOS_DEADLINE_SECONDS}
}

# Kyklop — the worker dispatcher, gRPC 7291.
kyklop {
    host = "kyklop"
    host = ${?KYKLOP_SERVER}
    port = 7291
    port = ${?KYKLOP_SERVER_GRPC_PORT}
}

cache {
    max-entries = 1000
    max-entries = ${?THESEUS_CACHE_MAX}
    expire-after-write-minutes = 60
    expire-after-write-minutes = ${?THESEUS_CACHE_TTL_MIN}
}

retry {
    max-attempts = 3
    max-attempts = ${?THESEUS_RETRY_MAX}
    initial-backoff-millis = 100
    initial-backoff-millis = ${?THESEUS_RETRY_BACKOFF_MS}
    multiplier = 3.0
    jitter-percent = 50
}

theseus {
    # Skip live gRPC client wiring on boot — used by tests and local smoke
    # contexts that construct the service directly.
    use-fixture = false
    use-fixture = ${?THESEUS_USE_FIXTURE}
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_THESEUS}
}
