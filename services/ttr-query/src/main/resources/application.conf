ktor {
    deployment {
        port = 7305
        port = ${?QUERY_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.query.ApplicationKt.module ]
    }
}

grpc {
    port = 7306
    port = ${?QUERY_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per Round 4 wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

# Translate — the translator (lang ↔ RelNode ↔ SQL), gRPC 7276.
translate {
    host = "translate"
    host = ${?TRANSLATE_SERVER}
    port = 7276
    port = ${?TRANSLATE_SERVER_GRPC_PORT}
    # The FIRST parse after a (re)start pays Calcite planner cold-start
    # (~30-40s; warm parses are ~2s), which blew the old 30s deadline → CANCELLED
    # + retry. 120s gives the cold parse room to finish in one shot.
    deadline-seconds = 120
    deadline-seconds = ${?TRANSLATE_DEADLINE_SECONDS}
}

# Validate — the validator (RLS + TopN + column rules), gRPC 7286.
validate {
    host = "validate"
    host = ${?VALIDATE_SERVER}
    port = 7286
    port = ${?VALIDATE_SERVER_GRPC_PORT}
    deadline-seconds = 120
    deadline-seconds = ${?VALIDATE_DEADLINE_SECONDS}
}

# Dispatch — the worker dispatcher, gRPC 7291.
dispatch {
    host = "dispatch"
    host = ${?DISPATCH_SERVER}
    port = 7291
    port = ${?DISPATCH_SERVER_GRPC_PORT}
}

cache {
    max-entries = 1000
    max-entries = ${?QUERY_CACHE_MAX}
    expire-after-write-minutes = 60
    expire-after-write-minutes = ${?QUERY_CACHE_TTL_MIN}
}

retry {
    max-attempts = 3
    max-attempts = ${?QUERY_RETRY_MAX}
    initial-backoff-millis = 100
    initial-backoff-millis = ${?QUERY_RETRY_BACKOFF_MS}
    multiplier = 3.0
    jitter-percent = 50
}

query {
    # Skip live gRPC client wiring on boot — used by tests and local smoke
    # contexts that construct the service directly.
    use-fixture = false
    use-fixture = ${?QUERY_USE_FIXTURE}
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_QUERY}
}
