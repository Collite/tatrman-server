# Default values for query. Env-agnostic: sane defaults, NO cluster knowledge. Deploying
# environments (Olymp cluster values, or test-context values) override image, telemetry,
# and the downstream wiring in extraEnv.

replicaCount: 1

image:
  repository: query
  # Defaults to .Chart.appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# The service listens on an HTTP port and a gRPC port (other constellation services call it
# over gRPC). These are the container ports AND the service ports AND the probe target.
ports:
  http: 7305
  grpc: 7306

service:
  type: ClusterIP

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: "1"

# OpenTelemetry. These services read a single OTLP endpoint URL (OTEL_EXPORTER_OTLP_ENDPOINT)
# plus the per-service OTEL_ENABLED_QUERY flag. Point `endpoint` at a collector (e.g. the
# cluster's Alloy) and set enabled; leave disabled where no collector exists (e.g. test runs).
telemetry:
  enabled: false
  # e.g. http://alloy.observability.svc.cluster.local:4317
  endpoint: ""
  serviceName: query

# Downstream constellation wiring + any other env. Defaults match the constellation's stable
# in-cluster service names (env-agnostic — every cluster names them the same). A deploying
# env REPLACES this list to retarget (e.g. a test context points the LLM upstream at WireMock).
extraEnv:
  - { name: TRANSLATE_SERVER, value: "translate" }
  - { name: VALIDATE_SERVER, value: "validate" }
  - { name: DISPATCH_SERVER, value: "dispatch" }

# Probes (HTTP on the http port).
readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30
livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
