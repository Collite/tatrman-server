# Default values for geo (RG-P3 grounding · LOCATION). Env-agnostic: sane defaults, NO cluster
# knowledge. Deploying environments override image, telemetry, the metadata gRPC target, the
# Nominatim geocoder endpoint, the durable boundary-cache Postgres, and the llm-gateway fallback.
#
# Q-19: the chart ships NO default Nominatim endpoint — public OSM Nominatim policy restricts
# production use, so a deploying env must point `nominatim.baseUrl` at a self-hosted instance.
# Unset ⇒ the geo capability reports dark and fails loud, never wrong (RS-19 / RG-GND-001).

replicaCount: 1

image:
  repository: ghcr.io/collite/geo
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

ports:
  http: 7121
  grpc: 7221

service:
  type: ClusterIP

resources:
  requests:
    memory: 384Mi
    cpu: 150m
  limits:
    memory: 768Mi
    cpu: "1"

telemetry:
  enabled: false
  endpoint: ""
  serviceName: geo

# Metadata (Veles) gRPC target — geo discovers geo_lat/geo_lon columns + the POI entity.
metadata:
  host: veles
  grpcPort: 7261

# Nominatim geocoder — NO default (see Q-19 above). Self-host and set baseUrl to enable geocoding.
# The public OSM Nominatim (nominatim.openstreetmap.org) is NOT a valid production endpoint — its
# usage policy forbids heavy/automated use — so this ships empty on purpose. RÚIAN (the ČÚZK CZ
# administrative register) is the deferred CZ-deterministic geocoding arc; until it lands, a
# self-hosted Nominatim is the supported source.
nominatim:
  baseUrl: ""
  userAgent: "tatrman-geo/1.0"

# Durable boundary cache (PostGIS/Postgres). Disabled ⇒ in-memory cache. Enable + point at a
# service-local Postgres to persist geocoded boundaries across restarts. Password via secretEnv.
db:
  enabled: false
  host: ""
  port: 5432
  name: geo
  user: geo
  boundaryCacheTtlDays: 90

# Secret-backed env (valueFrom.secretKeyRef); optional so the pod boots without it (in-memory mode).
secretEnv:
  - { name: GEO_DB_PASSWORD, secretName: geo-db, secretKey: password, optional: true }

# Install-time boundary-cache priming (RG-P3.S2.T2 · org.tatrman.geo.cache.PrimingRunner).
# A best-effort Helm post-install/upgrade hook Job that warms the durable boundary cache
# from `places` (comma/newline-separated place names — the model POI names + distinct member
# cities) so those places resolve even when Nominatim is later unreachable. Off by default;
# needs `db.enabled` (a durable store) and a reachable `nominatim.baseUrl` to be useful — an
# outage during priming is counted, not fatal. `command` overrides the geo image's default
# entrypoint to run the primer main class (the jib classpath layout).
boundaryPrime:
  enabled: false
  places: ""
  backoffLimit: 2
  command: ["java", "-cp", "@/app/jib-classpath-file", "org.tatrman.geo.cache.PrimingRunner"]

llmFallback:
  enabled: false
  gatewayUrl: ""

useFixtureModel: false

extraEnv: []

readinessProbe:
  path: /ready
  initialDelaySeconds: 2
  periodSeconds: 3
  failureThreshold: 20
livenessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
