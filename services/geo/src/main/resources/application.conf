ktor {
    deployment {
        port = 7121
        port = ${?GEO_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.geo.ApplicationKt.module ]
    }
}

grpc {
    port = 7221
    port = ${?GEO_SERVER_GRPC_PORT}
    max-message-size-bytes = 33554432  // 32 MiB per wire-format Rule 5
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

# metadata gRPC client. geo discovers POI entities (A3 kind: poi) + geo-role columns
# (geo_lat/geo_lon/geo_point) per package via the A3 SemanticHints accessors.
metadata {
    host = "metadata"
    host = ${?METADATA_HOST}
    host = ${?METADATA_SERVER}
    port = 7212
    port = ${?METADATA_GRPC_PORT}
    port = ${?METADATA_SERVER_GRPC_PORT}
    deadline-seconds = 30
    deadline-seconds = ${?METADATA_GRPC_DEADLINE_SECONDS}
}

geo {
    confidence-threshold = 0.6
    confidence-threshold = ${?GEO_CONFIDENCE_THRESHOLD}

    # External boundary sources (A9.3/A9.4). RÚIAN preferred for CZ admin units; Nominatim otherwise.
    # OSM usage policy requires a descriptive User-Agent + rate limiting; boundaries are cached.
    nominatim {
        base-url = "https://nominatim.openstreetmap.org"
        base-url = ${?GEO_NOMINATIM_BASE_URL}
        user-agent = "df-ai-platform-geo/1.0 (grounding)"
        user-agent = ${?GEO_NOMINATIM_USER_AGENT}
    }
    ruian {
        base-url = ""
        base-url = ${?GEO_RUIAN_BASE_URL}
    }
    # Cached polygon staleness before a refresh-on-read (A9.4).
    boundary-cache-ttl-days = 90
    boundary-cache-ttl-days = ${?GEO_BOUNDARY_CACHE_TTL_DAYS}

    # Service-local Postgres for the durable boundary cache (A9.4, Exposed DSL + Flyway). Disabled
    # by default → the resolver falls back to the in-memory boundary store. Shape matches the shared
    # DatabaseConnection.fromConfig helper (type/host/port/database/user/password).
    db {
        enabled = false
        enabled = ${?GEO_DB_ENABLED}
        type = "POSTGRES"
        host = ""
        host = ${?GEO_DB_HOST}
        port = "5432"
        port = ${?GEO_DB_PORT}
        database = "geo"
        database = ${?GEO_DB_NAME}
        user = "geo"
        user = ${?GEO_DB_USER}
        password = ""
        password = ${?GEO_DB_PASSWORD}
    }

    llm-fallback {
        enabled = false
        enabled = ${?GEO_LLM_FALLBACK_ENABLED}
        gateway-url = ""
        gateway-url = ${?GEO_LLM_FALLBACK_GATEWAY_URL}
        model = "claude-haiku-4-5"
        model = ${?GEO_LLM_FALLBACK_MODEL}
        timeout-ms = 10000
        timeout-ms = ${?GEO_LLM_FALLBACK_TIMEOUT_MS}
        api-key = ""
        api-key = ${?GEO_LLM_FALLBACK_API_KEY}
    }

    use-fixture-model = false
    use-fixture-model = ${?GEO_USE_FIXTURE_MODEL}
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_GEO}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
