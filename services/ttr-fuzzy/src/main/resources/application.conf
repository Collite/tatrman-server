ktor {
    deployment {
        port = 7265
        port = ${?FUZZY_HTTP_PORT}
        port = ${?FUZZY_MATCHER_SERVER_PORT}  # legacy ai-platform env, kept as a no-op override
    }
    application {
        modules = [ org.tatrman.fuzzy.ApplicationKt.module ]
    }
}

security {
    enabled = false
    enabled = ${?SECURITY_ENABLED}
    api-keys = ${?API_KEYS}
    # S-3: admin authority for operator endpoints (/refresh). Comma-separated
    # admin API keys; the `admin` role via X-Roles (H-2 OBO) also authorizes.
    admin-api-keys = ""
    admin-api-keys = ${?FUZZY_ADMIN_API_KEYS}
    keycloak {
        url = ${?KEYCLOAK_URL}
        realm = ${?KEYCLOAK_REALM}
    }
    service {
        name = "fuzzy"
        name = ${?SECURITY_SERVICE_NAME}
        keycloak-client-id = ${?FUZZY_KEYCLOAK_CLIENT_ID}
        keycloak-client-secret = ${?FUZZY_KEYCLOAK_CLIENT_SECRET}
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_FUZZY}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}

# Fuzzy v1 (kantheon — Phase 2.2 fork).
#
# Two loader sources (fuzzy.loader.source):
#   static   (default): the in-repo JSON catalog (fuzzy-catalog.json) — no DB,
#                       local/CI-friendly, the Czech-aware fixture set.
#   metadata          : the full ai-platform fuzzy-matcher behaviour, re-forked
#                       2026-06-14 — Fuzzy asks Veles for the fuzzy-tagged
#                       columns, composes `SELECT pk, col FROM table`, queries
#                       the warehouse (fuzzy.type + fuzzy.{postgres,mssql}), and
#                       populates the catalog. Set FUZZY_LOADER_SOURCE=metadata
#                       + FUZZY_DB_TYPE to enable.
# Czech NLP (Nlp) stays disabled until Stage 2.3.
fuzzy {
    grpc {
        port = 7266
        port = ${?FUZZY_GRPC_PORT}
        reflection-enabled = false
        reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
    }

    refreshIntervalSeconds = 3600
    refreshIntervalSeconds = ${?FUZZY_REFRESH_INTERVAL_SECONDS}

    token-based {
        distance-threshold = 0.20
        order-bonus-multiplier = 1.05
        max-order-bonus = 1.5
        idf-enabled = true
        idf-enabled = ${?FUZZY_TOKEN_BASED_IDF_ENABLED}
    }

    # Loader: "static" (default; the in-repo JSON catalog) or "metadata"
    # (veles gRPC; off by default until veles's fuzzy-column indexing is
    # wired end-to-end with a live SQL backend).
    loader {
        source = "static"
        source = ${?FUZZY_LOADER_SOURCE}
    }

    metadata {
        host = "veles"
        host = ${?FUZZY_METADATA_HOST}
        port = 7261
        port = ${?FUZZY_METADATA_PORT}
        timeout-ms = 10000
        timeout-ms = ${?FUZZY_METADATA_TIMEOUT_MS}
        schema = "db"
        schema = ${?FUZZY_METADATA_SCHEMA}
        namespace = ""
        namespace = ${?FUZZY_METADATA_NAMESPACE}
    }

    # Warehouse connection for the `metadata` loader (Veles → SELECT pk,col →
    # DB → catalog). Read only when `fuzzy.type` is set (i.e. the env var below is
    # present) AND `loader.source = "metadata"`; the default `static` source has
    # no `fuzzy.type` and opens no connection. `type` = postgres | mssql.
    type = ${?FUZZY_DB_TYPE}
    postgres {
        host = "localhost"
        host = ${?FUZZY_PG_HOST}
        port = "5432"
        port = ${?FUZZY_PG_PORT}
        database = "warehouse"
        database = ${?FUZZY_PG_DATABASE}
        user = ${?FUZZY_PG_USER}
        password = ${?FUZZY_PG_PASSWORD}
    }
    mssql {
        host = "localhost"
        host = ${?FUZZY_MSSQL_HOST}
        port = "1433"
        port = ${?FUZZY_MSSQL_PORT}
        database = "warehouse"
        database = ${?FUZZY_MSSQL_DATABASE}
        user = ${?FUZZY_MSSQL_USER}
        password = ${?FUZZY_MSSQL_PASSWORD}
    }

    # Czech lemmatisation via ttr-nlp's gRPC BatchLemmatize (RG-P2.S1.T4 — the
    # lemma axis ON by default in the open chart). `port` is the nlp GRPC port
    # (7271; gRPC is ttr-nlp's contract, REST 7270 is its dev mirror).
    # Degradable: NLP unreachable ⇒ folded-surface matching, never an outage.
    nlp {
        enabled = true
        enabled = ${?FUZZY_NLP_ENABLED}
        host = "nlp"
        host = ${?NLP_SERVICE_GRPC_HOST}
        port = 7271
        port = ${?NLP_SERVICE_GRPC_PORT}
        timeout-ms = 5000
        timeout-ms = ${?FUZZY_NLP_TIMEOUT_MS}
        lang = "cs"
        lang = ${?FUZZY_NLP_LANG}
    }
}
