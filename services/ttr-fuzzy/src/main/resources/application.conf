ktor {
    deployment {
        port = 7265
        port = ${?ECHO_HTTP_PORT}
        port = ${?FUZZY_MATCHER_SERVER_PORT}  # legacy ai-platform env, kept as a no-op override
    }
    application {
        modules = [ org.tatrman.kantheon.echo.ApplicationKt.module ]
    }
}

security {
    enabled = false
    enabled = ${?SECURITY_ENABLED}
    api-keys = ${?API_KEYS}
    keycloak {
        url = ${?KEYCLOAK_URL}
        realm = ${?KEYCLOAK_REALM}
    }
    service {
        name = "echo"
        name = ${?SECURITY_SERVICE_NAME}
        keycloak-client-id = ${?ECHO_KEYCLOAK_CLIENT_ID}
        keycloak-client-secret = ${?ECHO_KEYCLOAK_CLIENT_SECRET}
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_ECHO}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}

# Echo v1 (kantheon — Phase 2.2 fork).
#
# Two loader sources (echo.loader.source):
#   static   (default): the in-repo JSON catalog (echo-catalog.json) — no DB,
#                       local/CI-friendly, the Czech-aware fixture set.
#   metadata          : the full ai-platform fuzzy-matcher behaviour, re-forked
#                       2026-06-14 — Echo asks Ariadne for the fuzzy-tagged
#                       columns, composes `SELECT pk, col FROM table`, queries
#                       the warehouse (echo.type + echo.{postgres,mssql}), and
#                       populates the catalog. Set ECHO_LOADER_SOURCE=metadata
#                       + ECHO_DB_TYPE to enable.
# Czech NLP (Kadmos) stays disabled until Stage 2.3.
echo {
    grpc {
        port = 7266
        port = ${?ECHO_GRPC_PORT}
        reflection-enabled = false
        reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
    }

    refreshIntervalSeconds = 3600
    refreshIntervalSeconds = ${?ECHO_REFRESH_INTERVAL_SECONDS}

    token-based {
        distance-threshold = 0.20
        order-bonus-multiplier = 1.05
        max-order-bonus = 1.5
        idf-enabled = true
        idf-enabled = ${?ECHO_TOKEN_BASED_IDF_ENABLED}
    }

    # Loader: "static" (default; the in-repo JSON catalog) or "metadata"
    # (ariadne gRPC; off by default until ariadne's fuzzy-column indexing is
    # wired end-to-end with a live SQL backend).
    loader {
        source = "static"
        source = ${?ECHO_LOADER_SOURCE}
    }

    metadata {
        host = "ariadne"
        host = ${?ECHO_METADATA_HOST}
        port = 7261
        port = ${?ECHO_METADATA_PORT}
        timeout-ms = 10000
        timeout-ms = ${?ECHO_METADATA_TIMEOUT_MS}
        schema = "db"
        schema = ${?ECHO_METADATA_SCHEMA}
        namespace = ""
        namespace = ${?ECHO_METADATA_NAMESPACE}
    }

    # Warehouse connection for the `metadata` loader (Ariadne → SELECT pk,col →
    # DB → catalog). Read only when `echo.type` is set (i.e. the env var below is
    # present) AND `loader.source = "metadata"`; the default `static` source has
    # no `echo.type` and opens no connection. `type` = postgres | mssql.
    type = ${?ECHO_DB_TYPE}
    postgres {
        host = "localhost"
        host = ${?ECHO_PG_HOST}
        port = "5432"
        port = ${?ECHO_PG_PORT}
        database = "warehouse"
        database = ${?ECHO_PG_DATABASE}
        user = ${?ECHO_PG_USER}
        password = ${?ECHO_PG_PASSWORD}
    }
    mssql {
        host = "localhost"
        host = ${?ECHO_MSSQL_HOST}
        port = "1433"
        port = ${?ECHO_MSSQL_PORT}
        database = "warehouse"
        database = ${?ECHO_MSSQL_DATABASE}
        user = ${?ECHO_MSSQL_USER}
        password = ${?ECHO_MSSQL_PASSWORD}
    }

    # Czech lemmatisation via Kadmos (Phase 2.3). Disabled at v1 — folded-
    # surface matching only. Once Kadmos lands, set `enabled = true` and
    # point `host`/`port` at the in-cluster `kadmos` service.
    nlp {
        enabled = false
        enabled = ${?ECHO_NLP_ENABLED}
        host = "kadmos"
        host = ${?KADMOS_SERVICE_HOST}
        port = 7270
        port = ${?KADMOS_SERVICE_PORT}
        timeout-ms = 5000
        timeout-ms = ${?ECHO_NLP_TIMEOUT_MS}
        lang = "cs"
        lang = ${?ECHO_NLP_LANG}
    }
}
