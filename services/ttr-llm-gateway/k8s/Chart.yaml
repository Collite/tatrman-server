apiVersion: v2
name: llm-gateway
description: |
  The Kantheon llm-gateway service (LLM gateway, Spring Boot) — an env-agnostic Helm chart. Holds
  no cluster knowledge: image, replicas, resources, telemetry endpoint, the Postgres target and the
  upstream LLM-provider keys/base-URL are all values. A test context points the LLM upstream at
  WireMock via extraEnv. Per-environment values live in the deploying repo (Olymp clusters via
  ArgoCD multi-source D3'; test contexts via the Olymp scripted harness). Converted from the
  kustomize base, mirroring services/query/k8s (Spring Boot actuator probes).
type: application
version: 0.1.0
appVersion: "dev"
# Common Deployment/Service shape from the ttr-service library chart (D1).
dependencies:
  - name: ttr-service
    version: 0.1.0
    repository: "file://../../../shared/charts/ttr-service"
