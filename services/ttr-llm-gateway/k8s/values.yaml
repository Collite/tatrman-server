# Default values for llm-gateway (LLM gateway, Spring Boot). Env-agnostic: sane defaults, NO cluster
# knowledge. Deploying environments override image, telemetry, the Postgres target, the LLM keys
# (secretEnv) and — for a test context — the LLM upstream base URL (via extraEnv → WireMock).

replicaCount: 1

image:
  repository: llm-gateway
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# HTTP port (REST + actuator) and gRPC port.
ports:
  http: 7280
  grpc: 9090

service:
  type: ClusterIP

resources:
  requests:
    memory: 768Mi
    cpu: 250m
  limits:
    memory: 1536Mi
    cpu: "1"

# Postgres target (the default Spring profile). Env-agnostic bare service name.
db:
  host: postgres
  port: 5432

# OpenTelemetry. OTEL_SERVICE_NAME always; the OTLP endpoint renders only when enabled.
telemetry:
  enabled: false
  endpoint: ""
  serviceName: llm-gateway

# Secret-backed env (valueFrom.secretKeyRef). Upstream LLM-provider keys; `optional: true` so the
# pod boots without them (a test context stubs the upstream at WireMock and needs no real key).
secretEnv:
  - { name: AZURE_OPENAI_API_KEY, secretName: llm-gateway-secrets, secretKey: azure-openai-api-key, optional: true }
  - { name: ANTHROPIC_API_KEY, secretName: llm-gateway-secrets, secretKey: anthropic-api-key, optional: true }

# Any other env (a deploying env adds to / replaces this list). A test context sets the LLM upstream
# base URL here to retarget it at WireMock (e.g. AZURE_OPENAI_ENDPOINT / ANTHROPIC_BASE_URL).
extraEnv: []

# Probes — Spring Boot actuator health groups. LLM gateway (Spring Boot + Spring AI + gRPC
# autoconfig) is a SLOW starter — ~97s on a CPU-throttled node — so it needs a startupProbe.
# While a startupProbe is running, kubelet suspends the liveness + readiness probes, so the
# 45s liveness budget can't kill the pod mid-boot (the bp-dsk CrashLoop, 2026-07-08). Budget:
# 10s + 40×10s = 410s before startup is declared failed.
# Target the readiness GROUP (state-only: readinessState), NOT the full `/actuator/health` — the
# aggregate goes 503 when the OPTIONAL Redis cache (llm.cache.enabled=false) isn't deployed, which
# would make the startupProbe never pass and the pod never become Ready (bp-dsk, 2026-07-08).
startupProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 40
readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 30
livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 45
  periodSeconds: 15

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
