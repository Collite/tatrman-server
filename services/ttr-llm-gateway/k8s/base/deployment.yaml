apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: kantheon
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prometheus:dev
          ports:
            - name: http
              containerPort: 7280
            - name: grpc
              containerPort: 9090
          env:
            - name: PROMETHEUS_SERVER_PORT
              value: "7280"
            # Postgres (the default profile). Point at the Kantheon PG.
            - name: POSTGRESQL_HOST
              value: postgres
            - name: POSTGRESQL_PORT
              value: "5432"
            # Upstream LLM secrets — sealed-secret `prometheus-secrets` (authored
            # in the deploy/integration track, fork Stage 2.5 T4).
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: prometheus-secrets, key: azure-openai-api-key }
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: { name: prometheus-secrets, key: anthropic-api-key }
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.observability.svc.cluster.local:4317
            - name: OTEL_SERVICE_NAME
              value: prometheus
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 7280
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 7280
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests:
              memory: 768Mi
              cpu: 250m
            limits:
              memory: 1536Mi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: kantheon
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 7280
      targetPort: 7280
    - name: grpc
      port: 9090
      targetPort: 9090
