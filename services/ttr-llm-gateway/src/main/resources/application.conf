ktor {
    deployment {
        port = 7280
        port = ${?LLM_GATEWAY_SERVER_PORT}
    }
    application {
        modules = [ org.tatrman.llmgateway.ApplicationKt.module ]
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_LLM_GATEWAY}
}

# Postgres — prompt logs + governance (Flyway V1 + LG-P4 V2/V3). Wired in LG-P1·S1·T4.
db {
    enabled = false
    enabled = ${?LLM_GATEWAY_DB_ENABLED}
    type = "POSTGRES"
    host = "localhost"
    host = ${?LLM_GATEWAY_DB_HOST}
    port = "5432"            # string — db-common reads getString("port").toInt()
    port = ${?LLM_GATEWAY_DB_PORT}
    database = "llmgateway"
    database = ${?LLM_GATEWAY_DB_NAME}
    user = "tatrman"
    user = ${?LLM_GATEWAY_DB_USER}
    password = "tatrman"
    password = ${?LLM_GATEWAY_DB_PASSWORD}
}

# Redis — rate-limit windows + response cache. Wired in LG-P1·S1·T4.
redis {
    enabled = false
    enabled = ${?LLM_GATEWAY_REDIS_ENABLED}
    host = "localhost"
    host = ${?LLM_GATEWAY_REDIS_HOST}
    port = 6379
    port = ${?LLM_GATEWAY_REDIS_PORT}
}

# Admin key API (LG-P4·S3) — Keycloak-JWT gated `/admin/keys` (contracts §1.8). Disabled unless
# `realmPublicKey` (the realm's RS256 public key, base64 X.509 as shown in Keycloak → Realm Settings →
# Keys) is provided AND the DB is enabled (issuance needs the store). Realm role: `llm-gateway-admin`.
admin {
    enabled = false
    enabled = ${?LLM_GATEWAY_ADMIN_ENABLED}
    issuer = ${?LLM_GATEWAY_ADMIN_ISSUER}          # e.g. https://keycloak/realms/tatrman
    audience = ${?LLM_GATEWAY_ADMIN_AUDIENCE}       # e.g. llm-gateway
    role = "llm-gateway-admin"
    role = ${?LLM_GATEWAY_ADMIN_ROLE}
    realmPublicKey = ${?LLM_GATEWAY_ADMIN_REALM_PUBLIC_KEY}
}
