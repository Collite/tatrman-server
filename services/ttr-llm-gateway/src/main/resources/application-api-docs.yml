spring:
    application:
        name: prometheus
    threads:
        virtual:
            enabled: true
    flyway:
        enabled: false
    sql:
        init:
            mode: always
            schema-locations: classpath:schema-h2.sql
    datasource:
        url: jdbc:h2:mem:prometheus;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
        username: sa
        password:
    docker:
        compose:
            enabled: false
    ai:
        chat:
            client:
                enabled: false
        azure:
            openai:
                api-key: ${AZURE_OPENAI_API_KEY:azure-placeholder}
                api-version: ${AZURE_OPENAI_API_VERSION:2024-12-01-preview}
                endpoint: ${AZURE_OPENAI_ENDPOINT:https://oai-dolphin-1.openai.azure.com/}
                chat:
                    options:
                        deployment-name: ${AZURE_OPENAI_CHAT_DEPLOYMENT:gpt-4o}
                embedding:
                    options:
                        deployment-name: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:text-embedding-ada-002}

llm:
    security:
        enabled: false
    async:
        enabled: false
    storage:
        type: h2

server:
    port: ${PROMETHEUS_SERVER_PORT:7280}

logging:
    level:
        org.tatrman.prometheus: DEBUG
        org.springframework.security: DEBUG

management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus
    endpoint:
        prometheus:
            enabled: false
    tracing:
        sampling:
            probability: 0.0
    metrics:
        export:
            otlp:
                enabled: false
    otlp:
        metrics:
            export:
                enabled: false

    prometheus:
        metrics:
            export:
                enabled: false
    opentelemetry:
        tracing:
            export:
                otlp:
                    endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://alloy:4318/v1/traces}







