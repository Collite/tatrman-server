# LLM Gateway 2.0 providers + resilience config (contracts §2.2, HOCON). One key per provider (C-5);
# `keyEnv` is the env-var NAME, resolved to a Key per call — never baked into client construction.
# baseUrls use optional env overrides so the file loads without secrets set (defaults are placeholders).
providers {
  azure {
    kind = "openai-wire"
    # Azure OpenAI *v1* API surface (OpenAI-compatible): Bearer auth, model in the body, no deployment
    # path, no api-version query — the endpoint IS the OpenAI-wire /v1 shape. Supersedes the classic
    # surface (api-key header + /openai/deployments/{upstream}/{path}?api-version=...). AZURE_OPENAI_ENDPOINT
    # must end in /openai/v1; UrlBuilder appends the request path ({path} = chat/completions | embeddings)
    # verbatim, and PassthroughHandler already sets the body `model` to the catalog upstream (the
    # deployment name, e.g. gpt-5-mini via AZURE_OPENAI_CHAT_DEPLOYMENT). To go back to the classic
    # surface, restore the api-key header + the /openai/deployments/{upstream}/{path}?api-version pattern.
    baseUrl = "https://REPLACE.openai.azure.com/openai/v1"
    baseUrl = ${?AZURE_OPENAI_ENDPOINT}
    auth = { header = "Authorization", scheme = "Bearer", keyEnv = "AZURE_OPENAI_KEY" }
    urlPattern = "/{path}"
  }
  openai {
    kind = "openai-wire"
    baseUrl = "https://api.openai.com"
    baseUrl = ${?OPENAI_BASE_URL}          # override for staging/proxy/WireMock retarget (#5)
    auth = { header = "Authorization", scheme = "Bearer", keyEnv = "OPENAI_API_KEY" }
    urlPattern = "/v1/{path}"
  }
  gemini {
    kind = "openai-wire"
    baseUrl = "https://generativelanguage.googleapis.com/v1beta/openai"
    baseUrl = ${?GEMINI_BASE_URL}          # override for staging/proxy/WireMock retarget (#5)
    auth = { header = "Authorization", scheme = "Bearer", keyEnv = "GEMINI_API_KEY" }
    urlPattern = "/{path}"          # baseUrl already ends /v1beta/openai
  }
  anthropic {
    kind = "anthropic"
    baseUrl = "https://api.anthropic.com"
    baseUrl = ${?ANTHROPIC_BASE_URL}       # override for staging/proxy/WireMock retarget (#5)
    auth = { header = "x-api-key", keyEnv = "ANTHROPIC_API_KEY" }
    version = "2023-06-01"           # anthropic-version header
    defaultMaxTokens = 4096          # Anthropic requires max_tokens; used when the OpenAI request omits it (B-1)
  }
}

retry   { maxAttempts = 3, initialBackoffMs = 250, maxBackoffMs = 4000, wallClockBudgetMs = 15000 }  # C-3
circuit { failureThreshold = 5, cooldownMs = 30000 }                                                 # C-4 lite
sse     { heartbeatSeconds = 15 }
cache   { enabled = true, keyPrefix = "llm-gateway:chat:", maxBodyBytes = 262144 }   # E-1; 256 KiB body cap
