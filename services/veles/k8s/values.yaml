# Default values for veles. Env-agnostic: sane defaults, NO cluster knowledge. Deploying
# environments (Olymp cluster values, or test-context values) override image, telemetry, the
# model/prompt git source + PAT, and any extra wiring.

replicaCount: 1

image:
  repository: ghcr.io/collite/veles
  # Defaults to .Chart.appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# HTTP port (probes + REST) and gRPC port (constellation services call GetModel over gRPC).
ports:
  http: 7260
  grpc: 7261

service:
  type: ClusterIP

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: "1"

# OpenTelemetry. OTEL_SERVICE_NAME + the per-service OTEL_ENABLED_VELES flag; point `endpoint`
# at a collector and set enabled where one exists (leave disabled for test runs).
telemetry:
  enabled: false
  endpoint: ""
  serviceName: veles

# Veles loads its model + prompts from a git remote. Env-agnostic default = the canonical
# ai-models repo; a deploying env (or a test context needing a seed-aligned model) overrides
# `gitRemoteUri` and supplies the PAT via `secretEnv`.
metadata:
  gitRemoteUri: "https://github.com/Tatrman/ai-models.git"

# Secret-backed env (valueFrom.secretKeyRef). `optional: true` mirrors the kustomize base — the
# pod boots without the PAT (public/fixture remotes need none).
secretEnv:
  - { name: METADATA_GIT_TOKEN, secretName: veles-github-pat, secretKey: token, optional: true }
  - { name: PROMPTS_GIT_TOKEN, secretName: veles-github-pat, secretKey: token, optional: true }

# Any other env (a deploying env REPLACES this list). e.g. a fixture-model toggle for tests.
extraEnv: []

# Probes (HTTP on the http port).
readinessProbe:
  path: /ready
  initialDelaySeconds: 2
  periodSeconds: 3
  failureThreshold: 20
livenessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
