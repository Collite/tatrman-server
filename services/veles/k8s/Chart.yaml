apiVersion: v2
name: ariadne
description: |
  The Kantheon ariadne service (model graph / metadata) — an env-agnostic Helm chart.
  Holds no cluster knowledge: image, replicas, resources, telemetry endpoint, the model/prompt
  git source and its PAT are all values. Per-environment values live in the deploying repo
  (Olymp clusters via ArgoCD multi-source D3'; test contexts via the Olymp scripted harness).
  Converted from the kustomize base/overlays, mirroring services/theseus/k8s.
type: application
# Chart version: the packaging. appVersion tracks the default image tag.
version: 0.1.0
appVersion: "dev"
# Common Deployment/Service shape from the kantheon-service library chart (D1).
dependencies:
  - name: kantheon-service
    version: 0.1.0
    repository: "file://../../../shared/charts/kantheon-service"
