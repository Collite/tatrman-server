# Patterns: Číselníky, sortiment, master data
# Produkty, podprodukty, artikly, zásoby, tržní skupiny, obchodní kanály, uživatelé, prodejní akce

query_patterns:

  # ===========================================================================
  # ROLE, ORGANIZAČNÍ STRUKTURA, UŽIVATELÉ, UŽIVATEL V ROLÍCH
  # ===========================================================================

  role:
    pattern: "seznam (vsech |všech |)(rolí|role)"
    description: "Seznam všech rolí"
    entities: ["skupina_uživatelů"]
    tested: true
    example:
      question: "Seznam všech rolí"
    sql_template: |
      SELECT
             IDSKUPUZIV,
             KOD_SKUP_UZIV,
             NAZEV_SKUP_UZIV
      FROM QSKUPUZIV
      ORDER BY KOD_SKUP_UZIV;

  organizacni_struktura:
    pattern: "seznam organizační struktury"
    description: "Zobrazení organizační struktury (strom funkčních míst)"
    entities: ["organizační_struktura"]
    tested: true
    example:
      question: "Organizační struktura"
    sql_template: |
      SELECT
             P.IDSKUPUZIV IDSKUPUZIV_P,
             P.KOD_SKUP_UZIV KOD_SKUP_UZIV_P,
             P.NAZEV_SKUP_UZIV NAZEV_SKUP_UZIV_P,
             R.IDSKUPUZIV IDSKUPUZIV_R,
             R.KOD_SKUP_UZIV KOD_SKUP_UZIV_R,
             R.NAZEV_SKUP_UZIV NAZEV_SKUP_UZIV_R
      FROM QSKUPUZIV P
      JOIN QSKUPUZIV R ON R.IDSKUPUZIV = P.IDSKUPUZIV_R
      ORDER BY P.KOD_SKUP_UZIV, R.KOD_SKUP_UZIV;

  uzivatele: 
    pattern: "seznam (vsech |všech |)(uzivatelu|uživatelů)"
    description: "Seznam všech uživatelů"
    entities: ["uživatel"]
    tested: true
    example:
      question: "Seznam všech uživatelů"
    sql_template: |
      SELECT
             IDUZIVATEL,
             KOD_UZIV,
             JMENO_UZIV,
             UZIV_EMAIL
      FROM QUZIVATEL_DF
      WHERE VLZAKAZPRISTUP = 0
      ORDER BY KOD_UZIV;

  uzivatel_v_rolich:
    pattern: "seznam (vsech |všech |)(roli |rolí )(uzivatele |uživatele ){kod_uzivatele}"
    pattern_alt: "(zobraz|seznam|najdi) (uzivatele|uživatele|uživatelů|uzivatelu) (v |ve |)(roli|rolí) {nazev_role}"
    description: "Seznam rolí uživatele, nebo seznam uživatelů v dané roli"
    entities: ["uživatel", "skupina_uživatelů"]
    tested: true
    param_labels:
      kod_uzivatele: "Kód uživatele"
      nazev_role: "Název nebo kód role"
    example:
      question: "Seznam rolí uživatele jkrov"
      question_alt: "Zobraz uživatele v roli designér"
    sql_template: |
      SELECT
             u.IDUZIVATEL,
             u.KOD_UZIV,
             u.JMENO_UZIV,
             su.IDSKUPUZIV,
             su.KOD_SKUP_UZIV,
             su.NAZEV_SKUP_UZIV
      FROM QUZIVATEL_DF u
      JOIN QUZVESKUP su ON su.IDUZIVATEL = u.IDUZIVATEL
      WHERE ('{kod_uzivatele}' = '' OR u.KOD_UZIV = '{kod_uzivatele}')
        AND ('{nazev_role}' = '' OR su.NAZEV_SKUP_UZIV COLLATE Latin1_General_CI_AI LIKE '%{nazev_role}%'
             OR su.KOD_SKUP_UZIV COLLATE Latin1_General_CI_AI LIKE '%{nazev_role}%')
      ORDER BY u.JMENO_UZIV;

  # ===========================================================================
  # PRODUKTY, TRŽNÍ SKUPINY, PODPRODUKTY
  # ===========================================================================

  produkty:
    pattern: "seznam (vsech |všech |)(produktu|produktů)"
    description: "Seznam všech produktů"
    entities: ["produkt"]
    tested: true
    example:
      question: "Seznam všech produktů"
    sql_template: |
      SELECT
             IDSKUPZBOZI,
             KOD_SKUP_ZBOZI,
             NAZEV_SKUP_ZBOZI
      FROM QSKUPZBOZI_DF
      WHERE NAZEV_SKUP_ZBOZI not LIKE 'Z%'
      ORDER BY NAZEV_SKUP_ZBOZI;

  trzni_skupiny:
    pattern: "seznam (všech |)tržních skupin"
    description: "Seznam všech tržních skupin"
    entities: ["tržní_skupina"]
    tested: true
    sql_template: |
      SELECT
             IDSKUPZNACZBOZI,
             KOD_SKUPZNACZBOZI,
             NAZEV_SKUPZNACZBOZI
      FROM QSKUPZNACZBOZI_DF
      WHERE NAZEV_SKUPZNACZBOZI not LIKE 'Z%'
      ORDER BY NAZEV_SKUPZNACZBOZI;

  podprodukty:
    pattern: "seznam (všech |)podproduktů( produktu {nazev_produktu}|)"
    description: "Seznam podproduktů, podle produktu"
    entities: ["podprodukt", "produkt"]
    tested: true
    param_labels:
      nazev_produktu: "Název produktu"
    sql_template: |
      SELECT
        pp.IDXXPODSKUPZBOZI,
        pp.KOD_PODSKUPZBOZI,
        pp.NAZEV_PODSKUPZBOZI,
        p.NAZEV_SKUP_ZBOZI
      FROM QXXPODSKUPZBOZI pp
      JOIN QSKUPZBOZI_DF p ON p.IDSKUPZBOZI = pp.IDSKUPZBOZI
      WHERE ('{id_produktu}' = '' OR pp.IDSKUPZBOZI = '{id_produktu}')
        AND ('{nazev_produktu}' = '' OR p.NAZEV_SKUP_ZBOZI LIKE '%{nazev_produktu}%')
        AND pp.NAZEV_PODSKUPZBOZI not LIKE 'Z%'
      ORDER BY p.NAZEV_SKUP_ZBOZI, pp.NAZEV_PODSKUPZBOZI;


  # ---------------------------------------------------------------------------
  # ARTIKLY
  # ---------------------------------------------------------------------------

  hledani_artiklu:
    pattern: "(najdi|hledej|vyhledej) (artikl|zboží) {nazev_artiklu}"
    description: "Vyhledání artiklu podle názvu"
    entities: ["artikl"]
    tested: true
    param_labels:
      nazev_artiklu: "Název artiklu"
    example:
      question: "Najdi artikl SHERON Zimní ostřikovač"
    sql_template: |
      SELECT
             z.IDZBOZI,
             z.CIS_ZBOZI,
             z.NAZEV_ZBOZI
      FROM QZBOZI_DF z
      WHERE z.VLTYP_SLOZ = 1
        AND z.NAZEV_ZBOZI COLLATE Latin1_General_CI_AI LIKE '%{nazev_artiklu}%'
      ORDER BY z.NAZEV_ZBOZI;

  artikly_produktu:
    pattern: "(jaké|jake|jaka) artikly patří do produktu {nazev_produktu}"
    description: "Artikly v produktové skupině"
    entities: ["artikl", "produkt"]
    tested: true
    param_labels:
      nazev_produktu: "Název produktu"
    example:
      question: "Jaké artikly patří do produktu Ostřikovače?"
    sql_template: |
      SELECT
             z.IDZBOZI,
             z.CIS_ZBOZI,
             z.NAZEV_ZBOZI
      FROM QZBOZI_DF z
      JOIN QSKUPZBOZI_DF p ON p.IDSKUPZBOZI = z.IDSKUPZBOZI
      WHERE z.VLTYP_SLOZ = 1
        AND p.NAZEV_SKUP_ZBOZI COLLATE Latin1_General_CI_AI LIKE '%{nazev_produktu}%'
      ORDER BY z.NAZEV_ZBOZI;

  # ===========================================================================
  # SCÉNÁŘE PRO ERP ASISTENTA (z docs/priklady_dotazu.md)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # 1. ZÁSOBY A ARTIKLY
  # ---------------------------------------------------------------------------

  aktivni_artikly:
    pattern: "seznam (všech |)aktivních artiklů"
    description: "Seznam aktivních artiklů"
    entities: ["artikl"]
    tested: true
    sql_template: |
      SELECT
        IDZBOZI,
        CIS_ZBOZI,
        NAZEV_ZBOZI,
        VLPODTYP_SLOZ
      FROM QZBOZI_DF
      WHERE VLTYP_SLOZ = 1
        AND VLSTAVZBOZI = 0
      ORDER BY NAZEV_ZBOZI;

  zasoby_artiklu:
    pattern: "zásoby artikl(ů|u) (kód|kod) {kod_artiklu}"
    pattern_alt: "zásoby artikl(ů|u)( {nazev_artiklu}|)"
    description: |
      Evidence výpadků zásob a plánovaného doplnění artiklů
      Zdroj: XXVYPADKYZASOB. Pro aktuální fyzický stav na skladě použij pattern skladova_dostupnost_artiklu (pt05).
    entities: ["zásoba_artiklu", "artikl"]
    tested: true
    param_labels:
      kod_artiklu: "Kód artiklu"
      nazev_artiklu: "Název artiklu"
    sql_template: |
      SELECT
        za.IDXXVYPADKYZASOB,
        a.CIS_ZBOZI,
        a.NAZEV_ZBOZI,
        za.MNZASOBA,
        za.DTDOPLNENI,
        za.MNDOPLNENI
      FROM XXVYPADKYZASOB za
      JOIN QZBOZI_DF a ON a.IDZBOZI = za.IDZBOZI AND a.VLTYP_SLOZ = 1
      WHERE ('{id_artiklu}' = '' OR za.IDZBOZI = '{id_artiklu}')
        AND ('{kod_artiklu}' = '' OR a.CIS_ZBOZI LIKE '%{kod_artiklu}%')
        AND ('{nazev_artiklu}' = '' OR a.NAZEV_ZBOZI LIKE '%{nazev_artiklu}%')
      ORDER BY a.NAZEV_ZBOZI;

  termin_obnoveni_zasoby:
    pattern: "(kdy bude obnovena zásoba|termín obnovení zásoby|termín doplnění) {nazev_artiklu}"
    description: "Zjištění termínu obnovení zásoby artiklu"
    entities: ["zásoba_artiklu", "artikl"]
    tested: true
    param_labels:
      nazev_artiklu: "Název artiklu"
    sql_template: |
      SELECT
             z.IDXXVYPADKYZASOB,
             a.CIS_ZBOZI,
             a.NAZEV_ZBOZI,
             z.DTDOPLNENI,
             z.MNDOPLNENI
      FROM XXVYPADKYZASOB z
      JOIN QZBOZI_DF a ON a.IDZBOZI = z.IDZBOZI AND a.VLTYP_SLOZ = 1
      WHERE a.NAZEV_ZBOZI COLLATE Latin1_General_CI_AI LIKE '%{nazev_artiklu}%'
        AND z.DTDOPLNENI IS NOT NULL
      ORDER BY z.DTDOPLNENI;

  # ---------------------------------------------------------------------------
  # ÚROVEŇ 2 - ZÁVISÍ NA ENTITÁCH ÚROVNĚ 0-1 (nové)
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # UŽIVATELÉ A PRODEJNÍ AKCE
  # ---------------------------------------------------------------------------

  obchodni_zastupce:
    pattern: "(najdi|hledej|kdo je|info o) (obchodního zástupce|obchodním zástupci|obchodní zástupce|oz) {jmeno_uzivatele}"
    pattern_alt: "(seznam |)(všech |)(obchodních zástupců|obchodní zástupce|oz)"
    description: "Najde obchodního zástupce podle jména/kódu, nebo zobrazí seznam všech OZ"
    entities: ["uživatel"]
    tested: true
    param_labels:
      jmeno_uzivatele: "Jméno uživatele"
    test_values:
      jmeno_uzivatele: "Nov"
    example:
      question: "Najdi obchodního zástupce Novák"
      explanation: "Hledání OZ podle jména (LIKE) nebo kódu (=). Bez parametru vrátí všechny OZ."
    sql_template: |
      SELECT
        u.IDUZIVATEL,
        u.KOD_UZIV,
        u.JMENO_UZIV
      FROM QUZIVATEL_DF u
      WHERE u.IDUZIVATEL IN (SELECT IDUZIVATEL FROM QUZVESKUP WHERE KOD_SKUP_UZIV = 'OZ')
        AND NOT u.IDUZIVATEL IN (SELECT IDUZIVATEL FROM QUZVESKUP WHERE KOD_SKUP_UZIV = '00')
        AND (u.JMENO_UZIV COLLATE Latin1_General_CI_AI LIKE '%{jmeno_uzivatele}%'
             OR u.KOD_UZIV COLLATE Latin1_General_CI_AI LIKE '%{jmeno_uzivatele}%')
      ORDER BY u.JMENO_UZIV;

  prodejni_akce:
    pattern: "seznam (všech |)platných prodejních akcí"
    description: "Seznam platných prodejních akcí"
    entities: ["prodejní_akce"]
    tested: true
    sql_template: |
      SELECT
        IDXXPRODAKCE,
        KOD_PRODAKCE
      FROM QXXPRODAKCE
      WHERE DTPLATI_OD <= GETDATE()
        AND (DTPLATI_DO IS NULL OR DTPLATI_DO >= GETDATE())
      ORDER BY KOD_PRODAKCE;

  # ---------------------------------------------------------------------------
  # ÚROVEŇ 1 - ZÁVISÍ NA NEZÁVISLÝCH (nové)
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # OBCHODNÍ KANÁLY, DODACÍ MÍSTA (STRUKTURA)
  # ---------------------------------------------------------------------------

  obchodni_kanaly_trzni_skupiny:
    pattern: "seznam (všech |vsech |)(obchodních kanálů|obchodnich kanalu) (pro |)(tržní skupinu|trzni skupinu) {nazev_trzni_skupiny}"
    description: "Seznam obchodních kanálů s vazbou na tržní skupinu"
    entities: ["obchodní_kanál", "tržní_skupina"]
    tested: true    
    param_labels:
      nazev_trzni_skupiny: "Název tržní skupiny"
    example:
      question: "Seznam obchodních kanálů pro tržní skupinu"
    sql_template: |
      SELECT
        ok.IDCENSKUP,
        ok.CEN_SKUP,
        ts.NAZEV_SKUPZNACZBOZI
      FROM QCENSKUP_DF ok
      LEFT JOIN QSKUPZNACZBOZI_DF ts ON ts.IDSKUPZNACZBOZI = ok.IDSKUPZNACZBOZI
      WHERE ('{id_trzni_skupiny}' = '' OR ok.IDSKUPZNACZBOZI = '{id_trzni_skupiny}')
        AND ('{nazev_trzni_skupiny}' = '' OR ts.NAZEV_SKUPZNACZBOZI COLLATE Latin1_General_CI_AI LIKE '%{nazev_trzni_skupiny}%')
        AND ok.CEN_SKUP NOT LIKE 'Z%'
      ORDER BY ts.NAZEV_SKUPZNACZBOZI, ok.CEN_SKUP;

  typy_dodacich_mist:
    pattern: "typy dodacích míst( pro kanál {kod_kanalu}|)"
    description: "Seznam typů dodacích míst"
    entities: ["typ_dodacího_místa", "obchodní_kanál"]
    tested: true
    param_labels:
      kod_kanalu: "Kód kanálu"
    sql_template: |
      SELECT
        tdm.IDXXTYPDODMIST,
        tdm.KOD_TYPDODMIST,
        ok.CEN_SKUP
      FROM QXXTYPDODMIST tdm
      JOIN QCENSKUP_DF ok ON ok.IDCENSKUP = tdm.IDCENSKUP
      WHERE ('{id_obchodniho_kanalu}' = '' OR ok.IDCENSKUP = '{id_obchodniho_kanalu}')
        AND ('{kod_kanalu}' = '' OR ok.CEN_SKUP COLLATE Latin1_General_CI_AI LIKE '%{kod_kanalu}%')
      ORDER BY ok.CEN_SKUP, tdm.KOD_TYPDODMIST;


  # ---------------------------------------------------------------------------
  # PŘIŘAZENÍ PRODUKTŮ / ARTIKLŮ NA ÚROVNĚ
  # ---------------------------------------------------------------------------

  produkty_pro_firmu:
    pattern: "produkty (pro |)firm(u|y)"
    description: "Seznam produktů přiřazených na úrovni firmy"
    entities: ["produkt"]
    tested: true
    sql_template: |
      SELECT
        p.IDSKUPZBOZI,
        p.KOD_SKUP_ZBOZI,
        p.NAZEV_SKUP_ZBOZI,
        pf.PORADI_F,
        pf.VLVYZNAM_F,
        pf.HDNORMATIV_TRZBY_F
      FROM QSKUPZBOZI_DF p
      JOIN QXXMEZABC pf ON p.IDSKUPZBOZI = pf.IDSKUPZBOZI
      WHERE pf.VLTYP_NASTAVENI = 1
      ORDER BY pf.PORADI_F;

  produkty_pro_trzni_skupinu:
    pattern: "produkty (pro |v |)tržní skupin(u|ě) {kod_trzni_skupiny}"
    description: "Seznam produktů přiřazených k tržní skupině"
    entities: ["produkt", "tržní_skupina"]
    tested: true
    param_labels:
      kod_trzni_skupiny: "Kód tržní skupiny"
    sql_template: |
      SELECT
        p.IDSKUPZBOZI,
        p.KOD_SKUP_ZBOZI,
        p.NAZEV_SKUP_ZBOZI,
        ts.NAZEV_SKUPZNACZBOZI,
        pts.PORADI_F,
        pts.VLVYZNAM_F,
        pts.HDNORMATIV_TRZBY_F
      FROM QSKUPZBOZI_DF p
      JOIN  QXXMEZABC pts ON p.IDSKUPZBOZI = pts.IDSKUPZBOZI
      JOIN QSKUPZNACZBOZI_DF ts ON ts.IDSKUPZNACZBOZI = pts.IDSKUPZNACZBOZI
      WHERE pts.VLTYP_NASTAVENI = 11
        AND ('{id_trzni_skupiny}' = '' OR pts.IDSKUPZNACZBOZI = '{id_trzni_skupiny}')
        AND ts.KOD_SKUPZNACZBOZI COLLATE Latin1_General_CI_AI LIKE '%{kod_trzni_skupiny}%'
      ORDER BY pts.PORADI_F;

  produkty_pro_obchodni_kanal:
    pattern: "produkty (pro |v |)obchodní(m|) kanál(u|) {kod_kanalu}"
    description: "Seznam produktů přiřazených k obchodnímu kanálu"
    entities: ["produkt", "obchodní_kanál"]
    tested: true
    param_labels:
      kod_kanalu: "Kód kanálu"
    sql_template: |
      SELECT
        p.IDSKUPZBOZI,
        p.KOD_SKUP_ZBOZI,
        p.NAZEV_SKUP_ZBOZI,
        ok.CEN_SKUP,
        pok.PORADI_F,
        pok.VLVYZNAM_F,
        pok.HDNORMATIV_TRZBY_F
      FROM QSKUPZBOZI_DF p 
      JOIN QXXMEZABC pok ON p.IDSKUPZBOZI = pok.IDSKUPZBOZI
      JOIN QCENSKUP_DF ok ON ok.IDCENSKUP = pok.IDCENSKUP
      WHERE pok.VLTYP_NASTAVENI = 21
        AND ('{id_obchodniho_kanalu}' = '' OR pok.IDCENSKUP = '{id_obchodniho_kanalu}')
        AND ok.CEN_SKUP COLLATE Latin1_General_CI_AI LIKE '%{kod_kanalu}%'
      ORDER BY pok.PORADI_F;

  artikly_pro_trzni_skupinu:
    pattern: "artikly (pro |v |)tržní skupin(u|ě) {kod_trzni_skupiny}"
    description: "Seznam artiklů přiřazených k tržní skupině"
    entities: ["artikl", "tržní_skupina"]
    tested: true
    param_labels:
      kod_trzni_skupiny: "Kód tržní skupiny"
    sql_template: |
      SELECT
        a.IDZBOZI,
        a.CIS_ZBOZI,
        a.NAZEV_ZBOZI,
        ts.NAZEV_SKUPZNACZBOZI,
        ats.VLVYZNAM_Z
      FROM QZBOZI_DF a
      JOIN QXXTRSKUPZBOZI ats ON a.IDZBOZI = ats.IDZBOZI AND a.VLTYP_SLOZ = 1
      JOIN QSKUPZNACZBOZI_DF ts ON ts.IDSKUPZNACZBOZI = ats.IDSKUPZNACZBOZI
      WHERE ('{id_trzni_skupiny}' = '' OR ats.IDSKUPZNACZBOZI = '{id_trzni_skupiny}')
        AND ts.KOD_SKUPZNACZBOZI COLLATE Latin1_General_CI_AI LIKE '%{kod_trzni_skupiny}%'
      ORDER BY a.NAZEV_ZBOZI;

  artikly_pro_obchodni_kanal:
    pattern: "artikly (pro |v |)obchodní(m|) kanál(u|) {kod_kanalu}"
    description: "Seznam artiklů přiřazených k obchodnímu kanálu (listing)"
    entities: ["artikl", "obchodní_kanál"]
    tested: true
    param_labels:
      kod_kanalu: "Kód kanálu"
    sql_template: |
      SELECT
        a.IDZBOZI,
        a.CIS_ZBOZI,
        a.NAZEV_ZBOZI,
        ok.CEN_SKUP,
        aok.VLVYZNAM_Z
      FROM QZBOZI_DF a
      JOIN QXXLISTING aok ON a.IDZBOZI = aok.IDZBOZI AND a.VLTYP_SLOZ = 1
      JOIN QCENSKUP_DF ok ON ok.IDCENSKUP = aok.IDCENSKUP
      WHERE ('{id_obchodniho_kanalu}' = '' OR aok.IDCENSKUP = '{id_obchodniho_kanalu}')
        AND ok.CEN_SKUP COLLATE Latin1_General_CI_AI LIKE '%{kod_kanalu}%'
      ORDER BY a.NAZEV_ZBOZI;

  # ---------------------------------------------------------------------------
  # PŘIŘAZENÍ PODPRODUKTŮ NA ÚROVNĚ
  # ---------------------------------------------------------------------------

  podprodukty_pro_firmu:
    pattern: "podprodukty (pro |)firm(u|y)"
    description: "Seznam podproduktů přiřazených na úrovni firmy"
    entities: ["podprodukt", "produkt"]
    tested: true
    sql_template: |
      SELECT
        pp.IDXXPODSKUPZBOZI,
        pp.KOD_PODSKUPZBOZI,
        pp.NAZEV_PODSKUPZBOZI,
        sz.NAZEV_SKUP_ZBOZI,
        ppf.PORADI_F,
        ppf.VLVYZNAM_F,
        ppf.HDNORMATIV_TRZBY_F
      FROM QXXPODSKUPZBOZI pp
      JOIN QXXMEZABC ppf ON pp.IDXXPODSKUPZBOZI = ppf.IDXXPODSKUPZBOZI
      JOIN QSKUPZBOZI_DF sz ON sz.IDSKUPZBOZI = ppf.IDSKUPZBOZI
      WHERE ppf.VLTYP_NASTAVENI = 2
      ORDER BY ppf.PORADI_F;

  podprodukty_pro_trzni_skupinu:
    pattern: "podprodukty (pro |v |)tržní skupin(u|ě) {kod_trzni_skupiny}"
    description: "Seznam podproduktů přiřazených k tržní skupině"
    entities: ["podprodukt", "tržní_skupina"]
    tested: true
    param_labels:
      kod_trzni_skupiny: "Kód tržní skupiny"
    sql_template: |
      SELECT
        pp.IDXXPODSKUPZBOZI,
        pp.KOD_PODSKUPZBOZI,
        pp.NAZEV_PODSKUPZBOZI,
        ts.NAZEV_SKUPZNACZBOZI,
        ppts.PORADI_F,
        ppts.VLVYZNAM_F,
        ppts.HDNORMATIV_TRZBY_F
      FROM QXXPODSKUPZBOZI pp
      JOIN QXXMEZABC ppts ON pp.IDXXPODSKUPZBOZI = ppts.IDXXPODSKUPZBOZI
      JOIN QSKUPZNACZBOZI_DF ts ON ts.IDSKUPZNACZBOZI = ppts.IDSKUPZNACZBOZI
      WHERE ppts.VLTYP_NASTAVENI = 12
        AND ('{id_trzni_skupiny}' = '' OR ppts.IDSKUPZNACZBOZI = '{id_trzni_skupiny}')
        AND ts.KOD_SKUPZNACZBOZI COLLATE Latin1_General_CI_AI LIKE '%{kod_trzni_skupiny}%'
      ORDER BY ppts.PORADI_F;

  podprodukty_pro_obchodni_kanal:
    pattern: "podprodukty (pro |v |)obchodní(m|) kanál(u|) {kod_kanalu}"
    description: "Seznam podproduktů přiřazených k obchodnímu kanálu"
    entities: ["podprodukt", "obchodní_kanál"]
    tested: true
    param_labels:
      kod_kanalu: "Kód kanálu"
    sql_template: |
      SELECT
        pp.IDXXPODSKUPZBOZI,
        pp.KOD_PODSKUPZBOZI,
        pp.NAZEV_PODSKUPZBOZI,
        ok.CEN_SKUP,
        ppok.PORADI_F,
        ppok.VLVYZNAM_F,
        ppok.HDNORMATIV_TRZBY_F
      FROM QXXPODSKUPZBOZI pp
      JOIN QXXMEZABC ppok ON pp.IDXXPODSKUPZBOZI = ppok.IDXXPODSKUPZBOZI
      JOIN QCENSKUP_DF ok ON ok.IDCENSKUP = ppok.IDCENSKUP
      WHERE ppok.VLTYP_NASTAVENI = 22
        AND ('{id_obchodniho_kanalu}' = '' OR ppok.IDCENSKUP = '{id_obchodniho_kanalu}')
        AND ok.CEN_SKUP COLLATE Latin1_General_CI_AI LIKE '%{kod_kanalu}%'
      ORDER BY ppok.PORADI_F;

