# Patterns: Obchodní transakce
# Subjekty, dodací místa, osoby, faktury, zakázky, vratky, dobropisy, položky dokladů, tok dokladů

query_patterns:

  # ===========================================================================
  # DODACÍ MÍSTA ZÁKAZNÍKA, SOUHRNNÉ INFO
  # ===========================================================================

  subjekty_obchodniho_kanalu:
    pattern: "subjekty (v |)(obchodním |)kanálu {kod_kanalu}"
    description: "Seznam subjektů (odběratelů) v daném obchodním kanálu"
    entities: ["subjekt", "obchodní_vztah", "obchodní_kanál"]
    tested: true
    param_labels:
      kod_kanalu: "Kód kanálu"
    sql_template: |
      SELECT
        s.IDSUBJEKT,
        s.KOD_SUBJEKTU,
        s.SUBJ_NAZEV,
        ok.CEN_SKUP
      FROM QSUBJEKT s
      JOIN QSUBJVTSUBJ_DF ov ON ov.IDSUBJEKT = s.IDSUBJEKT AND ov.TYP_SUBJ = 'ODB'
      JOIN QCENSKUP_DF ok ON ok.IDCENSKUP = ov.IDCENSKUP
      WHERE ('{id_obchodniho_kanalu}' = '' OR ok.IDCENSKUP = '{id_obchodniho_kanalu}')
        AND ok.CEN_SKUP LIKE '%{kod_kanalu}%'
      ORDER BY s.SUBJ_NAZEV;

  dodaci_mista_zakaznika:
    pattern: "(jaká|jake|jaka) (dodací místa|dodaci mista|pobočky|provozovny) (má|ma) {nazev_zakaznika}"
    description: "Seznam dodacích míst zákazníka"
    entities: ["dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    example:
      question: "Jaká dodací místa má Tesco?"
    sql_template: |
      SELECT
            dm.IDSUBJADR,
             dm.SUBJADR_POZNAMKA,
             dm.ULICE,
             dm.MESTO
      FROM QSUBJADR_DF dm
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND dm.VLSUBJADR_TYP = 2
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      ORDER BY dm.SUBJADR_POZNAMKA;

  osoby_dodaciho_mista:
    pattern: "osoby (dodacího místa |na dodacím místě ){id_dodaciho_mista}"
    description: "Seznam osob na dodacím místě"
    entities: ["osoba_dodacího_místa", "dodací_místo"]
    tested: true
    test_values:
      id_dodaciho_mista: ""
    sql_template: |
      SELECT
        o.IDSUBJOSOBA,
        o.IDSUBJADR,
        o.JMENO,
        o.FUNKCE,
        o.TEL,
        o.EMAIL
      FROM QSUBJOSOBA_DF o
      WHERE ('{id_dodaciho_mista}' = '' OR o.IDSUBJADR = '{id_dodaciho_mista}')
      ORDER BY o.JMENO;

  info_o_zakaznikovi:
    pattern: "(co víš o zákazníkovi|informace o zákazníkovi|přehled zákazníka|shrnutí zákazníka|vše o zákazníkovi) {nazev_zakaznika}"
    description: "Souhrnné informace o zákazníkovi - zakázky, faktury, vratky, dobropisy"
    entities: ["zakázka", "faktura", "vratka", "dobropis", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    sql_template: |
      -- Zakázky zákazníka
      SELECT 'zakázka' AS typ_zaznamu,
             z.CIS_DOK AS cislo_dokladu,
             z.DTVYSTAVENO AS datum,
             z.DTZDANITPLN AS termin,
             'datum dodání' AS typ_datumu,
             CAST(z.VLSTAVHDOK AS VARCHAR) AS stav
      FROM QHDOK_ZAK_DF z
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = z.IDSUBJADRP
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND z.TYP_DOK = 'POB' 
        AND z.HDKUHRADEVAL >= 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      UNION ALL
      -- Faktury zákazníka
      SELECT 'faktura' AS typ_zaznamu,
             f.CIS_DOK AS cislo_dokladu,
             f.DTVYSTAVENO AS datum,
             f.DTSPLATNO AS termin,
             'datum splatnosti' AS typ_datumu,
             CAST(f.VLSTAVHDOK AS VARCHAR) AS stav
      FROM QHDOK_FAV_DF f
      JOIN QSUBJEKT s ON s.IDSUBJEKT = f.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND f.TYP_DOK = 'FVU' 
        AND f.HDKUHRADEVAL >= 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      UNION ALL
      -- Vratky zákazníka
      SELECT 'vratka' AS typ_zaznamu,
             v.CIS_DOK AS cislo_dokladu,
             v.DTVYSTAVENO AS datum,
             v.DTZDANITPLN AS termin,
             'datum stažení' AS typ_datumu,
             CAST(v.VLSTAVHDOK AS VARCHAR) AS stav
      FROM QHDOK_ZAK_DF v
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = v.IDSUBJADRP
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND v.TYP_DOK = 'POB' 
        AND v.HDKUHRADEVAL < 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      UNION ALL
      -- Dobropisy zákazníka
      SELECT 'dobropis' AS typ_zaznamu,
             d.CIS_DOK AS cislo_dokladu,
             d.DTVYSTAVENO AS datum,
             d.DTSPLATNO AS termin,
             'datum splatnosti' AS typ_datumu,
             CAST(d.VLSTAVHDOK AS VARCHAR) AS stav
      FROM QHDOK_FAV_DF d
      JOIN QSUBJEKT s ON s.IDSUBJEKT = d.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND d.TYP_DOK = 'FVU' 
        AND d.HDKUHRADEVAL < 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      ORDER BY datum DESC;

  # ---------------------------------------------------------------------------
  # FAKTURY ZÁKAZNÍKA
  # ---------------------------------------------------------------------------

  faktury_zakaznika:
    pattern: "(faktury|seznam faktur) (zákazníka |zakaznika |pro zákazníka |pro zakaznika |pro |){nazev_zakaznika}"
    pattern_alt: "(seznam faktur|faktury zákazníka|faktury zakaznika)"
    description: "Seznam faktur zákazníka"
    entities: ["faktura", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    sql_template: |
      SELECT
             f.IDHDOK,
             f.CIS_DOK,
             s.SUBJ_NAZEV,
             f.DTVYSTAVENO,
             f.DTSPLATNO,
             f.HDKUHRADEVAL,
             f.VLSTAVHDOK
      FROM QHDOK_FAV_DF f
      JOIN QSUBJEKT s ON s.IDSUBJEKT = f.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND f.TYP_DOK = 'FVU'
        AND f.HDKUHRADEVAL >= 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      ORDER BY f.DTVYSTAVENO DESC;

  nesplacene_faktury:
    pattern: "(nesplacené|neuhrazené|dlužné|po splatnosti) faktury (zákazníka |zakaznika |pro |){nazev_zakaznika}"
    pattern_alt: "(nesplacené|neuhrazené|dlužné|po splatnosti) faktury"
    description: "Faktury zákazníka po splatnosti"
    entities: ["faktura", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    sql_template: |
      SELECT
              f.IDHDOK,
             f.CIS_DOK,
             s.SUBJ_NAZEV,
             f.DTVYSTAVENO,
             f.DTSPLATNO,
             f.HDKUHRADEVAL,
             f.VLSTAVHDOK
      FROM QHDOK_FAV_DF f
      JOIN QSUBJEKT s ON s.IDSUBJEKT = f.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND f.TYP_DOK = 'FVU'
        AND f.HDKUHRADEVAL >= 0
        AND f.DTSPLATNO < GETDATE()
        AND f.VLSTAVHDOK NOT IN (20) -- 20 = Storno
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      ORDER BY f.DTSPLATNO ASC;

  # ---------------------------------------------------------------------------
  # 8. ZAKÁZKY ZÁKAZNÍKA
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # ZAKÁZKY ZÁKAZNÍKA
  # ---------------------------------------------------------------------------

  zakazky_zakaznika:
    pattern: "(zakázky|zakazky|seznam zakázek|seznam zakazek) (zákazníka |zakaznika |pro zákazníka |pro zakaznika |pro |){nazev_zakaznika}"
    pattern_alt: "(jaké|jake) zakázky (má|ma) {nazev_zakaznika}"
    description: "Seznam zakázek zákazníka řazený podle data dodání (nejnovější nahoře)"
    entities: ["zakázka", "dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    sql_template: |
      SELECT
              z.IDHDOK,
             z.CIS_DOK,
             s.SUBJ_NAZEV,
             dm.SUBJADR_POZNAMKA,
             z.DTZDANITPLN,
             z.HDKUHRADEVAL,
             z.VLSTAVHDOK
      FROM QHDOK_ZAK_DF z
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = z.IDSUBJADRP
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND ('{id_dodaciho_mista}' = '' OR dm.IDSUBJADR = '{id_dodaciho_mista}')
        AND z.TYP_DOK = 'POB'
        AND z.HDKUHRADEVAL >= 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      ORDER BY z.DTZDANITPLN DESC;

  hodnota_zakazky:
    pattern: "(hodnota|cena|celková cena|částka) zakáz(ky|ek) (zákazníka |zakaznika |pro |){nazev_zakaznika}"
    description: "Hodnota zakázek zákazníka seřazená podle částky (od nejvyšší)"
    entities: ["zakázka", "dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    sql_template: |
      SELECT
              z.IDHDOK,
             z.CIS_DOK,
             s.SUBJ_NAZEV,
             dm.SUBJADR_POZNAMKA,
             z.DTZDANITPLN,
             z.HDKUHRADEVAL,
             z.VLSTAVHDOK
      FROM QHDOK_ZAK_DF z
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = z.IDSUBJADRP
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND ('{id_dodaciho_mista}' = '' OR dm.IDSUBJADR = '{id_dodaciho_mista}')
        AND z.TYP_DOK = 'POB'
        AND z.HDKUHRADEVAL >= 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      ORDER BY z.HDKUHRADEVAL DESC;

  # ---------------------------------------------------------------------------
  # 9. PRODEJE PRODUKTU U ZÁKAZNÍKA
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # VRATKY A REKLAMACE
  # ---------------------------------------------------------------------------

  termin_stazeni_vratky:
    pattern: "(kdy bude staženo zboží|termín stažení vratky|termín vratky|kdy budou staženy vratky) (od zákazníka |pro zákazníka |pro |){nazev_zakaznika}"
    description: "Zjištění termínu stažení vratky od zákazníka"
    entities: ["vratka", "dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    sql_template: |
      SELECT
             v.IDHDOK,
             v.CIS_DOK,
             s.KOD_SUBJEKTU,
             s.SUBJ_NAZEV,
             v.DTZDANITPLN,
             v.VLSTAVHDOK
      FROM QHDOK_ZAK_DF v
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = v.IDSUBJADRP
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND v.TYP_DOK = 'POB' 
        AND v.HDKUHRADEVAL < 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      ORDER BY v.DTZDANITPLN DESC;

  vratky_zakaznika:
    pattern: "(jsou plánované|jsou planovane|existují|existuji|seznam) vrat(ky|ek) (pro |od |zákazníka |zakaznika ){nazev_zakaznika}"
    description: "Seznam vratek pro zákazníka"
    entities: ["vratka", "dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    example:
      question: "Jsou plánované vratky pro Kaufland?"
    sql_template: |
      SELECT
             v.IDHDOK,
             v.CIS_DOK,
             s.SUBJ_NAZEV,
             v.DTZDANITPLN,
             v.VLSTAVHDOK
      FROM QHDOK_ZAK_DF v
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = v.IDSUBJADRP
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND v.TYP_DOK = 'POB' 
        AND v.HDKUHRADEVAL < 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      ORDER BY v.DTZDANITPLN DESC;

  # ---------------------------------------------------------------------------
  # 3. DOBROPISY
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # DOBROPISY
  # ---------------------------------------------------------------------------

  termin_uhrady_dobropisu:
    pattern: "(kdy bude (zákazníkovi |)uhrazen dobropis|termín proplacení dobropisu) {nazev_zakaznika}"
    pattern_alt: "(kdy bude uhrazen dobropis|uhrada dobropisu) (zákazníka |){nazev_zakaznika}"
    description: "Zjištění termínu úhrady dobropisu zákazníkovi"
    entities: ["dobropis", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    sql_template: |
      SELECT
             d.IDHDOK,
             d.CIS_DOK,
             s.KOD_SUBJEKTU,
             s.SUBJ_NAZEV,
             d.ZAK_HDOK,
             d.DTVYSTAVENO,
             d.DTSPLATNO,
             d.VLSTAVHDOK
      FROM QHDOK_FAV_DF d
      JOIN QSUBJEKT s ON s.IDSUBJEKT = d.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND d.TYP_DOK = 'FVU' 
        AND d.HDKUHRADEVAL < 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      ORDER BY d.DTSPLATNO DESC;

  dobropisy_zakaznika:
    pattern: "(existují dobropisy|existuji dobropisy|seznam dobropisů|seznam dobropisu) (pro |zákazníka |zakaznika ){nazev_zakaznika}"
    description: "Seznam dobropisů pro zákazníka"
    entities: ["dobropis", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    example:
      question: "Existují dobropisy pro Tesco?"
    sql_template: |
      SELECT
             d.IDHDOK,
             d.CIS_DOK,
             s.SUBJ_NAZEV,
             d.DTVYSTAVENO,
             d.DTSPLATNO,
             d.VLSTAVHDOK
      FROM QHDOK_FAV_DF d
      JOIN QSUBJEKT s ON s.IDSUBJEKT = d.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND d.TYP_DOK = 'FVU' 
        AND d.HDKUHRADEVAL < 0
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      ORDER BY d.DTVYSTAVENO DESC;

  # ---------------------------------------------------------------------------
  # 3.5 POLOŽKY DOKLADU (ZAKÁZKY, FAKTURY, VRATKY, DOBROPISY)
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # POLOŽKY DOKLADU
  # ---------------------------------------------------------------------------

  polozky_dokladu:
    pattern: "(položky|artikly|zboží|obsah) (zakázky|zakazky|faktury|vratky|dobropisu|dokladu)"
    description: "Zobrazí položky (artikly) dokladu podle ID dokladu v kontextu"
    entities: ["zakázka_složka", "artikl"]
    tested: true
    test_values:
      id_dokladu: "123"
    example:
      question: "Zobraz artikly zakázky"
    sql_template: |
      SELECT
             zs.IDSDOK,
             zs.IDZBOZI,
             a.CIS_ZBOZI,
             a.NAZEV_ZBOZI,
             zs.MNCELKEMPOCET,
             zs.HDJCENAVAL,
             zs.HDCCENAVAL
      FROM QZBOZSDOK zs
      JOIN QZBOZI_DF a ON a.IDZBOZI = zs.IDZBOZI AND a.VLTYP_SLOZ = 1
      WHERE zs.IDHDOK = '{id_dokladu}'
      ORDER BY a.NAZEV_ZBOZI;

  # ---------------------------------------------------------------------------
  # TOK DOKLADŮ
  # ---------------------------------------------------------------------------

  naslednici_dokladu:
    pattern: "následníci (dokladu |zakázky |faktury ){číslo_dokladu}"
    description: "Seznam následných dokladů (např. faktury vytvořené ze zakázky)"
    entities: ["tok_dokladů"]
    tested: true
    param_labels:
      číslo_dokladu: "Číslo dokladu"
    sql_template: |
      SELECT
        td.IDHISHDOK,
        td.CIS_DOKN,
        td.NAZEV_TYPDOKN,
        td.DTZDANITPLNN,
        td.STAVN
      FROM QHISHDOK_DF td
      WHERE ('{id_dokladu}' = '' OR td.IDHDOKP = '{id_dokladu}')
        AND ('{číslo_dokladu}' = '' OR td.CIS_DOKP LIKE '%{číslo_dokladu}%')
      ORDER BY td.DTZDANITPLNN DESC;

  predchudci_dokladu:
    pattern: "předchůdci (dokladu |faktury |dobropisu ){číslo_dokladu}"
    description: "Seznam předchozích dokladů (např. zakázky, ze kterých vznikla faktura)"
    entities: ["tok_dokladů"]
    tested: true
    param_labels:
      číslo_dokladu: "Číslo dokladu"
    sql_template: |
      SELECT
        td.IDHISHDOK,
        td.CIS_DOKP,
        td.NAZEV_TYPDOKP,
        td.DTZDANITPLNP,
        td.STAVP
      FROM QHISHDOK_DF td
      WHERE ('{id_dokladu}' = '' OR td.IDHDOKN = '{id_dokladu}')
        AND ('{číslo_dokladu}' = '' OR td.CIS_DOKN LIKE '%{číslo_dokladu}%')
      ORDER BY td.DTZDANITPLNP DESC;

  tok_dokladu:
    pattern: "(tok|historie|vazby) dokladu {číslo_dokladu}"
    description: "Celý tok dokladu - všechny vazby (předchůdci i následníci)"
    entities: ["tok_dokladů"]
    tested: true
    param_labels:
      číslo_dokladu: "Číslo dokladu"
    sql_template: |
      SELECT
        td.IDHISHDOK,
        td.CIS_DOKP,
        td.NAZEV_TYPDOKP,
        td.DTZDANITPLNP,
        td.STAVP,
        td.CIS_DOKN,
        td.NAZEV_TYPDOKN,
        td.DTZDANITPLNN,
        td.STAVN
      FROM QHISHDOK_DF td
      WHERE ('{id_dokladu}' = '' OR td.IDHDOKP = '{id_dokladu}' OR td.IDHDOKN = '{id_dokladu}')
        AND ('{číslo_dokladu}' = '' OR td.CIS_DOKP LIKE '%{číslo_dokladu}%' OR td.CIS_DOKN LIKE '%{číslo_dokladu}%')
      ORDER BY td.DTZDANITPLNP, td.DTZDANITPLNN;

  nevyfakturovane_zakazky_dm:
    pattern: "(které |)(nevyfakturované |)zakázky (pro |na |)(dodací místo|dodacího místa|dodacím místě) {zkratka_dodaciho_mista} (nemají fakturu|bez faktury|nemá fakturu)"
    pattern_alt: "(které |)(nevyfakturované |)zakázky (pro |na |)(dodací místo|dodacího místa|dodacím místě) {zkratka_dodaciho_mista}"
    description: "Zakázky pro konkrétní dodací místo, ke kterým neexistuje navazující faktura"
    entities: ["zakázka", "dodací_místo", "tok_dokladů"]
    tested: true
    param_labels:
      zkratka_dodaciho_mista: "Zkratka dodacího místa"
    sql_template: |
      SELECT
        z.IDHDOK,
        z.CIS_DOK,
        z.DTZDANITPLN,       
        z.VLSTAVHDOK
      FROM QHDOK_ZAK_DF z
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = z.IDSUBJADRP
      WHERE z.TYP_DOK = 'POB'
        AND z.HDKUHRADEVAL >= 0
        AND z.VLSTAVHDOK NOT IN (-2, 10)
        AND ('{id_dodaciho_mista}' = '' OR dm.IDSUBJADR = '{id_dodaciho_mista}')
        AND dm.SUBJADR_POZNAMKA COLLATE Latin1_General_CI_AI LIKE '%{zkratka_dodaciho_mista}%'
        AND NOT EXISTS (
          SELECT 1 FROM QHISHDOK_DF td
          WHERE td.IDHDOKP = z.IDHDOK
            AND td.NAZEV_TYPDOKN LIKE '%aktur%'
        )
      ORDER BY z.DTZDANITPLN DESC;

  vazby_podle_typu:
    pattern: "vazby (z|mezi) {typ_předchůdce} (na|do|→) {typ_následníka}"
    description: "Seznam vazeb mezi konkrétními typy dokladů"
    entities: ["tok_dokladů"]
    tested: true
    param_labels:
      typ_předchůdce: "Typ předchůdce"
      typ_následníka: "Typ následníka"
    sql_template: |
      SELECT
        td.IDHISHDOK,
        td.CIS_DOKP,
        td.NAZEV_TYPDOKP,
        td.DTZDANITPLNP,
        td.STAVP,
        td.CIS_DOKN,
        td.NAZEV_TYPDOKN,
        td.DTZDANITPLNN,
        td.STAVN
      FROM QHISHDOK_DF td
      WHERE td.NAZEV_TYPDOKP COLLATE Latin1_General_CI_AI LIKE '%{typ_předchůdce}%'
        AND td.NAZEV_TYPDOKN COLLATE Latin1_General_CI_AI LIKE '%{typ_následníka}%'
      ORDER BY td.DTZDANITPLNP DESC;

