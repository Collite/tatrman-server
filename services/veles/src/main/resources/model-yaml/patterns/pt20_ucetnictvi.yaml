# Patterns: Účetnictví
# Účetní zápisy, střediska, období, účty osnovy, doklady

query_patterns:

  # ===========================================================================
  # ÚČETNÍ ZÁPISY
  # ===========================================================================

  ucetni_zapisy_agregace_ukazatele:
    pattern: "(vypiš|vypis|ukaž|ukaz|zobraz) (účetní |ucetni |)(záznamy|zaznamy|zápisy|zapisy|pohyby) (pro |)(ukazatel|ukazatele) {nazev_ukazatele} za (období|obdobi) {obdobi}"
    description: "Součty účetních zápisů po účtech pro ukazatel MÚ za období"
    entities: ["účetní_zápis", "ukazatel_manažerského_účetnictví", "účetní_středisko", "účetní_období", "účet_účetní_osnovy"]
    tested: false
    param_labels:
      nazev_ukazatele: "Kód nebo název ukazatele MÚ"
      obdobi: "Účetní období (RRRR.MM)"
    example:
      question: "Vypiš účetní záznamy pro ukazatel VY KANCELAR za období 2026.03"
    sql_template: |
      SELECT MIN(z.IDUCETZAP) AS IDUCETZAP,
             o.UCET_OBD,
             mu.KOD_UKAZMU,
             mu.NAZEV_UKAZMU,
             u.KOD_UCTU,
             u.NAZEV_UCTU,
             SUM(z.HDKON_STAV) AS UCETNI_HODNOTA,
             -SUM(z.HDKON_STAV) AS MU_HODNOTA
      FROM QUCETZAP z
      JOIN QSTRED_DF s ON s.IDSTRED = z.IDSTRED
      JOIN QXXUKAZMU mu ON mu.IDXXUKAZMU = s.IDXXUKAZMU
      JOIN QUCTOBD o ON o.IDUCTOBD = z.IDUCTOBD
      JOIN QUCTOSN_DF u ON u.IDUCTOSN = z.IDUCTOSN
      WHERE (mu.KOD_UKAZMU COLLATE Latin1_General_CI_AI LIKE '{nazev_ukazatele}%'
         OR mu.NAZEV_UKAZMU COLLATE Latin1_General_CI_AI LIKE '%{nazev_ukazatele}%')
        AND o.UCET_OBD LIKE '%{obdobi}%'
        AND substring(u.KOD_UCTU,1,1) in ('5','6','8','9')
      GROUP BY z.IDUCTOBD, z.IDUCTOSN, z.IDSTRED,
               o.UCET_OBD, mu.KOD_UKAZMU, mu.NAZEV_UKAZMU,
               u.KOD_UCTU, u.NAZEV_UCTU
      ORDER BY SUM(z.HDKON_STAV) DESC;

  ucetni_zapisy_agregace_strediska:
    pattern: "(vypiš|vypis|ukaž|ukaz|zobraz) (účetní |ucetni |)(záznamy|zaznamy|zápisy|zapisy|pohyby) (pro |)(středisko|stredisko) {nazev_strediska} za (období|obdobi) {obdobi} podle (účetní hodnoty|ucetni hodnoty)"
    pattern_alt: "(vypiš|vypis|ukaž|ukaz|zobraz) (účetní |ucetni |)(záznamy|zaznamy|zápisy|zapisy|pohyby) (pro |)(středisko|stredisko) {nazev_strediska} za (období|obdobi) {obdobi}"
    description: "Součty účetních zápisů po účtech pro středisko za období"
    entities: ["účetní_zápis", "účetní_středisko", "účetní_období", "účet_účetní_osnovy"]
    tested: false
    param_labels:
      nazev_strediska: "Název nebo kód střediska"
      obdobi: "Účetní období (RRRR.MM)"
    example:
      question: "Vypiš účetní záznamy pro středisko DF ADNAK za období 2026.03 podle účetní hodnoty"
    sql_template: |
      SELECT MIN(z.IDUCETZAP) AS IDUCETZAP,
             o.UCET_OBD,
             s.KOD_STR,
             s.NAZEV_STR,
             u.KOD_UCTU,
             u.NAZEV_UCTU,
             SUM(z.HDKON_STAV) AS UCETNI_HODNOTA,
             -SUM(z.HDKON_STAV) AS MU_HODNOTA
      FROM QUCETZAP z
      JOIN QSTRED_DF s ON s.IDSTRED = z.IDSTRED
      JOIN QUCTOBD o ON o.IDUCTOBD = z.IDUCTOBD
      JOIN QUCTOSN_DF u ON u.IDUCTOSN = z.IDUCTOSN
      WHERE (s.KOD_STR COLLATE Latin1_General_CI_AI LIKE '{nazev_strediska}%'
         OR s.NAZEV_STR COLLATE Latin1_General_CI_AI LIKE '%{nazev_strediska}%')
        AND o.UCET_OBD LIKE '%{obdobi}%'
        AND substring(u.KOD_UCTU,1,1) in ('5','6','8','9')
      GROUP BY z.IDUCTOBD, z.IDUCTOSN, z.IDSTRED,
               o.UCET_OBD, s.KOD_STR, s.NAZEV_STR,
               u.KOD_UCTU, u.NAZEV_UCTU
      ORDER BY SUM(z.HDKON_STAV) DESC;

  ucetni_zapisy_agregace_uctu:
    pattern: "(vypiš|vypis|ukaž|ukaz|zobraz) (účetní |ucetni |)(záznamy|zaznamy|zápisy|zapisy|pohyby) (pro |)(účet|ucet) {nazev_uctu} za (období|obdobi) {obdobi} podle (účetní hodnoty|ucetni hodnoty)"
    pattern_alt: "(vypiš|vypis|ukaž|ukaz|zobraz) (účetní |ucetni |)(záznamy|zaznamy|zápisy|zapisy|pohyby) (pro |)(účet|ucet) {nazev_uctu} za (období|obdobi) {obdobi}"
    description: "Součty účetních zápisů po střediscích pro účet za období"
    entities: ["účetní_zápis", "účet_účetní_osnovy", "účetní_období", "účetní_středisko"]
    tested: false
    param_labels:
      nazev_uctu: "Kód nebo název účtu"
      obdobi: "Účetní období (RRRR.MM)"
    example:
      question: "Vypiš účetní záznamy pro účet 518032 za období 2026.03 podle účetní hodnoty"
    sql_template: |
      SELECT MIN(z.IDUCETZAP) AS IDUCETZAP,
             o.UCET_OBD,
             u.KOD_UCTU,
             u.NAZEV_UCTU,
             s.KOD_STR,
             s.NAZEV_STR,
             SUM(z.HDKON_STAV) AS UCETNI_HODNOTA,
             -SUM(z.HDKON_STAV) AS MU_HODNOTA
      FROM QUCETZAP z
      JOIN QUCTOSN_DF u ON u.IDUCTOSN = z.IDUCTOSN
      JOIN QUCTOBD o ON o.IDUCTOBD = z.IDUCTOBD
      JOIN QSTRED_DF s ON s.IDSTRED = z.IDSTRED
      WHERE (u.KOD_UCTU COLLATE Latin1_General_CI_AI LIKE '{nazev_uctu}%'
         OR u.NAZEV_UCTU COLLATE Latin1_General_CI_AI LIKE '%{nazev_uctu}%')
        AND o.UCET_OBD LIKE '%{obdobi}%'
        AND substring(u.KOD_UCTU,1,1) in ('5','6','8','9')
      GROUP BY z.IDUCTOBD, z.IDUCTOSN, z.IDSTRED,
               o.UCET_OBD, u.KOD_UCTU, u.NAZEV_UCTU,
               s.KOD_STR, s.NAZEV_STR
      ORDER BY SUM(z.HDKON_STAV) DESC;

  ucetni_zapisy_detail_agregace:
    pattern: "(detail|rozpad|rozbal) (účetních |ucetnich |)(zápisů|zapisu|agregace|záznamu|zaznamu) {id_ucetniho_zapisu}"
    description: "Detail účetních zápisů pro kombinaci období+účet+středisko z agregovaného řádku"
    entities: ["účetní_zápis", "účet_účetní_osnovy", "účetní_období", "účetní_středisko", "účetní_doklad"]
    tested: false
    param_labels:
      id_ucetniho_zapisu: "IDUCETZAP z agregovaného řádku"
    example:
      question: "Detail účetních zápisů 12345"
    sql_template: |
      SELECT z.IDUCETZAP,
             o.UCET_OBD,
             u.KOD_UCTU,
             u.NAZEV_UCTU,
             s.KOD_STR,
             s.NAZEV_STR,
             z.HDKON_STAV AS UCETNI_HODNOTA,
             -z.HDKON_STAV AS MU_HODNOTA,
             d.CIS_DOK,
             z.UZTEXT,
             d.SLOZKA_IDENT
      FROM QUCETZAP z
      JOIN QUCTOBD o ON o.IDUCTOBD = z.IDUCTOBD
      JOIN QUCTOSN_DF u ON u.IDUCTOSN = z.IDUCTOSN
      JOIN QSTRED_DF s ON s.IDSTRED = z.IDSTRED
      LEFT JOIN QSDOK d ON d.IDSDOK = z.IDSDOK
      WHERE z.IDUCTOBD = (SELECT TOP 1 r.IDUCTOBD FROM QUCETZAP r WHERE r.IDUCETZAP = {id_ucetniho_zapisu})
        AND z.IDUCTOSN = (SELECT TOP 1 r.IDUCTOSN FROM QUCETZAP r WHERE r.IDUCETZAP = {id_ucetniho_zapisu})
        AND z.IDSTRED = (SELECT TOP 1 r.IDSTRED FROM QUCETZAP r WHERE r.IDUCETZAP = {id_ucetniho_zapisu})
      ORDER BY z.HDKON_STAV DESC;

  ucetni_doklad_detail:
    pattern: "(detail|zobraz|ukaž|ukaz) (účetní |ucetni |)(doklad|dokladu) (pro |)(zápis|zapis|záznam|zaznam) {id_ucetniho_zapisu}"
    description: "Detail účetního dokladu (hlavička + složky) pro daný účetní zápis"
    entities: ["účetní_doklad", "účetní_zápis", "typ_dokladu"]
    tested: false
    param_labels:
      id_ucetniho_zapisu: "IDUCETZAP účetního zápisu"
    example:
      question: "Detail dokladu pro zápis 12345"
    sql_template: |
      WITH z AS
        (SELECT r.IDHDOK, r.IDSDOK FROM QUCETZAP r WHERE r.IDUCETZAP = {id_ucetniho_zapisu})
      SELECT s.IDSDOK,
             t.NAZEV_TYPDOK,
             d.CIS_DOK,
             d.DTZDANITPLN,
             d.IDSUBJEKT,
             s.ZAK_SDOK,
             d.TEXTPOZN,
             s.PORADI_DOK,
             s.VLTYP_SLOZ,
             s.KOD_POHYB,
             s.SLOZKA_IDENT,
             s.NAZEV_ZBOZI,
             s.TEXT_SLOZ,
             s.MNPOCETMJ,
             s.HDJCENAKC,
             s.HDCCENAKC
      FROM QHDOK d
      LEFT JOIN QTYPDOK t ON t.IDTYPDOK = d.IDTYPDOK
      LEFT JOIN QSDOK s ON s.IDSDOK = (SELECT IDSDOK FROM z)
      WHERE d.IDHDOK = (SELECT IDHDOK FROM z)
      ORDER BY s.PORADI_DOK;
