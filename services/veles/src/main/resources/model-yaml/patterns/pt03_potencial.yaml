# Patterns: Prodeje, potenciál, vytěžnost
# Rezerva tržeb, tržba na cm, prodeje, tržby

query_patterns:

  # ---------------------------------------------------------------------------
  # REZERVA TRŽEB
  # ---------------------------------------------------------------------------

  rezerva_trzby_dodaciho_mista:
    pattern: "rezerva tržeb (pro |)dodací(ho|) míst(o|a) {zkratka_dm}"
    description: "Rezerva tržeb a vytěženost pro konkrétní dodací místo"
    entities: ["rezerva_tržby", "dodací_místo", "obchodní_kanál", "podprodukt"]
    tested: true
    param_labels:
      zkratka_dm: "Zkratka dodacího místa"
    sql_template: |
      SELECT
        rt.SUBJADR_POZNAMKA,
        rt.IDCENSKUP,
        rt.IDXXPODSKUPZBOZI,
        rt.DM_NEUPLNA_DATA,
        rt.DM_KONKURENCE_ZAEVIDOVANA,
        rt.HDNORMATIV_TRZBY,
        rt.HDTRZBA_POTENCIAL_PODPROD,
        rt.HDTRZBA_CILOVYNORMATIV_PODPROD,
        rt.HDTRZBA_VYTEZNOST_PODPROD
      FROM XXREZERVA_TRZBY rt
      WHERE rt.SUBJADR_POZNAMKA COLLATE Latin1_General_CI_AI LIKE '%{zkratka_dm}%'
      ORDER BY rt.HDTRZBA_POTENCIAL_PODPROD DESC;

  top_rezervy_trzeb:
    pattern: "(top |největší |)(dodací(ch|) míst(a|) s |)největší rezerv(ou|y) tržeb"
    pattern_alt: "top (největší |)rezervy tržeb"
    description: "Dodací místa s největší rezervou tržeb"
    entities: ["dodací_místo", "rezerva_tržby"]
    tested: true
    sql_template: |
      SELECT TOP 10
        dm.IDSUBJADR,
        rt.SUBJADR_POZNAMKA,
        MAX(rt.DM_NEUPLNA_DATA) AS DM_NEUPLNA_DATA,
        MAX(rt.DM_KONKURENCE_ZAEVIDOVANA) AS DM_KONKURENCE_ZAEVIDOVANA,
        MAX(rt.HDTRZBA_12M_DM) AS HDTRZBA_12M_DM,
        MAX(rt.HDTRZBA_POTENCIAL_DM) AS HDTRZBA_POTENCIAL_DM,
        MAX(rt.HDTRZBA_POTENCIAL_DM) - MAX(rt.HDTRZBA_12M_DM) AS REZERVA
      FROM XXREZERVA_TRZBY rt
      -- JOIN přes SUBJADR_POZNAMKA je záměrný (XXREZERVA_TRZBY neobsahuje IDSUBJADR)
      LEFT JOIN QSUBJADR_DF dm ON dm.SUBJADR_POZNAMKA = rt.SUBJADR_POZNAMKA and dm.VLSUBJADR_TYP = 2
      GROUP BY dm.IDSUBJADR, rt.SUBJADR_POZNAMKA
      ORDER BY REZERVA DESC;

  nevytezena_dodaci_mista:
    pattern: "nevytěžen(á|ých|é) dodací(ch|) míst(a|)"
    pattern_alt: "(nízk|špatn)(á|ou|é) vytěžnost(í|) dodací(ch|) míst"
    description: "Nevytěžená dodací místa"
    entities: ["dodací_místo", "rezerva_tržby"]
    tested: true
    sql_template: |
      SELECT TOP 10
        dm.IDSUBJADR,
        rt.SUBJADR_POZNAMKA,
        MAX(rt.DM_NEUPLNA_DATA) AS DM_NEUPLNA_DATA,
        MAX(rt.DM_KONKURENCE_ZAEVIDOVANA) AS DM_KONKURENCE_ZAEVIDOVANA,
        MAX(rt.HDTRZBA_12M_DM) AS HDTRZBA_12M_DM,
        MAX(rt.HDTRZBA_POTENCIAL_DM) AS HDTRZBA_POTENCIAL_DM,
        CAST(ROUND(MAX(rt.HDTRZBA_12M_DM) * 100.0
          / NULLIF(MAX(rt.HDTRZBA_POTENCIAL_DM), 0), 1) AS DECIMAL(18,1)) AS VYTEZNOST
      FROM XXREZERVA_TRZBY rt
      -- JOIN přes SUBJADR_POZNAMKA je záměrný (XXREZERVA_TRZBY neobsahuje IDSUBJADR)
      LEFT JOIN QSUBJADR_DF dm ON dm.SUBJADR_POZNAMKA = rt.SUBJADR_POZNAMKA and dm.VLSUBJADR_TYP = 2
      GROUP BY dm.IDSUBJADR, rt.SUBJADR_POZNAMKA
      HAVING CAST(ROUND(MAX(rt.HDTRZBA_12M_DM) * 100.0
                 / NULLIF(MAX(rt.HDTRZBA_POTENCIAL_DM), 0), 1) AS DECIMAL(18,1)) < 50
      ORDER BY VYTEZNOST ASC;

  rezerva_trzby_podle_produktu:
    pattern: "rezerva tržeb (podle |pro |)produkt(u|ů|)"
    description: "Agregovaná rezerva tržeb podle produktů (přes podprodukty)"
    entities: ["produkt", "rezerva_tržby", "podprodukt"]
    tested: true
    sql_template: |
      SELECT 
        pp.IDSKUPZBOZI,
        p.NAZEV_SKUP_ZBOZI,
        SUM(rt.HDTRZBA_POTENCIAL_PODPROD) AS HDTRZBA_POTENCIAL_PODPROD,
        CASE WHEN SUM(rt.HDTRZBA_CILOVYNORMATIV_PODPROD) > 0
             THEN ROUND(SUM(rt.HDTRZBA_12M_PODPROD) * 100.0 / SUM(rt.HDTRZBA_CILOVYNORMATIV_PODPROD), 1)
        END AS HDTRZBA_VYTEZNOST_PODPROD
      FROM XXREZERVA_TRZBY rt
      JOIN QXXPODSKUPZBOZI pp ON pp.IDXXPODSKUPZBOZI = rt.IDXXPODSKUPZBOZI
      JOIN QSKUPZBOZI_DF p ON p.IDSKUPZBOZI = pp.IDSKUPZBOZI
      GROUP BY pp.IDSKUPZBOZI, p.NAZEV_SKUP_ZBOZI
      ORDER BY HDTRZBA_POTENCIAL_PODPROD DESC;

  nadnormativni_podprodukty:
    pattern: "nadnormativní podprodukty( dodacího místa {zkratka_dm}|)"
    description: "Seznam nadnormativních podproduktů s potenciálem"
    entities: ["rezerva_tržby", "podprodukt"]
    tested: true
    param_labels:
      zkratka_dm: "Zkratka dodacího místa"
    sql_template: |
      SELECT
        rt.SUBJADR_POZNAMKA,
        rt.IDXXPODSKUPZBOZI,
        pp.NAZEV_PODSKUPZBOZI,
        rt.HDTRZBA_NORMATIV,
        rt.VLPODPROD_NADNORMATIV,
        rt.HDTRZBA_NORMATIV_UPRAV
      FROM XXREZERVA_TRZBY rt
      JOIN QXXPODSKUPZBOZI pp ON pp.IDXXPODSKUPZBOZI = rt.IDXXPODSKUPZBOZI
      WHERE rt.VLPODPROD_NADNORMATIV = 1
        AND ('{zkratka_dm}' = '' OR rt.SUBJADR_POZNAMKA COLLATE Latin1_General_CI_AI LIKE '%{zkratka_dm}%')
      ORDER BY rt.HDTRZBA_NORMATIV DESC;

  # ---------------------------------------------------------------------------
  # ÚROVEŇ 4 (nové)
  # ---------------------------------------------------------------------------


  # ---------------------------------------------------------------------------
  # TRŽBA NA CM
  # ---------------------------------------------------------------------------

  trzba_na_cm_dm:
    pattern: "tržba na cm (na |pro |)(dodací(m|ho) míst(ě|o|a) |){zkratka_dodaciho_mista}"
    description: "Tržba na cm regálové plochy artiklů na dodacím místě"
    entities: ["výtěžnost_regálu", "artikl", "produkt"]
    tested: true
    param_labels:
      zkratka_dodaciho_mista: "Zkratka dodacího místa"
    sql_template: |
      SELECT
             vr.SUBJADR_POZNAMKA,
             a.CIS_ZBOZI,
             a.NAZEV_ZBOZI,
             p.NAZEV_SKUP_ZBOZI,
             vr.MNFACING,
             vr.MNDELKA_REG_ART,
             vr.HDTRZBA_12M_PREP,
             vr.HDVYTEZNOST_REGALU
      FROM QDF_VYTEZNOST_REGALU vr
      JOIN QZBOZI_DF a ON a.IDZBOZI = vr.IDZBOZI AND a.VLTYP_SLOZ = 1
      JOIN QSKUPZBOZI_DF p ON p.IDSKUPZBOZI = vr.IDSKUPZBOZI
      WHERE vr.SUBJADR_POZNAMKA COLLATE Latin1_General_CI_AI LIKE '%{zkratka_dodaciho_mista}%'
      ORDER BY vr.HDVYTEZNOST_REGALU DESC;

  trzba_na_cm_kanal:
    pattern: "tržba na cm (v |pro |)(obchodní(m|) |)kanál(u|) {kod_kanalu}"
    description: "Tržba na cm regálové plochy artiklů v obchodním kanálu"
    entities: ["výtěžnost_regálu_kanál", "artikl", "obchodní_kanál"]
    tested: true
    param_labels:
      kod_kanalu: "Kód kanálu"
    sql_template: |
      SELECT
             ok.CEN_SKUP,
             a.CIS_ZBOZI,
             a.NAZEV_ZBOZI,
             vr.ODEBIRA_POCET_DM_KANAL,
             vr.CELKEM_POCET_DM_KANAL,
             vr.MNDELKA_REG_ART_KANAL,
             vr.HDTRZBA_12M_PREP_KANAL,
             vr.HDVYTEZNOST_REGALU_KANAL
      FROM QDF_VYTEZNOST_REGALU_KANAL vr
      JOIN QZBOZI_DF a ON a.IDZBOZI = vr.IDZBOZI AND a.VLTYP_SLOZ = 1
      JOIN QCENSKUP_DF ok ON ok.IDCENSKUP = vr.IDCENSKUP
      WHERE ('{kod_kanalu}' = '' OR ok.CEN_SKUP LIKE '%{kod_kanalu}%')
      ORDER BY vr.HDVYTEZNOST_REGALU_KANAL DESC;

  # ===========================================================================
  # PRODEJE A TRŽBY
  # ===========================================================================

  prodeje_zakaznika:
    pattern: "(jake ma zakaznik|jaké má zákazník|ukaz mi trzby zakaznika|ukaž mi tržby zákazníka|prodeje zakaznika|prodeje zákazníka|obraty zakaznika|obraty zákazníka|trzby zakaznika|tržby zákazníka) {nazev_zakaznika}"
    pattern_alt: "(jake ma|jaké má) {nazev_zakaznika} prodeje"
    description: "Celková tržba zákazníka za 12 měsíců"
    entities: ["subjekt", "prodeje"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    example:
      question: "Jaké má Kaufland prodeje?"
    sql_template: |
      SELECT 
        s.IDSUBJEKT,
        s.SUBJ_NAZEV,
        COUNT(DISTINCT dm.IDSUBJADR) AS POCET_DM,
        SUM(p.HDTRZBA_12M) AS HDTRZBA_12M,
        SUM(p.HDTRZBA_24M) AS HDTRZBA_24M
      FROM QSUBJEKT s
      JOIN QSUBJADR_DF dm ON dm.IDSUBJEKT = s.IDSUBJEKT AND dm.VLSUBJADR_TYP = 2
      JOIN XXPRODEJE p ON p.IDSUBJADR = dm.IDSUBJADR
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      GROUP BY s.IDSUBJEKT, s.SUBJ_NAZEV
      ORDER BY HDTRZBA_12M DESC;

  produkty_zakaznika:
    pattern: "(jake produkty kupuje|jaké produkty kupuje|co nakupuje zakaznik|co nakupuje zákazník) {nazev_zakaznika}"
    pattern_alt: "(produkty|sortiment) (zákazníka |zakaznika ){nazev_zakaznika}"
    description: "Produkty nakupované zákazníkem"
    entities: ["produkt", "dodací_místo", "subjekt", "prodeje"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    example:
      question: "Jaké produkty kupuje Kaufland?"
    sql_template: |
      SELECT 
        pr.IDSKUPZBOZI,
        s.SUBJ_NAZEV,
        pr.NAZEV_SKUP_ZBOZI,
        SUM(p.HDTRZBA_12M) AS HDTRZBA_12M
      FROM QSKUPZBOZI_DF pr 
      JOIN XXPRODEJE p ON pr.IDSKUPZBOZI = p.IDSKUPZBOZI
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = p.IDSUBJADR AND dm.VLSUBJADR_TYP = 2
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      GROUP BY pr.IDSKUPZBOZI, s.SUBJ_NAZEV, pr.NAZEV_SKUP_ZBOZI
      ORDER BY HDTRZBA_12M DESC;

  posledni_dodavka_zakaznika:
    pattern: "(kdy byla poslední dodávka|kdy jsme naposledy dodávali|posledni dodavka|poslední dodávka) (pro |){nazev_zakaznika}"
    pattern_alt: "(co|kdy) jsme (naposledy|naposled) (dodali|dodávali) (pro |){nazev_zakaznika}"
    description: "Datum poslední dodávky pro zákazníka"
    entities: ["prodeje", "artikl", "dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    sql_template: |
      SELECT
             s.SUBJ_NAZEV,
             a.NAZEV_ZBOZI,
             p.DTPOSLEDNI_DOD,
             p.MNPOSLEDNI_DOD
      FROM XXPRODEJE p
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = p.IDSUBJADR AND dm.VLSUBJADR_TYP = 2
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      JOIN QZBOZI_DF a ON a.IDZBOZI = p.IDZBOZI AND a.VLTYP_SLOZ = 1
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
        AND p.DTPOSLEDNI_DOD IS NOT NULL
      ORDER BY p.DTPOSLEDNI_DOD DESC;

  trzba_zakaznika_24m:
    pattern: "(jaká je tržba|tržba zákazníka) {nazev_zakaznika} za (posledních |)24 měsíců"
    pattern_alt: "(celková |)(tržba|trzba|obrat) {nazev_zakaznika} za (posledních |)24 měsíců"
    description: "Tržba zákazníka za 24 měsíců"
    entities: ["prodeje", "dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    sql_template: |
      SELECT s.SUBJ_NAZEV,
             SUM(p.HDTRZBA_24M) AS HDTRZBA_24M
      FROM XXPRODEJE p
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = p.IDSUBJADR AND dm.VLSUBJADR_TYP = 2
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      GROUP BY s.SUBJ_NAZEV
      ORDER BY HDTRZBA_24M DESC;

  top_artikly_zakaznika:
    pattern: "(které artikly má|top artikly zákazníka) {nazev_zakaznika} s nejvyšší tržbou"
    pattern_alt: "(nejprodávanější|nejlepší) artikly (zákazníka |){nazev_zakaznika}"
    description: "Artikly zákazníka s nejvyšší tržbou"
    entities: ["prodeje", "artikl", "dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
    sql_template: |
      SELECT TOP 10
             s.SUBJ_NAZEV,
             a.NAZEV_ZBOZI,
             SUM(p.HDTRZBA_12M) AS HDTRZBA_12M
      FROM XXPRODEJE p
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = p.IDSUBJADR AND dm.VLSUBJADR_TYP = 2
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      JOIN QZBOZI_DF a ON a.IDZBOZI = p.IDZBOZI AND a.VLTYP_SLOZ = 1
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
      GROUP BY s.SUBJ_NAZEV, a.NAZEV_ZBOZI
      ORDER BY HDTRZBA_12M DESC;

  prvni_nakup_artiklu:
    pattern: "(kdy|datum) {nazev_zakaznika} poprvé (nakoupil|koupil) {nazev_artiklu}"
    description: "Datum prvního nákupu artiklu zákazníkem"
    entities: ["prodeje", "artikl", "dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
      nazev_artiklu: "Název artiklu"
    sql_template: |
      SELECT
             s.SUBJ_NAZEV,
             a.NAZEV_ZBOZI,
             p.DTPRVNI_DOD
      FROM XXPRODEJE p
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = p.IDSUBJADR AND dm.VLSUBJADR_TYP = 2
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      JOIN QZBOZI_DF a ON a.IDZBOZI = p.IDZBOZI AND a.VLTYP_SLOZ = 1
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
        AND a.NAZEV_ZBOZI COLLATE Latin1_General_CI_AI LIKE '%{nazev_artiklu}%'
        AND p.DTPRVNI_DOD IS NOT NULL
      ORDER BY p.DTPRVNI_DOD;

  porovnani_trzeb_zakazniku:
    pattern: "(porovnej|srovnej) trzby {nazev_zakaznika_a} a {nazev_zakaznika_b}"
    pattern_alt: "(porovnej|srovnej) zakazniky {nazev_zakaznika_a} a {nazev_zakaznika_b}"
    description: "Porovnání tržeb dvou zákazníků za 12 měsíců"
    entities: ["prodeje", "dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika_a: "Název 1. zákazníka"
      nazev_zakaznika_b: "Název 2. zákazníka"
    sql_template: |
      SELECT s.SUBJ_NAZEV,
             SUM(p.HDTRZBA_12M) AS HDTRZBA_12M,
             SUM(p.HDTRZBA_24M) AS HDTRZBA_24M
      FROM XXPRODEJE p
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = p.IDSUBJADR AND dm.VLSUBJADR_TYP = 2
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      WHERE (s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika_a}%'
         OR s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika_b}%')
      GROUP BY s.SUBJ_NAZEV
      ORDER BY HDTRZBA_12M DESC;

  prodeje_produktu_u_zakaznika:
    pattern: "prodeje produkt(u|) {nazev_produktu} (u |u zákazníka |u zakaznika |pro |pro zákazníka |){nazev_zakaznika}"
    pattern_alt: "(kolik|jak) {nazev_zakaznika} nakupuje {nazev_produktu}"
    description: "Prodeje konkrétního produktu u zákazníka"
    entities: ["prodeje", "produkt", "artikl", "dodací_místo", "subjekt"]
    tested: true
    param_labels:
      nazev_zakaznika: "Název zákazníka"
      nazev_produktu: "Název produktu"
    sql_template: |
      SELECT
             dm.SUBJADR_POZNAMKA,
             a.CIS_ZBOZI,
             a.NAZEV_ZBOZI,
             p.HDTRZBA_12M,
             p.HDTRZBA_24M,
             p.DTPOSLEDNI_DOD
      FROM XXPRODEJE p
      JOIN QSUBJADR_DF dm ON dm.IDSUBJADR = p.IDSUBJADR AND dm.VLSUBJADR_TYP = 2
      JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
      JOIN QSKUPZBOZI_DF pr ON pr.IDSKUPZBOZI = p.IDSKUPZBOZI
      JOIN QZBOZI_DF a ON a.IDZBOZI = p.IDZBOZI AND a.VLTYP_SLOZ = 1
      WHERE ('{id_subjektu}' = '' OR s.IDSUBJEKT = '{id_subjektu}')
        AND s.SUBJ_NAZEV COLLATE Latin1_General_CI_AI LIKE '%{nazev_zakaznika}%'
        AND pr.NAZEV_SKUP_ZBOZI COLLATE Latin1_General_CI_AI LIKE '%{nazev_produktu}%'
      ORDER BY p.HDTRZBA_12M DESC;

  prodeje_na_dodacim_miste:
    pattern: "prodeje (na |)(dodacím místě |){zkratka_dodaciho_mista}"
    pattern_alt: "(seznam |)(prodeje|prodejů|tržby|tržeb) (na dodacím místě|dodacího místa)"
    description: |
      Seznam prodejů pro konkrétní dodací místo
      LIKE match na zkratku je záměrný — zkratka může být podřetězec.
    entities: ["prodeje", "obchodní_kanál", "produkt", "podprodukt", "artikl"]
    tested: true
    param_labels:
      zkratka_dodaciho_mista: "Zkratka dodacího místa"
    sql_template: |
      SELECT
        pr.SUBJADR_POZNAMKA,
        ok.CEN_SKUP,
        p.NAZEV_SKUP_ZBOZI,
        pp.NAZEV_PODSKUPZBOZI,
        a.CIS_ZBOZI,
        a.NAZEV_ZBOZI,
        pr.DTPRVNI_DOD,
        pr.DTPOSLEDNI_DOD,
        pr.HDTRZBA_24M,
        pr.HDTRZBA_12M
      FROM XXPRODEJE pr
      LEFT JOIN QCENSKUP_DF ok ON ok.IDCENSKUP = pr.IDCENSKUP
      LEFT JOIN QSKUPZBOZI_DF p ON p.IDSKUPZBOZI = pr.IDSKUPZBOZI
      LEFT JOIN QXXPODSKUPZBOZI pp ON pp.IDXXPODSKUPZBOZI = pr.IDXXPODSKUPZBOZI
      LEFT JOIN QZBOZI_DF a ON a.IDZBOZI = pr.IDZBOZI AND a.VLTYP_SLOZ = 1
      WHERE ('{id_dodaciho_mista}' = '' OR pr.IDSUBJADR = '{id_dodaciho_mista}')
        AND pr.SUBJADR_POZNAMKA COLLATE Latin1_General_CI_AI LIKE '%{zkratka_dodaciho_mista}%'
      ORDER BY p.NAZEV_SKUP_ZBOZI, a.NAZEV_ZBOZI;

  trzby_podle_produktu:
    pattern: "tržby (podle |pro |)produkt(u|)( {nazev_produktu}|)"
    description: "Souhrn tržeb podle produktů"
    entities: ["prodeje", "produkt"]
    tested: true
    param_labels:
      nazev_produktu: "Název produktu"
    sql_template: |
      SELECT 
        p.IDSKUPZBOZI,
        p.KOD_SKUP_ZBOZI,
        p.NAZEV_SKUP_ZBOZI,
        SUM(pr.HDTRZBA_24M) AS HDTRZBA_24M,
        SUM(pr.HDTRZBA_12M) AS HDTRZBA_12M
      FROM XXPRODEJE pr
      JOIN QSKUPZBOZI_DF p ON p.IDSKUPZBOZI = pr.IDSKUPZBOZI
      WHERE ('{id_produktu}' = '' OR pr.IDSKUPZBOZI = '{id_produktu}')
        AND ('{nazev_produktu}' = '' OR p.NAZEV_SKUP_ZBOZI LIKE '%{nazev_produktu}%')
      GROUP BY p.IDSKUPZBOZI, p.KOD_SKUP_ZBOZI, p.NAZEV_SKUP_ZBOZI
      ORDER BY HDTRZBA_12M DESC;

  trzby_podle_kanalu:
    pattern: "tržby (podle |pro |)(obchodní |prodejní |)kanál(u|)( {kod_kanalu}|)"
    description: "Souhrn tržeb podle obchodních kanálů"
    entities: ["prodeje", "obchodní_kanál"]
    tested: true
    param_labels:
      kod_kanalu: "Kód kanálu"
    sql_template: |
      SELECT 
          ok.CEN_SKUP,
          SUM(pr.HDTRZBA_24M) AS HDTRZBA_24M,
          SUM(pr.HDTRZBA_12M) AS HDTRZBA_12M
      FROM XXPRODEJE pr
      JOIN QCENSKUP_DF ok ON ok.IDCENSKUP = pr.IDCENSKUP
      WHERE ('{id_obchodniho_kanalu}' = '' OR ok.IDCENSKUP = '{id_obchodniho_kanalu}')
        AND ('{kod_kanalu}' = '' OR ok.CEN_SKUP LIKE '%{kod_kanalu}%')
      GROUP BY ok.CEN_SKUP
      ORDER BY HDTRZBA_12M DESC;
