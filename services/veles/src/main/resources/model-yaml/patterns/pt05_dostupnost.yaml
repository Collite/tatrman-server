# Patterns: Dostupnost artiklu
# Identifikace, skladová dostupnost, plánované doplnění, kompletní přehled
# Agent: ai-ag-rmt-overovac-dostupnosti-artiklu
# Vytvořeno: 27.04.2026 DS  |  fix 05.05.2026 DS (NOB INFO_TERMIN dnes)

query_patterns:

  # ===========================================================================
  # IDENTIFIKACE
  # ===========================================================================

  identifikace_artiklu:
    pattern: "(identifikuj|ověř|over|zjisti dostupnost) (artikl|zboží|položku) {hledany_vyraz}"
    description: |
      Kaskádové vyhledání artiklu:
        1. přesná shoda CIS_ZBOZI
        2. přesná shoda CARKOVY_KOD
        3. přesná shoda CARKOVY_KODMJ (čárový kód obalu)
        4. fulltextová shoda NAZEV_ZBOZI
      Vrací: IDZBOZI, CIS_ZBOZI, NAZEV_ZBOZI, TYP_ARTIKLU, ZPUSOB_PORIZENI, STAV_ARTIKLU, PRODUKT, PODPRODUKT, NALEZENO_PODLE
    entities: ["artikl", "produkt", "podprodukt", "čárový_kód_obalu"]
    tested: true
    param_labels:
      hledany_vyraz: "Kód, čárový kód nebo název artiklu"
    example:
      question: "Identifikuj artikl 1410244"
    sql_template: |
      SELECT
             Z.IDZBOZI,
             Z.CIS_ZBOZI,
             Z.NAZEV_ZBOZI,
             Z.VLPODTYP_SLOZ,
             case Z.VLPODTYP_SLOZ
                 when 1 then 'Výrobek'
                 when 2 then 'Zboží'
                 when 3 then 'Materiál'
                 when 4 then 'Polotovar'
                 else 'Neznámý'
             end                             AS TYP_ARTIKLU,
             case
                 when Z.VLPODTYP_SLOZ in (1,4) then 'Vyráběný'
                 when Z.VLPODTYP_SLOZ in (2,3) then 'Nakupovaný'
                 else 'Neurčeno'
             end                             AS ZPUSOB_PORIZENI,
             Z.VLSTAVZBOZI,
             case Z.VLSTAVZBOZI
                 when 0 then 'Aktivní'
                 when 1 then 'Neaktivní'
                 else 'Neznámý'
             end                             AS STAV_ARTIKLU,
             SZ.NAZEV_SKUP_ZBOZI            AS PRODUKT,
             PSZ.NAZEV_PODSKUPZBOZI          AS PODPRODUKT,
             case
                 when Z.CIS_ZBOZI = '{hledany_vyraz}' then 'Kód artiklu'
                 when Z.CARKOVY_KOD = '{hledany_vyraz}' then 'Čárový kód'
                 when VMJ.CARKOVY_KODMJ = '{hledany_vyraz}' then 'Čárový kód obalu'
                 when Z.NAZEV_ZBOZI LIKE '%{hledany_vyraz}%' then 'Název (fulltext)'
                 else 'Jiné'
             end                             AS NALEZENO_PODLE
      FROM QZBOZI_DF Z WITH(NOLOCK)
      LEFT JOIN QSKUPZBOZI_DF SZ WITH(NOLOCK) ON SZ.IDSKUPZBOZI = Z.IDSKUPZBOZI
      LEFT JOIN QXXPODSKUPZBOZI PSZ WITH(NOLOCK) ON PSZ.IDXXPODSKUPZBOZI = Z.IDXXPODSKUPZBOZI
      LEFT JOIN QZBOZIVMJ_DF VMJ WITH(NOLOCK) ON VMJ.IDZBOZI = Z.IDZBOZI
                                               AND VMJ.CARKOVY_KODMJ = '{hledany_vyraz}'
      WHERE ISNULL(Z.VLSTAVZBOZI, 0) = 0
        AND Z.VLTYP_SLOZ = 1
        AND (
              Z.CIS_ZBOZI = '{hledany_vyraz}'
           OR Z.CARKOVY_KOD = '{hledany_vyraz}'
           OR VMJ.CARKOVY_KODMJ = '{hledany_vyraz}'
           OR Z.NAZEV_ZBOZI LIKE '%{hledany_vyraz}%'
            )
      ORDER BY
          case
              when Z.CIS_ZBOZI = '{hledany_vyraz}' then 1
              when Z.CARKOVY_KOD = '{hledany_vyraz}' then 2
              when VMJ.CARKOVY_KODMJ = '{hledany_vyraz}' then 3
              else 4
          end,
          Z.CIS_ZBOZI;

  # ===========================================================================
  # DOSTUPNOST
  # ===========================================================================

  skladova_dostupnost_artiklu:
    pattern: "(skladová dostupnost|zásoby per sklad|stav skladu) (artiklu |)(kód |kod |){kod_artiklu}"
    pattern_alt: "(kolik je na skladě|kolik máme skladem) {nazev_artiklu}"
    description: |
      Disponibilní stav artiklu per sklad z QZBOZSKL_DF.
      Klíčový sloupec: DISPONIBILNI (Disponibilní pro ověření).
      Výjimka: Pro Materiál (VLPODTYP_SLOZ=3) na skladu 04 se bere MNFYZVOLNYSTAV (Volné).
      Vrací pouze sklady s nenulovým fyzickým stavem.
    entities: ["zásoba_per_sklad", "artikl", "sklad"]
    tested: true
    param_labels:
      kod_artiklu: "Kód artiklu"
      nazev_artiklu: "Název artiklu"
    example:
      question: "Skladová dostupnost artiklu 1410244"
    sql_template: |
      SELECT
             ZS.CIS_SKLAD                    AS SKLAD,
             ZS.NAZEV_SKLAD                  AS NAZEV_SKLADU,
             ZS.CIS_ZBOZI,
             ZS.NAZEV_ZBOZI,
             ZS.MNFYZICKYSTAV                AS FYZICKY_STAV,
             ZS.MNBLOKOVANO                  AS BLOKOVANO,
             ZS.MNFYZVOLNYSTAV               AS VOLNE,
             ZS.DISPONIBILNI                 AS DISPONIBILNI_PRO_OVERENI,
             ZS.DISPONIBILNI_WMS             AS DISPONIBILNI_STAV,
             ZS.MNFYZICKYSTAV_PAL            AS FYZICKY_STAV_PAL,
             ZS.DISPONIBILNI_PAL             AS DISPONIBILNI_PAL,
             -- Pro Materiál na skladu surovin (04) se bere VOLNE místo DISPONIBILNI
             case
                 when Z.VLPODTYP_SLOZ = 3 AND ZS.CIS_SKLAD = '04' then
                     case
                         when ZS.MNFYZVOLNYSTAV > 0
                             then 'Skladem (' + CAST(CAST(ZS.MNFYZVOLNYSTAV as int) as varchar(20)) + ' ks volné)'
                         when ZS.MNFYZVOLNYSTAV = 0
                             then 'Nedostupný (0 ks volné)'
                         when ZS.MNFYZVOLNYSTAV < 0
                             then 'Nedostatek (přečerpáno o '
                                  + CAST(CAST(ABS(ZS.MNFYZVOLNYSTAV) as int) as varchar(20)) + ' ks)'
                         else 'Stav neznámý'
                     end
                 else
                     case
                         when ZS.DISPONIBILNI > 0
                             then 'Skladem (' + CAST(CAST(ZS.DISPONIBILNI as int) as varchar(20)) + ' ks disp.)'
                         when ZS.DISPONIBILNI = 0
                             then 'Nedostupný (0 ks disp.)'
                         when ZS.DISPONIBILNI < 0
                             then 'Nedostatek (přečerpáno o '
                                  + CAST(CAST(ABS(ZS.DISPONIBILNI) as int) as varchar(20)) + ' ks)'
                         else 'Stav neznámý'
                     end
             end                             AS STAV_DOSTUPNOSTI,
             case
                 when ZS.DISPONIBILNI_WMS > 0 then 'OK'
                 when ZS.DISPONIBILNI_WMS <= 0 then 'KRITICKÝ'
                 else '?'
             end                             AS DISP_STAV_SIGNAL
      FROM QZBOZSKL_DF ZS WITH(NOLOCK)
      LEFT JOIN QZBOZI_DF Z WITH(NOLOCK) ON Z.IDZBOZI = ZS.IDZBOZI
      WHERE ('{id_artiklu}' = '' OR ZS.IDZBOZI = '{id_artiklu}')
        AND ('{kod_artiklu}' = '' OR ZS.CIS_ZBOZI = '{kod_artiklu}')
       /* AND ZS.MNFYZICKYSTAV <> 0 */
      ORDER BY ZS.CIS_SKLAD;

  celkova_dostupnost_artiklu:
    pattern: "(celková dostupnost|celkem skladem|celkový stav) (artiklu |){kod_artiklu}"
    description: |
      Součet disponibilního stavu artiklu přes všechny sklady.
      Agreguje DISPONIBILNI a DISPONIBILNI_WMS z QZBOZSKL_DF.
    entities: ["zásoba_na_skladě", "artikl"]
    tested: true
    param_labels:
      kod_artiklu: "Kód artiklu"
    example:
      question: "Celková dostupnost artiklu 1410244"
    sql_template: |
      SELECT
             ZS.CIS_ZBOZI,
             MAX(ZS.NAZEV_ZBOZI)             AS NAZEV_ZBOZI,
             SUM(ZS.MNFYZICKYSTAV)           AS FYZICKY_STAV_CELKEM,
             SUM(ZS.MNBLOKOVANO)             AS BLOKOVANO_CELKEM,
             SUM(ZS.MNFYZVOLNYSTAV)          AS VOLNE_CELKEM,
             SUM(ZS.DISPONIBILNI)            AS DISPONIBILNI_CELKEM,
             SUM(ZS.DISPONIBILNI_WMS)        AS DISPONIBILNI_WMS_CELKEM,
             SUM(ZS.DISPONIBILNI_PAL)        AS DISPONIBILNI_PAL_CELKEM,
             case
                 when SUM(ZS.DISPONIBILNI) > 0 then 'Skladem'
                 when SUM(ZS.DISPONIBILNI) = 0 then 'Na hranici'
                 else 'Nedostatek'
             end                             AS STAV_DOSTUPNOSTI
      FROM QZBOZSKL_DF ZS WITH(NOLOCK)
      WHERE ZS.CIS_ZBOZI = '{kod_artiklu}'
        AND ZS.MNFYZICKYSTAV <> 0
      GROUP BY ZS.CIS_ZBOZI;

  # ===========================================================================
  # DOPLNĚNÍ
  # ===========================================================================

  planovane_doplneni_artiklu:
    pattern: "(plánované doplnění|kdy bude doplněn|plán doplnění|plán příjmu) (artiklu |){kod_artiklu}"
    description: |
      Plánované příjmy z QXXPLANMATTOKU (VLTYPPLANUMT IN 2, 4, 6).
      Primární zdroj pro informaci o budoucích doplněních.
      Vrací potvrzené příjmy s termínem >= dnes.
    entities: ["plán_materiálového_toku", "artikl"]
    tested: true
    param_labels:
      kod_artiklu: "Kód artiklu"
    example:
      question: "Plánované doplnění artiklu 1410244"
    sql_template: |
      SELECT
             PMT.CIS_ZBOZI,
             PMT.NAZEV_ZBOZI,
             case PMT.VLPODTYP_SLOZ
                 when 1 then 'Výrobek'
                 when 2 then 'Zboží'
                 when 3 then 'Materiál'
                 when 4 then 'Polotovar'
             end                             AS TYP_ARTIKLU,
             case
                 when PMT.VLPODTYP_SLOZ in (1,4) then 'Vyráběný'
                 when PMT.VLPODTYP_SLOZ in (2,3) then 'Nakupovaný'
                 else 'Neurčeno'
             end                             AS ZPUSOB_PORIZENI,
             PMT.CIS_SKLAD                   AS SKLAD,
             PMT.NAZEV_SKLAD,
             PMT.DTDATPOHYBU                 AS TERMIN_DOPLNENI,
             PMT.MNPRIJEMMT                  AS POTVRZENY_PRIJEM,
             PMT.MNNAVRHDOPLN                AS NAVRH_DOPLNENI,
             PMT.MNBUDNAVDOPLN               AS BUDOUCI_NAVRH_DOPLNENI,
             PMT.MNCELKPLANDOPLN             AS CELKOVY_PLAN_DOPLNENI,
             PMT.CIS_SARZE                   AS SARZE,
             PMT.KOD_MJ                      AS MJ,
             PMT.VLSTAVPRIKAZU               AS STAV_PRIKAZU,
             PMT.DTTERMINPRIKAZU             AS TERMIN_PRIKAZU,
             PMT.SUBJ_NAZEV_DOD              AS DODAVATEL,
             PMT.DTDATUMDODANI               AS DATUM_DODANI,
             case
                 when PMT.DTDATPOHYBU < GETDATE() then 'Termín prošlý'
                 when PMT.DTDATPOHYBU = CAST(GETDATE() as date) then 'Dnes'
                 else 'Očekáváno: ' + CONVERT(varchar(10), PMT.DTDATPOHYBU, 104)
             end                             AS INFO_TERMIN
      FROM QXXPLANMATTOKU PMT WITH(NOLOCK)
      WHERE PMT.DTDATPOHYBU >= GETDATE()
        AND PMT.MNPRIJEMMT > 0
        AND PMT.VLTYPPLANUMT IN (2, 4, 6)
        AND PMT.CIS_ZBOZI = '{kod_artiklu}'
      ORDER BY PMT.DTDATPOHYBU ASC, PMT.CIS_SKLAD;

  zalozni_doplneni_vyroba:
    pattern: "(výrobní příkazy|plán výroby|vyráběné doplnění) (artiklu |){kod_artiklu}"
    description: |
      Záložní zdroj pro vyráběné artikly (VLPODTYP_SLOZ IN 1, 4).
      Otevřené výrobní příkazy z HDOK/SDOK: PVY, PVP, PLV.
      Použít pouze pokud QXXPLANMATTOKU nevrátí výsledky.
    entities: ["artikl"]
    tested: true
    param_labels:
      kod_artiklu: "Kód artiklu"
    example:
      question: "Výrobní příkazy artiklu 1410244"
    sql_template: |
      SELECT
             Z.CIS_ZBOZI,
             Z.NAZEV_ZBOZI,
             'Vyráběný'                      AS ZPUSOB_PORIZENI,
             TD.TYP_DOK                      AS TYP_DOKLADU,
             case TD.TYP_DOK
                 when 'PVY' then 'Příkaz k výrobě'
                 when 'PVP' then 'Příkaz k výrobě polotovarů'
                 when 'PLV' then 'Plán výroby'
             end                             AS NAZEV_TYPU,
             H.CIS_DOK                       AS CISLO_DOKLADU,
             H.DTVYSTAVENO                   AS DATUM_VYSTAVENI,
             H.DTZDANITPLN                   AS PLAN_DATUM_DOKONCENI,
             H.VLSTAVHDOK                    AS STAV_DOKLADU,
             case H.VLSTAVHDOK
                 when -2 then 'Koncept'
                 when 0  then 'Rozpracováno'
                 when 1  then 'Otevřený'
                 when 3  then 'Blokovaný'
                 else 'Stav ' + CAST(H.VLSTAVHDOK as varchar(5))
             end                             AS STAV_POPIS,
             SD.MNCELKEMPOCET                AS MNOZSTVI,
             MJ.KOD_MJ                       AS MERNA_JEDNOTKA,
             case
                 when H.DTZDANITPLN IS NULL then 'Termín neurčen'
                 when H.DTZDANITPLN < GETDATE() then 'Termín prošlý'
                 else 'Očekáváno: ' + CONVERT(varchar(10), H.DTZDANITPLN, 104)
             end                             AS INFO_TERMIN
      FROM HDOK H WITH(NOLOCK)
      LEFT JOIN TYPDOK TD WITH(NOLOCK) ON TD.IDTYPDOK = H.IDTYPDOK
      LEFT JOIN SDOK SD WITH(NOLOCK) ON SD.IDHDOK = H.IDHDOK
                                      AND SD.VLTYP_SLOZ IN (1,2)
      LEFT JOIN QZBOZI_DF Z WITH(NOLOCK) ON Z.IDZBOZI = SD.IDZBOZI
      LEFT JOIN QMJ MJ WITH(NOLOCK) ON MJ.IDMJ = SD.IDMJ
      WHERE TD.TYP_DOK IN ('PVY','PVP','PLV')
        AND H.VLSTAVHDOK IN (-2, 0, 1)
        AND Z.CIS_ZBOZI = '{kod_artiklu}'
      ORDER BY H.DTZDANITPLN ASC;

  zalozni_doplneni_nakup:
    pattern: "(nákupní objednávky|objednané doplnění|nakupované doplnění) (artiklu |){kod_artiklu}"
    description: |
      Záložní zdroj pro nakupované artikly (VLPODTYP_SLOZ IN 2, 3).
      Otevřené nákupní objednávky z HDOK/SDOK: NOB.
      Použít pouze pokud QXXPLANMATTOKU nevrátí výsledky.
    entities: ["artikl"]
    tested: true
    param_labels:
      kod_artiklu: "Kód artiklu"
    example:
      question: "Nákupní objednávky artiklu 1410244"
    sql_template: |
      SELECT
             Z.CIS_ZBOZI,
             Z.NAZEV_ZBOZI,
             'Nakupovaný'                    AS ZPUSOB_PORIZENI,
             'NOB'                           AS TYP_DOKLADU,
             'Nákupní objednávka'            AS NAZEV_TYPU,
             H.CIS_DOK                       AS CISLO_DOKLADU,
             H.DTVYSTAVENO                   AS DATUM_VYSTAVENI,
             H.DTZDANITPLN                   AS OCEKAVANY_TERMIN_DODANI,
             H.VLSTAVHDOK                    AS STAV_DOKLADU,
             case H.VLSTAVHDOK
                 when -2 then 'Koncept'
                 when 0  then 'Rozpracováno'
                 when 1  then 'Otevřený'
                 when 3  then 'Blokovaný'
                 when 6  then 'Předfakturováno'
                 else 'Stav ' + CAST(H.VLSTAVHDOK as varchar(5))
             end                             AS STAV_POPIS,
             SUBJ.SUBJ_NAZEV                 AS DODAVATEL,
             SD.MNCELKEMPOCET                AS MNOZSTVI,
             MJ.KOD_MJ                       AS MERNA_JEDNOTKA,
             H.JEJICH_CISDOK                 AS CISLO_DODAVATELE,
             case
                 when H.DTZDANITPLN IS NULL then 'Termín dodání neurčen'
                 when CAST(H.DTZDANITPLN AS date) = CAST(GETDATE() AS date) then 'Dodání v plánu dnes'
                 when H.DTZDANITPLN < CAST(GETDATE() AS date) then 'Termín prošlý – zpožděná dodávka'
                 else 'Očekáváno: ' + CONVERT(varchar(10), H.DTZDANITPLN, 104)
             end                             AS INFO_TERMIN
      FROM HDOK H WITH(NOLOCK)
      LEFT JOIN TYPDOK TD WITH(NOLOCK) ON TD.IDTYPDOK = H.IDTYPDOK
      LEFT JOIN SDOK SD WITH(NOLOCK) ON SD.IDHDOK = H.IDHDOK
                                      AND SD.VLTYP_SLOZ IN (1,2)
      LEFT JOIN QZBOZI_DF Z WITH(NOLOCK) ON Z.IDZBOZI = SD.IDZBOZI
      LEFT JOIN QSUBJEKT SUBJ WITH(NOLOCK) ON SUBJ.IDSUBJEKT = H.IDSUBJEKT
      LEFT JOIN QMJ MJ WITH(NOLOCK) ON MJ.IDMJ = SD.IDMJ
      WHERE TD.TYP_DOK = 'NOB'
        AND H.VLSTAVHDOK IN (-2, 0, 1, 3, 6)
        AND Z.CIS_ZBOZI = '{kod_artiklu}'
      ORDER BY H.DTZDANITPLN ASC;

  # ===========================================================================
  # KOMPLETNÍ PŘEHLED
  # ===========================================================================

  kompletni_dostupnost_artiklu:
    pattern: "(kompletní dostupnost|kompletní přehled dostupnosti|celý přehled) (artiklu |){hledany_vyraz}"
    description: |
      Kompletní přehled dostupnosti artiklu v jednom dotazu:
        KROK 1: Identifikace artiklu (kaskáda CIS → EAN → EAN obalu → název)
        KROK 2: Skladová zásoba per sklad (QZBOZSKL_DF) + celkový součet
        KROK 3: Plánované doplnění z QXXPLANMATTOKU (příjmy VLTYPPLANUMT IN 2, 4, 6)
      Odpovídá sql/06_kompletni_dostupnost.sql.
    entities: ["artikl", "produkt", "podprodukt", "čárový_kód_obalu", "zásoba_na_skladě", "sklad", "plán_materiálového_toku"]
    tested: true
    param_labels:
      hledany_vyraz: "Kód, čárový kód nebo název artiklu"
    example:
      question: "Kompletní dostupnost artiklu 1410244"
      explanation: |
        Vrací 3 result sety:
          1. Identifikace artiklu + typ + produkt/podprodukt
          2. Skladová zásoba per sklad + celkový součet
          3. Plánované doplnění (budoucí příjmy) z QXXPLANMATTOKU
    note: |
      Kompletní SQL viz sql/06_kompletni_dostupnost.sql v projektu
      ai-ag-rmt-overovac-dostupnosti-artiklu.
      Pattern je orchestrační – kombinuje identifikace_artiklu,
      skladova_dostupnost_artiklu a planovane_doplneni_artiklu.
