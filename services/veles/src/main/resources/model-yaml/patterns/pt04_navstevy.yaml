# Patterns: Návštěvy a konkurence
# Platnosti dodacích míst, denní výkazy OZ, návštěvy zákazníků, aktivity návštěv, konkurenční data

query_patterns:

  # ===========================================================================
  # PLATNOSTI DODACÍCH MÍST
  # ===========================================================================

  platnosti_dm_v_tdm:
    pattern: "platnosti dodacího místa {id_dodaciho_mista} v typu"
    pattern_alt: "platnosti dodacího místa {id_dodaciho_mista}"
    description: "Platnosti dodacího místa v typech dodacích míst"
    entities: ["platnost_dm_v_tdm", "dodací_místo", "typ_dodacího_místa"]
    tested: true
    test_values:
      id_dodaciho_mista: ""
    sql_template: |
      SELECT
        pt.IDXXTDMSUBJADR,
        pt.IDSUBJADR,
        tdm.KOD_TYPDODMIST,
        pt.DTPLATI_OD,
        pt.DTPLATI_DO
      FROM QXXTDMSUBJADR pt
      JOIN QXXTYPDODMIST tdm ON tdm.IDXXTYPDODMIST = pt.IDXXTYPDODMIST
      WHERE ('{id_dodaciho_mista}' = '' OR pt.IDSUBJADR = '{id_dodaciho_mista}')
      ORDER BY pt.DTPLATI_OD DESC;

  # ===========================================================================
  # KONKURENČNÍ DATA (ČÍSELNÍKY)
  # ===========================================================================

  konkurencni_dodavatele:
    pattern: "seznam (všech |)(aktivních |)konkurenčních dodavatelů"
    description: "Seznam konkurenčních dodavatelů"
    entities: ["konkurenční_dodavatel"]
    tested: true
    sql_template: |
      SELECT
             IDXXKONKURENT,
             NAZEV_KONKURENTA
      FROM QXXKONKURENT
      WHERE VLTYP_KONK = 1
      ORDER BY NAZEV_KONKURENTA;

  konkurencni_znacky:
    pattern: "seznam (všech |)(aktivních |)konkurenčních značek"
    description: "Seznam konkurenčních značek"
    entities: ["konkurenční_značka"]
    tested: true
    sql_template: |
      SELECT
             IDXXKONKURENT,
             NAZEV_KONKURENTA
      FROM QXXKONKURENT
      WHERE VLTYP_KONK = 0
      ORDER BY NAZEV_KONKURENTA;

  typy_informaci_o_konkurenci:
    pattern: "typy informací o konkurenci"
    description: "Seznam povolených typů informací o konkurenci"
    entities: ["typ_informace_o_konkurenci"]
    tested: true
    sql_template: |
      SELECT
             IDXXKONKINFOTYP,
             VLTYP_INFO,
             VLVLASTNOST_INFO,
             VLOBLAST_INFO,
             VLTRZNI_SKUPINA,
             VLKANAL,
             VLPRODUKT,
             VLDODAVATEL,
             VLZNACKA
      FROM XXKONKINFOTYP
      ORDER BY VLTYP_INFO, VLVLASTNOST_INFO;


  # ---------------------------------------------------------------------------
  # DENNÍ VÝKAZY A NÁVŠTĚVY
  # ---------------------------------------------------------------------------

  denni_vykazy_oz:
    pattern: "denní výkazy( obchodního zástupce|)( {jmeno_oz}|)"
    description: "Seznam denních výkazů obchodních zástupců"
    entities: ["denní_výkaz_oz", "uživatel"]
    tested: true
    param_labels:
      jmeno_oz: "Jméno obchodního zástupce"
    sql_template: |
      SELECT
             dv.IDXXDENNIPLANOZ,
             dv.IDUZIVATEL_DE,
             u.JMENO_UZIV,
             dv.DTDEN
      FROM QXXDENNIPLANOZ dv
      JOIN QUZIVATEL_DF u ON u.IDUZIVATEL = dv.IDUZIVATEL_DE
      WHERE ('{id_obchodniho_zastupce}' = '' OR dv.IDUZIVATEL_DE = '{id_obchodniho_zastupce}')
        AND ('{jmeno_oz}' = '' OR u.JMENO_UZIV COLLATE Latin1_General_CI_AI LIKE '%{jmeno_oz}%')
      ORDER BY dv.DTDEN DESC;

  # ===========================================================================
  # ÚROVEŇ 1 - ZÁVISÍ POUZE NA NEZÁVISLÝCH (k otestování)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # 1.1 DODACÍ MÍSTA
  # ---------------------------------------------------------------------------

  navstevy_zakaznika:
    pattern: "návštěvy (zákazníka |)(na dodacím místě {id_dodaciho_mista}|)(pro |){zkratka_dodaciho_mista}"
    pattern_alt: "(seznam |)(všech |)(návštěv|návštěvy|návštěvu)( zákazníka| zákazníků|)( pro| na|)( {zkratka_dodaciho_mista}|)"
    description: "Seznam návštěv zákazníků"
    entities: ["návštěva_zákazníka", "denní_výkaz_oz", "dodací_místo"]
    tested: true
    param_labels:
      zkratka_dodaciho_mista: "Zkratka dodacího místa"
    test_values:
      id_dodaciho_mista: ""
      zkratka_dodaciho_mista: ""
    sql_template: |
      SELECT
        nz.IDXXNAVSTEVAOZ,
        nz.IDXXDENNIPLANOZ,
        nz.IDUZIVATEL_DE,
        nz.IDSUBJADR,
        nz.DTUSKUTECNENO,
        nz.SUBJADR_POZNAMKA,
        nz.JMENO_UZIV_DE,
        nz.VLTYP_NAVSTEVY,
        nz.VLSTAV_XXNAVSTEVAOZ
      FROM QXXNAVSTEVAOZ nz
      WHERE ('{id_dodaciho_mista}' = '' OR nz.IDSUBJADR = '{id_dodaciho_mista}')
        AND ('{zkratka_dodaciho_mista}' = '' OR nz.SUBJADR_POZNAMKA COLLATE Latin1_General_CI_AI LIKE '%{zkratka_dodaciho_mista}%')
      ORDER BY nz.DTUSKUTECNENO DESC;

  navstevy_pro_denni_vykaz_oz:
    pattern: "návštěvy (zákazníka |)pro denní výkaz {id_denního_výkazu_oz}"
    description: "Seznam návštěv zákazníků v denním výkazu obchodního zástupce"
    entities: ["návštěva_zákazníka", "denní_výkaz_oz", "dodací_místo"]
    tested: true
    test_values:
      id_denního_výkazu_oz: ""
    sql_template: |
      SELECT
        nz.IDXXNAVSTEVAOZ,
        nz.IDXXDENNIPLANOZ,
        nz.IDUZIVATEL_DE,
        nz.IDSUBJADR,
        nz.DTUSKUTECNENO,
        nz.SUBJADR_POZNAMKA,
        nz.JMENO_UZIV_DE,
        nz.VLTYP_NAVSTEVY,
        nz.VLSTAV_XXNAVSTEVAOZ
      FROM QXXNAVSTEVAOZ nz
      WHERE ('{id_denního_výkazu_oz}' = '' OR nz.IDXXDENNIPLANOZ = '{id_denního_výkazu_oz}')
      ORDER BY nz.DTUSKUTECNENO DESC;


  # ---------------------------------------------------------------------------
  # AKTIVITY NÁVŠTĚVY (ARTIKLY, ÚKOLY, PODNĚTY)
  # ---------------------------------------------------------------------------

  artikly_navstevy:
    pattern: "(seznam |)artikl(ů|y) (z |pro |)(konkrétní |)návštěv(y|u)( zákazníka|) {id_navstevy}"
    description: "Seznam artiklů pro konkrétní návštěvu zákazníka"
    entities: ["artikl_návštěvy_zákazníka", "návštěva_zákazníka", "artikl"]
    tested: true
    sql_template: |
      SELECT
        anz.IDXXPLNPOLDISTR,
        anz.IDXXNAVSTEVAOZ,
        a.CIS_ZBOZI,
        a.NAZEV_ZBOZI,
        anz.DTPOSLDODANI,
        anz.MNPOSLDODANI,
        anz.MNFACING,
        anz.MNARTIKL_SIRKA,
        anz.MNDELKA_REG_ART
      FROM QXXPLNPOLDISTR_AT anz
      JOIN QZBOZI_DF a ON a.IDZBOZI = anz.IDZBOZI AND a.VLTYP_SLOZ = 1
      WHERE ('{id_navstevy}' = '' OR anz.IDXXNAVSTEVAOZ = '{id_navstevy}')
      ORDER BY a.NAZEV_ZBOZI;

  ukoly_navstevy:
    pattern: "(seznam |)úkol(ů|y) (z |pro |)(konkrétní |)návštěv(y|u)( zákazníka|) {id_navstevy}"
    description: "Seznam úkolů pro konkrétní návštěvu zákazníka"
    entities: ["úkol_návštěvy_zákazníka", "návštěva_zákazníka"]
    tested: true
    sql_template: |
      SELECT
        u.IDXXPLNUKOLOZ,
        u.IDXXNAVSTEVAOZ,
        u.SPEC_ZADANIUKOLOZ
      FROM QXXPLNUKOLOZ u
      WHERE ('{id_navstevy}' = '' OR u.IDXXNAVSTEVAOZ = '{id_navstevy}')
      ORDER BY u.IDXXPLNUKOLOZ;

  podnety_navstevy:
    pattern: "(seznam |)podnět(ů|y) (z |pro |)(konkrétní |)návštěv(y|u)( zákazníka|) {id_navstevy}"
    description: "Seznam podnětů pro konkrétní návštěvu zákazníka"
    entities: ["podnět_návštěvy_zákazníka", "návštěva_zákazníka", "produkt"]
    tested: true
    sql_template: |
      SELECT
        pn.IDXXPODNET,
        pn.IDXXNAVSTEVAOZ,
        p.NAZEV_SKUP_ZBOZI,
        pn.PODNET
      FROM QXXPODNET pn
      LEFT JOIN QSKUPZBOZI_DF p ON p.IDSKUPZBOZI = pn.IDSKUPZBOZI
      WHERE ('{id_navstevy}' = '' OR pn.IDXXNAVSTEVAOZ = '{id_navstevy}')
      ORDER BY p.NAZEV_SKUP_ZBOZI;


  # ---------------------------------------------------------------------------
  # PRODUKTY A KONKURENCE NÁVŠTĚVY
  # ---------------------------------------------------------------------------

  produkty_navstevy_zakaznika:
    pattern: "(seznam |)produkt(ů|y) (z |pro |)(konkrétní |)návštěv(y|u)( zákazníka|) {id_navstevy}"
    description: "Seznam produktů z návštěvy zákazníka"
    entities: ["produkt_návštěvy_zákazníka", "návštěva_zákazníka", "produkt"]
    tested: true
    sql_template: |
      SELECT
        pdm.IDXXNOZPRIPRAVA,
        pdm.IDXXNAVSTEVAOZ,
        p.NAZEV_SKUP_ZBOZI,
        pdm.PORADI_PR,
        pdm.VYHRAZENO,
        pdm.HDVYTEZNOST_REGALU_PROD
      FROM QXXNOZPRIPRAVA pdm
      JOIN QSKUPZBOZI_DF p ON p.IDSKUPZBOZI = pdm.IDSKUPZBOZI
      WHERE ('{id_navstevy}' = '' OR pdm.IDXXNAVSTEVAOZ = '{id_navstevy}')
      ORDER BY pdm.PORADI_PR;

  konkurence_navstevy_zakaznika:
    pattern: "(seznam |)konkurenc(e|i) (z |pro |)(konkrétní |)návštěv(y|u)( zákazníka|) {id_navstevy}"
    description: "Seznam konkurence z návštěvy zákazníka"
    entities: ["konkurence_návštěvy_zákazníka", "návštěva_zákazníka", "produkt", "konkurenční_dodavatel", "konkurenční_značka"]
    tested: true
    sql_template: |
      SELECT
        knd.IDXXKONKNADM,
        knd.IDXXNAVSTEVAOZ,
        p.NAZEV_SKUP_ZBOZI,
        kd.NAZEV_KONKURENTA AS NAZEV_KONKURENTA_D,
        kz.NAZEV_KONKURENTA AS NAZEV_KONKURENTA_Z,
        knd.OBSAZENO,
        knd.OBSAZENO_PROC
      FROM QXXKONKNADM knd
      LEFT JOIN QSKUPZBOZI_DF p ON p.IDSKUPZBOZI = knd.IDSKUPZBOZI
      LEFT JOIN QXXKONKURENT kd ON kd.IDXXKONKURENT = knd.IDXXKONKURENT_D AND kd.VLTYP_KONK = 1
      LEFT JOIN QXXKONKURENT kz ON kz.IDXXKONKURENT = knd.IDXXKONKURENT_Z AND kz.VLTYP_KONK = 0
      WHERE ('{id_navstevy}' = '' OR knd.IDXXNAVSTEVAOZ = '{id_navstevy}')
      ORDER BY p.NAZEV_SKUP_ZBOZI;

  podprodukty_navstevy_zakaznika:
    pattern: "(seznam |)podprodukt(ů|y) (z |pro |)(konkrétní |)návštěv(y|u)( zákazníka|) {id_navstevy}"
    description: "Seznam podproduktů z návštěvy zákazníka"
    entities: ["podprodukt_návštěvy_zákazníka", "produkt_návštěvy_zákazníka", "podprodukt", "návštěva_zákazníka"]
    tested: true
    sql_template: |
      SELECT
        ppd.IDXXNOZPODPROD,
        ppd.IDXXNOZPRIPRAVA,
        pp.KOD_PODSKUPZBOZI,
        pp.NAZEV_PODSKUPZBOZI,
        ppd.PORADI_PODPROD,
        ppd.VLVYZNAM_PODPROD,
        ppd.HDNORMATIV_TRZBY_PODPROD,
        ppd.HDTRZBA_12M_PODPROD,
        ppd.HDTRZBA_POTENCIAL_PODPROD,
        ppd.HDTRZBA_VYTEZNOST_PODPROD,
        ppd.POCET_ART_PODPROD,
        ppd.DI_PODPRODUKT
      FROM QXXNOZPODPROD ppd
      JOIN QXXPODSKUPZBOZI pp ON pp.IDXXPODSKUPZBOZI = ppd.IDXXPODSKUPZBOZI
      WHERE ('{id_navstevy}' = '' OR ppd.IDXXNAVSTEVAOZ = '{id_navstevy}')
      ORDER BY ppd.PORADI_PODPROD;

  # ---------------------------------------------------------------------------
  # INFORMACE O KONKURENCI (DETAILY)
  # ---------------------------------------------------------------------------

  informace_o_konkurenci:
    pattern: "informace o konkurenci( pro dodavatele {id_konkurencniho_dodavatele}| pro značku {id_konkurencni_znacky}|)"
    description: "Seznam informací o konkurenci, volitelně filtrovaný"
    entities: ["informace_ke_konkurenci", "konkurenční_dodavatel", "konkurenční_značka", "tržní_skupina", "obchodní_kanál", "produkt"]
    tested: true
    sql_template: |
      SELECT
        ik.IDXXKONKINFO,
        kd.NAZEV_KONKURENTA AS NAZEV_KONKURENTA_D,
        kz.NAZEV_KONKURENTA AS NAZEV_KONKURENTA_Z,
        ts.NAZEV_SKUPZNACZBOZI,
        ok.CEN_SKUP,
        p.NAZEV_SKUP_ZBOZI,
        ik.VLTYP_INFO,
        ik.VLVLASTNOST_INFO,
        ik.VLOBLAST_INFO,
        ik.DTPLATI_OD,
        ik.DTPLATI_DO
      FROM QXXKONKINFO ik
      LEFT JOIN QXXKONKURENT kd ON kd.IDXXKONKURENT = ik.IDXXKONKURENT_D AND kd.VLTYP_KONK = 1
      LEFT JOIN QXXKONKURENT kz ON kz.IDXXKONKURENT = ik.IDXXKONKURENT_Z AND kz.VLTYP_KONK = 0
      LEFT JOIN QSKUPZNACZBOZI_DF ts ON ts.IDSKUPZNACZBOZI = ik.IDSKUPZNACZBOZI
      LEFT JOIN QCENSKUP_DF ok ON ok.IDCENSKUP = ik.IDCENSKUP
      LEFT JOIN QSKUPZBOZI_DF p ON p.IDSKUPZBOZI = ik.IDSKUPZBOZI
      WHERE ('{id_konkurencniho_dodavatele}' = '' OR ik.IDXXKONKURENT_D = '{id_konkurencniho_dodavatele}')
        AND ('{id_konkurencni_znacky}' = '' OR ik.IDXXKONKURENT_Z = '{id_konkurencni_znacky}')
      ORDER BY ik.DTPLATI_OD DESC;
