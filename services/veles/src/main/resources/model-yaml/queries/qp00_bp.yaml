sql_queries:
    subjekty_obchodniho_kanalu:
        description: "Seznam subjektů (odběratelů) v daném obchodním kanálu"
        parameters:
            - name: id_obchodniho_kanalu
              type: int
              default: 0
            - name: kod_kanalu
              type: varchar(10)
        sql_template: |
            SELECT
              s.IDSUBJEKT,
              s.KOD_SUBJEKTU,
              s.SUBJ_NAZEV,
              ok.CEN_SKUP
            FROM QSUBJEKT s
            JOIN QSUBJVTSUBJ_DF ov ON ov.IDSUBJEKT = s.IDSUBJEKT AND ov.TYP_SUBJ = 'ODB'
            JOIN QCENSKUP_DF ok ON ok.IDCENSKUP = ov.IDCENSKUP
            WHERE ({id_obchodniho_kanalu} = 0 OR ok.IDOBCHKAN = {id_obchodniho_kanalu})
              AND ok.CEN_SKUP LIKE '%{kod_kanalu}%'
            ORDER BY s.SUBJ_NAZEV;

    dodaci_mista_zakaznika:
        description: "Seznam dodacích míst zákazníka, parametrem je název zákazníka (nebo jeho část)"
        parameters:
            - name: nazev_zakaznika
              type: varchar(100)
        sql_template: |
            SELECT
                  dm.IDSUBJADR,
                   dm.SUBJADR_POZNAMKA,
                   dm.ULICE,
                   dm.MESTO
            FROM QSUBJADR_DF dm
            JOIN QSUBJEKT s ON s.IDSUBJEKT = dm.IDSUBJEKT
            WHERE dm.VLSUBJADR_TYP = 2
              AND s.SUBJ_NAZEV COLLATE Czech_CI_AI LIKE '%{nazev_zakaznika}%'
            ORDER BY dm.SUBJADR_POZNAMKA;

    osoby_dodaciho_mista:
        description: "Seznam osob na dodacím místě"
        parameters:
            - name: id_dodaciho_mista
              type: text
        sql_template: |
            SELECT
              o.IDSUBJOSOBA,
              o.IDSUBJADR,
              o.JMENO,
              o.FUNKCE,
              o.TEL,
              o.EMAIL
            FROM QSUBJOSOBA_DF o
            WHERE ('{id_dodaciho_mista}' = '' OR o.IDSUBJADR = '{id_dodaciho_mista}')
            ORDER BY o.JMENO;
