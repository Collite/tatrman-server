entities:

  tržní_skupina:
    table: "QSKUPZNACZBOZI_DF WHERE (NAZEV_SKUPZNACZBOZI not like 'Z%')"  # Z% = interní/záložní skupiny, nezobrazovat
    entity_type: structural
    name_column: "název_tržní_skupiny"
    code_column: "kód_tržní_skupiny"
    aliases: ["segment", "typ prodejny"]
    description: |
      Evidence tržních skupin a jejich vlastností.
    columns:
      - name: "id_tržní_skupiny"
        column: "IDSKUPZNACZBOZI"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor tržní skupiny"

      - name: "kód_tržní_skupiny"
        column: "KOD_SKUPZNACZBOZI"
        type: "varchar(10)"
        description: "Unikátní kód tržní skupiny"

      - name: "název_tržní_skupiny"
        column: "NAZEV_SKUPZNACZBOZI"
        type: "varchar(50)"
        description: "Název tržní skupiny"
        searchable: true
        search_hint: "Hledání tržní skupiny podle názvu. Příklad: WHERE NAZEV_SKUPZNACZBOZI LIKE '%Gastro%'"

  obchodní_kanál:
    table: "QCENSKUP_DF WHERE (CEN_SKUP not like '0%') AND (VLNEAKTIVNI = 0)"  # 0% = interní kanály (např. 0TEST), nezobrazovat
    entity_type: structural
    name_column: "kód_obchodního_kanálu"
    description: |
      Evidence obchodních kanálů a jejich vlastností.
    columns:
      - name: "id_obchodního_kanálu"
        column: "IDCENSKUP"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor obchodního kanálu"

      - name: "kód_obchodního_kanálu"
        column: "CEN_SKUP"
        type: "varchar(10)"
        description: "Unikátní kód obchodního kanálu"
        searchable: true
        search_hint: "Hledání obchodního kanálu podle kódu. Příklad: WHERE CEN_SKUP LIKE '%KA%'"

      - name: "id_tržní_skupiny"
        column: "IDSKUPZNACZBOZI"
        type: "int"
        description: "Vazba na tržní skupinu"

      - name: "manažer_obchodního_kanálu"
        column: "IDUZIVATEL"
        type: "int"
        description: "Identifikace uživatele, který je zodpovědný za tento obchodní kanál"

      - name: "spočtený_normativ_tržby"
        column: "VLNORMATIV_TRZBY_S"
        type: "smallint"
        description: "Určení přiřazení spočteného normativu tržby pro tento obchodní kanál  (0 = tržní skupina, 1 = obchodní kanál)"

      - name: "minimální_počet_sortimentů"
        column: "POCETSORT_MIN"
        type: "int"
        description: "Minimální počet sortimentů pro tento obchodní kanál"

      - name: "podíl_dm_pro_zájmový_artikl_procent"
        column: "HDPODIL_DM_ZAJM_ARTIKL"
        type: "money"
        description: "Stanovuje hranici odebírajících dodacích míst kanálu, která musí být splněna pro indikaci zájmového artiklu. Hodnota v procentech (50.00 = 50 %)."


  prodejní_akce:
    table: "QXXPRODAKCE"
    entity_type: master
    name_column: "kód_prodejní_akce"
    code_column: "kód_prodejní_akce"
    description: |
      Evidence prodejních akcí a jejich vlastností.
    columns:
      - name: "id_prodejní_akce"
        column: "IDXXPRODAKCE"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor prodejní akce"

      - name: "kód_prodejní_akce"
        column: "KOD_PRODAKCE"
        type: "varchar(70)"
        description: "Kód/název prodejní akce"

      - name: "platnost_od"
        column: "DTPLATI_OD"
        type: "date"
        description: "Datum platnosti prodejní akce od"

      - name: "platnost_do"
        column: "DTPLATI_DO"
        type: "date"
        description: "Datum platnosti prodejní akce do. NULL = platné bez omezení."

  subjekt: 
    table: "QSUBJEKT"
    entity_type: master
    aliases: ["zákazník", "firma", "odběratel"]
    label_plural: "zákazníků"
    name_column: "název_subjektu"
    code_column: "kód_subjektu"
    description: |
      Evidence zákazníků a jejich vlastností.
      ⚠ Jeden zákazník může mít více dodacích míst.
    columns:
      - name: "id_subjektu"
        column: "IDSUBJEKT"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor subjektu"

      - name: "kód_subjektu"
        column: "KOD_SUBJEKTU"
        type: "varchar(15)"
        description: "Kód subjektu"

      - name: "název_subjektu"
        label: "Subjekt"
        column: "SUBJ_NAZEV"
        type: "varchar(255)"
        description: "Název subjektu"
        searchable: true
        search_hint: "Preferuj pro právnické osoby. Příklad: WHERE SUBJ_NAZEV LIKE '%Kaufland%'"

  obchodní_vztah: 
    table: "QSUBJVTSUBJ_DF WHERE TYP_SUBJ='ODB'"
    entity_type: master
    description: |
      Evidence obchodních vztahů zákazníků.
    columns:
      - name: "id_obchodního_vztahu"
        column: "IDSUBJVTSUBJ"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor obchodního vztahu"

      - name: "id_subjektu"
        column: "IDSUBJEKT"
        type: "int"
        description: "Vazba na subjekt"

      - name: "id_obchodního_kanálu"
        column: "IDCENSKUP"
        type: "int"
        description: "Vazba na obchodní kanál"

  dodací_místo:
    table: "QSUBJADR_DF WHERE VLSUBJADR_TYP = 2"
    entity_type: master
    aliases: ["dodací místo", "adresa dodání", "provozovna", "pobočka", "prodejna"]
    name_column: "zkratka_dodacího_místa"
    label_plural: "dodacích míst"
    description: |
      Evidence dodacích míst subjektů.
    columns:
      - name: "id_dodacího_místa"
        column: "IDSUBJADR"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor dodacího místa"

      - name: "id_subjektu"
        column: "IDSUBJEKT"
        type: "int"
        description: "Vazba na subjekt"

      - name: "zkratka_dodacího_místa"
        label: "Zkratka"
        column: "SUBJADR_POZNAMKA"
        type: "varchar(60)"
        description: "Zkratka dodacího místa"
        searchable: true
        search_hint: "Použij pro konkrétní provozovny. Příklad: WHERE SUBJADR_POZNAMKA LIKE '%Kaufland%'"

      - name: "město"
        column: "MESTO"
        type: "varchar(60)"
        description: "Město dodacího místa"
        searchable: true
        search_hint: "Pro lokalizaci zákazníka. Příklad: WHERE MESTO LIKE '%Praha%'"  

      - name: "ulice"
        column: "ULICE"
        type: "varchar(60)"
        description: "Ulice a číslo popisné dodacího místa"

      - name: "obchodní_zástupce"
        column: "IDUZIVATEL_DE"
        type: "int"
        description: "Identifikace obchodního zástupce přiřazeného k dodacímu místu"

      - name: "datum_poslední_návštěvy"
        label: "Distribuce"
        column: "DTPOSLEDNI"
        type: "date"
        description: "Datum poslední návštěvy na dodacím místě"

      - name: "zeměpisná_šířka"
        column: "LATITUDE"
        type: "float"
        description: "Zeměpisná šířka dodacího místa"

      - name: "zeměpisná_délka"
        column: "LONGITUDE"
        type: "float"
        description: "Zeměpisná délka dodacího místa"

  platnost_dm_v_tdm:
    table: "QXXTDMSUBJADR"
    entity_type: config
    description: |
      Platnost dodacího místa v typu dodacího místa.
    columns:
      - name: "id_platnost_dm_v_tdm"
        column: "IDXXTDMSUBJADR"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor platnosti přiřazeného typu dodacího místa"

      - name: "id_typu_dodacího_místa"
        column: "IDXXTYPDODMIST"
        type: "int"
        description: "Vazba na typ dodacího místa"

      - name: "id_dodacího_místa"
        column: "IDSUBJADR"
        type: "int"
        description: "Vazba na dodací místo"

      - name: "platnost_od"
        column: "DTPLATI_OD"
        type: "date"
        description: "Datum platnosti od (inkluzivní hranice)"  
      
      - name: "platnost_do"
        column: "DTPLATI_DO"
        type: "date"
        description: "Datum platnosti do (inkluzivní hranice). NULL = platné bez omezení."

  typ_dodacího_místa:
    table: "QXXTYPDODMIST"
    entity_type: master
    name_column: "kód_typu_dodacího_místa"
    description: |
      Typ dodacího místa v obchodním kanálu.
    columns:
      - name: "id_typ_dodacího_místa"
        column: "IDXXTYPDODMIST"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor typu dodacího místa"

      - name: "id_obchodního_kanálu"
        column: "IDCENSKUP"
        type: "int"
        description: "Vazba na obchodní kanál"

      - name: "kód_typu_dodacího_místa"
        column: "KOD_TYPDODMIST"
        type: "varchar(20)"
        description: "Kód typu dodacího místa"

  osoba_dodacího_místa:
    table: "QSUBJOSOBA_DF"
    entity_type: master
    description: |
      Osoby dodacího místa.
    columns:
      - name: "id_osoby_dodacího_místa"
        column: "IDSUBJOSOBA"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor osoby dodacího místa"

      - name: "id_dodacího_místa"
        column: "IDSUBJADR"
        type: "int"
        description: "Vazba na dodací místo"

      - name: "jméno"
        column: "JMENO"
        type: "varchar(100)"
        description: "Jméno osoby dodacího místa"

      - name: "funkce"
        column: "FUNKCE"
        type: "varchar(200)"
        description: "Funkce osoby na dodacím místě"

      - name: "telefon"
        column: "TEL" 
        type: "varchar(30)"
        description: "Telefonní číslo osoby dodacího místa"

      - name: "email"
        column: "EMAIL" 
        type: "varchar(100)"
        description: "Emailová adresa osoby dodacího místa"

  cenová_politika:
    table: "QCESKZBPA_DF WHERE VLPROCENU = 2"
    entity_type: config
    description: |
      Cenová politika pro obchodní kanál nebo subjekt a cenovou skupinu artiklu nebo artikl.
    columns:
      - name: "id_cenové_politiky"
        column: "IDCESKZBPA"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor cenové politiky"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        description: "Vazba na artikl. NULL = platí pro cenovou skupinu zboží"

      - name: "id_cenové_skupiny_zboží"
        column: "IDCENSKZB"
        type: "int"
        description: "Vazba na cenovou skupinu zboží. NULL = platí pro konkrétní artikl"

      - name: "id_subjektu"
        column: "IDSUBJEKT"
        type: "int"
        description: "Vazba na subjekt. NULL = platí pro obchodní kanál"

      - name: "id_obchodního_kanálu"
        column: "IDCENSKUP"
        type: "int"
        description: "Vazba na obchodní kanál. NULL = platí pro subjekt"

      - name: "id_produktu"
        column: "IDSKUPZBOZI"
        type: "int"
        description: "Vazba na produkt"

      - name: "id_podproduktu"
        column: "IDXXPODSKUPZBOZI"
        type: "int"
        description: "Vazba na podprodukt"

      - name: "předpis_ceny"
        column: "PREDPIS_CENA"
        type: "varchar(500)"
        description: "Předpis pro výpočet ceny hodnota nebo vzorec"

      - name: "platnost_od"
        column: "DTPLATI_OD"
        type: "date"
        description: "Datum platnosti cenové politiky od"

      - name: "platnost_do"
        column: "DTPLATI_DO"
        type: "date"
        description: "Datum platnosti cenové politiky do. NULL = platné bez omezení."

relationships:

  obchodni_kanal_trzni_skupina:
    from: "obchodní_kanál"
    to: "tržní_skupina"
    type: "many-to-one"
    join: "QCENSKUP_DF.IDSKUPZNACZBOZI = QSKUPZNACZBOZI_DF.IDSKUPZNACZBOZI"
    description: "Obchodní kanál patří do tržní skupiny"

  obchodni_kanal_manazer:
    from: "obchodní_kanál"
    to: "uživatel"  # bt01_uzivatel.yaml
    type: "many-to-one"
    join: "QCENSKUP_DF.IDUZIVATEL = QUZIVATEL_DF.IDUZIVATEL"
    description: "Obchodní kanál má přiřazeného manažera"

  obchodni_vztah_subjekt:
    from: "obchodní_vztah"
    to: "subjekt"
    type: "many-to-one"
    join: "QSUBJVTSUBJ_DF.IDSUBJEKT = QSUBJEKT.IDSUBJEKT"
    description: "Obchodní vztah patří subjektu"

  obchodni_vztah_obchodni_kanal:
    from: "obchodní_vztah"
    to: "obchodní_kanál"
    type: "many-to-one"
    join: "QSUBJVTSUBJ_DF.IDCENSKUP = QCENSKUP_DF.IDCENSKUP"
    description: "Obchodní vztah je přiřazen k obchodnímu kanálu"

  typ_dodaciho_mista_obchodni_kanal:
    from: "typ_dodacího_místa"
    to: "obchodní_kanál"
    type: "many-to-one"
    join: "QXXTYPDODMIST.IDCENSKUP = QCENSKUP_DF.IDCENSKUP"
    description: "Typ dodacího místa patří k obchodnímu kanálu"

  dodaci_misto_subjekt:
    from: "dodací_místo"
    to: "subjekt"
    type: "many-to-one"
    join: "QSUBJADR_DF.IDSUBJEKT = QSUBJEKT.IDSUBJEKT"
    description: "Dodací místo patří subjektu"

  dodaci_misto_obchodni_zastupce:
    from: "dodací_místo"
    to: "uživatel"  # bt01_uzivatel.yaml
    type: "many-to-one"
    join: "QSUBJADR_DF.IDUZIVATEL_DE = QUZIVATEL_DF.IDUZIVATEL"
    description: "Dodací místo má přiřazeného obchodního zástupce"

  platnost_dm_v_tdm_dodaci_misto:
    from: "platnost_dm_v_tdm"
    to: "dodací_místo"
    type: "many-to-one"
    join: "QXXTDMSUBJADR.IDSUBJADR = QSUBJADR_DF.IDSUBJADR"
    description: "Platnost dm v tdm patří k dodacímu místu"

  platnost_dm_v_tdm_typ_dodaciho_mista:
    from: "platnost_dm_v_tdm"
    to: "typ_dodacího_místa"
    type: "many-to-one"
    join: "QXXTDMSUBJADR.IDXXTYPDODMIST = QXXTYPDODMIST.IDXXTYPDODMIST"
    description: "Platnost dm v tdm patří k typu dodacího místa"

  osoba_dodaciho_mista_dodaci_misto:
    from: "osoba_dodacího_místa"
    to: "dodací_místo"
    type: "many-to-one"
    join: "QSUBJOSOBA_DF.IDSUBJADR = QSUBJADR_DF.IDSUBJADR"
    description: "Osoba dodacího místa patří k dodacímu místu"

  cenova_politika_artikl:
    from: "cenová_politika"
    to: "artikl"  # bt02_artikl.yaml
    type: "many-to-one"
    join: "QCESKZBPA_DF.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Cenová politika platí pro konkrétní artikl"

  cenova_politika_cenova_skupina:
    from: "cenová_politika"
    to: "cenová_skupina_artiklu"  # bt02_artikl.yaml
    type: "many-to-one"
    join: "QCESKZBPA_DF.IDCENSKZB = QCENSKZB_DF.IDCENSKZB"
    description: "Cenová politika platí pro cenovou skupinu artiklu"

  cenova_politika_subjekt:
    from: "cenová_politika"
    to: "subjekt"
    type: "many-to-one"
    join: "QCESKZBPA_DF.IDSUBJEKT = QSUBJEKT.IDSUBJEKT"
    description: "Cenová politika platí pro konkrétní subjekt"

  cenova_politika_obchodni_kanal:
    from: "cenová_politika"
    to: "obchodní_kanál"
    type: "many-to-one"
    join: "QCESKZBPA_DF.IDCENSKUP = QCENSKUP_DF.IDCENSKUP"
    description: "Cenová politika platí pro obchodní kanál"

  cenova_politika_produkt:
    from: "cenová_politika"
    to: "produkt"  # bt02_artikl.yaml
    type: "many-to-one"
    join: "QCESKZBPA_DF.IDSKUPZBOZI = QSKUPZBOZI_DF.IDSKUPZBOZI"
    description: "Cenová politika platí pro produkt"

  cenova_politika_podprodukt:
    from: "cenová_politika"
    to: "podprodukt"  # bt02_artikl.yaml
    type: "many-to-one"
    join: "QCESKZBPA_DF.IDXXPODSKUPZBOZI = QXXPODSKUPZBOZI.IDXXPODSKUPZBOZI"
    description: "Cenová politika platí pro podprodukt"

