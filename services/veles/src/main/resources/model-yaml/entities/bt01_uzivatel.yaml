entities:
  skupina_uživatelů:
    table: "QSKUPUZIV"
    entity_type: structural
    name_column: "název_skupiny_uživatelů"
    code_column: "kód_skupiny_uživatelů"
    aliases: ["skupina", "skupiny uživatelů", "skupinu uživatelů", "skupiny"]
    description: |
      Číselník skupin uživatelů (pracovních pozic/rolí).
      Každá skupina = pracovní pozice/role (např. "Obchodní ředitel", "Regionální manažer", "Obchodní zástupce").
    columns:
      - name: "id_skupiny_uživatelů"
        column: "IDSKUPUZIV"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor skupiny uživatelů"

      - name: "kód_skupiny_uživatelů"
        column: "KOD_SKUP_UZIV"
        type: "varchar(20)"
        description: "Kód skupiny uživatelů"

      - name: "název_skupiny_uživatelů"
        column: "NAZEV_SKUP_UZIV"
        type: "varchar(90)"
        description: "Název skupiny uživatelů"

  organizační_struktura:
    table: "QSKUPUZIV WHERE NOT IDSKUPUZIV_R IS NULL"
    entity_type: config
    name_column: "název_podřízeného_funkčního_místa"
    aliases: ["řídí", "řídící", "nadřízený", "nadřízená", "podřízený", "podřízená", "podřízené",
              "organizační struktura", "organizační hierarchie"]
    description: |
      Strom funkčních míst (pozic). Každý řádek = podřízené místo + jeho nadřízené místo.
    columns:
      - name: "id_podřízeného_funkčního_místa"
        column: "IDSKUPUZIV"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor podřízeného funkčního místa"

      - name: "název_podřízeného_funkčního_místa"
        column: "NAZEV_SKUP_UZIV"
        type: "varchar(90)"
        description: "Název podřízeného funkčního místa (pozice/role)"

      - name: "id_nadřízeného_funkčního_místa"
        column: "IDSKUPUZIV_R"
        type: "int"
        description: "FK na nadřazené (řídící) funkční místo. NULL = kořenové funkční místo bez nadřízeného."

      - name: "název_nadřízeného_funkčního_místa"
        column: "NAZEV_SKUP_UZIV_R"
        type: "varchar(90)"
        description: "Název nadřízeného funkčního místa (denormalizovaný)"

  uživatel:
    table: "QUZIVATEL_DF"
    entity_type: master
    name_column: "jméno_uživatele"
    code_column: "kód_uživatele"
    description: |
      Evidence uživatelů systému.
    columns:
      - name: "id_uživatele"
        column: "IDUZIVATEL"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor uživatele"

      - name: "kód_uživatele"
        column: "KOD_UZIV"
        type: "varchar(20)"
        description: "Kód uživatele"

      - name: "jméno_uživatele"
        column: "JMENO_UZIV"
        type: "varchar(100)"
        description: "Jméno uživatele"
        searchable: true
        search_hint: "Hledání uživatele podle jména. Příklad: WHERE JMENO_UZIV COLLATE Latin1_General_CI_AI LIKE '%Novák%'"

      - name: "email_uživatele"
        column: "UZIV_EMAIL"
        type: "varchar(100)"
        description: "Email uživatele"

      - name: "telefon_uživatele"
        column: "UZIV_TEL"
        type: "varchar(30)"
        description: "Telefon uživatele"

  uživatel_ve_skupině:
    table: "QUZVESKUP"
    entity_type: config
    name_column: "název_skupiny_uživatelů"
    code_column: "kód_skupiny_uživatelů"
    description: |
      Vazba mezi uživateli a skupinami uživatelů.
      Umožňuje zjistit, do které skupiny uživatel patří a jaké má tak přístupové práva.
      ⚠ Uživatel může být ve VÍCE skupinách. Pro "výchozí skupinu" VŽDY filtruj WHERE VLVYCHOZI = 1.
    columns:
      - name: "id_uživatele_ve_skupině"
        column: "IDUZVESKUP"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor záznamu vazby uživatele ve skupině"

      - name: "id_uživatele"
        column: "IDUZIVATEL"
        type: "int"
        description: "Vazba na uživatele"

      - name: "id_skupiny_uživatelů"
        column: "IDSKUPUZIV"
        type: "int"
        description: "Vazba na skupinu uživatelů"

      - name: "název_skupiny_uživatelů"
        column: "NAZEV_SKUP_UZIV"
        type: "varchar(90)"
        description: "Název skupiny uživatelů (denormalizováno z JOIN na QSKUPUZIV)"

      - name: "kód_skupiny_uživatelů"
        column: "KOD_SKUP_UZIV"
        type: "varchar(20)"
        description: "Kód skupiny uživatelů (denormalizováno z JOIN na QSKUPUZIV)"

      - name: "výchozí_skupina_uživatele"
        column: "VLVYCHOZI"
        type: "smallint"
        description: "Indikuje, zda je tato skupina výchozí pro uživatele (1 = ano, 0 = ne). Uživatel může být členem více skupin, ale pouze jedna může být výchozí."

relationships:

  organizacni_struktura_ridici:
    from: "organizační_struktura"
    to: "organizační_struktura"
    type: "many-to-one"
    join: "QSKUPUZIV.IDSKUPUZIV_R = QSKUPUZIV.IDSKUPUZIV"
    description: "Skupina je podřízena řídící skupině (hierarchie)"

  uzivatel_ve_skupine_uzivatel:
    from: "uživatel_ve_skupině"
    to: "uživatel"
    type: "many-to-one"
    join: "QUZVESKUP.IDUZIVATEL = QUZIVATEL_DF.IDUZIVATEL"
    description: "Členství uživatele ve skupině"

  uzivatel_ve_skupine_skupina:
    from: "uživatel_ve_skupině"
    to: "skupina_uživatelů"
    type: "many-to-one"
    join: "QUZVESKUP.IDSKUPUZIV = QSKUPUZIV.IDSKUPUZIV"
    description: "Členství uživatele ve skupině"

    