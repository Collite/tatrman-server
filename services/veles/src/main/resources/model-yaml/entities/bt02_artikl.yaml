entities:

  produkt:
    table: "QSKUPZBOZI_DF"
    entity_type: structural
    aliases: ["skupina zboží", "produktová skupina"]
    name_column: "název_produktu"
    code_column: "kód_produktu"
    label_plural: "produktů"
    description: |
      Evidence produktů a jejich vlastností.
      ⚠ Produkt seskupuje artikly různých velikostí/variant.
    columns:
      - name: "id_produktu"
        column: "IDSKUPZBOZI"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor produktu"

      - name: "kód_produktu"
        column: "KOD_SKUP_ZBOZI"
        type: "varchar(20)"
        description: "Unikátní kód produktu"

      - name: "název_produktu"
        label: "Produkt"
        column: "NAZEV_SKUP_ZBOZI"
        type: "varchar(255)"
        description: "Obchodní název produktu"
        searchable: true
        search_hint: "Hledání produktu/skupiny zboží. Příklad: WHERE NAZEV_SKUP_ZBOZI LIKE '%mléko%'"

      - name: "pořadí_zadané"
        column: "PORADI"
        type: "smallint"
        description: "Zadané pořadí produktu"

      - name: "význam_zadaný"
        column: "VLVYZNAM_Z"
        type: "smallint"
        description: "Zadaný význam produktu"

  podprodukt:
    table: "QXXPODSKUPZBOZI where not NAZEV_PODSKUPZBOZI like 'ZK%'"
    entity_type: structural
    name_column: "název_podproduktu"
    code_column: "kód_podproduktu"
    description: |
      Evidence podproduktů a jejich vlastností.
    columns:
      - name: "id_podproduktu"
        column: "IDXXPODSKUPZBOZI"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor podproduktu"

      - name: "kód_podproduktu"
        column: "KOD_PODSKUPZBOZI"
        type: "varchar(20)"
        description: "Unikátní kód podproduktu"

      - name: "název_podproduktu"
        label: "Podprodukt"
        column: "NAZEV_PODSKUPZBOZI"
        type: "varchar(90)"
        description: "Obchodní název podproduktu"
        searchable: true
        search_hint: "Hledání podproduktu podle názvu. Příklad: WHERE NAZEV_PODSKUPZBOZI LIKE '%jogurt%'"

      - name: "id_produktu"
        column: "IDSKUPZBOZI"
        type: "int"
        description: "Vazba na nadřazený produkt" 

      - name: "pořadí_zadané"
        column: "PORADI"
        type: "smallint"
        description: "Zadané pořadí podproduktu"

      - name: "význam_zadaný"
        column: "VLVYZNAM_Z"
        type: "smallint"
        description: "Zadaný význam podproduktu"

      - name: "lhůta_poslední_dodávky"
        column: "LHUTA_POSL_DODAVKY"
        type: "int"
        description: |
          Lhůta poslední dodávky ve dnech. Pomocný parametr pro:
          - určení termínu poslední dodávky
          - výpočet obrátkovosti zásob

      - name: "objednávkový_list"
        column: "VLOBJ_LIST"
        type: "smallint"
        description: |
          Identifikátor, zda-li se má artikl v tomto podproduktu tisknout v cenové nabídce DF Tablet:
          0 = Ne
          1 = Ano

      - name: "nulové_režie_artiklu"
        column: "VLREZIE_ABC_ART_NE"
        type: "smallint"
        description: |
          Parametr pro rozpočítání nepřímých nákladů v ABC plán:
          0 = Ne
          1 = Ano (režie artiklů se na artiklech nerozpouští)

      - name: "nulové_režie_zákazníka"
        column: "VLREZIE_ABC_ZAK_NE"
        type: "smallint"
        description: |
          Parametr pro rozpočítání nepřímých nákladů v ABC plán:
          0 = Ne
          1 = Ano (režie zákazníků se na artiklech nerozpouští)

      - name: "produkt_manažer"
        column: "IDUZIVATEL"
        type: "int"
        description: "Produkt manažer odpovědný za podprodukt"

  cenová_skupina_artiklu:
    table: "QCENSKZB_DF"
    entity_type: structural
    name_column: "název_cenové_skupiny"
    code_column: "kód_cenové_skupiny"
    description: |
      Cenová skupina artiklu pro stanovení prodejní ceny.
    columns:
      - name: "id_cenové_skupiny"
        column: "IDCENSKZB"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor cenové skupiny artiklu"

      - name: "kód_cenové_skupiny"
        column: "KOD_CENSKZB"
        type: "varchar(20)"
        description: "Unikátní kód cenové skupiny"
        searchable: true
        search_hint: "Hledání cenové skupiny podle kódu. Příklad: WHERE KOD_CENSKZB LIKE '%CS%'"

      - name: "název_cenové_skupiny"
        column: "NAZEV_CENSKZB"
        type: "varchar(100)"
        description: "Název cenové skupiny"
        searchable: true
        search_hint: "Hledání cenové skupiny podle názvu. Příklad: WHERE NAZEV_CENSKZB LIKE '%mléko%'"

      - name: "stav"
        column: "VLSTAV"
        type: "smallint"
        description: "Stav cenové skupiny (0 = aktivní, 1 = značka, 20 = neaktivní)"

  artikl:
    table: "QZBOZI_DF WHERE VLTYP_SLOZ=1"
    entity_type: master
    aliases: ["zboží", "položka", "SKU"]
    label_plural: "artiklů"
    name_column: "název_artiklu"
    code_column: "kód_artiklu"
    description: |
      Evidence všech artiklů a jejich vlastností.
      ⚠ Artikl patří k produktu přes IDSKUPZBOZI.
      Typ artiklu je určen hodnotou VLPODTYP_SLOZ:
        1 = Výrobek
        2 = Zboží
        3 = Materiál
        4 = Polotovar
    columns:
      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor artiklu"

      - name: "kód_artiklu"
        column: "CIS_ZBOZI"
        type: "varchar(30)"
        description: "Unikátní kód artiklu"
        searchable: true
        search_hint: "Interní číslo artiklu. Příklad: WHERE CIS_ZBOZI LIKE '%12345%'"

      - name: "název_artiklu"
        label: "Název"
        column: "NAZEV_ZBOZI"
        type: "varchar(255)"
        description: "Obchodní název artiklu"
        searchable: true
        search_hint: "Název pro uživatele. Příklad: WHERE NAZEV_ZBOZI LIKE '%jogurt%'"

      - name: "typ_artiklu"
        column: "VLPODTYP_SLOZ"
        type: "smallint"
        description: "Typ artiklu (1 = Výrobek, 2 = Zboží, 3 = Materiál, 4 = Polotovar)"
        
      - name: "id_produktu"
        column: "IDSKUPZBOZI"
        type: "int"
        description: "Vazba na nadřazený produkt"
      
      - name: "id_podproduktu"
        column: "IDXXPODSKUPZBOZI"
        type: "int"
        description: "Vazba na nadřazený podprodukt"

      - name: "id_cenové_skupiny"
        column: "IDCENSKZB"
        type: "int"
        description: "Vazba na cenovou skupinu artiklu"

      - name: "značka_artiklu"
        column: "SKP"
        type: "varchar(10)"
        description: "Značka artiklu"

      - name: "stav_artiklu"
        column: "VLSTAVZBOZI"
        type: "smallint"
        description: "Status artiklu (pouze hodnoty 0 = aktivní, 1 = neaktivní)"

  zásoba_artiklu:
    table: "XXVYPADKYZASOB"
    entity_type: transaction
    description: |
      Evidence výpadků zásob a plánovaného doplnění artiklů.
      ⚠ Nepoužívej pro aktuální stav skladu — k tomu slouží entita zásoba_na_skladě (BT11, tabulka QZBOZSKL_DF),
      která obsahuje fyzický stav, disponibilitu a další provozní ukazatele per sklad.
      Tuto entitu použij, když uživatel ptá na termín nebo množství doplnění zásoby.
    columns:
      - name: "id_zásoby_artiklu"
        column: "IDXXVYPADKYZASOB"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor zásoby artiklu na skladě"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        description: "Vazba na artikl"

      - name: "aktuální_zásoba"
        column: "MNZASOBA"
        type: "decimal(19,5)"
        description: "Aktuální množství zásoby artiklu na skladě"

      - name: "datum_doplnění"
        column: "DTDOPLNENI"
        type: "date"
        description: "Datum doplnění zásoby artiklu na skladě"

      - name: "množství_doplnění"
        column: "MNDOPLNENI"
        type: "decimal(19,5)"
        description: "Množství doplnění zásoby artiklu na skladě"  
  
relationships:

  produkt_podprodukt:
    from: "podprodukt"
    to: "produkt"
    type: "many-to-one"
    join: "QXXPODSKUPZBOZI.IDSKUPZBOZI = QSKUPZBOZI_DF.IDSKUPZBOZI"
    description: "Podprodukt patří pod nadřazený produkt"

  podprodukt_produkt_manazer:
    from: "podprodukt"
    to: "uživatel"  # bt01_uzivatel.yaml
    type: "many-to-one"
    join: "QXXPODSKUPZBOZI.IDUZIVATEL = QUZIVATEL_DF.IDUZIVATEL"
    description: "Podprodukt má přiřazeného produkt manažera"

  artikl_produkt:
    from: "artikl"
    to: "produkt"
    type: "many-to-one"
    join: "QZBOZI_DF.IDSKUPZBOZI = QSKUPZBOZI_DF.IDSKUPZBOZI"
    description: "Artikl patří pod nadřazený produkt"

  artikl_podprodukt:
    from: "artikl"
    to: "podprodukt"
    type: "many-to-one"
    join: "QZBOZI_DF.IDXXPODSKUPZBOZI = QXXPODSKUPZBOZI.IDXXPODSKUPZBOZI"
    description: "Artikl patří pod nadřazený podprodukt"

  artikl_cenova_skupina:
    from: "artikl"
    to: "cenová_skupina_artiklu"
    type: "many-to-one"
    join: "QZBOZI_DF.IDCENSKZB = QCENSKZB_DF.IDCENSKZB"
    description: "Artikl patří do cenové skupiny"

  artikl_cenova_skupina_znacky:
    from: "artikl"
    to: "cenová_skupina_artiklu"
    type: "many-to-one"
    join: "QZBOZI_DF.SKP = QCENSKZB_DF.KOD_CENSKZB"
    description: "Artikl patří do cenové skupiny značky (alternativní vazba přes pole SKP)"

  zasoba_artiklu_artikl:
    from: "zásoba_artiklu"
    to: "artikl"
    type: "many-to-one"
    join: "XXVYPADKYZASOB.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Zásoba artiklu patří ke konkrétnímu artiklu"
