entities:

  účetní_období:
    table: "QUCTOBD where UCET_OBD >= '2025.01'"
    entity_type: master
    aliases: ["účetní období", "období", "měsíc"]
    name_column: "kód_účetního_období"
    code_column: "kód_účetního_období"
    label_plural: "účetních období"
    description: |
      Číselník účetních období. Každý záznam reprezentuje jedno účetní období (typicky měsíc)
      s vazbou na fiskální období, datem prvního a posledního dne.
    columns:
      - name: "id_účetního_období"
        column: "IDUCTOBD"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor účetního období"

      - name: "kód_účetního_období"
        column: "UCET_OBD"
        type: "varchar(8)"
        description: "Kód účetního období ve formátu RRRR.MM (např. 2026.04)"
        searchable: true
        search_hint: "Hledání účetního období. Příklad: WHERE UCET_OBD LIKE '%2026%'"

      - name: "stav_účetního_období"
        column: "VLSTAVUO"
        type: "smallint"
        description: "Stav účetního období (0 = otevřené)"

      - name: "první_den_období"
        column: "dtObd_PrvniDen"
        type: "datetime"
        description: "První den účetního období"

      - name: "poslední_den_období"
        column: "dtObd_PoslDen"
        type: "datetime"
        description: "Poslední den účetního období"

  ukazatel_manažerského_účetnictví:
    table: "QXXUKAZMU"
    entity_type: master
    aliases: ["ukazatel MÚ", "ukazatel manažerského účetnictví", "nákladový ukazatel"]
    name_column: "název_ukazatele"
    code_column: "kód_ukazatele"
    label_plural: "ukazatelů manažerského účetnictví"
    description: |
      Číselník ukazatelů manažerského účetnictví. Každý ukazatel je přiřazen ke středisku.
    columns:
      - name: "id_ukazatele"
        column: "IDXXUKAZMU"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor ukazatele"

      - name: "kód_ukazatele"
        column: "KOD_UKAZMU"
        type: "varchar(20)"
        description: "Kód ukazatele"
        searchable: true
        fuzzy: true
        search_hint: "Hledání ukazatele podle kódu. Příklad: WHERE KOD_UKAZMU COLLATE Latin1_General_CI_AI LIKE '%AD%'"

      - name: "název_ukazatele"
        column: "NAZEV_UKAZMU"
        type: "varchar(90)"
        description: "Název ukazatele"
        searchable: true
        fuzzy: true
        search_hint: "Hledání ukazatele podle názvu. Příklad: WHERE NAZEV_UKAZMU COLLATE Latin1_General_CI_AI LIKE '%majetek%'"

  účetní_středisko:
    table: "QSTRED_DF"
    entity_type: master
    aliases: ["středisko", "nákladové středisko"]
    name_column: "název_střediska"
    code_column: "kód_střediska"
    label_plural: "účetních středisek"
    description: |
      Číselník účetních (nákladových) středisek.
    columns:
      - name: "id_střediska"
        column: "IDSTRED"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor střediska"

      - name: "kód_střediska"
        column: "KOD_STR"
        type: "varchar(10)"
        description: "Kód střediska"
        searchable: true
        fuzzy: true
        search_hint: "Hledání střediska podle kódu. Příklad: WHERE KOD_STR = '10'"

      - name: "název_střediska"
        column: "NAZEV_STR"
        type: "varchar(90)"
        description: "Název střediska"
        searchable: true
        fuzzy: true
        search_hint: "Hledání střediska podle názvu. Příklad: WHERE NAZEV_STR COLLATE Latin1_General_CI_AI LIKE '%obchod%'"

      - name: "id_ukazatele"
        column: "IDXXUKAZMU"
        type: "int"
        description: "FK na ukazatel manažerského účetnictví (QXXUKAZMU.IDXXUKAZMU)"

  účet_účetní_osnovy:
    table: "QUCTOSN_DF where substring(KOD_UCTU,1,1) in ('5','6','8','9')"
    entity_type: master
    aliases: ["účet", "účet osnovy", "účetní osnova"]
    name_column: "název_účtu"
    code_column: "kód_účtu"
    label_plural: "účtů účetní osnovy"
    description: |
      Číselník účtů účetní osnovy.
    columns:
      - name: "id_účtu"
        column: "IDUCTOSN"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor účtu"

      - name: "kód_účtu"
        column: "KOD_UCTU"
        type: "varchar(10)"
        description: "Kód účtu (např. 013, 501001)"
        searchable: true
        search_hint: "Hledání účtu podle kódu. Příklad: WHERE KOD_UCTU LIKE '501%'"

      - name: "název_účtu"
        column: "NAZEV_UCTU"
        type: "varchar(90)"
        description: "Název účtu"
        searchable: true
        search_hint: "Hledání účtu podle názvu. Příklad: WHERE NAZEV_UCTU COLLATE Latin1_General_CI_AI LIKE '%software%'"

  hodnoty_manažerského_účetnictví:
    table: "QXXUKAZMUHOD"
    entity_type: transaction
    aliases: ["hodnoty MÚ", "hodnoty manažerského účetnictví", "plán a skutečnost"]
    label_plural: "hodnot manažerského účetnictví"
    description: |
      Hodnoty ukazatelů manažerského účetnictví za účetní období (plán, skutečnost).
    columns:
      - name: "id_hodnoty"
        column: "IDXXUKAZMUHOD"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor záznamu hodnoty"

      - name: "id_ukazatele"
        column: "IDXXUKAZMU"
        type: "int"
        description: "FK na ukazatel manažerského účetnictví (QXXUKAZMU.IDXXUKAZMU)"

      - name: "id_účetního_období"
        column: "IDUCTOBD"
        type: "int"
        description: "FK na účetní období (QUCTOBD.IDUCTOBD)"

      - name: "plán"
        column: "HDPLAN"
        type: "money"
        description: "Plánovaná hodnota za období"

      - name: "skutečnost"
        column: "HDSKUT"
        type: "money"
        description: "Skutečná hodnota za období"

      - name: "plán_kumulativně"
        column: "HDPLANKUM"
        type: "money"
        description: "Plánovaná hodnota kumulativně"

      - name: "skutečnost_kumulativně"
        column: "HDSKUTKUM"
        type: "money"
        description: "Skutečná hodnota kumulativně"

  typ_dokladu:
    table: "QTYPDOK"
    entity_type: master
    aliases: ["typ dokladu", "druh dokladu"]
    name_column: "název_typu_dokladu"
    code_column: "kód_typu_dokladu"
    label_plural: "typů dokladů"
    description: |
      Číselník typů dokladů.
    columns:
      - name: "id_typu_dokladu"
        column: "IDTYPDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor typu dokladu"

      - name: "kód_typu_dokladu"
        column: "TYP_DOK"
        type: "varchar(10)"
        description: "Kód typu dokladu"
        fuzzy: true

      - name: "název_typu_dokladu"
        column: "NAZEV_TYPDOK"
        type: "varchar(30)"
        description: "Název typu dokladu"
        fuzzy: true

  účetní_doklad:
    table: "QSDOK"
    entity_type: transaction
    aliases: ["složka dokladu", "doklad", "účetní doklad"]
    label_plural: "účetních dokladů"
    description: |
      Složky obchodních dokladů – řádky dokladů s vazbou na hlavičku, zboží a účetní období.
    columns:
      - name: "id_složky_dokladu"
        column: "IDSDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor složky dokladu"

      - name: "id_hlavičky_dokladu"
        column: "IDHDOK"
        type: "int"
        description: "FK na hlavičku dokladu"

      - name: "id_typu_dokladu"
        column: "IDTYPDOK"
        type: "int"
        description: "FK na typ dokladu"

      - name: "id_subjektu"
        column: "IDSUBJEKT"
        type: "int"
        description: "FK na subjekt (odběratel/dodavatel)"

      - name: "číslo_dokladu"
        column: "CIS_DOK"
        type: "varchar(20)"
        description: "Číslo dokladu"

      - name: "datum_zdanitelného_plnění"
        column: "DTZDANITPLN"
        type: "datetime"
        description: "Datum uskutečnění zdanitelného plnění (DUZP)"

      - name: "text_poznámky"
        column: "TEXTPOZN"
        type: "varchar(2500)"
        description: "Text hlavičky / poznámka dokladu"

      - name: "zakázka"
        column: "ZAK_SDOK"
        type: "varchar(20)"
        description: "Číslo zakázky na složce dokladu"

      - name: "pořadí_v_dokladu"
        column: "PORADI_DOK"
        type: "int"
        description: "Pořadí složky v rámci dokladu"

      - name: "typ_složky"
        column: "VLTYP_SLOZ"
        type: "smallint"
        description: "Typ složky (1=zboží, 2=služba, 3=ostatní, 9=poplatek)"

      - name: "kód_pohybu"
        column: "KOD_POHYB"
        type: "varchar(6)"
        description: "Kód pohybu složky (např. FV = Faktura vydaná)"

      - name: "identifikátor_složky"
        column: "SLOZKA_IDENT"
        type: "varchar(30)"
        description: "Kód složky (identifikátor artiklu/zboží)"

      - name: "název_složky"
        column: "NAZEV_ZBOZI"
        type: "varchar(255)"
        description: "Název složky (název zboží/služby)"

      - name: "text_složky"
        column: "TEXT_SLOZ"
        type: "varchar(max)"
        description: "Text složky dokladu"

      - name: "počet_mj"
        column: "MNPOCETMJ"
        type: "decimal"
        description: "Počet měrných jednotek"

      - name: "cena_za_mj"
        column: "HDJCENAKC"
        type: "money"
        description: "Jednotková cena v Kč"

      - name: "cena_celkem"
        column: "HDCCENAKC"
        type: "money"
        description: "Celková cena v Kč"

  účetní_zápis:
    table: "QUCETZAP"
    entity_type: transaction
    aliases: ["účetní zápis", "zápis", "účetní pohyb"]
    label_plural: "účetních zápisů"
    description: |
      Účetní zápisy – jednotlivé řádky účetních dokladů s obraty MD/Dal.
    columns:
      - name: "id_účetního_zápisu"
        column: "IDUCETZAP"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor účetního zápisu"

      - name: "id_hlavičky_dokladu"
        column: "IDHDOK"
        type: "int"
        description: "FK na hlavičku účetního dokladu"

      - name: "id_složky_dokladu"
        column: "IDSDOK"
        type: "int"
        description: "FK na složku účetního dokladu"

      - name: "id_střediska"
        column: "IDSTRED"
        type: "int"
        description: "FK na účetní středisko (QSTRED_DF.IDSTRED)"

      - name: "id_účtu"
        column: "IDUCTOSN"
        type: "int"
        description: "FK na účet účetní osnovy (QUCTOSN_DF.IDUCTOSN)"

      - name: "id_účetního_období"
        column: "IDUCTOBD"
        type: "int"
        description: "FK na účetní období (QUCTOBD.IDUCTOBD)"

      - name: "text_zápisu"
        column: "UZTEXT"
        type: "varchar(90)"
        description: "Text účetního zápisu"

      - name: "obrat_md"
        column: "HDOBRAT_MD"
        type: "money"
        description: "Obrat strany Má dáti"

      - name: "obrat_dal"
        column: "HDOBRAT_DAL"
        type: "money"
        description: "Obrat strany Dal"

      - name: "účetní_hodnota"
        column: "HDKON_STAV"
        type: "money"
        description: "Účetní hodnota"

relationships:

  účetní_středisko_ukazatel:
    from: "účetní_středisko"
    to: "ukazatel_manažerského_účetnictví"
    type: "many-to-one"
    join: "QSTRED_DF.IDXXUKAZMU = QXXUKAZMU.IDXXUKAZMU"
    description: "Středisko má přiřazený ukazatel manažerského účetnictví"

  hodnota_ukazatele_ukazatel:
    from: "hodnoty_manažerského_účetnictví"
    to: "ukazatel_manažerského_účetnictví"
    type: "many-to-one"
    join: "QXXUKAZMUHOD.IDXXUKAZMU = QXXUKAZMU.IDXXUKAZMU"
    description: "Hodnota MÚ patří k ukazateli"

  hodnota_ukazatele_období:
    from: "hodnoty_manažerského_účetnictví"
    to: "účetní_období"
    type: "many-to-one"
    join: "QXXUKAZMUHOD.IDUCTOBD = QUCTOBD.IDUCTOBD"
    description: "Hodnota MÚ patří k účetnímu období"

  účetní_zápis_středisko:
    from: "účetní_zápis"
    to: "účetní_středisko"
    type: "many-to-one"
    join: "QUCETZAP.IDSTRED = QSTRED_DF.IDSTRED"
    description: "Účetní zápis patří ke středisku"

  účetní_zápis_období:
    from: "účetní_zápis"
    to: "účetní_období"
    type: "many-to-one"
    join: "QUCETZAP.IDUCTOBD = QUCTOBD.IDUCTOBD"
    description: "Účetní zápis patří k účetnímu období"

  účetní_zápis_účet:
    from: "účetní_zápis"
    to: "účet_účetní_osnovy"
    type: "many-to-one"
    join: "QUCETZAP.IDUCTOSN = QUCTOSN_DF.IDUCTOSN"
    description: "Účetní zápis patří k účtu účetní osnovy"

  účetní_zápis_doklad:
    from: "účetní_zápis"
    to: "účetní_doklad"
    type: "many-to-one"
    join: "QUCETZAP.IDHDOK = QSDOK.IDHDOK"
    description: "Účetní zápis patří k hlavičce dokladu"

  účetní_zápis_složka_dokladu:
    from: "účetní_zápis"
    to: "účetní_doklad"
    type: "many-to-one"
    join: "QUCETZAP.IDSDOK = QSDOK.IDSDOK"
    description: "Účetní zápis patří ke složce dokladu"

  účetní_doklad_typ:
    from: "účetní_doklad"
    to: "typ_dokladu"
    type: "many-to-one"
    join: "QSDOK.IDTYPDOK = QTYPDOK.IDTYPDOK"
    description: "Doklad patří k typu dokladu"

