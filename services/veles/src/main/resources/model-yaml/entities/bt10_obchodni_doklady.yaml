entities:

  zakázka:
    table: "QHDOK_ZAK_DF WHERE TYP_DOK='POB' AND HDKUHRADEVAL>=0"
    entity_type: transaction
    name_column: "číslo_zakázky"
    description: |
      Hlavička zakázky - obchodní doklad pro zákazníka.
    columns:
      - name: "id_zakázky"
        column: "IDHDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor zakázky"

      - name: "číslo_zakázky"
        column: "CIS_DOK"
        type: "varchar(20)"
        description: "Číslo zakázky"

      - name: "id_dodacího_místa"
        column: "IDSUBJADRP"
        type: "int"
        description: "Vazba na dodací místo"

      - name: "datum_dodání_zakázky"
        column: "DTZDANITPLN"
        type: "date"
        description: "Datum dodání zakázky. Stejný DB sloupec DTZDANITPLN jako datum_plnění na faktuře."

      - name: "hodnota_zakázky"
        column: "HDKUHRADEVAL"
        type: "money"
        description: "Celková hodnota zakázky v Kč (kladná částka)"

      - name: "stav_zakázky"
        column: "VLSTAVHDOK"
        type: "smallint"
        description: |
          Stav zakázky:
           -2 = Pořizovaná
           0 = Rozpracovaná
           1 = Normální
           3 = Blokovaná
           4 = Pozastavená
           6 = Předfakturovaná
           7 = Expedovaná
           8 = K fakturaci
           9 = Vyfakturovaná
           10 = Uzavřená

  zakázka_složka:
    table: "QSDOK_ZAK_DF"
    entity_type: transaction
    aliases: ["položka_zakázky", "řádek_zakázky", "složka_dokladu"]
    description: |
      Složka (položka) zakázky - jednotlivé artikly na zakázce.
      ⚠ Tabulka QZBOZSDOK je sdílená pro složky všech typů dokladů.
      Příslušnost ke konkrétnímu dokladu se určuje JOINem na hlavičku (IDHDOK).
      Pravidlo: Vždy použij JOIN na příslušnou hlavičku dokladu, nikdy nedotazuj QZBOZSDOK samostatně.
    columns:
      - name: "id_složky_zakázky"
        column: "IDSDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor složky zakázky"

      - name: "id_zakázky"
        column: "IDHDOK"
        type: "int"
        description: "Vazba na hlavičku zakázky"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        description: "Vazba na artikl"

      - name: "množství"
        column: "MNCELKEMPOCET"
        type: "decimal(19,5)"
        description: "Objednané množství kusů"

      - name: "cena_za_kus"
        column: "HDJCENAVAL"
        type: "money"
        description: "Cena za měrnou jednotku"

      - name: "celková_cena"
        column: "HDCCENAVAL"
        type: "money"
        description: "Celková cena položky"

      - name: "id_prodejní_akce"
        column: "IDXXPRODAKCE"
        type: "int"
        description: "Vazba na prodejní akci"

  vratka:
    table: "QHDOK_ZAK_DF WHERE TYP_DOK='POB' AND HDKUHRADEVAL<0"
    entity_type: transaction
    name_column: "číslo_vratky"
    description: |
      Hlavička vratky - obchodní doklad pro vrácení zboží.
    columns:
      - name: "id_vratky"
        column: "IDHDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor vratky"

      - name: "číslo_vratky"
        column: "CIS_DOK"
        type: "varchar(20)"
        description: "Číslo vratky"

      - name: "id_dodacího_místa"
        column: "IDSUBJADRP"
        type: "int"
        description: "Vazba na dodací místo"

      - name: "datum_stažení_vratky"
        column: "DTZDANITPLN"
        type: "date"
        description: "Datum stažení vratky"

      - name: "hodnota_vratky"
        column: "HDKUHRADEVAL"
        type: "money"
        description: "Celková hodnota vratky v Kč (záporná částka)"

      - name: "stav_vratky"
        column: "VLSTAVHDOK"
        type: "smallint"
        description: |
          Stav vratky:
           -2 = Pořizovaná
           0 = Rozpracovaná
           1 = Normální
           3 = Blokovaná
           4 = Pozastavená
           6 = Předfakturovaná
           7 = Expedovaná
           8 = K fakturaci
           9 = Vyfakturovaná
           10 = Uzavřená

  vratka_složka:
    table: "QZBOZSDOK"
    entity_type: transaction
    description: |
      Složka (položka) vratky - jednotlivé artikly na vratce.
      ⚠ Tabulka QZBOZSDOK je sdílená pro složky všech typů dokladů.
      Příslušnost ke konkrétnímu dokladu se určuje JOINem na hlavičku (IDHDOK).
      Pravidlo: Vždy použij JOIN na příslušnou hlavičku dokladu, nikdy nedotazuj QZBOZSDOK samostatně.
    columns:
      - name: "id_složky_vratky"
        column: "IDSDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor složky vratky"

      - name: "id_vratky"
        column: "IDHDOK"
        type: "int"
        description: "Vazba na hlavičku vratky"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        description: "Vazba na artikl"

      - name: "množství"
        column: "MNCELKEMPOCET"
        type: "decimal(19,5)"
        description: "Vrácené množství kusů"

      - name: "cena_za_kus"
        column: "HDJCENAVAL"
        type: "money"
        description: "Cena za měrnou jednotku"

      - name: "celková_cena"
        column: "HDCCENAVAL"
        type: "money"
        description: "Celková cena položky"

  faktura:
    table: "QHDOK_FAV_DF WHERE TYP_DOK='FVU' AND HDKUHRADEVAL>=0"
    entity_type: transaction
    name_column: "číslo_faktury"
    description: |
      Hlavička faktury - obchodní doklad pro zákazníka.
    columns:
      - name: "id_faktury"
        column: "IDHDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor faktury"

      - name: "číslo_faktury"
        column: "CIS_DOK"
        type: "varchar(20)"
        description: "Číslo faktury"

      - name: "zakázka"
        column: "ZAK_HDOK"
        type: "varchar(20)"
        description: "Vazba na číslo zakázky"

      - name: "id_subjektu"
        column: "IDSUBJEKT"
        type: "int"
        description: "Vazba na zákazníka (subjekt)"

      - name: "datum_plnění"
        column: "DTZDANITPLN"
        type: "date"
        description: "Datum plnění faktury. Stejný DB sloupec DTZDANITPLN jako datum_dodání na zakázce."

      - name: "datum_vystavení"
        column: "DTVYSTAVENO"
        type: "date"
        description: "Datum vystavení faktury"

      - name: "datum_splatnosti"
        column: "DTSPLATNO"
        type: "date"
        description: "Datum splatnosti faktury"

      - name: "hodnota_faktury"
        column: "HDKUHRADEVAL"
        type: "money"
        description: "Celková hodnota faktury v Kč (kladná částka)"

      - name: "stav_faktury"
        column: "VLSTAVHDOK"
        type: "smallint"
        description: |
          Stav faktury:
           0 = Rozpracovaná
           2 = K tisku
           3 = Vytištěná
           4 = K odeslání
           5 = Odeslaná
           6 = Doručená
           7 = K proplacení
           8 = K zápočtu
           9 = Zamítnuto
           10 = Online szamla
           20 = Storno

  faktura_složka:
    table: "QZBOZSDOK"
    entity_type: transaction
    description: |
      Složka (položka) faktury - jednotlivé artikly na faktuře.
      ⚠ Tabulka QZBOZSDOK je sdílená pro složky všech typů dokladů.
      Příslušnost ke konkrétnímu dokladu se určuje JOINem na hlavičku (IDHDOK).
      Pravidlo: Vždy použij JOIN na příslušnou hlavičku dokladu, nikdy nedotazuj QZBOZSDOK samostatně.
    columns:
      - name: "id_složky_faktury"
        column: "IDSDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor složky faktury"

      - name: "id_faktury"
        column: "IDHDOK"
        type: "int"
        description: "Vazba na hlavičku faktury"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        description: "Vazba na artikl"

      - name: "množství"
        column: "MNCELKEMPOCET"
        type: "decimal(19,5)"
        description: "Fakturované množství kusů"

      - name: "cena_za_kus"
        column: "HDJCENAVAL"
        type: "money"
        description: "Cena za měrnou jednotku"

      - name: "celková_cena"
        column: "HDCCENAVAL"
        type: "money"
        description: "Celková cena položky"

  dobropis:
    table: "QHDOK_FAV_DF WHERE TYP_DOK='FVU' AND HDKUHRADEVAL<0"
    entity_type: transaction
    name_column: "číslo_dobropisu"
    description: |
      Hlavička dobropisu - obchodní doklad pro vrácení peněz zákazníkovi.
    columns:
      - name: "id_dobropisu"
        column: "IDHDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor dobropisu"

      - name: "číslo_dobropisu"
        column: "CIS_DOK"
        type: "varchar(20)"
        description: "Číslo dobropisu"

      - name: "vratka"
        column: "ZAK_HDOK"
        type: "varchar(20)"
        description: "Vazba na číslo vratky"

      - name: "id_subjektu"
        column: "IDSUBJEKT"
        type: "int"
        description: "Vazba na zákazníka (subjekt)"

      - name: "datum_plnění"
        column: "DTZDANITPLN"
        type: "date"
        description: "Datum plnění dobropisu"      

      - name: "datum_vystavení"
        column: "DTVYSTAVENO"
        type: "date"
        description: "Datum vystavení dobropisu"

      - name: "datum_splatnosti"
        column: "DTSPLATNO"
        type: "date"
        description: "Datum splatnosti dobropisu"

      - name: "hodnota_dobropisu"
        column: "HDKUHRADEVAL"
        type: "money"
        description: "Celková hodnota dobropisu v Kč (záporná částka)"

      - name: "stav_dobropisu"
        column: "VLSTAVHDOK"
        type: "smallint"
        description: |
          Stav dobropisu:
           0 = Rozpracovaná
           2 = K tisku
           3 = Vytištěná
           4 = K odeslání
           5 = Odeslaná
           6 = Doručená
           7 = K proplacení
           8 = K zápočtu
           9 = Zamítnuto
           10 = Online szamla
           20 = Storno

  dobropis_složka:
    table: "QZBOZSDOK"
    entity_type: transaction
    description: |
      Složka (položka) dobropisu - jednotlivé artikly na dobropisu.
      ⚠ Tabulka QZBOZSDOK je sdílená pro složky všech typů dokladů.
      Příslušnost ke konkrétnímu dokladu se určuje JOINem na hlavičku (IDHDOK).
      Pravidlo: Vždy použij JOIN na příslušnou hlavičku dokladu, nikdy nedotazuj QZBOZSDOK samostatně.
    columns:
      - name: "id_složky_dobropisu"
        column: "IDSDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor složky dobropisu"

      - name: "id_dobropisu"
        column: "IDHDOK"
        type: "int"
        description: "Vazba na hlavičku dobropisu"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        description: "Vazba na artikl"

      - name: "množství"
        column: "MNCELKEMPOCET"
        type: "decimal(19,5)"
        description: "Množství kusů na dobropisu"

      - name: "cena_za_kus"
        column: "HDJCENAVAL"
        type: "money"
        description: "Cena za měrnou jednotku"

      - name: "celková_cena"
        column: "HDCCENAVAL"
        type: "money"
        description: "Celková cena položky"

  reklamace:
    table: "QHDOK_ZAK_DF WHERE TYP_DOK='PDO'"
    entity_type: transaction
    name_column: "číslo_reklamace"
    description: |
      Hlavička reklamace - obchodní doklad pro reklamaci.
    columns:
      - name: "id_reklamace"
        column: "IDHDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor reklamace"

      - name: "číslo_reklamace"
        column: "CIS_DOK"
        type: "varchar(20)"
        description: "Číslo reklamace"

      - name: "číslo_vratky"
        column: "JEJICH_CISDOK"
        type: "varchar(60)"
        description: "Vazba na číslo vratky"

      - name: "id_dodacího_místa"
        column: "IDSUBJADRP"
        type: "int"
        description: "Vazba na dodací místo"

      - name: "datum_plnění"
        column: "DTZDANITPLN"
        type: "date"
        description: "Datum plnění reklamace"      

      - name: "datum_vystavení"
        column: "DTVYSTAVENO"
        type: "date"
        description: "Datum vystavení reklamace"

      - name: "stav_reklamace"
        column: "VLSTAVHDOK"
        type: "smallint"
        description: |
          Stav reklamace:
           0 = Pořízeno
           1 = K ověření OA
           2 = K ověření OZ
           3 = Ověřeno OZ
           4 = K ověření AG
           5 = Ověřeno AG
           6 = Ověřeno OA
           9 = Čeká na zákazníka
           10 = Uzavřeno

  reklamace_složka:
    table: "QSDOK_PDO_DF"
    entity_type: transaction
    description: |
      Složka (položka) reklamace - jednotlivé artikly na reklamaci.
    columns:
      - name: "id_složky_reklamace"
        column: "IDSDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor složky reklamace"

      - name: "id_reklamace"
        column: "IDHDOK"
        type: "int"
        description: "Vazba na hlavičku reklamace"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        description: "Vazba na artikl"

      - name: "množství"
        column: "MNCELKEMPOCET"
        type: "decimal(19,5)"
        description: "Množství kusů na reklamaci"

      - name: "cena_za_kus"
        column: "HDJCENAVAL"  
        type: "money"
        description: "Cena za měrnou jednotku"

      - name: "celková_cena"
        column: "HDCCENAVAL"  
        type: "money"
        description: "Celková cena položky"

  tok_dokladů:
    table: "QHISHDOK_DF"
    entity_type: transaction
    description: "Vazba mezi doklady (předchůdce -> následník)"
    columns:
      - name: "id_toku_dokladů"
        column: "IDHISHDOK"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor toku dokladů"

      - name: "id_předchůdce"
        column: "IDHDOKP"
        type: "int"
        description: "Identifikace předchozího dokladu (např. Objednávka)"

      - name: "číslo_předchůdce"
        column: "CIS_DOKP"
        type: "varchar(20)"
        description: "Číslo předchozího dokladu"

      - name: "typ_předchůdce"
        column: "NAZEV_TYPDOKP"
        type: "varchar(30)"
        description: "Typ předchozího dokladu (např. Objednávka, Zakázka, Faktura)"

      - name: "datum_plnění_předchůdce"
        column: "DTZDANITPLNP"
        type: "date"
        description: "Datum plnění předchozího dokladu"

      - name:  "stav_předchůdce"
        column: "STAVP"
        type: "varchar(30)"
        description: "Stav předchozího dokladu"

      - name: "id_následníka"
        column: "IDHDOKN"
        type: "int"
        description: "Identifikace následného dokladu (např. Faktura)"
      
      - name: "číslo_následníka"
        column: "CIS_DOKN"
        type: "varchar(20)"
        description: "Číslo následného dokladu"
      
      - name: "typ_následníka"
        column: "NAZEV_TYPDOKN"
        type: "varchar(30)"
        description: "Typ následného dokladu (např. Faktura, Dobropis)"

      - name: "datum_plnění_následníka"
        column: "DTZDANITPLNN"
        type: "date"
        description: "Datum plnění následného dokladu"

      - name:  "stav_následníka"
        column: "STAVN"
        type: "varchar(30)"
        description: "Stav následného dokladu"

relationships:

  zakazka_dodaci_misto:
    from: "zakázka"
    to: "dodací_místo"
    type: "many-to-one"
    join: "QHDOK_ZAK_DF.IDSUBJADRP = QSUBJADR_DF.IDSUBJADR"
    description: "Zakázka patří k dodacímu místu"

  zakazka_slozka_zakazka:
    from: "zakázka_složka"
    to: "zakázka"
    type: "many-to-one"
    join: "QSDOK_ZAK_DF.IDHDOK = QHDOK_ZAK_DF.IDHDOK"
    description: "Složka zakázky patří k zakázce"

  zakazka_slozka_artikl:
    from: "zakázka_složka"
    to: "artikl"
    type: "many-to-one"
    join: "QSDOK_ZAK_DF.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Složka zakázky obsahuje konkrétní artikl"

  zakazka_slozka_prodejni_akce:
    from: "zakázka_složka"
    to: "prodejní_akce"
    type: "many-to-one"
    join: "QSDOK_ZAK_DF.IDXXPRODAKCE = QXXPRODAKCE.IDXXPRODAKCE"
    description: "Složka zakázky může být součástí prodejní akce"

  vratka_dodaci_misto:
    from: "vratka"
    to: "dodací_místo"
    type: "many-to-one"
    join: "QHDOK_ZAK_DF.IDSUBJADRP = QSUBJADR_DF.IDSUBJADR"
    description: "Vratka patří k dodacímu místu"

  vratka_slozka_vratka:
    from: "vratka_složka"
    to: "vratka"
    type: "many-to-one"
    join: "QZBOZSDOK.IDHDOK = QHDOK_ZAK_DF.IDHDOK"
    description: "Složka vratky patří k vratce"

  vratka_slozka_artikl:
    from: "vratka_složka"
    to: "artikl"
    type: "many-to-one"
    join: "QZBOZSDOK.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Složka vratky obsahuje konkrétní artikl"

  faktura_subjekt:
    from: "faktura"
    to: "subjekt"
    type: "many-to-one"
    join: "QHDOK_FAV_DF.IDSUBJEKT = QSUBJEKT.IDSUBJEKT"
    description: "Faktura patří k zákazníkovi (subjektu)"
    note: "Faktura nemá přímou vazbu na dodací místo. Cesta k DM vede přes tok_dokladů → zakázka → dodací_místo."

  faktura_slozka_faktura:
    from: "faktura_složka"
    to: "faktura"
    type: "many-to-one"
    join: "QZBOZSDOK.IDHDOK = QHDOK_FAV_DF.IDHDOK"
    description: "Složka faktury patří k faktuře"

  faktura_slozka_artikl:
    from: "faktura_složka"
    to: "artikl"
    type: "many-to-one"
    join: "QZBOZSDOK.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Složka faktury obsahuje konkrétní artikl"

  dobropis_subjekt:
    from: "dobropis"
    to: "subjekt"
    type: "many-to-one"
    join: "QHDOK_FAV_DF.IDSUBJEKT = QSUBJEKT.IDSUBJEKT"
    description: "Dobropis patří k zákazníkovi (subjektu)"

  dobropis_slozka_dobropis:
    from: "dobropis_složka"
    to: "dobropis"
    type: "many-to-one"
    join: "QZBOZSDOK.IDHDOK = QHDOK_FAV_DF.IDHDOK"
    description: "Složka dobropisu patří k dobropisu"

  dobropis_slozka_artikl:
    from: "dobropis_složka"
    to: "artikl"
    type: "many-to-one"
    join: "QZBOZSDOK.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Složka dobropisu obsahuje konkrétní artikl"

  reklamace_dodaci_misto:
    from: "reklamace"
    to: "dodací_místo"
    type: "many-to-one"
    join: "QHDOK_ZAK_DF.IDSUBJADRP = QSUBJADR_DF.IDSUBJADR"
    description: "Reklamace patří k dodacímu místu"

