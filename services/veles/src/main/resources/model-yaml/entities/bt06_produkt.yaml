relationships:

  produkt_pro_firmu_trzni_skupina:
    from: "produkt_pro_firmu"
    to: "tržní_skupina"
    type: "many-to-one"
    join: "QXXMEZABC.IDSKUPZNACZBOZI = QSKUPZNACZBOZI_DF.IDSKUPZNACZBOZI"
    description: "Produkt přiřazený k firmě ukazuje na tržní skupinu"

  produkt_pro_firmu_produkt:
    from: "produkt_pro_firmu"
    to: "produkt"
    type: "many-to-one"
    join: "QXXMEZABC.IDSKUPZBOZI = QSKUPZBOZI_DF.IDSKUPZBOZI"
    description: "Produkt přiřazený k firmě odkazuje na produkt"

  podprodukt_pro_firmu_trzni_skupina:
    from: "podprodukt_pro_firmu"
    to: "tržní_skupina"
    type: "many-to-one"
    join: "QXXMEZABC.IDSKUPZNACZBOZI = QSKUPZNACZBOZI_DF.IDSKUPZNACZBOZI"
    description: "Podprodukt přiřazený k firmě ukazuje na tržní skupinu"

