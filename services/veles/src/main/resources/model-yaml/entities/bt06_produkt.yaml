    description: "Každý produkt přiřazený k tržní skupině ukazuje na danou tržní skupinu"

  produkt_pro_trzni_skupinu_produkt:
    from: "produkt_pro_tržní_skupinu"
    to: "produkt"
    type: "many-to-one"
