entities:

  prodeje:
    table: "XXPRODEJE"
    entity_type: transaction
    composite_primary_key: ["id_dodacího_místa", "id_artiklu"]
    description: |
      Agregovaná evidence prodejů na úrovni dodacího místa, produktu a artiklu.
      Obsahuje kumulativní tržby a data první/poslední dodávky.
    columns:
      - name: "id_dodacího_místa"
        column: "IDSUBJADR"
        type: "int"
        primary_key: true
        description: "Identifikace dodacího místa"

      - name: "id_tržní_skupiny"
        column: "IDSKUPZNACZBOZI"
        type: "int"
        description: "Identifikace tržní skupiny"

      - name: "id_obchodního_kanálu"
        column: "IDCENSKUP"
        type: "int"
        description: "Identifikace obchodního kanálu"

      - name: "zkratka_dodacího_místa"
        label: "Zkratka"
        column: "SUBJADR_POZNAMKA"
        type: "varchar(30)"
        description: "Zkratka dodacího místa"

      - name: "id_typ_dodacího_místa"
        column: "IDXXTYPDODMIST"
        type: "int"
        description: "Identifikace typu dodacího místa"

      - name: "id_produktu"
        column: "IDSKUPZBOZI"
        type: "int"
        description: "Identifikace produktu"

      - name: "id_podproduktu"
        column: "IDXXPODSKUPZBOZI"
        type: "int"
        description: "Identifikace podproduktu"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        primary_key: true
        description: "Identifikace artiklu"

      - name: "první_dodávka"
        column: "DTPRVNI_DOD"
        type: "date"
        description: "První dodávka, která nebyla dobropisem"

      - name: "poslední_dodávka"
        column: "DTPOSLEDNI_DOD"
        type: "date"
        description: "Poslední dodávka, která nebyla dobropisem"

      - name: "množství_poslední_dodávky"
        column: "MNPOSLEDNI_DOD"
        type: "decimal(19,5)"
        description: "Množství poslední dodávky v kusech"

      - name: "tržba_24_měsíců"
        column: "HDTRZBA_24M"
        type: "money"
        description: "Součet tržeb (prodeje i dobropisy) za posledních 24 měsíců. Bez DPH. Rolling window počítaný dávkovým přepočtem (nikoli od dneška)."

      - name: "tržba_12_měsíců"
        column: "HDTRZBA_12M"
        type: "money"
        description: "Součet tržeb (prodeje i dobropisy) za posledních 12 měsíců. Bez DPH. Rolling window počítaný dávkovým přepočtem (nikoli od dneška)."

      - name: "počet_kusů_24_měsíců"
        column: "MNMNOZSTVI_24M"
        type: "decimal(19,5)"
        description: "Součet prodaných kusů (prodeje i dobropisy) za posledních 24 měsíců"

      - name: "počet_kusů_12_měsíců"
        column: "MNMNOZSTVI_12M"
        type: "decimal(19,5)"
        description: "Součet prodaných kusů (prodeje i dobropisy) za posledních 12 měsíců"

relationships:
  prodeje_dodaci_misto:
    from: "prodeje"
    to: "dodací_místo"
    type: "many-to-one"
    join: "XXPRODEJE.IDSUBJADR = QSUBJADR_DF.IDSUBJADR"
    description: "Prodeje patří k dodacímu místu"

  prodeje_obchodni_kanal:
    from: "prodeje"
    to: "obchodní_kanál"
    type: "many-to-one"
    join: "XXPRODEJE.IDCENSKUP = QCENSKUP_DF.IDCENSKUP"
    description: "Prodeje patří k obchodnímu kanálu"

  prodeje_trzni_skupina:
    from: "prodeje"
    to: "tržní_skupina"
    type: "many-to-one"
    join: "XXPRODEJE.IDSKUPZNACZBOZI = QSKUPZNACZBOZI_DF.IDSKUPZNACZBOZI"
    description: "Prodeje patří k tržní skupině"

  prodeje_typ_dodaciho_mista:
    from: "prodeje"
    to: "typ_dodacího_místa"
    type: "many-to-one"
    join: "XXPRODEJE.IDXXTYPDODMIST = QXXTYPDODMIST.IDXXTYPDODMIST"
    description: "Prodeje patří k typu dodacího místa"

  prodeje_produkt:
    from: "prodeje"
    to: "produkt"
    type: "many-to-one"
    join: "XXPRODEJE.IDSKUPZBOZI = QSKUPZBOZI_DF.IDSKUPZBOZI"
    description: "Prodeje odkazují na produkt"

  prodeje_podprodukt:
    from: "prodeje"
    to: "podprodukt"
    type: "many-to-one"
    join: "XXPRODEJE.IDXXPODSKUPZBOZI = QXXPODSKUPZBOZI.IDXXPODSKUPZBOZI"
    description: "Prodeje odkazují na podprodukt"

  prodeje_artikl:
    from: "prodeje"
    to: "artikl"
    type: "many-to-one"
    join: "XXPRODEJE.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Prodeje odkazují na artikl"
