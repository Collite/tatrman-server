entities:
  konkurenční_dodavatel:
    table: "QXXKONKURENT WHERE VLTYP_KONK=1"
    entity_type: structural
    name_column: "název_konkurenčního_dodavatele"
    description: |
      Evidence konkurenčních dodavatelů a jejich vlastností.
      ⚠ Tabulka QXXKONKURENT je sdílená pro dodavatele i značky — rozlišení přes WHERE VLTYP_KONK.
      Pro JOIN z informace_ke_konkurenci použij FK IDXXKONKURENT_D (dodavatel) nebo IDXXKONKURENT_Z (značka).
    columns:
      - name: "id_konkurenčního_dodavatele"
        column: "IDXXKONKURENT"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor konkurenčního dodavatele"
  
      - name: "název_konkurenčního_dodavatele"
        column: "NAZEV_KONKURENTA"
        type: "varchar(60)"
        description: "Název konkurenčního dodavatele"
        searchable: true
        search_hint: "Hledání konkurenčního dodavatele podle názvu. Příklad: WHERE NAZEV_KONKURENTA LIKE '%Danone%'"
  
      - name: "typ_konkurence"
        column: "VLTYP_KONK"
        type: "smallint"
        description: "Typ konkurence (1 = Dodavatel aktivní, 11 = Dodavatel neaktivní)"

  konkurenční_značka:
    table: "QXXKONKURENT WHERE VLTYP_KONK=0"
    entity_type: structural
    name_column: "název_konkurenční_značky"
    description: |
      Evidence konkurenčních značek a jejich vlastností.
      ⚠ Tabulka QXXKONKURENT je sdílená pro dodavatele i značky — rozlišení přes WHERE VLTYP_KONK.
      Pro JOIN z informace_ke_konkurenci použij FK IDXXKONKURENT_D (dodavatel) nebo IDXXKONKURENT_Z (značka).
    columns:
      - name: "id_konkurenční_značky"
        column: "IDXXKONKURENT"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor konkurenční značky"
  
      - name: "název_konkurenční_značky"
        column: "NAZEV_KONKURENTA"
        type: "varchar(60)"
        description: "Název konkurenční značky"
        searchable: true
        search_hint: "Hledání konkurenční značky podle názvu. Příklad: WHERE NAZEV_KONKURENTA LIKE '%Activia%'"
  
      - name: "typ_konkurence"
        column: "VLTYP_KONK"
        type: "smallint"
        description: "Typ konkurence (0 = Značka aktivní, 10 = Značka neaktivní)"

  typ_informace_o_konkurenci:
    table: "XXKONKINFOTYP"
    entity_type: config
    description: |
      Povolené typy informací o konkurenci.
    columns:
      - name: "id_typu_informace"
        column: "IDXXKONKINFOTYP"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor typu informace o konkurenci"

      - name: "typ_informace"
        column: "VLTYP_INFO"
        type: "smallint"
        description: | 
          Typ informace o konkurenci:
          10 = Zjištění dodavatel
          20 = Zjištění značka
          30 = Povolená kombinace
          40 = Zájmový konkurent

      - name: "vlastnost_informace"
        column: "VLVLASTNOST_INFO"
        type: "smallint"
        description: |
          Vlastnost pro typ informace o konkurenci:
          -1 = Nelze vybrat
          0 = Neutrální zjištění
          10 = Silné stránky
          11 = Slabé stránky
          20 = Výhody
          21 = Nevýhody

      - name: "oblast_informace"
        column: "VLOBLAST_INFO"
        type: "smallint"
        description: |
          Oblast pro typ informace o konkurenci:
          -1 =  Nelze vybrat
          10 = Nabízený sortiment
          20 = Cenová politika
          30 = Marketingová podpora
          40 = Prodejní servis
          50 = Logistický servis

      - name: "tržní_skupina"
        column: "VLTRZNI_SKUPINA"
        type: "smallint"
        description: |
          Tržní skupina pro typ informace o konkurenci:
          -1 = Nelze vybrat
          0 = Nepovinný
          1 = Povinný

      - name: "obchodní_kanál"
        column: "VLKANAL"
        type: "smallint"
        description: |
          Obchodní kanál pro typ informace o konkurenci:
          -1 = Nelze vybrat
          0 = Nepovinný
          1 = Povinný

      - name: "produkt"
        column: "VLPRODUKT"
        type: "smallint"
        description: |
          Produkt pro typ informace o konkurenci:
          -1 = Nelze vybrat
          0 = Nepovinný
          1 = Povinný

      - name: "podprodukt"
        column: "VLPODPRODUKT"
        type: "smallint"
        description: |
          Podprodukt pro typ informace o konkurenci:
          -1 = Nelze vybrat
          0 = Nepovinný
          1 = Povinný

      - name: "dodavatel"
        column: "VLDODAVATEL"
        type: "smallint"
        description: |
          Dodavatel pro typ informace o konkurenci:
          -1 = Nelze vybrat
          0 = Nepovinný
          1 = Povinný

      - name: "značka"
        column: "VLZNACKA"
        type: "smallint"
        description: |
          Značka pro typ informace o konkurenci:
          -1 = Nelze vybrat
          0 = Nepovinný
          1 = Povinný

      - name: "zjištění"
        column: "VLZJISTENI"
        type: "smallint"
        description: |
          Zjištění pro typ informace o konkurenci:
          -1 = Nelze vybrat
          0 = Nepovinný
          1 = Povinný

  informace_ke_konkurenci:
    table: "QXXKONKINFO"
    entity_type: config
    description: |
      Evidence informací ke konkurenci.
    columns:
      - name: "id_informace_ke_konkurenci"
        column: "IDXXKONKINFO"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor informace ke konkurenci"

      - name: "id_konkurenčního_dodavatele"
        column: "IDXXKONKURENT_D"
        type: "int"
        description: "Vazba na konkurenčního dodavatele"

      - name: "id_konkurenční_značky"
        column: "IDXXKONKURENT_Z"
        type: "int"
        description: "Vazba na konkurenční značku"

      - name: "id_tržní_skupiny"
        column: "IDSKUPZNACZBOZI"
        type: "int"
        description: "Vazba na tržní skupinu"

      - name: "zjištění"
        column: "ZJISTENI"
        type: "varchar(max)"
        description: "Textový popis zjištění ke konkurenčnímu dodavateli nebo značce"

      - name: "id_obchodního_kanálu"
        column: "IDCENSKUP"
        type: "int"
        description: "Vazba na obchodní kanál"

      - name: "id_produktu"
        column: "IDSKUPZBOZI"
        type: "int"
        description: "Vazba na produkt"

      - name: "id_podproduktu"
        column: "IDXXPODSKUPZBOZI"
        type: "int"
        description: "Vazba na podprodukt"

      - name: "typ_informace"
        column: "VLTYP_INFO"
        type: "smallint"
        description: | 
          Typ informace o konkurenci:
          10 = Zjištění dodavatel
          20 = Zjištění značka
          30 = Povolená kombinace
          40 = Zájmový konkurent

      - name: "vlastnost_informace"
        column: "VLVLASTNOST_INFO"
        type: "smallint"
        description: |
          Vlastnost pro typ informace o konkurenci:
          -1 = Nelze vybrat
          0 = Neutrální zjištění
          10 = Silné stránky
          11 = Slabé stránky
          20 = Výhody
          21 = Nevýhody

      - name: "oblast_informace"
        column: "VLOBLAST_INFO"
        type: "smallint"
        description: |
          Oblast pro typ informace o konkurenci:
          -1 = Nelze vybrat
          10 = Nabízený sortiment
          20 = Cenová politika
          30 = Marketingová podpora
          40 = Prodejní servis
          50 = Logistický servis

      - name: "platnost_od"
        column: "DTPLATI_OD"
        type: "date"
        description: "Platnost informace od"

      - name: "platnost_do"
        column: "DTPLATI_DO"
        type: "date"
        description: "Platnost informace do"  

      - name: "aktualizováno"
        column: "DTAKTUALIZACE"
        type: "date"
        description: "Datum poslední změny na řádku"  
        
relationships:

  informace_ke_konkurenci_konkurencni_dodavatel:
    from: "informace_ke_konkurenci"
    to: "konkurenční_dodavatel"
    type: "many-to-one"
    join: "QXXKONKINFO.IDXXKONKURENT_D = QXXKONKURENT.IDXXKONKURENT"
    description: "Informace ke konkurenci odkazuje na konkurenčního dodavatele"

  informace_ke_konkurenci_konkurencni_znacka:
    from: "informace_ke_konkurenci"
    to: "konkurenční_značka"
    type: "many-to-one"
    join: "QXXKONKINFO.IDXXKONKURENT_Z = QXXKONKURENT.IDXXKONKURENT"
    description: "Informace ke konkurenci odkazuje na konkurenční značku"

  informace_ke_konkurenci_trzni_skupina:
    from: "informace_ke_konkurenci"
    to: "tržní_skupina"
    type: "many-to-one"
    join: "QXXKONKINFO.IDSKUPZNACZBOZI = QSKUPZNACZBOZI_DF.IDSKUPZNACZBOZI"
    description: "Informace ke konkurenci odkazuje na tržní skupinu"

  informace_ke_konkurenci_obchodni_kanal:
    from: "informace_ke_konkurenci"
    to: "obchodní_kanál"
    type: "many-to-one"
    join: "QXXKONKINFO.IDCENSKUP = QCENSKUP_DF.IDCENSKUP"
    description: "Informace ke konkurenci odkazuje na obchodní kanál"

  informace_ke_konkurenci_produkt:
    from: "informace_ke_konkurenci"
    to: "produkt"
    type: "many-to-one"
    join: "QXXKONKINFO.IDSKUPZBOZI = QSKUPZBOZI_DF.IDSKUPZBOZI"
    description: "Informace ke konkurenci odkazuje na produkt"

  informace_ke_konkurenci_podprodukt:
    from: "informace_ke_konkurenci"
    to: "podprodukt"
    type: "many-to-one"
    join: "QXXKONKINFO.IDXXPODSKUPZBOZI = QXXPODSKUPZBOZI.IDXXPODSKUPZBOZI"
    description: "Informace ke konkurenci odkazuje na podprodukt"

  informace_ke_konkurenci_typ_informace:
    from: "informace_ke_konkurenci"
    to: "typ_informace_o_konkurenci"
    type: "many-to-one"
    join: |
      QXXKONKINFO.VLTYP_INFO = XXKONKINFOTYP.VLTYP_INFO AND
      QXXKONKINFO.VLVLASTNOST_INFO = XXKONKINFOTYP.VLVLASTNOST_INFO AND
      QXXKONKINFO.VLOBLAST_INFO = XXKONKINFOTYP.VLOBLAST_INFO
    note: "Zdrojová tabulka QXXKONKINFO neobsahuje FK IDXXKONKINFOTYP – join přes přirozený klíč (3 business sloupce)."
    description: "Informace ke konkurenci používá typ informace o konkurenci"
