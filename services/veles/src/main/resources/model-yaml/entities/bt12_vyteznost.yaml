entities:

  výtěžnost_regálu:
    table: "QDF_VYTEZNOST_REGALU"
    entity_type: transaction
    composite_primary_key: ["zkratka_dodacího_místa", "id_artiklu"]
    description: |
      Výtěžnost regálové plochy pro dodací místo a artikl.
      Určí se poslední návštěva DM s evidencí distribuce. Ke zjištěným návštěvám
      se doplní artikly z XXPLNPOLDISTR (bez prodejních akcí, ISNULL(VLPRODAKCE,0)=0)
      a prodeje z XXPRODEJE (kde ISNULL(HDTRZBA_24M,0)>0).
      Koeficient roční tržby (HDTRZBA_12M_KOEF, hodnoty 0–3) se stanoví dle data
      první dodávky. Přepočtená roční tržba = HDTRZBA_24M / HDTRZBA_12M_KOEF.
      Tržba na cm = přepočtená tržba 12M / délka regálu [Kč/cm].
    columns:
      - name: "id_obchodního_kanálu"
        column: "IDCENSKUP"
        type: "int"
        description: "Identifikace obchodního kanálu"

      - name: "zkratka_dodacího_místa"
        label: "Zkratka"
        column: "SUBJADR_POZNAMKA"
        type: "varchar(60)"
        primary_key: true
        description: "Zkratka dodacího místa"

      - name: "id_produktu"
        column: "IDSKUPZBOZI"
        type: "int"
        description: "Identifikace produktu"

      - name: "id_podproduktu"
        column: "IDXXPODSKUPZBOZI"
        type: "int"
        description: "Identifikace podproduktu"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        primary_key: true
        description: "Identifikace artiklu"

      - name: "facing"
        label: "Facing"
        column: "MNFACING"
        type: "decimal(19,5)"
        description: "Počet čelních pozic artiklu na DM (z poslední návštěvy s evidencí distribuce)"

      - name: "tržba_24_měsíců"
        column: "HDTRZBA_24M"
        type: "money"
        description: "Tržba artiklu na DM za posledních 24 měsíců (z XXPRODEJE, kde HDTRZBA_24M > 0)"

      - name: "první_dodávka"
        column: "DTPRVNI_DOD"
        type: "date"
        description: "Datum první dodávky artiklu na DM"

      - name: "poslední_dodávka"
        column: "DTPOSLEDNI_DOD"
        type: "date"
        description: "Datum poslední dodávky artiklu na DM"

      - name: "množství_poslední_dodávky"
        column: "MNPOSLEDNI_DOD"
        type: "decimal(19,5)"
        description: "Množství poslední dodávky artiklu na DM"

      - name: "koeficient_roční_tržby"
        column: "HDTRZBA_12M_KOEF"
        type: "money"
        description: |
          Koeficient roční tržby (hodnoty 0–3):
          - DTPRVNI_DOD > dnes - 365 dnů → 1
          - DTPRVNI_DOD <= dnes - 365 a > dnes - 730 → (počet dnů od DTPRVNI_DOD) / 365
          - DTPRVNI_DOD <= dnes - 730 dní → 3

      - name: "délka_regálu"
        column: "MNDELKA_REG_ART"
        type: "decimal(38,8)"
        description: "Délka regálu v cm pro artikl a DM = facing × šířka artiklu"

      - name: "přepočtená_tržba_12m"
        column: "HDTRZBA_12M_PREP"
        type: "money"
        description: "Přepočtená roční tržba = HDTRZBA_24M / HDTRZBA_12M_KOEF"

      - name: "tržba_na_cm"
        label: "Tržba na cm"
        column: "HDVYTEZNOST_REGALU"
        type: "money"
        description: "Tržba na cm regálové plochy artiklu na DM [Kč/cm] = HDTRZBA_12M_PREP / MNDELKA_REG_ART"

  výtěžnost_regálu_kanál:
    table: "QDF_VYTEZNOST_REGALU_KANAL"
    entity_type: transaction
    composite_primary_key: ["id_obchodního_kanálu", "id_artiklu"]
    description: |
      Výtěžnost regálové plochy agregovaná za obchodní kanál a artikl.
      Pohled agreguje data z QDF_VYTEZNOST_REGALU za kanál a artikl.
      Hodnoty se počítají pouze z artiklů, které mají evidovaný facing > 0.
      Slouží k určení průměrné výtěžnosti artiklu v kanálu pro artikly
      s potenciálem k nabídce.
    columns:
      - name: "id_obchodního_kanálu"
        column: "IDCENSKUP"
        type: "int"
        primary_key: true
        description: "Identifikace obchodního kanálu"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        primary_key: true
        description: "Identifikace artiklu"

      - name: "odebírá_počet_dm_kanál"
        label: "Odebírá DM"
        column: "ODEBIRA_POCET_DM_KANAL"
        type: "int"
        description: "Počet DM v kanálu, které pro artikl mají tržbu 12M > 0"

      - name: "celkem_počet_dm_kanál"
        column: "CELKEM_POCET_DM_KANAL"
        type: "int"
        description: "Celkový počet DM v kanálu"

      - name: "délka_regálu_kanál"
        column: "MNDELKA_REG_ART_KANAL"
        type: "decimal(38,5)"
        description: "Celková délka regálu artiklu v kanálu v cm (SUM, nikoli AVG)"

      - name: "přepočtená_tržba_12m_kanál"
        label: "Prům. tržba DM"
        column: "HDTRZBA_12M_PREP_KANAL"
        type: "money"
        description: "Průměrná přepočtená roční tržba artiklu v kanálu"

      - name: "tržba_na_cm_kanál"
        label: "Tržba na cm kanál"
        column: "HDVYTEZNOST_REGALU_KANAL"
        type: "money"
        description: "Tržba na cm regálové plochy artiklu v kanálu [Kč/cm] = SUM(HDTRZBA_12M_PREP WHERE facing>0) / NULLIF(SUM(MNDELKA_REG_ART), 0)"

relationships:

  vyteznost_regalu_dodaci_misto:
    from: "výtěžnost_regálu"
    to: "dodací_místo"
    type: "many-to-one"
    join: "QDF_VYTEZNOST_REGALU.SUBJADR_POZNAMKA = QSUBJADR_DF.SUBJADR_POZNAMKA"
    note: "JOIN přes varchar (SUBJADR_POZNAMKA) je záměrný — tabulka QDF_VYTEZNOST_REGALU neobsahuje IDSUBJADR, používá SUBJADR_POZNAMKA jako součást kompozitního PK."
    description: "Tržba na cm patří k dodacímu místu (join přes zkratku DM)"

  vyteznost_regalu_obchodni_kanal:
    from: "výtěžnost_regálu"
    to: "obchodní_kanál"
    type: "many-to-one"
    join: "QDF_VYTEZNOST_REGALU.IDCENSKUP = QCENSKUP_DF.IDCENSKUP"
    description: "Tržba na cm patří k obchodnímu kanálu"

  vyteznost_regalu_produkt:
    from: "výtěžnost_regálu"
    to: "produkt"
    type: "many-to-one"
    join: "QDF_VYTEZNOST_REGALU.IDSKUPZBOZI = QSKUPZBOZI_DF.IDSKUPZBOZI"
    description: "Tržba na cm odkazuje na produkt"

  vyteznost_regalu_podprodukt:
    from: "výtěžnost_regálu"
    to: "podprodukt"
    type: "many-to-one"
    join: "QDF_VYTEZNOST_REGALU.IDXXPODSKUPZBOZI = QXXPODSKUPZBOZI.IDXXPODSKUPZBOZI"
    description: "Tržba na cm odkazuje na podprodukt"

  vyteznost_regalu_artikl:
    from: "výtěžnost_regálu"
    to: "artikl"
    type: "many-to-one"
    join: "QDF_VYTEZNOST_REGALU.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Tržba na cm odkazuje na artikl"

  vyteznost_regalu_kanal_obchodni_kanal:
    from: "výtěžnost_regálu_kanál"
    to: "obchodní_kanál"
    type: "many-to-one"
    join: "QDF_VYTEZNOST_REGALU_KANAL.IDCENSKUP = QCENSKUP_DF.IDCENSKUP"
    description: "Tržba na cm kanál patří k obchodnímu kanálu"

  vyteznost_regalu_kanal_artikl:
    from: "výtěžnost_regálu_kanál"
    to: "artikl"
    type: "many-to-one"
    join: "QDF_VYTEZNOST_REGALU_KANAL.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Tržba na cm kanál odkazuje na artikl"
