entities:
  denní_výkaz_oz:
    table: "QXXDENNIPLANOZ"
    entity_type: transaction
    name_column: "datum_výkazu"
    description: |
      Evidence denních výkazů obchodních zástupců.
    columns:
      - name: "id_denního_výkazu_oz"
        column: "IDXXDENNIPLANOZ"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor denního výkazu obchodního zástupce"
  
      - name: "id_obchodního_zástupce"
        column: "IDUZIVATEL_DE" 
        type: "int"
        description: "Vazba na obchodního zástupce"

      - name: "datum_výkazu"
        column: "DTDEN"
        type: "date"
        description: "Datum denního výkazu obchodního zástupce"

  návštěva_zákazníka:
    table: "QXXNAVSTEVAOZ"
    entity_type: transaction
    name_column: "datum_návštěvy"
    description: |
      Evidence návštěv zákazníků obchodními zástupci.
    columns:
      - name: "id_návštěvy_zákazníka"
        column: "IDXXNAVSTEVAOZ"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor návštěvy zákazníka"
  
      - name: "id_denního_výkazu_obchodního_zástupce"
        column: "IDXXDENNIPLANOZ"
        type: "int"
        description: "Vazba na denní výkaz obchodního zástupce"

      - name: "id_obchodního_zástupce"
        column: "IDUZIVATEL_DE"
        type: "int"
        description: "Vazba na obchodního zástupce"

      - name: "jméno_obchodního_zástupce"
        column: "JMENO_UZIV_DE"
        type: "varchar(100)"
        description: "Jméno obchodního zástupce"

      - name: "id_dodacího_místa"
        column: "IDSUBJADR"
        type: "int"
        description: "Vazba na dodací místo zákazníka"

      - name: "zkratka_dodacího_místa"
        label: "Zkratka"
        column: "SUBJADR_POZNAMKA"
        type: "varchar(60)"
        description: "Zkratka dodacího místa (denormalizováno z QSUBJADR_DF)"

      - name: "datum_návštěvy"
        column: "DTUSKUTECNENO"
        type: "date"
        description: "Datum návštěvy zákazníka"

      - name: "typ_návštěvy"
        column: "VLTYP_NAVSTEVY"
        type: "smallint"
        description: |
          Typ návštěvy zákazníka:
          0 = běžná
          1 = kontrola
          2 = ostatní
          3 = bez evidence
          4 = aktivita
          5 = objednávka
          6 = objednávka NT
          Výchozí filtr pro "počet návštěv": typ IN (0, 1, 2, 4) — bez typů 3 (bez evidence), 5 a 6 (objednávky).

      - name: "stav_návštěvy"
        column: "VLSTAV_XXNAVSTEVAOZ"
        type: "smallint"
        description: |
          Stav návštěvy zákazníka:
          0 = rozpracovaná
          1 = uzavřena
          2 = splněna
          Rozpracovaná = OZ ještě nedokončil návštěvu.
          Uzavřena = OZ dokončil návštěvu, ale nesplnil všechny úkoly/cíle.
          Splněna = OZ dokončil návštěvu a splnil všechny úkoly/cíle.
          Pro "dokončené návštěvy" použij filtr: stav IN (1, 2).

  artikl_návštěvy_zákazníka:
    table: "QXXPLNPOLDISTR_AT"
    entity_type: transaction
    description: |
      Evidence artiklů spojených s návštěvou zákazníka.
    columns:
      - name: "id_artiklu_návštěvy_zákazníka"
        column: "IDXXPLNPOLDISTR"
        type: "int"
        primary_key: true
        description: "Identifikace artiklu v návštěvě"

      - name: "id_návštěvy_zákazníka"
        column: "IDXXNAVSTEVAOZ"
        type: "int"
        description: "Identifikace návštěvy"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        description: "Identifikace artiklu"

      - name: "id_podproduktu"
        column: "IDXXPODSKUPZBOZI"
        type: "int"
        description: "Identifikace podproduktu"

      - name: "zásoba_dnes"
        column: "MNKUSUDNES"
        type: "int"
        description: "Zásoba artiklu k dnešnímu dni na DM (= 0 není, =1 je)"

      - name: "poslední_dodávka"
        label: "Datum posl. dodání"
        column: "DTPOSLDODANI"
        type: "datetime"
        description: "Datum poslední dodávky artiklu (IDZBOZI) na DM (SUBJADR_POZNAMKA) = XXPRODEJE.DTPOSLEDNI_DOD"

      - name: "množství_poslední_dodávky"
        label: "Posl. dod. ks"
        column: "MNPOSLDODANI"
        type: "int"
        description: "Množství poslední dodávky artiklu (IDZBOZI) na DM (SUBJADR_POZNAMKA) = XXPRODEJE.MNPOSLEDNI_DOD"

      - name: "facing"
        label: "Facing"
        column: "MNFACING"
        type: "decimal(19, 5)"
        description: "Počet čelních pozic artiklu na DM. Výchozí hodnota přenesená z předchozí návštěvy, OZ ji může přepsat."

      - name: "význam"
        label: "Význam"
        column: "VYZNAM"
        type: "smallint"
        description: "Význam artiklu = QXXLISTING.VLVYZNAM_F"

      - name: "sezóna"
        column: "VLSEZONA"
        type: "smallint"
        description: |
          Indikace artiklu, zda-li v době generování aktivity byl validní pro výpočet distribuce.
          Naplnění podle hodnoty QXXPRODKRIVKA.VLPLATI pro prodejní křivku artiklu.
          0 = Ne
          1 = Ano

      - name: "šířka_artiklu"
        column: "MNARTIKL_SIRKA"
        type: "decimal(19, 5)"
        description: "Šířka KS artiklu v cm (ISNULL ( XXHODPARZBOZI.HODNOTA_PARZBOZI, 0 ) pro PORADI_TYPPARZBOZI = 2)"

      - name: "délka_regálu_pro_artikl"
        column: "MNDELKA_REG_ART"
        type: "decimal(18,2)"
        description: "Výpočtové pole (XXPLNPOLDISTR.MNARTIKL_SIRKA * XXPLNPOLDISTR.MNFACING)"

      - name: "počet_kusů_12_měsíců"
        column: "MNMNOZSTVI_12M"
        type: "decimal(19,5)"
        description: "Počet prodaných kusů (prodeje i dobropisy) za posledních 12 měsíců = XXPRODEJE.MNMNOZSTVI_12M"

      - name: "tržba_na_cm"
        label: "Tržba na cm"
        column: "HDVYTEZNOST_REGALU"
        type: "money"
        description: "Tržba na cm regálové plochy artiklu pro návštěvu = QDF_VYTEZNOST_REGALU.HDVYTEZNOST_REGALU pro dodací místo a artikl"

      - name: "tržba_na_cm_dm_int"
        label: "Tržba DM na cm"
        column: "HDVYTEZNOST_REGALU_INT"
        type: "money"
        description: "Vypočítaný sloupec v pohledu QXXPLNPOLDISTR_AT. Výtěžnost 1 cm regálu na DM pro artikl. Existuje pouze v CZ aplikaci (SK používá HDVYTEZNOST_REGALU)."

      - name: "přepočtená_tržba_12m_kanál"
        label: "Prům. tržba DM"
        column: "HDTRZBA_12M_PREP_KANAL"
        type: "money"
        description: "Přepočítaná tržba 12 M pro kanál a artikl = QDF_VYTEZNOST_REGALU_KANAL.HDTRZBA_12M_PREP_KANAL pro kanál a artikl"

      - name: "tržba_na_cm_kanál"
        label: "Tržba na cm kanál"
        column: "HDVYTEZNOST_REGALU_KANAL_INT"
        type: "money"
        description: "Tržba na cm regálové plochy pro kanál a artikl = QDF_VYTEZNOST_REGALU_KANAL.HDVYTEZNOST_REGALU_KANAL pro kanál a artikl"

      - name: "počet_odebírajících_dm_v_kanálu"
        label: "Odebírá DM"
        column: "ODEBIRA_POCET_DM_KANAL"
        type: "int"
        description: "Počet DM v kanálu, které pro artikl mají tržbu 12M > 0 = QDF_VYTEZNOST_REGALU_KANAL.ODEBIRA_POCET_DM_KANAL pro kanál a artikl"

  úkol_návštěvy_zákazníka:
    table: "QXXPLNUKOLOZ"
    entity_type: transaction
    description: |
      Evidence úkolů spojených s návštěvou zákazníka.
    columns:
      - name: "id_úkolu_návštěvy_zákazníka"
        column: "IDXXPLNUKOLOZ"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor úkolu návštěvy zákazníka"

      - name: "id_návštěvy_zákazníka"
        column: "IDXXNAVSTEVAOZ"
        type: "int"
        description: "Vazba na návštěvu zákazníka"

      - name: "popis_úkolu"
        column: "SPEC_ZADANIUKOLOZ"
        type: "varchar(1042)"
        description: "Popis úkolu"

  podnět_návštěvy_zákazníka:
    table: "QXXPODNET"
    entity_type: transaction
    description: |
      Evidence podnětů spojených s návštěvou zákazníka.
    columns:
      - name: "id_podnětu_návštěvy_zákazníka"
        column: "IDXXPODNET"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor podnětu návštěvy zákazníka"

      - name: "id_návštěvy_zákazníka"
        column: "IDXXNAVSTEVAOZ"
        type: "int"
        description: "Vazba na návštěvu zákazníka"

      - name: "id_produktu"
        column: "IDSKUPZBOZI"
        type: "int"
        description: "Vazba na produkt"

      - name: "popis_podnětu"
        column: "PODNET"
        type: "varchar(max)"
        description: "Popis podnětu"

  produkt_návštěvy_zákazníka:
    table: "QXXNOZPRIPRAVA"
    entity_type: transaction
    description: |
      Evidence produktů spojených s návštěvou zákazníka.
    columns:
      - name: "id_produktu_návštěvy_zákazníka"
        column: "IDXXNOZPRIPRAVA"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor produktu v návštěvě zákazníka"

      - name: "id_návštěvy_zákazníka"
        column: "IDXXNAVSTEVAOZ"
        type: "int"
        description: "Vazba na návštěvu zákazníka"

      - name: "id_produktu"
        column: "IDSKUPZBOZI"
        type: "int"
        description: "Vazba na produkt"

      - name: "význam_produktu"
        column: "VLVYZNAM_PR"
        type: "smallint"
        description: "Význam produktu v kanálu = QXXMEZABC.VLVYZNAM_F WHERE VLTYP_NASTAVENI = 21 pro kanál a produkt"

      - name: "pořadí_produktu"
        column: "PORADI_PR"
        type: "int"
        description: "Pořadí produktu v kanálu = XXNOZPRIPRAVA.PORADI_PR"

      - name: "vyhrazený_prostor"
        label: "Celkem cm"
        column: "VYHRAZENO"
        type: "int"
        description: "Délkové cm regálu, které jsou vyhrazeny na DM pro daný produkt = XXNOZPRIPRAVA.VYHRAZENO"

      - name: "rezerva_tržby_produktu"
        label: "Rezerva tržby"
        column: "HDTRZBA_POTENCIAL_PROD"
        type: "int"
        description: "Rezerva tržby (nevyužitá rezerva tržby produktu) = CONVERT(int, ROUND(SUM(QXXNOZPODPROD.HDTRZBA_POTENCIAL_PODPROD), 0))"

      - name: "výtěžnost_tržby"
        label: "Tržba DF %"
        column: "HDTRZBA_VYTEZNOST_PROD"
        type: "int"
        description: "Výtěžnost tržby v celých % = CONVERT(int, ROUND(SUM(HDTRZBA_12M_PODPROD) / NULLIF(SUM(HDTRZBA_CILOVYNORMATIV_PODPROD), 0) * 100, 0))"

      - name: "název_produktu"
        label: "Produkt"
        column: "NAZEV_SKUP_ZBOZI"
        type: "varchar(255)"
        description: "Název produktu = SKUPZBOZI.NAZEV_SKUP_ZBOZI"

      - name: "distribuce_procent"
        label: "Distribuce %"
        column: "DI_PRODUKT"
        type: "int"
        description: "Distribuční index produktu v celých % = CONVERT(int, 100.0 * SUM(SKORE) / NULLIF(SUM(VYZNAM), 0))"

      - name: "obsadil_df_cm"
        label: "Délka DF cm"
        column: "MNOBSADIL_DF_CM_PROD"
        type: "int"
        description: "Délka regálu obsažená DF za návštěvu a produkt = SUM(QXXNOZPODPROD.MNOBSADIL_DF_CM_PODPROD)"

      - name: "podíl_df_procent"
        label: "Délka DF %"
        column: "PODIL_DF_PROD"
        type: "int"
        description: "Podíl DF na vyhrazeném prostoru produktu v celých % = CONVERT(int, ROUND(SUM(MNOBSADIL_DF_CM_PODPROD) / CONVERT(MONEY, NULLIF(VYHRAZENO, 0)) * 100.00, 0))"

      - name: "tržba_na_cm_produktu"
        label: "Tržba na cm"
        column: "HDVYTEZNOST_REGALU_PROD"
        type: "money"
        description: "Tržba na cm regálové plochy za návštěvu a produkt [Kč/cm] = SUM ( QXXNOZPODPROD.HDTRZBA_12M_PREP_PODPROD ) / SUM ( QXXNOZPODPROD.MNOBSADIL_DF_CM_PODPROD ) za DM a produkt"

  podprodukt_návštěvy_zákazníka:
    table: "QXXNOZPODPROD"
    entity_type: transaction
    description: |
      Evidence podproduktů spojených s návštěvou zákazníka.
      VIEW nad XXNOZPODPROD s JOINy na XXNOZPRIPRAVA, XXPODSKUPZBOZI, XXNAVSTEVAOZ
      a subquery DISTRIBUCE z XXPLNPOLDISTR (facing, distribuce, obsazení regálu).
      Filtr: pouze podprodukty s VLVYZNAM_PODPROD > 0.
      Sloupce odvozené z XXPLNPOLDISTR vrací NULL, pokud HDNORMATIV_TRZBY_PODPROD = 0.
    columns:
      - name: "id_podproduktu_návštěvy_zákazníka"
        column: "IDXXNOZPODPROD"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor podproduktu v návštěvě zákazníka"

      - name: "id_produktu_návštěvy_zákazníka"
        column: "IDXXNOZPRIPRAVA"
        type: "int"
        description: "Vazba na produkt spojený s návštěvou zákazníka"

      - name: "id_podproduktu"
        column: "IDXXPODSKUPZBOZI"
        type: "int"
        description: "Vazba na podprodukt"

      - name: "pořadí_podproduktu"
        label: "Pořadí"
        column: "PORADI_PODPROD"
        type: "int"
        description: "Pořadí podproduktu v rámci produktu na DM = XXNOZPODPROD.PORADI_PODPROD"

      - name: "id_návštěvy_zákazníka"
        column: "IDXXNAVSTEVAOZ"
        type: "int"
        description: "Vazba na návštěvu zákazníka = XXNOZPRIPRAVA.IDXXNAVSTEVAOZ (přes JOIN na XXNOZPRIPRAVA)"

      - name: "normativ_tržby_podproduktu"
        column: "HDNORMATIV_TRZBY_PODPROD"
        type: "money"
        description: "Normativ tržby podproduktu = XXNOZPODPROD.HDNORMATIV_TRZBY_PODPROD"

      - name: "význam_podproduktu"
        column: "VLVYZNAM_PODPROD"
        type: "smallint"
        description: "Význam podproduktu v kanálu = XXNOZPODPROD.VLVYZNAM_PODPROD"

      - name: "tržba_12m_podproduktu"
        label: "Skutečná tržba"
        column: "HDTRZBA_12M_PODPROD"
        type: "int"
        description: "Tržba podproduktu na DM za posledních 12 měsíců zaokrouhlená na celé Kč = CONVERT(int, ROUND(XXNOZPODPROD.HDTRZBA_12M_PODPROD, 0))"

      - name: "rezerva_tržby_podproduktu"
        label: "Rezerva tržby"
        column: "HDTRZBA_POTENCIAL_PODPROD"
        type: "int"
        description: "Rezerva tržby podproduktu zaokrouhlená na celé Kč = CONVERT(int, ROUND(XXNOZPODPROD.HDTRZBA_POTENCIAL_PODPROD, 0))"

      - name: "výtěžnost_tržby_podproduktu"
        label: "Tržba DF %"
        column: "HDTRZBA_VYTEZNOST_PODPROD"
        type: "int"
        description: "Na kolik % aktuální tržba využívá rezervu tržby = CONVERT(int, XXNOZPODPROD.HDTRZBA_VYTEZNOST_PODPROD)"

      - name: "počet_artiklů_podproduktu"
        label: "Dodaných artiklů"
        column: "POCET_ART_PODPROD"
        type: "int"
        description: "Počet artiklů podproduktu na DM s facingem > 0 = SUM(CASE WHEN ISNULL(XXPLNPOLDISTR.MNFACING,0) > 0 THEN 1 END) z XXPLNPOLDISTR per IDXXNAVSTEVAOZ + IDXXPODSKUPZBOZI. NULL pokud HDNORMATIV_TRZBY_PODPROD = 0."

      - name: "distribuce_procent_podproduktu"
        label: "Distribuce %"
        column: "DI_PODPRODUKT"
        type: "int"
        description: "Distribuce podproduktu na DM v % = CONVERT(int, 100.0 * DISTRIBUCE.SKORE / NULLIF(DISTRIBUCE.VYZNAM, 0)) z XXPLNPOLDISTR. SKORE = SUM(VYZNAM) artiklů se zásobou, bez prodejní akce a s platnou sezónou."

      - name: "přepočtená_tržba_12m_podproduktu"
        column: "HDTRZBA_12M_PREP_PODPROD"
        type: "money"
        description: "Přepočtená tržba podproduktu za 12 měsíců = XXNOZPODPROD.HDTRZBA_12M_PREP_PODPROD"

      - name: "cílová_normativní_tržba"
        label: "Plánovaná tržba"
        column: "HDTRZBA_CILOVYNORMATIV_PODPROD"
        type: "int"
        description: "Plánovaná tržba podproduktu zaokrouhlená na celé Kč = CONVERT(int, ROUND(XXNOZPODPROD.HDTRZBA_CILOVYNORMATIV_PODPROD, 0))"

      - name: "kód_podproduktu"
        column: "KOD_PODSKUPZBOZI"
        type: "varchar(20)"
        description: "Kód podproduktu = XXPODSKUPZBOZI.KOD_PODSKUPZBOZI"

      - name: "název_podproduktu"
        label: "Podprodukt"
        column: "NAZEV_PODSKUPZBOZI"
        type: "varchar(90)"
        description: "Název podproduktu = XXPODSKUPZBOZI.NAZEV_PODSKUPZBOZI"

      - name: "tržba_na_cm_podproduktu"
        label: "Tržba na cm"
        column: "HDVYTEZNOST_REGALU_PODPROD"
        type: "money"
        description: "Tržba na cm regálové plochy podproduktu [Kč/cm] = ROUND(XXNOZPODPROD.HDTRZBA_12M_PREP_PODPROD / NULLIF(DISTRIBUCE.MNOBSADIL_DF_CM_PODPROD, 0), 0|2). NULL pokud HDNORMATIV_TRZBY_PODPROD = 0. DISTRIBUCE.MNOBSADIL_DF_CM_PODPROD = SUM(MNARTIKL_SIRKA * MNFACING) z XXPLNPOLDISTR."

      - name: "obsadil_df_cm_podproduktu"
        column: "MNOBSADIL_DF_CM_PODPROD"
        type: "decimal(38,9)"
        description: "Délka regálu obsažená DF za podprodukt v cm = SUM(XXPLNPOLDISTR.MNARTIKL_SIRKA * XXPLNPOLDISTR.MNFACING) per IDXXNAVSTEVAOZ + IDXXPODSKUPZBOZI. NULL pokud HDNORMATIV_TRZBY_PODPROD = 0."

      - name: "přepočtená_tržba_12m_dm"
        column: "HDTRZBA_12M_PREP_DM"
        type: "money"
        description: "Přepočtená tržba 12M za celé dodací místo = SUM(HDTRZBA_12M_PREP_PODPROD) OVER (PARTITION BY IDXXNAVSTEVAOZ)"

      - name: "obsadil_df_cm_dm"
        column: "MNOBSADIL_DF_CM_DM"
        type: "decimal(38,9)"
        description: "Délka regálu obsazená DF za celé DM v cm = SUM(MNOBSADIL_DF_CM_PODPROD) OVER (PARTITION BY IDXXNAVSTEVAOZ)"

      - name: "tržba_na_cm_dm"
        column: "HDVYTEZNOST_REGALU_DM"
        type: "money"
        description: "Tržba na cm regálové plochy celého DM [Kč/cm] = HDTRZBA_12M_PREP_DM / NULLIF(MNOBSADIL_DF_CM_DM, 0)"

      - name: "obsadil_df_cm_podproduktu_int"
        label: "Délka DF cm"
        column: "MNOBSADIL_DF_CM_PODPROD_INT"
        type: "int"
        description: "Výpočtové pole: CAST(MNOBSADIL_DF_CM_PODPROD AS int)"

      - name: "podíl_tržby_na_cm_podproduktu"
        column: "HDVYTEZNOST_REGALU_PODPROD_PODIL"
        type: "money"
        description: "Výpočtové pole: podíl tržby na cm podproduktu vůči DM = CAST(ROUND(100.0 * HDVYTEZNOST_REGALU_PODPROD / NULLIF(HDVYTEZNOST_REGALU_DM, 0), 2) AS DECIMAL(18,2))"

  konkurence_návštěvy_zákazníka:
    table: "QXXKONKNADM"
    entity_type: transaction
    description: |
      Evidence konkurence spojené s návštěvou zákazníka.
    columns:
      - name: "id_konkurence_návštěvy_zákazníka"
        column: "IDXXKONKNADM"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor konkurence v návštěvě zákazníka"

