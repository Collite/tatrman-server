entities:

  rezerva_tržby:
    table: "XXREZERVA_TRZBY"
    entity_type: transaction
    composite_primary_key: ["zkratka_dm", "id_obchodního_kanálu", "id_podproduktu"]
    description: |
      Výpočet rezervy tržeb a vytěženosti pro dodací místa a podprodukty.
      Tabulka XXREZERVA_TRZBY obsahuje všechny sloupce včetně indikačních a výpočtových.
    columns:
      - name: "zkratka_dm"
        label: "Zkratka"
        column: "SUBJADR_POZNAMKA"
        type: "varchar(30)"
        primary_key: true
        description: "Identifikace dodacího místa"

      - name: "id_obchodního_kanálu"
        column: "IDCENSKUP"
        type: "int"
        primary_key: true
        description: "Identifikace obchodního kanálu"

      - name: "id_podproduktu"
        column: "IDXXPODSKUPZBOZI"
        type: "int"
        primary_key: true
        description: "Identifikace podproduktu"

      - name: "dm_s_neúplnými_daty"
        column: "DM_NEUPLNA_DATA"
        type: "int"
        description: |
          Indikace, zda-li se jedná o DM s úplnými nebo neúplnými daty:
          0 = Ne, 1 = Ano
          Hodnota "Ano" nastane, pokud:
            • Dodací místo nemá tržbu 12M: ISNULL(PRODEJE.HDTRZBA_12M_DM, 0) <= 0
            • Nebo první dodávka je < 120 dnů od dnešního dne:
              ISNULL(PRODEJE.DTPRVNI_DOD, CONVERT(Date, GETDATE()))
              BETWEEN DATEADD(DAY, -120, CONVERT(Date, GETDATE())) AND CONVERT(Date, GETDATE())
            • Nebo podíl prodávaných zájmových podproduktů na DM vůči celkovému počtu
              zájmových podproduktů v kanálu je < 25 %:
              CONVERT(MONEY, PRODEJE.POCET_PODPROD_DM) / NULLIF(LISTING.POCET_PODPROD_KANAL, 0) * 100.00 < 25.00

      - name: "dm_s_evidovanou_konkurencí"
        column: "DM_KONKURENCE_ZAEVIDOVANA"
        type: "int"
        description: |
          Indikace, zda-li je na DM kompletně zaevidovaná konkurence:
          0 = Ne, 1 = Ano
          Zohledňuje evidovaný vyhrazený prostor v produktu na poslední návštěvě DM
          a pokud není, tak se používá délka regálové plochy evidovaná na dodacím místě.
            • Z poslední návštěvy se zjistí celkový počet produktů.
            • Z poslední návštěvy se zjistí počet produktů s evidovanou konkurencí
              (na produktu není evidován <neurčený> dodavatel a <neurčená> značka).
            • Z hlavičky adresy se zjistí délka regálové plochy v metrech
              (SUBJADRADD.DELKA_REGALU * 100 cm/m). Použije se pokud není konkurence
              zaevidovaná na 100 %.
            • Pokud počet vyplněných produktů = počet produktů celkem, vezme se
              hodnota VYHRAZENO, jinak NULL a použije se DELKA_REGALU.
              Pokud celkový výsledek > 0, DM má vyplněnou konkurenci.
          WHEN ISNULL(
               CASE
                    WHEN EVIDENCE_KONKURENCE.KONKURENCE_PRODUKTY_CELKEM
                         = EVIDENCE_KONKURENCE.KONKURENCE_PRODUKTY_VYPLNENO
                    THEN NULLIF(EVIDENCE_KONKURENCE.VYHRAZENO, 0)
               END,
               DELKA_REGALU.VYHRAZENO
          ) > 0 THEN 1

      - name: "datum_první_dodávky"
        column: "DTPRVNI_DOD"
        type: "date"
        description: "Datum první dodávky na dodacím místě: MIN(XXPRODEJE.DTPRVNI_DOD)"

      - name: "počet_podproduktů_dm"
        column: "POCET_PODPROD_DM"
        type: "int"
        description: |
          Počet zájmových podproduktů, které na dodacím místě mají tržbu 12M > 0:
          COUNT(DISTINCT CASE WHEN XXPRODEJE.HDTRZBA_12M > 0 AND QXXMEZABC.VLVYZNAM_F > 0
                THEN XXPRODEJE.IDXXPODSKUPZBOZI END)

      - name: "počet_podproduktů_kanál"
        column: "POCET_PODPROD_KANAL"
        type: "int"
        description: |
          Počet zájmových podproduktů v kanálu s aktivním listingem k dnešnímu dni:
          COUNT(DISTINCT ZBOZIADD.IDXXPODSKUPZBOZI) kde QXXMEZABC.VLVYZNAM_F > 0

      - name: "konkurence_produkty_celkem"
        column: "KONKURENCE_PRODUKTY_CELKEM"
        type: "int"
        description: "Počet produktů poslední návštěvy: COUNT(DISTINCT XXKONKNADM.IDSKUPZBOZI)"

      - name: "konkurence_produkty_vyplněno"
        column: "KONKURENCE_PRODUKTY_VYPLNENO"
        type: "int"
        description: |
          Počet produktů poslední návštěvy s evidovanou konkurencí:
          COUNT(DISTINCT CASE
               WHEN XXKONKURENT_D.NAZEV_KONKURENTA <> '(neurčený)'
                    AND XXKONKURENT_Z.NAZEV_KONKURENTA <> '(neurčená)'
               THEN XXKONKNADM.IDSKUPZBOZI
          END)

      - name: "vyhrazený_prostor"
        label: "Celkem cm"
        column: "VYHRAZENO"
        type: "int"
        description: |
          Celkový vyhrazený prostor na dodacím místě:
          ISNULL(
               CASE
                    WHEN EVIDENCE_KONKURENCE.KONKURENCE_PRODUKTY_CELKEM
                         = EVIDENCE_KONKURENCE.KONKURENCE_PRODUKTY_VYPLNENO
                    THEN NULLIF(EVIDENCE_KONKURENCE.VYHRAZENO, 0)
               END,
               DELKA_REGALU.VYHRAZENO
          )

      - name: "tržba_12m_podproduktu"
        label: "Skutečná tržba"
        column: "HDTRZBA_12M_PODPROD"
        type: "money"
        description: "Skutečná tržba podproduktu na DM za posledních 12 měsíců"

      - name: "normativ_tržby"
        column: "HDNORMATIV_TRZBY"
        type: "money"
        description: "Cílová (normativní) tržba podproduktu na DM — určuje očekávanou úroveň prodejů. Zdroj: QXXMEZABC.HDNORMATIV_TRZBY_F (VLTYP_NASTAVENI = 22), jen zájmové podprodukty v kanálu."

      - name: "celková_tržba_na_dm"
        column: "HDTRZBA_12M_DM"
        type: "money"
        description: "SUM ( HDTRZBA_12M_PODPROD ) Celkový součet prodejů za dodací místo"

      - name: "celkový_normativ_tržby_dm"
        column: "HDNORMATIV_TRZBY_DM"
        type: "money"
        description: "SUM ( HDNORMATIV_TRZBY ) Celkový součet normativů tržby za dodací místo"

      - name: "normativní_tržba"
        column: "HDTRZBA_NORMATIV"
        type: "money"
        description: "Výpočtové pole podle pravidla: HDNORMATIV_TRZBY / 100 * ( HDTRZBA_12M_DM / ( HDNORMATIV_TRZBY_DM / 100 ) )"

      - name: "nadnormativní_podprodukt"
        column: "VLPODPROD_NADNORMATIV"
        type: "smallint"
        description: "Výpočtové pole: 1 = nadnormativní (HDTRZBA_12M_PODPROD >= HDTRZBA_NORMATIV), 0 = pod normou, NULL = nedefinováno"

      - name: "upravená_nadnormativní_tržba"
        column: "HDTRZBA_NORMATIV_UPRAV"
        type: "money"
        description: "Výpočtové pole podle pravidla: WHEN ISNULL ( HDTRZBA_NORMATIV, 0) <= 0 THEN 0 WHEN HDTRZBA_12M_PODPROD > HDTRZBA_NORMATIV AND HDTRZBA_12M_PODPROD / HDTRZBA_NORMATIV > 1.33 THEN HDTRZBA_NORMATIV * 1.33 ELSE HDTRZBA_12M_PODPROD"

      - name: "celková_potenciální_tržba_dm"
        column: "HDTRZBA_POTENCIAL_DM"
        type: "money"
        description: "WHEN ISNULL(HDTRZBA_12M_PODPROD,0) = 0 THEN 0 ELSE SUM(HDTRZBA_NORMATIV_UPRAV) pro VLPODPROD_NADNORMATIV = 1 za dodací místo / SUM(HDNORMATIV_TRZBY / 100) pro VLPODPROD_NADNORMATIV = 1 za dodací místo"

      - name: "cílový_normativ_podproduktu"
        label: "Plánovaná tržba"
        column: "HDTRZBA_CILOVYNORMATIV_PODPROD"
        type: "money"
        description: "HDTRZBA_POTENCIAL_DM * HDNORMATIV_TRZBY / 100 — cílová tržba podproduktu odvozená z celkového potenciálu DM"

      - name: "rezerva_tržby_podproduktu"
        label: "Rezerva tržby"
        column: "HDTRZBA_POTENCIAL_PODPROD"
        type: "money"
        description: "HDTRZBA_CILOVYNORMATIV_PODPROD - HDTRZBA_12M_PODPROD — rezerva tržby podproduktu (kladná = prostor pro růst, záporná = překonává cíl)"

      - name: "výtěžnost_procent"
        label: "Tržba DF %"
        column: "HDTRZBA_VYTEZNOST_PODPROD"
        type: "money"
        description: "HDTRZBA_12M_PODPROD / HDTRZBA_CILOVYNORMATIV_PODPROD * 100 zaokrouhlené na 1 desetinné číslo"

relationships:
  rezerva_trzby_dodaci_misto:
    from: "rezerva_tržby"
    to: "dodací_místo"
    type: "many-to-one"
    join: "XXREZERVA_TRZBY.SUBJADR_POZNAMKA = QSUBJADR_DF.SUBJADR_POZNAMKA"
    note: "JOIN přes varchar (SUBJADR_POZNAMKA) je záměrný — tabulka XXREZERVA_TRZBY neobsahuje IDSUBJADR, používá SUBJADR_POZNAMKA jako součást kompozitního PK."
    description: "Rezerva tržby patří k dodacímu místu"

  rezerva_trzby_obchodni_kanal:
    from: "rezerva_tržby"
    to: "obchodní_kanál"
    type: "many-to-one"
    join: "XXREZERVA_TRZBY.IDCENSKUP = QCENSKUP_DF.IDCENSKUP"
    description: "Rezerva tržby patří k obchodnímu kanálu"

  rezerva_trzby_podprodukt:
    from: "rezerva_tržby"
    to: "podprodukt"
    type: "many-to-one"
    join: "XXREZERVA_TRZBY.IDXXPODSKUPZBOZI = QXXPODSKUPZBOZI.IDXXPODSKUPZBOZI"
    description: "Rezerva tržby patří k podproduktu"
    note: "Cesta rezerva_tržby → produkt vede přes podprodukt: XXREZERVA_TRZBY.IDXXPODSKUPZBOZI → QXXPODSKUPZBOZI → QXXMEZABC.IDXXPODSKUPZBOZI (+ IDSKUPZBOZI) → QSKUPZBOZI_DF. Přímý relationship není potřeba."
