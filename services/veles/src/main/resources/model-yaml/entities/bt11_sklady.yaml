# Entita: Sklady, skladová dostupnost, plán materiálového toku, čárové kódy obalů
# Projekt: df-tablet-projekt
# Agent:   ai-ag-rmt-overovac-dostupnosti-artiklu
# Vytvořeno: 27.04.2026 DS

entities:

  sklad:
    table: "QSKLAD_DF"
    entity_type: structural
    aliases: ["skladiště", "warehouse"]
    name_column: "název_skladu"
    code_column: "kód_skladu"
    label_plural: "skladů"
    description: |
      Číselník skladů / skladových lokací.
      Hlavní sklady:
        20 = sklad expedice (hlavní)
        03 = sklad výroby
        07 = sklad prodejna Neubuz
        33 = sklad expedice reklamační
    columns:
      - name: "id_skladu"
        column: "IDSKLAD"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor skladu"

      - name: "kód_skladu"
        column: "CIS_SKLAD"
        type: "varchar(10)"
        description: "Kód skladu"
        searchable: true
        search_hint: "Kód skladu. Příklad: WHERE CIS_SKLAD = '20'"

      - name: "název_skladu"
        label: "Sklad"
        column: "NAZEV_SKLAD"
        type: "varchar(100)"
        description: "Název skladu"
        searchable: true
        search_hint: "Název skladu. Příklad: WHERE NAZEV_SKLAD LIKE '%expedice%'"

  zásoba_na_skladě:
    table: "QZBOZSKL_DF"
    entity_type: transaction
    composite_primary_key: ["id_artiklu", "id_skladu"]
    aliases: ["skladová zásoba", "stock per warehouse"]
    description: |
      Aktuální stav zásob artiklu na skladě.
      ⚠ Primární zdroj pro ověření dostupnosti artiklu.
      ⚠ Nepoužívej pro evidenci výpadků a plánované doplnění — k tomu slouží
        entita zásoba_artiklu (BT02, tabulka XXVYPADKYZASOB).
      Klíčový ukazatel: DISPONIBILNI = „Disponibilní pro ověření"
        = skutečný volný stav pro ještě nepředané zakázky na sklad.
      Sekundární ukazatel: DISPONIBILNI_WMS = „Disponibilní stav"
        = fyzický stav skladu 20+03 (bez rez. palet)
          − zakázky 2 prac. dny vpřed (sklad 20)
          − zakázky SK/HU nepředané do CZ
          − zakázky 5 dní zpět bez výdejky
          − zakázky >2 prac. dny vpřed předané na expedici.
        Aktualizace: každých 15 minut, Po–Pá.
    columns:
      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        primary_key: true
        description: "Vazba na artikl"

      - name: "id_skladu"
        column: "IDSKLAD"
        type: "int"
        primary_key: true
        description: "Vazba na sklad"

      - name: "kód_skladu"
        column: "CIS_SKLAD"
        type: "varchar(10)"
        description: "Kód skladu (denormalizováno)"

      - name: "název_skladu"
        column: "NAZEV_SKLAD"
        type: "varchar(100)"
        description: "Název skladu (denormalizováno)"

      - name: "kód_artiklu"
        column: "CIS_ZBOZI"
        type: "varchar(30)"
        description: "Kód artiklu (denormalizováno)"

      - name: "název_artiklu"
        column: "NAZEV_ZBOZI"
        type: "varchar(255)"
        description: "Název artiklu (denormalizováno)"

      - name: "fyzický_stav"
        column: "MNFYZICKYSTAV"
        type: "decimal(19,5)"
        description: "Celkové fyzické množství na skladě"

      - name: "blokováno"
        column: "MNBLOKOVANO"
        type: "decimal(19,5)"
        description: "Blokované/rezervované množství"

      - name: "volné"
        column: "MNFYZVOLNYSTAV"
        type: "decimal(19,5)"
        description: "Fyzický stav − Blokováno"

      - name: "disponibilní_pro_ověření"
        column: "DISPONIBILNI"
        type: "decimal(19,5)"
        description: |
          Primární ukazatel dostupnosti.
          Skutečný volný stav pro ještě nepředané zakázky na sklad.
          Nezohledňuje nahozené zakázky nepředané k vychystání.

      - name: "disponibilní_stav"
        column: "DISPONIBILNI_WMS"
        type: "decimal(19,5)"
        description: |
          Disponibilní stav WMS. Aktualizace: 15 min, Po–Pá.

      - name: "disponibilní_palety"
        column: "DISPONIBILNI_PAL"
        type: "decimal(19,5)"
        description: "Disponibilní množství v paletách"

      - name: "fyzický_stav_palety"
        column: "MNFYZICKYSTAV_PAL"
        type: "decimal(19,5)"
        description: "Fyzický stav v paletách"

      - name: "rezervace_b2c"
        column: "MNREZERVACE_B2C"
        type: "decimal(19,5)"
        description: "Množství rezervované pro B2C objednávky"

  plán_materiálového_toku:
    table: "QXXPLANMATTOKU"
    entity_type: transaction
    aliases: ["plán doplnění", "replenishment plan", "materiálový tok"]
    description: |
      Plán materiálového toku – potvrzené i navrhované příjmy a výdeje.
      ⚠ Primární zdroj pro informaci o plánovaném doplnění zásob.
      Typy plánů (VLTYPPLANUMT):
        1 = plán výdejů
        2 = plán příjmů zboží          ← příjmy Výrobek/Zboží
        3 = plán výdejů surovin
        4 = plán příjmů surovin        ← příjmy Materiál
        5 = plán výdejů polotovarů
        6 = plán příjmů polotovarů     ← příjmy Polotovar
      Pro doplnění používáme: VLTYPPLANUMT IN (2, 4, 6) = všechny příjmy
      View obsahuje denormalizované sloupce: CIS_ZBOZI, NAZEV_ZBOZI, VLPODTYP_SLOZ,
        CIS_SKLAD, NAZEV_SKLAD, SUBJ_NAZEV_DOD, KOD_MJ.
    columns:
      - name: "id_plánu"
        column: "IDXXPLANMATTOKU"
        type: "int"
        primary_key: true
        description: "Unikátní identifikátor záznamu plánu"

      - name: "typ_plánu"
        column: "VLTYPPLANUMT"
        type: "smallint"
        description: "Typ plánu (1–6, viz popis entity)"

      - name: "zdroj_plánu"
        column: "VLZDROJPLANUMT"
        type: "smallint"
        description: "Zdroj plánu"

      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        description: "Vazba na artikl"

      - name: "kód_artiklu"
        column: "CIS_ZBOZI"
        type: "varchar(30)"
        description: "Kód artiklu (denormalizováno)"

      - name: "název_artiklu"
        column: "NAZEV_ZBOZI"
        type: "varchar(255)"
        description: "Název artiklu (denormalizováno)"

      - name: "typ_artiklu"
        column: "VLPODTYP_SLOZ"
        type: "smallint"
        description: "Typ artiklu (1=Výrobek, 2=Zboží, 3=Materiál, 4=Polotovar)"

      - name: "id_skladu"
        column: "IDSKLAD"
        type: "int"
        description: "Vazba na sklad"

      - name: "kód_skladu"
        column: "CIS_SKLAD"
        type: "varchar(10)"
        description: "Kód skladu (denormalizováno)"

      - name: "název_skladu"
        column: "NAZEV_SKLAD"
        type: "varchar(100)"
        description: "Název skladu (denormalizováno)"

      - name: "datum_pohybu"
        column: "DTDATPOHYBU"
        type: "datetime"
        description: "Datum plánovaného pohybu (příjem/výdej)"

      - name: "výdej"
        column: "MNVYDEJMT"
        type: "decimal(19,5)"
        description: "Plánovaný výdej"

      - name: "příjem"
        column: "MNPRIJEMMT"
        type: "decimal(19,5)"
        description: "Potvrzený příjem (plánované doplnění)"

      - name: "návrh_doplnění"
        column: "MNNAVRHDOPLN"
        type: "decimal(19,5)"
        description: "Navrhované doplnění"

      - name: "budoucí_návrh_doplnění"
        column: "MNBUDNAVDOPLN"
        type: "decimal(19,5)"
        description: "Budoucí navrhované doplnění"

      - name: "celkový_plán_doplnění"
        column: "MNCELKPLANDOPLN"
        type: "decimal(19,5)"
        description: "Celkový plánovaný objem doplnění"

      - name: "šarže"
        column: "CIS_SARZE"
        type: "varchar(30)"
        description: "Číslo šarže"

      - name: "měrná_jednotka"
        column: "KOD_MJ"
        type: "varchar(10)"
        description: "Kód měrné jednotky"

      - name: "termín_příkazu"
        column: "DTTERMINPRIKAZU"
        type: "datetime"
        description: "Termín příkazu (výrobního/nákupního)"

      - name: "stav_příkazu"
        column: "VLSTAVPRIKAZU"
        type: "smallint"
        description: "Stav příkazu (1=výroba, 2=nákup potvrzený, 3=nákup v procesu)"

      - name: "datum_dodání"
        column: "DTDATUMDODANI"
        type: "datetime"
        description: "Očekávané datum dodání (u nákupu)"

      - name: "dodavatel"
        column: "SUBJ_NAZEV_DOD"
        type: "varchar(255)"
        description: "Název dodavatele (denormalizováno, u nakupovaných artiklů)"

      - name: "fyzický_stav_skladu"
        column: "MNFYZSTAVSKLAD"
        type: "decimal(19,5)"
        description: "Aktuální fyzický stav na skladě (snapshot)"

      - name: "počáteční_stav"
        column: "MNPOCATSTAV"
        type: "decimal(19,5)"
        description: "Počáteční stav zásoby"

      - name: "minimální_stav"
        column: "MNMINSTAV"
        type: "decimal(19,5)"
        description: "Minimální stav zásoby"

      - name: "optimální_stav"
        column: "MNOPTIMSTAV"
        type: "decimal(19,5)"
        description: "Optimální stav zásoby"

  čárový_kód_obalu:
    table: "QZBOZIVMJ_DF"
    entity_type: config
    composite_primary_key: ["id_artiklu", "čárový_kód_obalu"]
    aliases: ["čárový kód MJ", "barcode per unit"]
    description: |
      Evidence čárových kódů per měrná jednotka (obal).
      Slouží k identifikaci artiklu přes čárový kód obalu,
      když hlavní CARKOVY_KOD v QZBOZI_DF neodpovídá.
    columns:
      - name: "id_artiklu"
        column: "IDZBOZI"
        type: "int"
        primary_key: true
        description: "Vazba na artikl"

      - name: "čárový_kód_obalu"
        column: "CARKOVY_KODMJ"
        type: "varchar(30)"
        primary_key: true
        description: "Čárový kód pro danou měrnou jednotku/obal"
        searchable: true
        search_hint: "EAN kód obalu. Příklad: WHERE CARKOVY_KODMJ = '8594014720044'"

      - name: "kód_měrné_jednotky"
        column: "KOD_MJ"
        type: "varchar(10)"
        description: "Kód měrné jednotky (KS, KRT, PAL, ...)"

relationships:

  zásoba_na_skladě_artikl:
    from: "zásoba_na_skladě"
    to: "artikl"
    type: "many-to-one"
    join: "QZBOZSKL_DF.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Zásoba na skladě patří ke konkrétnímu artiklu"

  zásoba_na_skladě_sklad:
    from: "zásoba_na_skladě"
    to: "sklad"
    type: "many-to-one"
    join: "QZBOZSKL_DF.IDSKLAD = QSKLAD_DF.IDSKLAD"
    description: "Zásoba na skladě patří ke konkrétnímu skladu"

  plán_materiálového_toku_artikl:
    from: "plán_materiálového_toku"
    to: "artikl"
    type: "many-to-one"
    join: "QXXPLANMATTOKU.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Záznam plánu se vztahuje ke konkrétnímu artiklu"

  plán_materiálového_toku_sklad:
    from: "plán_materiálového_toku"
    to: "sklad"
    type: "many-to-one"
    join: "QXXPLANMATTOKU.IDSKLAD = QSKLAD_DF.IDSKLAD"
    description: "Záznam plánu se vztahuje ke konkrétnímu skladu"

  čárový_kód_obalu_artikl:
    from: "čárový_kód_obalu"
    to: "artikl"
    type: "many-to-one"
    join: "QZBOZIVMJ_DF.IDZBOZI = QZBOZI_DF.IDZBOZI"
    description: "Čárový kód obalu patří ke konkrétnímu artiklu"
