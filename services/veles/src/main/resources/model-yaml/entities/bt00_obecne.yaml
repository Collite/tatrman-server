# Globální pravidla (přidáno do systémového promptu)
pravidla:
  dph: "Všechny finanční částky v databázi jsou BEZ DPH (bez daně z přidané hodnoty), pokud není u sloupce výslovně uvedeno jinak."
  vyznam: "Sloupce VLVYZNAM_* (význam): celočíselná škála, 0 = nerelevantní/nezajímavý, > 0 = relevantní (čím vyšší hodnota, tím důležitější). Pro filtr 'důležité/zájmové' použij WHERE VLVYZNAM_* > 0."
  vychozi_obdobi: "Pokud uživatel nespecifikuje časové období, dotazuj data za AKTUÁLNÍ KALENDÁŘNÍ ROK (WHERE YEAR(datum_sloupec) = YEAR(GETDATE()))."
  datum_typy: "DB sloupce s prefixem DT* jsou fyzicky datetime, ale YAML je uvádí jako date (používá se pouze datová část). Při filtrování vždy porovnávej přes CAST(sloupec AS DATE) nebo CONVERT(Date, sloupec)."

# Běžné agregace a jejich použití
agregace:
  počet:
    aliases: ["kolik", "počet záznamů"]
    sql_function: "COUNT"
    description: "Spočítá počet záznamů"
    
  součet:
    aliases: ["celkem", "suma", "total"]
    sql_function: "SUM"
    description: "Sečte hodnoty"
    
  průměr:
    aliases: ["průměrný", "average"]
    sql_function: "AVG"
    description: "Vypočítá průměrnou hodnotu"
    
  maximum:
    aliases: ["max", "nejvíc", "největší"]
    sql_function: "MAX"
    description: "Najde maximální hodnotu"
    
  minimum:
    aliases: ["min", "nejméně", "nejmenší"]
    sql_function: "MIN"
    description: "Najde minimální hodnotu"

# Časová období
# POZN: {datum_sloupec} je placeholder — LLM musí dosadit správný datumový sloupec dané entity
# (např. DTZDANITPLN pro zakázky/faktury, DTUSKUTECNENO pro návštěvy, DTDEN pro denní výkaz)
časová_období:
  dnes:
    sql_expression: "CAST(GETDATE() AS DATE)"
    
  včera:
    sql_expression: "CAST(DATEADD(day, -1, GETDATE()) AS DATE)"
    
  tento_týden:
    sql_expression: "DATEPART(week, {datum_sloupec}) = DATEPART(week, GETDATE()) AND YEAR({datum_sloupec}) = YEAR(GETDATE())"
    note: "Předpokládá SET DATEFIRST 1 (pondělí). Pokud není nastaveno, přidej na začátek dotazu."
    
  tento_měsíc:
    sql_expression: "MONTH({datum_sloupec}) = MONTH(GETDATE()) AND YEAR({datum_sloupec}) = YEAR(GETDATE())"
    
  tento_rok:
    sql_expression: "YEAR({datum_sloupec}) = YEAR(GETDATE())"

  minulý_měsíc:
    aliases: ["předchozí měsíc"]
    sql_expression: "MONTH({datum_sloupec}) = MONTH(DATEADD(month, -1, GETDATE())) AND YEAR({datum_sloupec}) = YEAR(DATEADD(month, -1, GETDATE()))"

  minulý_rok:
    aliases: ["loni", "předchozí rok", "loňský rok"]
    sql_expression: "YEAR({datum_sloupec}) = YEAR(GETDATE()) - 1"

  posledních_7_dní:
    aliases: ["poslední týden", "za týden"]
    sql_expression: "{datum_sloupec} >= DATEADD(day, -7, GETDATE())"

  čtvrtletí:
    aliases: ["kvartál", "Q"]
    sql_expression: "DATEPART(quarter, {datum_sloupec}) = DATEPART(quarter, GETDATE()) AND YEAR({datum_sloupec}) = YEAR(GETDATE())"
    note: "Aktuální čtvrtletí. Pro konkrétní Qn použij DATEPART(quarter, ...) = n."

  posledních_30_dní:
    sql_expression: "{datum_sloupec} >= DATEADD(day, -30, GETDATE())"

# Výběr záznamu (modifikátory pro omezení počtu vrácených záznamů)
výběr_záznamu:
  první:
    aliases: ["první", "nejstarší"]
    sql: "TOP 1 ... ORDER BY {datum_sloupec} ASC"
    description: "Vrátí jeden nejstarší záznam"

  poslední:
    aliases: ["poslední", "nejnovější"]
    sql: "TOP 1 ... ORDER BY {datum_sloupec} DESC"
    description: "Vrátí jeden nejnovější záznam"

