ktor {
    deployment {
        port = 7260
        port = ${?VELES_HTTP_PORT}
    }
    application {
        modules = [ org.tatrman.veles.ApplicationKt.module ]
    }
}

grpc {
    port = 7261
    port = ${?VELES_GRPC_PORT}
    max-message-size-bytes = 33554432
    reflection-enabled = false
    reflection-enabled = ${?GRPC_REFLECTION_ENABLED}
}

metadata {
    descriptor {
        id = "v1-metadata"
        name = "v1 metadata model"
        description = "v1 metadata service model bundle"
    }

    # DF-M06 / Phase 07 B3 — periodic source re-load on top of the on-demand Refresh RPC. Default
    # 300s so the live GitHub model source (below) is tracked without a pod restart: each tick does a
    # cheap git fetch+reset and the reconcile is skipped when the commit SHA is unchanged. This also
    # auto-recovers from the bundled fallback back to the GitHub primary once it's reachable again.
    # Set to 0 to disable (sources refreshed only via explicit Refresh RPC).
    refresh-scheduler {
        interval-seconds = 300
        interval-seconds = ${?METADATA_REFRESH_INTERVAL_SECONDS}
    }

    sources {
        // Phase 1.2 v1.2 MVP: a single TTR-source path. Future
        // GitArchiveStorage / LiveDatabaseSource sources land via additional
        // `sources.*` blocks. YamlImportSource (Stage B) is wired below.
        ttr-fixture {
            enabled = false
            type = "filesystem"
            kind = "ttr"
            id = "ttr-fixture"
            priority = 100
            path = ${?METADATA_TTR_ROOT}
            // When unset, the service can boot in fixture-only mode by reading
            // from src/test/resources/fixture-model — useful for local dev.
        }

        // Primary model source — the DFPartner/ai-models GitHub repo, cloned at boot and
        // re-fetched on each scheduled refresh so the live model tracks the repo without a pod
        // restart. `remote-uri` defaults to the public clone URL; auth is env-only (PAT in
        // `METADATA_GIT_TOKEN`, username defaults to "x-access-token"). When the repo is
        // unreachable or unconfigured (blank remote-uri / no token), the service serves the bundled
        // `model-ttr` fallback below — the two are NEVER merged (see FallbackSource). fabric-infra
        // overrides remote-uri/branch/token per cluster.
        github-model {
            type = "git"
            // Parser kind for the repo contents: "ttr" (default) or "yaml-legacy" (legacy YAML
            // model ingested via YamlImportSource — same dispatch as the `yaml-legacy` block below).
            // Override with METADATA_GIT_KIND=yaml-legacy to read legacy YAML straight from the repo.
            kind = "ttr"
            kind = ${?METADATA_GIT_KIND}
            id = "github-model"
            enabled = true
            priority = 100
            remote-uri = "https://github.com/DFPartner/ai-models.git"
            remote-uri = ${?METADATA_GIT_REMOTE_URI}
            branch = "main"
            branch = ${?METADATA_GIT_BRANCH}
            subdirectory = ""
            subdirectory = ${?METADATA_GIT_SUBDIR}
            username = "x-access-token"
            username = ${?METADATA_GIT_USERNAME}
            password = ${?METADATA_GIT_TOKEN}
            local-checkout-dir = ${?METADATA_GIT_CHECKOUT_DIR}
            fallback = "model-ttr"
        }

        // Bundled TTR model — converted from the legacy YAML via `just yaml-to-ttr` (one package
        // directory per source file under resources/model-ttr). FALLBACK ONLY: not loaded as an
        // independent (merged) source; served only when `github-model` above is unavailable.
        model-ttr {
            type = "resources"
            kind = "ttr"
            id = "model-ttr"
            enabled = false
            path = "model-ttr"
            priority = 100
        }

        // Stage B (removed in Phase 2.1 fork) — legacy YAML model ingestion. Superseded by
        // `model-ttr` above; the legacy YAML parser path is gone. The `model-yaml` resource
        // dir stays in tree as a reference for the `just yaml-to-ttr` migration recipe.
        //
        // (yaml-legacy source block removed: TTR-only fork, Bora 2026-06-13)

        // Built-in stock roles from classpath resources.
        builtin-stock {
            type = "resources"
            kind = "ttr"
            id = "builtin-stock"
            path = "builtin"
            priority = 1000
        }
    }

}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_METADATA}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}
