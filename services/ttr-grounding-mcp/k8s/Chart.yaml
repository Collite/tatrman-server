apiVersion: v2
name: ttr-grounding-mcp
description: |
  The Tatrman ttr-grounding-mcp grounding service (RG-P3 workstream D) — an env-agnostic Helm chart.
  Holds no cluster knowledge: image, replicas, resources, telemetry endpoint, the metadata/
  llm-gateway wiring are all values. Per-environment values live in the deploying repo.
  Reuses the ttr-service library chart, mirroring services/veles/k8s.
type: application
version: 0.1.0
appVersion: "dev"
dependencies:
  - name: ttr-service
    version: 0.1.0
    repository: "file://../../../shared/charts/ttr-service"
