ktor {
    deployment {
        host = "0.0.0.0"
        port = "7153"
        port = ${?MCP_GROUNDING_SERVER_PORT}
    }
}

server {
    port = "7153"
    port = ${?MCP_GROUNDING_SERVER_PORT}
}

# The three deterministic grounding services this MCP wraps. One GroundingService proto, three
# gRPC endpoints. Ports mirror the services' application.conf (chrono 7220 / geo 7221 / money 7222).
grounding {
    chrono {
        host = "chrono"
        host = ${?CHRONO_HOST}
        host = ${?CHRONO_SERVER}
        port = "7220"
        port = ${?CHRONO_GRPC_PORT}
        port = ${?CHRONO_SERVER_GRPC_PORT}
    }
    geo {
        host = "geo"
        host = ${?GEO_HOST}
        host = ${?GEO_SERVER}
        port = "7221"
        port = ${?GEO_GRPC_PORT}
        port = ${?GEO_SERVER_GRPC_PORT}
    }
    money {
        host = "money"
        host = ${?MONEY_HOST}
        host = ${?MONEY_SERVER}
        port = "7222"
        port = ${?MONEY_GRPC_PORT}
        port = ${?MONEY_SERVER_GRPC_PORT}
    }
    # Per-tool deadline for the downstream Ground call.
    deadline-seconds = 20
    deadline-seconds = ${?GROUNDING_GRPC_DEADLINE_SECONDS}
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_GROUNDING_MCP}
    otlp {
        protocol = ${?GROUNDING_MCP_OTEL_PROTOCOL}
    }
}

security {
    enabled = false
    enabled = ${?SECURITY_ENABLED}
    api-keys = ${?API_KEYS}
    service {
        name = "grounding-mcp"
        name = ${?SECURITY_SERVICE_NAME}
    }
}
