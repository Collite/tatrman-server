name: Publish server libraries (GH Packages)

# Publishes the moved shared libs + proto stubs (org.tatrman:*) that kantheon
# consumes, to GitHub Packages `Collite/tatrman-server` (RO-17: GH Packages =
# staging registry). Tag-driven, mirroring tatrman's publish.yml.
#
# Tag → set:
#   server-libs/v<x.y.z>   the 11-module library set (SV-P1 S2 T1 audit):
#     ttr-server-proto · otel-config · logging-config · ktor-configurator ·
#     db-common · data-formatter · fuzzy-common · whois-common · keycloak-auth ·
#     ttr-meta-client · ttr-llm-client
#   (capabilities-client trimmed — no external consumer; see build.gradle.kts.)
#
# Version comes from the tag via -Ptatrman-server.version (the build reads that
# gradle property, NOT -Pversion). RO-24: never re-cut an existing version.
#
# Lane gating (SV — Central quota, 2026-07-13, mirrors tatrman/publish.yml;
# polarity flipped 2026-07-16 — justfile sync): EVERY tag publishes to the
# GitHub Packages staging lane. A tag additionally publishes to Maven Central
# ONLY when it carries an explicit `-RELEASE` marker (e.g.
# `server-libs/v0.9.2-RELEASE`) — the marker is stripped before the version
# reaches any registry (Central gets bare `0.9.2`, same as GH Packages).
# Un-marked bare tags (`server-libs/v0.9.5`) are now internal-only: most cuts
# are fast-iteration internal patches for kantheon to pin, so a public release
# must be marked explicitly rather than inferred from the absence of a
# prerelease suffix. Central's free tier (~1,167 files / ~78 MB / ~7 releases
# per month, 3-month rolling average) still can't absorb fast-iteration
# publishing. See tatrman's PUBLISHING.md § Release lanes for the full rationale.

on:
  push:
    tags:
      - 'server-libs/v*'

permissions:
  contents: read
  packages: write

jobs:
  # The publish path MUST NOT be reachable with a red gate (T3). Re-runs the two
  # enforcing checks from ci.yml (persona grep gate + P2/RO-6 dependency rules).
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: enforce no retired personas on wire/build surfaces
        run: |
          matches=$(grep -rn -iE 'ariadne|theseus|proteus|argos|kyklop|\barges|brontes|steropes|echo\b|kadmos|prometheus' \
            --include='*.proto' --include='*.kt' --include='*.kts' --include='*.py' --include='*.conf' \
            --include='*.yaml' --include='*.toml' --include='Dockerfile*' --include='*.tpl' --include='logback.xml' . \
            | grep -viE 'CHANGELOG|docs/|history|lore|Forked 2026|formerly|_to_delete' \
            | grep -viE 'PrometheusMeterRegistry|PrometheusConfig|PrometheusHealthCheck|prometheus\.io|:9090|/metrics|actuator|micrometer|registry.prometheus|MeterRegistry|prometheus (meter|call|scrape|registry|endpoint)|monitoring|include:.*prometheus' \
            | grep -viE 'prometheusUrl|hasPath\("prometheus|getConfig\("prometheus|config\.prometheus|"prometheus" ->|prometheus \{|PromQL|prometheus-client|prometheus_client|prometheus-jvm|prometheus - Prom' \
            | grep -viE '"prometheus",|Prometheus (metrics|exposition)|the fabric-infra estate' \
            || true)
          if [ -n "$matches" ]; then
            echo "::error::retired persona strings on a wire/build surface — publish blocked (naming ledger §5):"
            echo "$matches" | head -50
            exit 1
          else
            echo "grep-gate: clean"
          fi
      - name: check dependency rules (P2/RO-6)
        run: bash scripts/check-dependency-rules.sh

  publish:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v5

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          RAW_VERSION="${TAG##*/v}"
          # -RELEASE is a tag-level marker only — strip it before the version
          # reaches any registry. Its presence, not the absence of a prerelease
          # suffix, is what gates the Central lane (2026-07-16 polarity flip).
          if [[ "$RAW_VERSION" == *-RELEASE ]]; then
            PUBLIC=true
            VERSION="${RAW_VERSION%-RELEASE}"
          else
            PUBLIC=false
            VERSION="$RAW_VERSION"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "public=${PUBLIC}" >> "$GITHUB_OUTPUT"
          echo "Publishing server libraries version ${VERSION} (public=${PUBLIC})"

      - name: Publish to GH Packages (staging lane)
        # GH-Packages-SPECIFIC task, not the generic `publish` aggregate: vanniktech
        # registers a `mavenCentral` repository, so `publish` now also pulls in
        # `prepareMavenCentralPublishing` (needs `mavenCentralUsername`, absent in
        # this step) and the whole step fails. The Central lane below runs the
        # separate `publishToMavenCentral` aggregate with the credentials.
        run: ./gradlew --no-configuration-cache -Ptatrman-server.version=${{ steps.ver.outputs.version }} publishAllPublicationsToGitHubPackagesRepository
        env:
          # Read the org.tatrman:ttr-* toolchain (Collite/tatrman) to compile the
          # libs, AND write the org.tatrman:* libs to Collite/tatrman-server.
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SV-P1 S4 — public lane (RO-17). The root aggregate
      # `publishAndReleaseToMavenCentral` uploads ONE signed bundle of all 11 libs
      # to the Central Portal and AUTO-RELEASES it (enabled 2026-07-12 after the
      # first manual release). Skipped until the four credential secrets are set, so
      # the GH Packages lane above stays green in the interim. Secret names ARE the
      # Gradle property names so they flow straight through as `ORG_GRADLE_PROJECT_*` env.
      #
      # ALSO skipped unless the tag carried a `-RELEASE` marker (public=false
      # above) — un-marked internal patches stay on the GH Packages staging lane
      # to protect the Central monthly quota. Only a `-RELEASE` tag reaches Maven
      # Central, published there under the stripped bare x.y.z version.
      - name: Publish to Maven Central (Central Portal)
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralUsername }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralPassword }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKey }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKeyPassword }}
        if: ${{ env.ORG_GRADLE_PROJECT_mavenCentralUsername != '' && steps.ver.outputs.public == 'true' }}
        run: ./gradlew --no-configuration-cache -Ptatrman-server.version=${{ steps.ver.outputs.version }} publishAndReleaseToMavenCentral
