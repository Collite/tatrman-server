name: tatrman-server-ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Manual + nightly triggers for the heavy `helm-install` kind gate (SV-P4·S2·T7).
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Authenticates to the `Collite/tatrman` GitHub Packages repo for the TTR
      # toolchain (org.tatrman:ttr-*). A standing third-party dep (settings.gradle.kts).
      packages: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: build
        run: ./gradlew build
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # RG-P6.S2.T1 — the gating service-level conformance tier (the SV-P3 parity
  # instrument): the three service-level corpora (ENTITIES_ONLY resolver + Q-17
  # fuzzy + grounding hermetic), self-contained with NO DFP dependency. Green
  # required. See conformance/README.md.
  conformance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: extractions/setup-just@v2

      - name: conformance (service-level, gating)
        run: just conformance-service-level
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # P2/RO-6 dependency rules (contracts §7). Passes trivially on the S1 skeleton;
  # its real bite is S4 once the spine services + protos have arrived.
  dependency-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: check dependency rules
        run: bash scripts/check-dependency-rules.sh

  # DCO gate (SV-P2·S2, RO-18): every non-merge commit in a PR must carry a
  # `Signed-off-by:` trailer (`git commit -s`). Agent-authored patches included —
  # the human submitter's sign-off carries the DCO. See CONTRIBUTING.md.
  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: check Signed-off-by on every commit
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          missing=0
          while read -r sha; do
            [ -n "$sha" ] || continue
            if ! git show -s --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha is missing a Signed-off-by trailer"
              missing=1
            fi
          done < <(git rev-list --no-merges "$base..$head")
          if [ "$missing" -ne 0 ]; then
            echo "DCO check failed — sign off every commit with 'git commit -s' (see CONTRIBUTING.md)."
            exit 1
          fi
          echo "DCO: all commits signed off"

  # License-header gate (SV-P2·S1, RO-18): every tracked *.kt/*.kts/*.py/*.proto/*.ts
  # source file must carry `SPDX-License-Identifier: Apache-2.0` in its first 3 lines.
  # Generated (build/, **/generated/**, *_pb2*) and third-party scaffolds
  # (infra/backstage/** — "The Backstage Authors", Apache-2.0 upstream) are excluded.
  # `scripts/add-spdx.sh` applies the header idempotently.
  spdx:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: enforce SPDX license headers
        run: bash scripts/check-spdx.sh

  # SV-P4·S2·T1 — the umbrella-chart gate. `helm lint` + a golden-template drift
  # check: scripts/helm-golden.sh vendors the file:// subchart deps (offline) and
  # diffs three pinned values fixtures (spine-only · everything · honest-degrade)
  # against committed golden output. A chart change not reflected in golden fails
  # here — regenerate with `scripts/helm-golden.sh` and review the diff. Helm is
  # pinned to match the version golden was generated with (output is version-sensitive).
  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
        with:
          version: v4.2.1
      - name: helm lint
        run: helm lint helm/tatrman-server
      - name: golden templates (drift check)
        run: scripts/helm-golden.sh --check

  # SV-P4·S2·T7 — the kind install gate. Proves the umbrella actually INSTALLS and a
  # light subset reaches Ready (not just templates). Heavy, so it does NOT run on every
  # PR — only on a `chart-install` label, manual dispatch, or the nightly schedule.
  # Subset + rationale: helm/tatrman-server/deploy/values-kind-ci.yaml. (If the
  # ghcr.io/collite/* images are ever made private, add a docker-registry pull secret
  # + imagePullSecrets here.)
  helm-install:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'chart-install')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
        with:
          version: v4.2.1
      - uses: helm/kind-action@v1
        with:
          cluster_name: ttr-umbrella-ci
      - name: install the umbrella + wait for the subset to be Ready
        run: |
          scripts/helm-deps.sh
          helm install ttr helm/tatrman-server -n ttr-umbrella --create-namespace \
            -f helm/tatrman-server/deploy/values-kind-ci.yaml --wait --timeout 8m
      - name: show state
        if: always()
        run: |
          kubectl -n ttr-umbrella get pods
          kubectl -n ttr-umbrella get deploy
