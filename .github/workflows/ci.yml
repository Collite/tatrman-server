name: tatrman-server-ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Authenticates to the `Collite/tatrman` GitHub Packages repo for the TTR
      # toolchain (org.tatrman:ttr-*). A standing third-party dep (settings.gradle.kts).
      packages: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: build
        run: ./gradlew build
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # P2/RO-6 dependency rules (contracts §7). Passes trivially on the S1 skeleton;
  # its real bite is S4 once the spine services + protos have arrived.
  dependency-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: check dependency rules
        run: bash scripts/check-dependency-rules.sh

  # Persona grep gate (naming ledger §5). ENFORCING as of S6's phase-DONE gate
  # (was report-only through the S1→S5 window while the grafted spine still
  # carried retired persona strings). Now scans wire/build surfaces AND
  # Dockerfiles (S6 fix: the S4 sweep's include list missed Dockerfiles, which
  # had let stale `services/kadmos`/`workers/steropes` COPY paths through).
  # Surviving personas (Veles/Perun/Charon, Golem/Pythia/Iris) are not in the
  # regex, so any hit is real → the job fails.
  #
  # NOT yet scanned (SV-P1 chart-rename scope): Helm `*.tpl` templates + `logback.xml`
  # still carry chart-internal persona env/logger names; they rename WITH the
  # image publish + olymp repoint at SV-P1 gate 3, at which point add
  # `--include='*.tpl' --include='logback.xml'` here.
  grep-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: enforce no retired personas on wire/build surfaces
        run: |
          # Detect RETIRED persona strings (naming ledger §3). Refined per the
          # 2026-07-10 decision: the regex over-matched `echo` (English verb) and
          # `prometheus` (Micrometer's PrometheusMeterRegistry / the real monitoring
          # system) — those legitimate hits are excluded below; genuine persona
          # instances (the Echo/fuzzy service, the "Prometheus LLM gateway") are renamed.
          # `formerly` excludes historical "formerly Kadmos" provenance notes.
          matches=$(grep -rn -iE 'ariadne|theseus|proteus|argos\b|kyklop|\barges\b|brontes|steropes|echo\b|kadmos|prometheus' \
            --include='*.proto' --include='*.kt' --include='*.kts' --include='*.py' --include='*.conf' \
            --include='*.yaml' --include='*.toml' --include='Dockerfile*' . \
            | grep -viE 'CHANGELOG|docs/|history|lore|Forked 2026|formerly|_to_delete' \
            | grep -viE 'PrometheusMeterRegistry|PrometheusConfig|PrometheusHealthCheck|prometheus\.io|:9090|/metrics|actuator|micrometer|registry.prometheus|MeterRegistry|prometheus (meter|call|scrape|registry|endpoint)|monitoring|include:.*prometheus' \
            | grep -viE 'prometheusUrl|hasPath\("prometheus|getConfig\("prometheus|config\.prometheus|"prometheus" ->|prometheus \{|PromQL|prometheus-client|prometheus_client|prometheus-jvm|prometheus - Prom' \
            | grep -viE '"prometheus",|Prometheus (metrics|exposition)|the fabric-infra estate' \
            || true)
          if [ -n "$matches" ]; then
            echo "::error::retired persona strings on a wire/build surface (naming ledger §5):"
            echo "$matches" | head -50
            exit 1
          else
            echo "grep-gate: clean"
          fi
