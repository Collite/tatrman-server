name: tatrman-server-ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Authenticates to the `Collite/tatrman` GitHub Packages repo for the TTR
      # toolchain (org.tatrman:ttr-*). A standing third-party dep (settings.gradle.kts).
      packages: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: build
        run: ./gradlew build
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # P2/RO-6 dependency rules (contracts §7). Passes trivially on the S1 skeleton;
  # its real bite is S4 once the spine services + protos have arrived.
  dependency-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: check dependency rules
        run: bash scripts/check-dependency-rules.sh

  # Persona grep gate (naming ledger §5). Wired now but REPORT-ONLY through the
  # SV-P0 window (S1 T5 "allow-empty until S3"): the verbatim libs.versions.toml
  # and, from S3, the freshly-grafted spine still carry retired persona strings
  # until the S4 sweep cleans them. It flips to ENFORCING (drop continue-on-error)
  # at S6's phase-DONE gate. Surviving personas (Veles/Perun/Charon, Golem/Pythia/
  # Iris) are not in the regex, so a post-sweep hit is real.
  grep-gate:
    runs-on: ubuntu-latest
    continue-on-error: true   # report-only until S6; flip to enforcing then
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: report retired personas on wire/build surfaces
        run: |
          matches=$(grep -rn -iE 'ariadne|theseus|proteus|argos\b|kyklop|arges|brontes|steropes|echo\b|kadmos|prometheus' \
            --include='*.proto' --include='*.kt' --include='*.kts' --include='*.py' --include='*.conf' \
            --include='*.yaml' --include='*.toml' . \
            | grep -viE 'CHANGELOG|docs/|history|lore|Forked 2026|_to_delete' || true)
          if [ -n "$matches" ]; then
            echo "::warning::retired persona strings still present (expected pre-S4-sweep):"
            echo "$matches" | head -50
            echo "(report-only until S6 flips this gate to enforcing)"
          else
            echo "grep-gate: clean"
          fi
