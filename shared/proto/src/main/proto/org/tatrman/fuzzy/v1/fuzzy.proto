syntax = "proto3";

package org.tatrman.fuzzy.v1;

option java_multiple_files = true;
option java_package = "org.tatrman.fuzzy.v1";
option java_outer_classname = "FuzzyProto";

service FuzzyService {
  rpc Match (MatchRequest) returns (FuzzyMatchResponse) {}
}

message MatchRequest {
  string query = 1;
  optional string category = 2; // Optional filter by category
  optional string algorithm = 3; // Legacy single-algorithm selection (e.g. "LEVENSHTEIN", "JARO_WINKLER", "TATRMAN")
  int32 limit = 4; // Optional limit for number of results
  // Optional algorithm cascade. When non-empty it overrides `algorithm`:
  // the algorithms are tried in order and the first whose top-1 score meets
  // its min_score wins (precision-first, recall-fallback). If none qualify,
  // the last algorithm's best-effort results are returned.
  repeated AlgorithmSpec algorithms = 5;
}

// One step of an algorithm cascade: run `algorithm`, and treat it as the
// winner if its top candidate scores >= `min_score`.
message AlgorithmSpec {
  string algorithm = 1; // "LEVENSHTEIN" | "TATRMAN" | "JARO_WINKLER" | ...
  double min_score = 2; // cascade gate on the top-1 score (not an output filter)
}

message FuzzyMatchResponse {
  repeated FuzzyMatch matches = 1;
  bool is_error = 2;
  string error = 3;
  string matched_algorithm = 4; // Which algorithm produced these results (cascade winner / last tried)
  // RG-P2 additive (S-1): snapshot hash + per-category load timestamp of the
  // vocabulary that produced these results. Populated from RG-P2.S2 (refresh).
  string vocabulary_version = 5;
}

// RG-P2 (contracts §2, RS-15): how a candidate's category was sourced.
enum SourceTag {
  MEMBER = 0;      // data value — candidate_id is a data PK (→ resolved_id)
  VOCABULARY = 1;  // declared lexicon/valueLabels — carries target_ref
}

// RG-P2 (S-4): confidence provenance — producer + scoring method + raw score.
message Provenance {
  string producer = 1;  // e.g. "fuzzy"
  string method = 2;    // the algorithm that scored it, e.g. "TATRMAN"
  double raw_score = 3;
}

message FuzzyMatch {
  string candidate_id = 1;
  string candidate = 2;
  double score = 3; // Similarity score/distance
  string category = 4;
  // RG-P2 additive (response-side; the pinned MatchRequest is untouched):
  SourceTag source = 5;
  optional string target_ref = 6;  // set iff source = VOCABULARY (→ lexicon target)
  Provenance provenance = 7;       // S-4
}
