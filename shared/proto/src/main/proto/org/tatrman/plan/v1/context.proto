// =============================================================================
// AI Platform v1 — Pipeline context
//
// Promoted in Phase 1.0 from docs/v1/protos/ — this is the canonical location.
//
// Side-channel envelope that travels alongside a PlanNode through every
// service hop in the v1 pipeline (query-runner → Translator → Validator →
// Dispatcher → Worker → Translator-back). Carries identity, parameters,
// accumulated warnings, and audit trail.
// =============================================================================

syntax = "proto3";

package org.tatrman.plan.v1;

import "org/tatrman/plan/v1/parameters.proto";
import "org/tatrman/plan/v1/plan.proto";

option java_package = "org.tatrman.plan.v1";
option java_multiple_files = true;

// PipelineContext — the side-channel envelope.
//
// Every gRPC service request and response in the v1 query pipeline carries a
// pair (PlanNode, PipelineContext). The context grows monotonically as it
// flows: warnings accumulate, used_objects grows. The final context returned
// to the caller (alongside the result Arrow stream) carries the full audit
// trail of which model objects participated and what happened along the way.
message PipelineContext {
  // Correlates spans, logs, and traces across the pipeline. Generated by
  // query-runner if not supplied by the caller.
  string correlation_id = 1;

  // Identity for security predicates and row-level filtering. Required for
  // any call that may execute against data; unset means anonymous (the
  // Validator decides whether anonymous is allowed by policy).
  string user_id = 2;

  // Snapshot version of the model graph this query was compiled against.
  // Used as part of the query-runner cache key. Model changes invalidate
  // cached compilations.
  string model_version = 3;

  // Parameter bindings — the side-channel for Calcite RexDynamicParam
  // values. Same identity rule as ParameterBinding documents.
  repeated ParameterBinding parameters = 4;

  // Accumulated warnings from every service the context has passed through.
  // Append-only; never cleared mid-pipeline.
  repeated Warning warnings = 5;

  // Audit trail of model objects consulted during compilation.
  // Translator populates entries during RESOLVE and MAP_TO_PHYSICAL;
  // Validator may add entries when applying security predicates.
  repeated ObjectRef used_objects = 6;

  // Conversation / session identifier. Empty for stateless single queries
  // (the v1 default). When non-empty, the Dispatcher sticky-routes
  // subsequent queries with the same session_id to the same Worker pod —
  // provided that Worker advertises supports_stateful_sessions = true.
  // Stateless Workers (MS SQL) ignore this field. See Round 6 statefulness
  // discussion and ai_platform_session_workspace.md.
  string session_id = 7;

  // Authentication roles for the calling identity, resolved at the trust boundary (today: the MCP
  // edge — `tools/theseus-mcp`'s `IdentityResolver` from a Keycloak JWT's `realm_access.roles`).
  // Used by downstream services for role-gated decisions, e.g. the Validator honours
  // `apply_security = false` only when this list contains the service-configured admin role
  // (DF-V02). v1 trust model: downstream gRPC services trust the upstream-populated context;
  // inter-service mTLS / network isolation is the actual auth boundary. A future v2 zero-trust
  // pass should re-validate the JWT at each hop.
  repeated string auth_roles = 8;

  // Tenant identity for row-level-security scoping (a UUID string). Travels with the plan
  // through every pipeline hop. The Postgres worker (Arges) binds it per query via
  // `SET LOCAL app.tenant_id = <tenant_id>` inside a transaction so Midas's RLS policies
  // (`USING (tenant_id = app_current_tenant())`) scope every row; a missing tenant_id on a
  // connection marked `requires-tenant-id` fails closed. Added additively for the Arges arc
  // (docs/architecture/arges/contracts.md §1; plan Stage 1.1 T2). Empty for non-tenant-scoped
  // workers (e.g. MSSQL/Brontes), which ignore it.
  string tenant_id = 9;

  reserved 10 to 12;
}

// Warning — a non-fatal issue surfaced by some pipeline stage.
//
// Fatal failures are returned as gRPC status errors, not warnings.
// A query that completes with warnings still executes; the caller decides
// whether to escalate.
message Warning {
  // Stable machine-readable code (e.g. "parameter_unbound",
  // "join_ambiguous", "implicit_cast").
  string code = 1;
  // Human-readable explanation; safe to show in UI.
  string message = 2;
  // Pipeline stage that produced the warning, e.g. "parse", "resolve",
  // "expand_joins", "security", "rules", "optimize".
  string source_stage = 3;
  // Service that produced the warning, e.g. "translator", "validator",
  // "query-runner", "worker".
  string source_service = 4;
  reserved 5 to 9;
}
