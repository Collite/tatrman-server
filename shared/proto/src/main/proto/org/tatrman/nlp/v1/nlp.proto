syntax = "proto3";

// Forked from ai-platform@2575b923dca521fea0e3156257e4b779f02a6ed4 (tag kantheon-fork-point)
//   (shared/proto/src/main/proto/com/tatrman/nlp/v1/nlp.proto).
// Fork Stage 2.3 (Nlp). Package + outer-class renamed com.tatrman.nlp.v1 →
// org.tatrman.nlp.v1; the Rule-6 messages=99 field re-targeted from
// com.tatrman.metadata.v1.ResponseMessage to the kantheon stand-in
// org.tatrman.common.v1.ResponseMessage. NLP wire shapes are otherwise
// unchanged (fork principle: wire shapes fork unchanged). HTTP at v1 — types
// only, no gRPC service binding. themis/v1's nlp.v1 import is swapped in Stage 2.6.

package org.tatrman.nlp.v1;

import "org/tatrman/common/v1/response_message.proto";  // for ResponseMessage

option java_multiple_files = true;
option java_package = "org.tatrman.nlp.v1";
option java_outer_classname = "NlpProto";

// ---------------------------------------------------------------------------
// Shared enums
// ---------------------------------------------------------------------------

enum NlpOp {
  NLP_OP_UNSPECIFIED = 0;
  TOKENIZE = 1;
  SENTENCE_SPLIT = 2;
  LEMMATIZE = 3;
  POS_TAG = 4;
  DEP_PARSE = 5;
  NER = 6;
  DETECT_LANGUAGE = 7;
}

enum Mode {
  MODE_UNSPECIFIED = 0;
  NORMAL = 1;
  COMPARE = 2;
}

// ---------------------------------------------------------------------------
// Token-level structures
// ---------------------------------------------------------------------------

message Token {
  string text = 1;
  int32 char_start = 2;
  int32 char_end = 3;
  string lemma = 4;
  string upos = 5;           // Universal POS tag (UD standard)
  string xpos = 6;           // Language-specific POS tag
  map<string, string> feats = 7;  // Morphological features as key-value pairs
  int32 dep_head = 8;        // Index of head token (1-based); 0 = root
  string dep_relation = 9;   // UD dependency relation label
}

message Span {
  int32 char_start = 1;
  int32 char_end = 2;
}

message NerEntity {
  string text = 1;
  string label = 2;          // e.g. PER, LOC, ORG, DATE, MONEY, ...
  int32 char_start = 3;
  int32 char_end = 4;
  string normalized_value = 5;  // e.g. ISO date for DATE, typed amount for MONEY
  string source_engine = 6;     // Which engine produced this entity
}

// ---------------------------------------------------------------------------
// Per-engine result (used in COMPARE mode and as internal intermediate)
// ---------------------------------------------------------------------------

message EngineResult {
  repeated Token tokens = 1;
  repeated NerEntity entities = 2;
  repeated Span sentences = 3;
  repeated Span paragraphs = 4;
  string error = 5;          // non-empty if this engine failed for this request
}

// ---------------------------------------------------------------------------
// Request / Response
// ---------------------------------------------------------------------------

message AnalyzeRequest {
  string text = 1;
  string language = 2;                  // empty triggers DETECT_LANGUAGE
  repeated NlpOp ops = 3;
  Mode mode = 4;                        // default NORMAL
  map<string, string> engine_hints = 5;  // op-name → engine override
}

message AnalyzeResponse {
  string language = 1;
  double language_confidence = 2;
  string engine_used = 3;              // primary engine in NORMAL mode
  repeated Token tokens = 4;
  repeated Span sentences = 5;
  repeated Span paragraphs = 6;
  repeated NerEntity entities = 7;
  map<string, EngineResult> by_engine = 8;  // populated only in COMPARE mode
  string trace_id = 9;
  int64 elapsed_ms = 10;
  repeated org.tatrman.common.v1.ResponseMessage messages = 99;
}
