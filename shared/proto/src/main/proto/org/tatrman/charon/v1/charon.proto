// =============================================================================
// Charon — Arrow data mover
//
// Stage 1.1 (charon/plan.md §3). Source of truth: docs/architecture/charon/contracts.md §1.
// Migrated-service convention: proto root `org.tatrman.charon.v1` (per
// `AGENTS.md` §4 / charon/architecture.md §2 — "org.tatrman.<service>.v1" is the
// reservation for migrated platform-grade services; "org.tatrman.kantheon.*.v1"
// stays reserved for constellation/agent contracts).
//
// Wire-format rules inherited platform-wide (AGENTS.md §6):
//   - Rule 6 — every response carries `repeated ResponseMessage messages = 99`
//     (warning/hint/non-fatal-error channel; field 99 reserved across the board).
//   - Rule 7 — function-call args ride as JSON string (`args_json` on the wire;
//     camelCase keys; validated by the caller's ParamSpec). Not directly used by
//     Charon today, but the camelCase-keys convention is recorded so the wrapper
//     `tools/charon-mcp` (P3) doesn't drift.
// =============================================================================

syntax = "proto3";

package org.tatrman.charon.v1;

import "org/tatrman/kantheon/common/v1/response_message.proto";

option java_package = "org.tatrman.charon.v1";
option java_multiple_files = true;

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service CharonService {
  rpc Materialize (MaterializeRequest) returns (MoveResult);
  rpc Stage       (StageRequest)       returns (MoveResult);
  rpc Copy        (CopyRequest)        returns (MoveResult);
  rpc Evict       (EvictRequest)       returns (EvictResult);
  rpc Describe    (DescribeRequest)    returns (DescribeResult);
}

// -----------------------------------------------------------------------------
// Locations
// -----------------------------------------------------------------------------

// A `Location` is either a source the move can read from, a target the move
// can write to, or both. `oneof` disambiguates the four kinds Charon knows
// about in v1. New kinds (Parquet-on-S3, DuckDB worker, etc.) add a field here
// + a row in the legality matrix (contracts §2) + a Source/Target impl.
message Location {
  oneof kind {
    SeaweedBlob      seaweed       = 1;
    RedisEntry       redis         = 2;
    WorkerSessionDf  worker_df     = 3;
    DbTable          db_table      = 4;
  }
}

// A blob in the SeaweedFS S3 gateway. Bucket + key; retention_tag drives the
// S3 lifecycle rule applied to the object (production = 90d default,
// shallow = 7d — charon/contracts.md §6).
message SeaweedBlob {
  string bucket = 1;
  string key    = 2;
  // The `optional` keyword keeps protobuf 3 with explicit presence so callers
  // can tell "absent" (use server default) from "empty string" (a real value).
  optional string retention_tag = 3;
}

// A binary value in the platform Redis. Arrow IPC bytes as value; TTL
// honoured by Redis itself.
message RedisEntry {
  string key = 1;
  optional int64 ttl_seconds = 2;  // 0 = no expiry (discouraged); default from server config
}

// A dataframe loaded into a compute-engine session. `WorkerKind` discriminates
// the engine (POLARS = v1; METIS = Stage 3.1's `WorkerKind.METIS` activation
// against `services/metis` P1 — charon/contracts.md §1 / metis/contracts.md §1.3).
message WorkerSessionDf {
  WorkerKind worker_kind = 1;
  string session_id      = 2;
  string df_name         = 3;     // matches the worker-side keying (session_id, df_name)
}

enum WorkerKind {
  WORKER_KIND_UNSPECIFIED = 0;
  POLARS = 1;
  METIS  = 2;   // reserved slot; activated in Stage 3.1 once metis/v0.1.0 ships
}

// A table in a database reached via Charon's connection registry. Callers
// never carry credentials; `connection_id` resolves in the registry.
message DbTable {
  string connection_id = 1;       // resolved server-side in ConnectionRegistry
  string schema        = 2;
  string table         = 3;
}

// -----------------------------------------------------------------------------
// Requests
// -----------------------------------------------------------------------------

message MoveOptions {
  // SHA-256 over the canonical Arrow IPC schema bytes. Verified when set;
  // always computed + returned in `MoveResult.schema_fingerprint`.
  optional string expected_schema_fingerprint = 1;
  // Required when the target is `DbTable`. Anything else → `INVALID_ARGUMENT`.
  optional DbWriteMode db_write_mode = 2;
  // Per-move cap override (≤ server cap). Exceeding it → `RESOURCE_EXHAUSTED`.
  optional int64 max_bytes = 3;
  // Streaming chunk override (rows per Arrow IPC message). Default from
  // server config (`charon.move.chunk-rows`, default 65536).
  optional int32 chunk_rows = 4;
}

enum DbWriteMode {
  DB_WRITE_MODE_UNSPECIFIED = 0;
  CREATE  = 1;  // fail-if-exists (any pre-existing table → `FAILED_PRECONDITION`)
  REPLACE = 2;  // transactional swap; readers see old-or-new never partial
  APPEND  = 3;  // schema-compatibility check; mismatched column types fail
}

// `Materialize` — persist the source to a durable storage tier. Target must
// be `SeaweedBlob` | `RedisEntry` | `DbTable` (NOT `WorkerSessionDf` — that's
// `Stage`).
message MaterializeRequest {
  Location source       = 1;
  Location target       = 2;
  MoveOptions options   = 3;
}

// `Stage` — load the source into a compute-engine session. Target MUST be
// `WorkerSessionDf` (the make-it-hot verb).
message StageRequest {
  Location source       = 1;
  WorkerSessionDf target = 2;
  MoveOptions options   = 3;
}

// `Copy` — generic move between any legal pair (incl. cross-endpoint, e.g.
// DB→DB across two named connections). Superset of Materialize/Stage; kept
// for explicit-intent metrics and the no-same-kind pair cases.
message CopyRequest {
  Location source       = 1;
  Location target       = 2;
  MoveOptions options   = 3;
}

// `Evict` — delete/expire the location. S3 delete, Redis del, worker DF drop.
// `DbTable` is NEVER allowed (DB cleanup is the owner's job — not Charon's)
// → `INVALID_ARGUMENT`.
message EvictRequest {
  Location location = 1;
}

// `Describe` — live inspection: schema (+ fingerprint), row count (exact or
// estimate), size, liveness / TTL. Charon is stateless (no provenance store);
// PD-5 (2026-06-12) makes this Pythia's resume-time liveness probe.
message DescribeRequest {
  Location location = 1;
}

// -----------------------------------------------------------------------------
// Results
// -----------------------------------------------------------------------------

message MoveResult {
  // The resolved target (e.g. a generated S3 key for a `Materialize` to
  // Seaweed when the request didn't supply one).
  Location target = 1;
  // Always populated; matches the caller's `expected_schema_fingerprint` if set.
  string schema_fingerprint = 2;
  // Arrow schema, JSON rendering (for human inspection — see contracts §1 note
  // on Pythia's resume probe).
  string schema_json = 3;
  int64 row_count = 4;
  // Bytes written (Arrow IPC for blob tiers; 0 for DB).
  int64 size_bytes = 5;
  int64 duration_ms = 6;
  // Rule 6 — application-layer outcomes.
  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;
}

message EvictResult {
  // True if something was there. False is *not* an error — eviction is
  // idempotent (the caller may have re-evicted, or the TTL may have hit first).
  bool existed = 1;
  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;
}

message DescribeResult {
  bool exists = 1;
  // -1 when unknown without a full scan (e.g. S3 with no HEAD-style metadata).
  string schema_fingerprint = 2;
  string schema_json        = 3;
  int64 row_count = 4;             // -1 when unknown without a scan
  bool row_count_exact = 5;
  int64 size_bytes = 6;            // -1 when not applicable
  // RFC3339; populated for Redis TTL / worker session TTL / S3 lifecycle rule
  // when the underlying store exposes one. Empty otherwise.
  optional string expires_at = 7;
  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;
}
