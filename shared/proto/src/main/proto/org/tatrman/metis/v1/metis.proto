syntax = "proto3";

// Metis — model estimation service.
// Stage 1.1 (metis/plan.md §3). Source of truth: docs/architecture/metis/contracts.md §1.
// Migrated-service convention: proto root `org.tatrman.metis.v1`.
// Wire-format rules:
//   Rule 6 — every response carries `repeated ResponseMessage messages = 99`.
//   Rule 7 — args ride as JSON string; camelCase keys.

package org.tatrman.metis.v1;

import "org/tatrman/kantheon/common/v1/response_message.proto";

option java_package = "org.tatrman.metis.v1";
option java_multiple_files = true;

service MetisService {
  // Estimation lifecycle
  rpc Fit              (FitRequest)              returns (FitResult);
  rpc Diagnose         (DiagnoseRequest)         returns (DiagnoseResult);
  rpc Project          (ProjectRequest)          returns (ProjectResult);
  rpc SimulateScenario (SimulateScenarioRequest) returns (ProjectResult);

  // Workspace surface (Charon staging + Pythia housekeeping)
  rpc ImportDataFrame    (stream ArrowChunk)   returns (ImportResult);
  rpc ExportDataFrame    (ExportRequest)       returns (stream ArrowChunk);
  rpc DropWorkspaceEntry (DropRequest)         returns (DropResult);
  rpc GetStatus          (GetStatusRequest)    returns (GetStatusResponse);
}

// --- Estimation ---

enum ModelKind {
  MODEL_KIND_UNSPECIFIED = 0;
  LINEAR = 1;
  ARIMA = 2;
  PROPHET = 3;
}

message FitRequest {
  string session_id = 1;
  ModelKind model_kind = 2;
  oneof input {
    string input_df = 3;
    bytes inline_arrow_ipc = 4;
  }
  string model_name = 5;
  optional ArimaParams arima = 6;
  optional ProphetParams prophet = 7;
  optional LinearParams linear = 8;
}

message ArimaParams {
  optional int32 seasonality = 1;
  optional string order = 2;
  optional int32 max_order = 3;
}

message ProphetParams {
  optional bool yearly = 1;
  optional bool weekly = 2;
  optional bool daily = 3;
}

message LinearParams {
  repeated string x_cols = 1;
  string y_col = 2;
}

message FitResult {
  string model_name = 1;
  ModelKind model_kind = 2;
  string chosen_order = 3;
  double aic = 4;
  double log_likelihood = 5;
  int64 input_rows = 6;
  int64 fit_duration_ms = 7;
  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;
}

message DiagnoseRequest {
  string session_id = 1;
  string model_name = 2;
}

message DiagnoseResult {
  bool pass = 1;
  repeated DiagnosticCheck checks = 2;
  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;
}

message DiagnosticCheck {
  string name = 1;
  bool pass = 2;
  double statistic = 3;
  double p_value = 4;
  string detail = 5;
}

message ProjectRequest {
  string session_id = 1;
  string model_name = 2;
  string horizon = 3;
  optional double confidence_level = 4;
  string output_df = 5;
}

message SimulateScenarioRequest {
  string session_id = 1;
  string forecast_df = 2;
  string deltas_json = 3;
  string output_df = 4;
}

message ProjectResult {
  string output_df = 1;
  string schema_fingerprint = 2;
  int64 rows = 3;
  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;
}

// --- Workspace ---

message ArrowChunk {
  optional ImportHeader header = 1;
  bytes ipc_payload = 2;
}

message ImportHeader {
  string session_id = 1;
  string df_name = 2;
  optional string expected_schema_fingerprint = 3;
}

message ImportResult {
  string df_name = 1;
  string schema_fingerprint = 2;
  int64 rows = 3;
  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;
}

message ExportRequest {
  string session_id = 1;
  string df_name = 2;
  optional int32 chunk_rows = 3;
}

message DropRequest {
  string session_id = 1;
  string name = 2;
}

message DropResult {
  bool existed = 1;
  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;
}

message GetStatusRequest {}

message GetStatusResponse {
  int32 sessions = 1;
  int32 dataframes = 2;
  int32 models = 3;
  int64 workspace_bytes = 4;
  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;
}
