syntax = "proto3";

package org.tatrman.kantheon.themis.v1;
option java_package = "org.tatrman.kantheon.themis.v1";

// fork Stage 2.6 switch-over: nlp.v1 → in-repo kadmos.v1; Rule-6 ResponseMessage
// → kantheon common stand-in. After this, no kantheon proto imports cz/dfpartner/.
import "org/tatrman/kantheon/common/v1/response_message.proto";
import "org/tatrman/kadmos/v1/kadmos.proto";
// Phase 3 Stage 3.1: routing types reference common/v1.AgentId (moved there in
// the 2026-06-12 cohesion review, D2) + HandoffContext (PD-1 typed prior context).
import "org/tatrman/kantheon/common/v1/handoff.proto";

// ---------------------------------------------------------------------------
// Enums
// ---------------------------------------------------------------------------

enum UniversalEntityType {
  UNIVERSAL_ENTITY_TYPE_UNSPECIFIED = 0;
  PERSON = 1;
  LOCATION = 2;
  ORGANIZATION = 3;
  DATE = 4;
  MONEY = 5;
  MISC = 6;
}

enum Outcome {
  OUTCOME_UNSPECIFIED = 0;
  RESOLUTION = 1;
  AWAITING_CLARIFICATION = 2;
}

enum ResolveMode {
  // Default. Resolver picks function_id from Registry and emits Resolution or
  // AwaitingClarification. The existing v1 behaviour.
  RESOLVE_MODE_UNSPECIFIED = 0;
  RESOLVE_MODE_NORMAL = 1;

  // Entities-only. Resolver returns the parse + bindings (universal + domain),
  // never a function_id. `Registry` is ignored. `Resolution.function_id` is
  // empty; `Resolution.args_json` is "{}". Used by callers (Golem) that own
  // their own intent classification.
  RESOLVE_MODE_ENTITIES_ONLY = 2;
}

// ---------------------------------------------------------------------------
// Registry (caller-provided per-request)
// ---------------------------------------------------------------------------

message FunctionSpec {
  string function_id = 1;
  string description = 2;
  repeated ParamSpec params = 3;
}

message ParamSpec {
  string name = 1;
  string type = 2;         // e.g. "string", "int", "bool"
  bool required = 3;
  string description = 4;
}

message EntityTypeSpec {
  string entity_type_ref = 1;  // e.g. "customer", "invoice", "product"
  string description = 2;
  string fuzzy_matcher_namespace = 3;
}

message Registry {
  repeated FunctionSpec function_specs = 1;
  repeated EntityTypeSpec entity_types = 2;
}

// ---------------------------------------------------------------------------
// ResolveContext (caller-provided per-request)
// ---------------------------------------------------------------------------

message Turn {
  string role = 1;          // "user" or "assistant"
  string content = 2;
}

message EntityContext {
  string entity_type_ref = 1;
  string resolved_id = 2;
  string resolved_label = 3;
}

message ResolveContext {
  string locale = 1;              // e.g. "cs", "en" — derived from incoming request
  repeated EntityContext recent_entities = 2;
  repeated Turn recent_turns = 3;
  // Phase 3 Stage 3.4 (additive): per-request HITL profile. UNSPECIFIED is
  // treated as INTERACTIVE. STRICT makes decideHitlOrEmit emit RefusalWithGaps
  // on any blocker rather than asking a clarification.
  HitlProfile hitl = 4;
}

// ---------------------------------------------------------------------------
// Request / Response
// ---------------------------------------------------------------------------

message FreshQuestion {
  string conversation_id = 1;
  string text = 2;                 // the user's question
  string locale = 3;               // language hint, empty = auto-detect
}

message ResumeAnswer {
  string token = 1;                // HMAC-signed resume token
  string selected_option_id = 2;    // from AwaitingClarification response
  string free_text_answer = 3;     // used when option is "other" / freeform
  // Phase 3 Stage 3.1: Layer-3 chip-pick re-entry — the user chose an agent from
  // the rendered RoutingPickChips. Additive flat field (the shipped ResumeAnswer
  // has no oneof). Set exclusively of selected_option_id / free_text_answer.
  org.tatrman.kantheon.common.v1.AgentId picked_agent = 4;
}

message ResolveRequest {
  string conversation_id = 1;
  oneof input {
    FreshQuestion fresh = 2;
    ResumeAnswer resume = 3;
  }
  Registry registry = 4;
  ResolveContext context = 5;

  // Resolution mode. Unset / UNSPECIFIED is interpreted as NORMAL for
  // backwards compatibility with existing callers (Pythia, Wrangler).
  // ENTITIES_ONLY skips function-id binding and ignores `registry`.
  ResolveMode mode = 6;

  // --- Phase 3 routing extensions (Stage 3.1; additive, wire-compatible with v0.1.0) ---
  // NOTE: field 6 (mode) predates the routing layer, so routing fields start at 7
  // (contracts.md §1.2 listed profile=6 against an assumed base that never shipped).

  // Routing profile. PROFILE_UNSPECIFIED is interpreted as CHAT_QUICK in code
  // (Iris's fast path → routeToAgent runs). INVESTIGATION_DEEP skips routeToAgent.
  Profile profile = 7;

  // Layer-0 routing override: caller pins the target agent (e.g. an InvestigateChip
  // click forcing Pythia). When set, routeToAgent short-circuits to this agent.
  optional org.tatrman.kantheon.common.v1.AgentId routing_hint = 8;

  // PD-1 (2026-06-12): typed prior context, assembled by Iris-BFF from the previous
  // TurnPointer + EntityContext. THIS is "themis_prior_context": coreference ("it",
  // "that drop") resolves against prior_context.entities; prior_context.view tells
  // Themis what result the user is looking at.
  optional org.tatrman.kantheon.common.v1.HandoffContext prior_context = 9;
}

message ResolveResponse {
  org.tatrman.kadmos.v1.AnalyzeResponse parse = 1;  // ALWAYS present
  oneof outcome {
    Resolution resolution = 2;
    AwaitingClarification awaiting = 3;
    // Phase 3 Stage 3.1: STRICT-mode terminal (no entitled agent / unrecoverable
    // gaps). Runtime path wired in Stage 3.4. Field 6 — the next free slot after
    // trace_id(4)/elapsed_ms(5); contracts.md §1.2 listed 4, which is taken on the
    // shipped proto.
    RefusalWithGaps refusal = 6;
  }
  string trace_id = 4;
  int64 elapsed_ms = 5;
  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;
}

// ---------------------------------------------------------------------------
// Outcome structures
// ---------------------------------------------------------------------------

message Resolution {
  string function_id = 1;
  string args_json = 2;             // JSON object, camelCase keys; caller validates
  repeated EntityBinding bindings = 3;
  double confidence = 4;            // 0.0–1.0
  repeated InferenceAlternative alternatives = 5;
  string rationale = 6;

  // Phase 3 Stage 3.1 (additive; 10/11 leave 7–9 free for Resolver-side fields).
  IntentKind intent_kind = 10;              // classified by classifyIntentKind (Stage 3.2)
  optional RoutingDecision routing = 11;    // absent when profile == INVESTIGATION_DEEP
}

message InferenceAlternative {
  string function_id = 1;
  string args_json = 2;
  double confidence = 3;
  string rationale = 4;
}

message AwaitingClarification {
  string question = 1;              // localized clarification question
  repeated ClarificationOption options = 2;
  ClarificationContextSpan context_span = 3;
  // Phase 3 Stage 3.1: discriminated clarification kind. The shipped message had
  // no oneof; multi_question lands at 8 (4–7 left free for future kinds, e.g. an
  // explicit ambiguity variant). Runtime detection is Stage 3.2.
  oneof kind {
    MultiQuestionDetected multi_question = 8;
  }
}

message ClarificationOption {
  string option_id = 1;
  string label = 2;                 // human-readable option label
  string description = 3;            // optional context
}

message ClarificationContextSpan {
  int32 char_start = 1;
  int32 char_end = 2;
  string covered_text = 3;
}

// ---------------------------------------------------------------------------
// Phase 3 routing layer (Stage 3.1 — types; runtime nodes land Stages 3.2–3.4)
// ---------------------------------------------------------------------------

// Routing profile. Selects whether routeToAgent runs. Default-unmarshalled
// PROFILE_UNSPECIFIED resolves to CHAT_QUICK in code.
enum Profile {
  PROFILE_UNSPECIFIED = 0;
  CHAT_QUICK          = 1;   // Iris's fast path; routeToAgent runs
  INVESTIGATION_DEEP  = 2;   // Pythia's deep resolution; routeToAgent skipped
}

// Per-request HITL behaviour. Mirrors capabilities/v1.HitlProfile (duplicated
// per-package so neither contract imports the other). STRICT = refuse on any
// blocker (RefusalWithGaps); INTERACTIVE = the default clarification loop.
enum HitlProfile {
  HITL_PROFILE_UNSPECIFIED = 0;
  INTERACTIVE              = 1;   // default — AwaitingClarification on ambiguity
  SPECULATIVE              = 2;   // best-effort; for messaging clients (Hebe)
  STRICT                   = 3;   // refuse on any blocker
}

// Analytical intent class. Mirrors capabilities/v1.IntentKind (same semantics,
// duplicated per-package so neither contract imports the other). Drives Layer-1
// routing rules (RCA/FORECAST/SIMULATION → Pythia; PROCEDURAL → a Golem Shem).
enum IntentKind {
  INTENT_KIND_UNSPECIFIED = 0;
  PROCEDURAL              = 1;
  RCA                     = 2;
  FORECAST                = 3;
  SIMULATION              = 4;
}

// RoutingDecision — produced by Themis's routeToAgent node (Stage 3.3). Populated
// when profile == CHAT_QUICK; absent for INVESTIGATION_DEEP. `layer_hit` records
// which of the four cascade layers (0..3) produced this decision, for observability.
message RoutingDecision {
  org.tatrman.kantheon.common.v1.AgentId chosen_agent_id = 1;
  repeated AgentAlternate alternates = 2;
  string rationale     = 3;   // surfaced to user as "I sent this to X because…"
  double confidence    = 4;
  bool   needs_user_pick = 5; // true → Iris renders alternates as RoutingPickChips
  int32  layer_hit     = 6;   // 0/1/2/3 — for observability + debugging
}

// AgentAlternate — a runner-up agent, rendered as a RoutingPickChip subtext when
// needs_user_pick is true (Layer 3).
message AgentAlternate {
  org.tatrman.kantheon.common.v1.AgentId agent_id = 1;
  double score = 2;
  string why   = 3;           // one-line rationale for the chip subtext
}

// MultiQuestionDetected — the joint-inference verdict on compound questions
// (Stage 3.2). Carried inside AwaitingClarification.kind. PD-13 (2026-06-12):
// SPLIT = disjoint intents → Iris decomposes into N turns; KEEP_TOGETHER = a
// relating intent joins the clauses → the whole turn routes as one cross-domain
// question (Layer 1 → Pythia). Iris decomposes ONLY on SPLIT.
message MultiQuestionDetected {
  repeated string sub_questions = 1;        // self-standing strings for Iris to reissue
  Decomposition decomposition = 2;
  string decomposition_rationale = 3;
}

enum Decomposition {
  DECOMPOSITION_UNSPECIFIED = 0;
  SPLIT                     = 1;
  KEEP_TOGETHER             = 2;
}

// RefusalWithGaps — STRICT-mode terminal outcome (ResolveResponse.refusal).
// Emitted when resolution cannot proceed and no clarification will recover it.
message RefusalWithGaps {
  repeated Gap gaps = 1;
  string rationale  = 2;
  string trace_id   = 3;
}

// Gap — one reason resolution/routing could not complete.
message Gap {
  GapKind kind = 1;
  string description = 2;
  optional string suggested_action = 3;
}

enum GapKind {
  GAP_KIND_UNSPECIFIED   = 0;
  ENTITY_UNMAPPED        = 1;
  CAPABILITY_UNAVAILABLE = 2;
  OUT_OF_DATA_SCOPE      = 3;
  AMBIGUOUS_INTENT       = 4;
  // PD-8 (2026-06-12): no agent survives the visibility_roles filter. Policy =
  // reveal existence, deny access — when the user names an inaccessible domain,
  // Gap.description names it. See kantheon-security.md §3.2.
  NO_ENTITLED_AGENT      = 5;
}

// ---------------------------------------------------------------------------
// Entity bindings
// ---------------------------------------------------------------------------

message UniversalEntityBinding {
  UniversalEntityType entity_type = 1;
  string raw_text = 2;
  string normalized_value = 3;       // e.g. ISO date, typed amount
  string source_engine = 4;
}

message DomainEntityBinding {
  string entity_type_ref = 1;        // from Registry.entityTypes
  string raw_text = 2;
  string resolved_id = 3;
  string resolved_label = 4;
  repeated FuzzyCandidate alternatives = 5;
}

message FuzzyCandidate {
  string fuzzy_id = 1;
  string fuzzy_label = 2;
  double score = 3;
}

message EntityBinding {
  int32 span_start = 1;
  int32 span_end = 2;
  oneof binding {
    UniversalEntityBinding universal = 3;
    DomainEntityBinding domain = 4;
  }
}