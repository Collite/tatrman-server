// pythia/v1 — the autonomous analytical investigator contract (Pythia arc).
//
// Authority: docs/architecture/pythia/contracts.md §1 (the abbreviated skeleton
// + fixed field numbers + the §9 divergence table) projected field-complete from
// docs/design/pythia/Pythia-v1-Design.md §3.1–3.3 (the semantic authority). Where
// the design and contracts diverge, the locked §9 divergences win:
//   D1  PgResultSnapshot is a Handle kind (lets Phases 2–3 ship before Charon).
//   D1b DbTableRef is a Handle kind (Charon named-connection table).
//   D5  WorkerSessionDF keys on df_name (Polars worker keying), not df_id.
//   D6  Conclusion blocks are envelope/v1 Block (one Block contract constellation-wide).
// The 12-status lifecycle (PD-11 added AWAITING_BUDGET_DECISION) and the five
// AWAITING_* pause states are the task-list authority for this stage.
//
// Wire rules (AGENTS.md §6): Rule 6 — every response carries `messages = 99`;
// Rule 7 — function-call args ride as a JSON string (`*_json`), camelCase keys.
//
// Enum value names are prefixed per-enum: the package holds many enums whose
// bare values would collide (INCONCLUSIVE in Status and HypStatus, FAILED in
// Status and StepStatus, FORECAST in StyleHint and IntentKind), and proto3
// scopes top-level enum value names to the package.
syntax = "proto3";

package org.tatrman.kantheon.pythia.v1;

import "org/tatrman/kantheon/envelope/v1/envelope.proto";          // Block, BlockRole (D6)
import "org/tatrman/kantheon/themis/v1/themis.proto";              // Resolution / clarification outcomes
import "org/tatrman/kantheon/common/v1/handoff.proto";            // HandoffContext, EntityBinding (PD-1)
import "org/tatrman/kantheon/common/v1/response_message.proto";   // Rule-6 stand-in

option java_multiple_files = true;
option java_package = "org.tatrman.kantheon.pythia.v1";

// =========================================================================
// Enums — lifecycle, hypothesis, step, stop, style, intent, depth, policy.
// =========================================================================

// The 12-status investigation lifecycle (design §3.4 + PD-11). Five AWAITING_*
// pause states, each resumed by exactly one control endpoint (contracts §2):
//   AWAITING_RESOLUTION_INPUT       → POST .../answer
//   AWAITING_PLAN_APPROVAL          → POST .../approve-plan
//   AWAITING_PLAN_REVISION_APPROVAL → POST .../approve-revision
//   AWAITING_USER_INPUT             → POST .../answer
//   AWAITING_BUDGET_DECISION        → POST .../budget-decision   (PD-11)
// Terminal: DONE / FAILED / HALTED / INCONCLUSIVE (design §3.4).
enum Status {
  STATUS_UNSPECIFIED                     = 0;
  STATUS_SUBMITTED                       = 1;
  STATUS_RESOLVING                       = 2;
  STATUS_AWAITING_RESOLUTION_INPUT       = 3;
  STATUS_PLANNING                        = 4;
  STATUS_AWAITING_PLAN_APPROVAL          = 5;
  STATUS_EXECUTING                       = 6;
  STATUS_AWAITING_USER_INPUT             = 7;
  STATUS_AWAITING_PLAN_REVISION_APPROVAL = 8;
  STATUS_AWAITING_BUDGET_DECISION        = 9;   // PD-11 (on_budget_threshold = ASK)
  STATUS_SYNTHESIZING                    = 10;
  STATUS_DONE                            = 11;  // terminal
  STATUS_FAILED                          = 12;  // terminal
  STATUS_HALTED                          = 13;  // terminal
  STATUS_INCONCLUSIVE                    = 14;  // terminal
}

// Per-hypothesis lifecycle (design §3.2 Hypothesis.status).
enum HypStatus {
  HYP_STATUS_UNSPECIFIED = 0;
  HYP_PROPOSED           = 1;
  HYP_UNDER_TEST         = 2;
  HYP_SUPPORTED          = 3;
  HYP_REFUTED            = 4;
  HYP_INCONCLUSIVE       = 5;
  HYP_ABANDONED          = 6;
  HYP_OUT_OF_SCOPE       = 7;
}

// Per-step lifecycle (design §3.2 StepRecord.status).
enum StepStatus {
  STEP_STATUS_UNSPECIFIED = 0;
  STEP_SCHEDULED          = 1;
  STEP_RUNNING            = 2;
  STEP_COMPLETED          = 3;
  STEP_FAILED             = 4;
  STEP_RETRYING           = 5;
}

// The 5-element shared stop spine (design §3.5, decision #13). STOP_GOAL_REACHED
// is the only "confident" terminal; the rest flag truncation in the Conclusion.
enum StopReason {
  STOP_REASON_UNSPECIFIED = 0;
  STOP_USER               = 1;
  STOP_BUDGET             = 2;
  STOP_HARD_CAP           = 3;
  STOP_PLAN_EXHAUSTED     = 4;
  STOP_GOAL_REACHED       = 5;
}

// Caller's rendering hint (design §3.1). AUTO = Pythia infers from question shape.
enum StyleHint {
  STYLE_HINT_UNSPECIFIED = 0;
  STYLE_LIST             = 1;
  STYLE_NARRATIVE        = 2;
  STYLE_FORECAST         = 3;
  STYLE_SIMULATION       = 4;
  STYLE_AUTO             = 5;
}

// Resolved analytical intent (design §3.2 ResolvedIntent.kind). Pythia-local
// mirror of themis/v1 IntentKind, carried on the ResolutionResult.
enum IntentKind {
  INTENT_KIND_UNSPECIFIED = 0;
  INTENT_PROCEDURAL       = 1;
  INTENT_RCA              = 2;
  INTENT_FORECAST         = 3;
  INTENT_SIMULATION       = 4;
}

// Investigation depth ladder (design §3.1 Constraints). Defaults:
// SHALLOW ≤3 steps/~$0.20, NORMAL ≤15/~$2, DEEP ≤50/~$10.
enum DepthBudget {
  DEPTH_BUDGET_UNSPECIFIED = 0;
  DEPTH_SHALLOW            = 1;
  DEPTH_NORMAL             = 2;
  DEPTH_DEEP               = 3;
}

// Hypothesis display rank in the conclusion / tree (design §3.2 DisplayPriority).
enum DisplayPriority {
  DISPLAY_PRIORITY_UNSPECIFIED = 0;
  DISPLAY_HIDDEN               = 1;
  DISPLAY_SECONDARY           = 2;
  DISPLAY_PRIMARY             = 3;
}

// How a piece of evidence bears on its hypothesis (design §3.2 EvidenceLink).
enum EvidenceInterpretation {
  EVIDENCE_INTERPRETATION_UNSPECIFIED = 0;
  EVIDENCE_SUPPORTS                   = 1;
  EVIDENCE_REFUTES                    = 2;
  EVIDENCE_NEUTRAL                    = 3;
}

// Plan-revision kind (design §3.3 plan_revised, §3 reviser).
enum RevisionKind {
  REVISION_KIND_UNSPECIFIED = 0;
  REVISION_PRUNE            = 1;
  REVISION_PIVOT            = 2;
  REVISION_DECOMPOSE        = 3;
  REVISION_HALT             = 4;
}

// Confidence provenance (design §3.2 ConfidenceInfo.kind). HEURISTIC = the
// capped explained-variance sum (Phase 3); MODEL_BASED = a Metis fit (Phase 4).
enum ConfidenceKind {
  CONFIDENCE_KIND_UNSPECIFIED = 0;
  CONFIDENCE_HEURISTIC        = 1;
  CONFIDENCE_MODEL_BASED      = 2;
}

// Where a loose end was derived (design §3.2 LooseEnd.source).
enum LooseEndSource {
  LOOSE_END_SOURCE_UNSPECIFIED = 0;
  LOOSE_END_PLANNING_TIME      = 1;
  LOOSE_END_EXECUTION_TIME     = 2;
}

// Why a thread was left dangling (design §3.2 LooseEnd.reason).
enum LooseEndReason {
  LOOSE_END_REASON_UNSPECIFIED = 0;
  LOOSE_END_OUT_OF_DATA_SCOPE       = 1;
  LOOSE_END_OUT_OF_CAPABILITY_SCOPE = 2;
  LOOSE_END_DEPRIORITIZED_BY_DEPTH  = 3;
  LOOSE_END_BUDGET_EXHAUSTED        = 4;
  LOOSE_END_HARD_CAP_EXCEEDED       = 5;
  LOOSE_END_INCONCLUSIVE_ABANDONED  = 6;
  LOOSE_END_PIVOTED_AWAY            = 7;
  LOOSE_END_USER_HALTED             = 8;
}

// ---- HitlPolicy sub-policies (design §3.1 / §3.5 policy table) ----
enum PlanApprovalPolicy {
  PLAN_APPROVAL_UNSPECIFIED       = 0;
  PLAN_APPROVAL_AUTO              = 1;
  PLAN_APPROVAL_REQUIRED          = 2;
  PLAN_APPROVAL_REQUIRED_FOR_DEEP = 3;
}
enum SuspicionPolicy {
  SUSPICION_POLICY_UNSPECIFIED = 0;
  SUSPICION_CONTINUE           = 1;
  SUSPICION_WARN               = 2;
  SUSPICION_HALT               = 3;
}
enum RevisionPolicy {
  REVISION_POLICY_UNSPECIFIED = 0;
  REVISION_AUTO               = 1;
  REVISION_APPROVE            = 2;
}
enum BudgetPolicy {
  BUDGET_POLICY_UNSPECIFIED = 0;
  BUDGET_CONTINUE           = 1;
  BUDGET_ASK                = 2;
}
enum DisambiguationPolicy {
  DISAMBIGUATION_POLICY_UNSPECIFIED = 0;
  DISAMBIGUATION_INTERACTIVE        = 1;
  DISAMBIGUATION_SPECULATIVE        = 2;
  DISAMBIGUATION_STRICT             = 3;
}

// =========================================================================
// Request (design §3.1)
// =========================================================================

// A submitted investigation. `id` is assigned by Pythia on submit; `parent_id`
// links replays / reproductions / follow-ups to their origin.
message Investigation {
  string id                   = 1;             // Pythia-assigned on submit
  optional string parent_id   = 2;             // replay / reproduce / follow-up origin
  Caller caller               = 3;
  string question             = 4;             // natural language, locale-tagged
  InvestigationContext context = 5;
  StyleHint style_hint        = 6;
  optional ScenarioSpec scenario_params = 7;   // forecast / simulation only
  Constraints constraints     = 8;
  HitlPolicy hitl_policy      = 9;
  optional LlmOverrides llm_overrides = 10;
}

// Who asked, and the partition/billing key.
message Caller {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    IRIS             = 1;
    HEBE             = 2;
    API              = 3;
    SCHEDULED        = 4;
  }
  Kind kind             = 1;
  string user_id        = 2;
  string tenant_id      = 3;   // partition / retention / billing (design Q6)
  string correlation_id = 4;
}

// The originating context. `handoff` (PD-1) is the typed anchor from the turn
// that escalated: Pythia seeds the investigation from `handoff.view` (the
// pattern/sql/args behind what the user was looking at) + `handoff.entities`,
// and the Conclusion links back to `handoff.source_turn_ref`.
message InvestigationContext {
  repeated org.tatrman.kantheon.common.v1.EntityBinding entity_context = 1;
  repeated string conversation_excerpt = 2;     // last N relevant turns (rendered)
  string locale                        = 3;     // cs | en | sk | hu | de
  string themis_prior_context          = 4;     // opaque Themis continuation token
  optional org.tatrman.kantheon.common.v1.HandoffContext handoff = 5;  // PD-1
}

// Structured forecast / simulation input (design §3.1 ScenarioSpec).
message ScenarioSpec {
  string horizon            = 1;   // e.g. "2026-12-31"
  double confidence_level   = 2;   // e.g. 0.90
  bool include_seasonality  = 3;
  string deltas_json        = 4;   // Rule 7: {"priceDelta":0.2,"volumeDelta":-0.05}
  string model_class_hint   = 5;   // optional model family hint
}

// Hard caps (design §3.1 Constraints).
message Constraints {
  optional double max_llm_cost_usd  = 1;
  optional int32 max_llm_tokens     = 2;
  optional int32 latency_budget_ms  = 3;
  optional int32 max_step_count     = 4;
  DepthBudget depth_budget          = 5;
}

// Human-in-the-loop policy (design §3.1, behaviour in §3.5 table).
message HitlPolicy {
  PlanApprovalPolicy plan_approval       = 1;
  SuspicionPolicy on_suspicious_result   = 2;
  RevisionPolicy on_plan_revision        = 3;
  BudgetPolicy on_budget_threshold       = 4;
  DisambiguationPolicy disambiguation    = 5;
}

// Per-investigation tier escalations (design §3.1 LlmOverrides). Open map of
// call-site → tier tag; the two named call-sites are evaluator / suspicion.
message LlmOverrides {
  map<string, string> tier_overrides = 1;   // "evaluator" -> "strong", ...
}

// =========================================================================
// Resolution (design §3.2 ResolutionResult)
// =========================================================================

message ResolutionResult {
  ResolvedIntent resolved_intent           = 1;
  repeated Assumption assumptions          = 2;   // SPECULATIVE best-guesses
  repeated ClarificationRoundtrip clarifications = 3;
}

message ResolvedIntent {
  IntentKind kind                    = 1;
  repeated org.tatrman.kantheon.common.v1.EntityBinding entities = 2;
  string resolved_params_json        = 3;   // Rule 7; resolved against current time
  string expressed_params_json       = 4;   // Rule 7; original wording (replay vs reproduce)
  repeated string relevant_query_refs       = 5;
  repeated string relevant_capability_ids   = 6;
}

message Assumption {
  string text       = 1;
  double confidence = 2;
}

message ClarificationRoundtrip {
  string question          = 1;
  repeated string options  = 2;
  string answer            = 3;
}

// =========================================================================
// Plan (design §3.2 PlanDag)
// =========================================================================

message PlanDag {
  repeated Hypothesis hypotheses = 1;   // procedural plans carry one trivial hyp
  repeated PlanNode nodes        = 2;
  repeated DataDep edges         = 3;
  string rationale               = 4;
  int32 revision                 = 5;   // 0 initial; bumps on plan_revised
}

// A plan node. `tests_hyp_ids` ties the node to the hypotheses it probes. The
// oneof field numbers 3–7 are fixed (contracts §1).
message PlanNode {
  string node_id                  = 1;
  repeated string tests_hyp_ids   = 2;
  oneof kind {
    QueryNode query          = 3;   // theseus-mcp
    DataFrameNode dataframe  = 4;   // Polars worker (Phase 4)
    ModelNode model          = 5;   // Metis (Phase 4)
    ReasoningNode reasoning  = 6;   // LLM reasoning step
    RenderNode render        = 7;   // envelope/v1 Block production
  }
}

message QueryNode {
  string query_ref     = 1;   // catalogued query id
  string params_json   = 2;   // Rule 7; HandleRef projections resolved at launch
  repeated string stack = 3;  // optional TransDSL ops (Filter/Project/Sort)
}

message DataFrameNode {
  string dfdsl            = 1;
  string source_handle_id = 2;   // a WorkerSessionDF / blob handle
}

message ModelNode {
  string capability_id           = 1;   // e.g. "model.forecast.arima"
  repeated string input_handle_ids = 2;
  string params_json             = 3;   // Rule 7
}

message ReasoningNode {
  enum OutputKind { OUTPUT_KIND_UNSPECIFIED = 0; OUTPUT_STRUCTURED = 1; OUTPUT_TEXT = 2; }
  enum TierHint   { TIER_HINT_UNSPECIFIED   = 0; TIER_STRONG = 1; TIER_CHEAP = 2; }
  string prompt_ref              = 1;
  repeated string input_handle_ids = 2;
  OutputKind output_kind         = 3;
  TierHint tier_hint             = 4;
}

message RenderNode {
  enum RenderKind { RENDER_KIND_UNSPECIFIED = 0; RENDER_TABLE = 1; RENDER_CHART = 2; RENDER_NARRATIVE_FRAGMENT = 3; }
  RenderKind kind                = 1;
  repeated string input_handle_ids = 2;
  org.tatrman.kantheon.envelope.v1.BlockRole block_role = 3;
  optional string caption        = 4;
  string format_options_json     = 5;   // Rule 7
}

message DataDep {
  string from_node_id = 1;
  string to_node_id   = 2;
  string binding      = 3;   // e.g. "to.params.customerIds = from.output.customerId"
}

// =========================================================================
// Hypothesis / evidence / predicate (design §3.2 — verbatim fields)
// =========================================================================

message Hypothesis {
  string id                          = 1;
  optional string parent_id          = 2;   // sub-hypothesis tree
  string statement                   = 3;
  optional Predicate predicate       = 4;
  HypStatus status                   = 5;
  repeated string test_step_ids      = 6;
  repeated EvidenceLink evidence      = 7;
  double confidence                  = 8;   // [0,1]
  string rationale                   = 9;
  double estimated_explanatory_power = 10;  // [0,1]; planner-supplied, evaluator-refined
  double diagnostic_power            = 11;  // [0,1]; "if refuted, how much do I learn?"
  DisplayPriority display_priority   = 12;
}

message EvidenceLink {
  string step_id                       = 1;
  Handle output_handle                 = 2;
  EvidenceInterpretation interpretation = 3;
  string reasoning                     = 4;
  double confidence                    = 5;
}

// A formal evaluation rule (design §3.2 Predicate). The kinds exercised by the
// Phase 2 rules-first evaluator are enumerated; the set extends at this layer.
message Predicate {
  enum Kind {
    PREDICATE_KIND_UNSPECIFIED = 0;
    ROW_COUNT_GT        = 1;
    ROW_COUNT_LT        = 2;
    ROW_COUNT_EQ        = 3;
    METRIC_DELTA_RATIO  = 4;
    NULL_RATE_LT        = 5;
    CORRELATION_STRENGTH = 6;
  }
  Kind kind            = 1;
  string parameters_json = 2;   // Rule 7
  double threshold     = 3;
}

// =========================================================================
// Step + handle (design §3.2)
// =========================================================================

message StepRecord {
  string id                        = 1;
  string node_id                   = 2;
  StepStatus status                = 3;
  string started_at                = 4;
  optional string completed_at     = 5;
  int32 attempts                   = 6;
  repeated string input_handle_ids = 7;
  optional Handle output_handle    = 8;
  StepCost cost                    = 9;
  optional StepError error         = 10;
}

message StepCost {
  optional int32 tokens_in  = 1;
  optional int32 tokens_out = 2;
  double usd                = 3;
  int32 latency_ms          = 4;
  bool cached               = 5;
  string tier_used          = 6;   // "strong" | "cheap" | "" (no LLM)
}

message StepError {
  string code        = 1;
  string message     = 2;
  bool recoverable   = 3;
}

// A reference to materialised (or referencible) Arrow data. The oneof slots 1–6
// are FIXED (contracts §1 / §9): D1 added pg_snapshot (Pythia-private capped
// inline Arrow), D1b added db_table (Charon named-connection table). `handle_id`
// keys the HandleTable and is referenced by step/evidence output refs.
message Handle {
  oneof kind {
    LiveQueryRef live_query      = 1;
    PgResultSnapshot pg_snapshot = 2;   // D1 — Pythia-private, capped inline Arrow
    WorkerSessionDF worker_df    = 3;   // D5 — keyed (session_id, df_name)
    SeaweedArrowBlob seaweed     = 4;
    RedisArrowEntry redis        = 5;
    DbTableRef db_table          = 6;   // D1b — Charon named-connection table
  }
  string handle_id = 10;
}

message LiveQueryRef {
  string query_ref   = 1;   // not yet executed; lazy
  string args_json   = 2;   // Rule 7
  string schema_json = 3;
}

message PgResultSnapshot {
  bytes arrow_ipc    = 1;   // capped by pythia.handles.inline-max-bytes
  int64 row_count    = 2;
  string schema_json = 3;
  bool truncated     = 4;   // set when the result exceeded the inline cap
}

message WorkerSessionDF {
  string worker_pod   = 1;
  string session_id   = 2;
  string df_name      = 3;   // D5 — df_name, not df_id
  string schema_json  = 4;
  int64 row_count_est = 5;
  string ttl_until    = 6;
}

message SeaweedArrowBlob {
  string url             = 1;
  string schema_json     = 2;
  int64 row_count        = 3;
  string content_hash    = 4;   // Arrow fingerprint (PD-5)
  int64 size_bytes       = 5;
  optional string retention_until = 6;
}

message RedisArrowEntry {
  string key         = 1;
  string schema_json = 2;
  string ttl         = 3;
}

message DbTableRef {
  string connection  = 1;   // named connection (no credentials on the wire)
  string table       = 2;
  string schema_json = 3;
}

// =========================================================================
// Conclusion / findings / loose ends / usage (design §3.2)
// =========================================================================

message Conclusion {
  RenderableArtifact primary           = 1;
  repeated RenderableArtifact alternates = 2;
  repeated string evidence_step_ids    = 3;
  optional ConfidenceInfo confidence   = 4;   // null for procedural
  StopReason stop_reason               = 5;
  bool budget_truncated                = 6;
  string source_turn_ref               = 7;   // PD-1 back-link to handoff.source_turn_ref
  bool partial                         = 8;   // halt-with-partials (contracts §2)
}

message RenderableArtifact {
  repeated org.tatrman.kantheon.envelope.v1.Block blocks = 1;   // D6
}

message ConfidenceInfo {
  ConfidenceKind kind      = 1;
  double score             = 2;   // [0,1]
  repeated string caveats  = 3;
}

message Finding {
  string id                         = 1;
  string kind                       = 2;   // open: "BASELINE", ...
  string summary                    = 3;
  repeated string evidence_step_ids = 4;
}

message LooseEnd {
  string hypothesis_id            = 1;
  LooseEndSource source           = 2;
  LooseEndReason reason           = 3;
  string why                      = 4;
  optional string suggested_followup = 5;
  optional string parent_hypothesis_id = 6;
}

message ResourceUsage {
  double total_usd                = 1;
  int64 total_llm_tokens_in       = 2;
  int64 total_llm_tokens_out      = 3;
  int32 total_query_count         = 4;
  int64 total_latency_ms          = 5;
  double cache_hit_rate           = 6;
  double cache_savings_usd        = 7;
  optional double halted_at_budget_pct = 8;
  bool hard_cap_hit               = 9;
  map<string, double> usd_by_tier = 10;
  map<string, double> usd_by_task_kind = 11;
}

// =========================================================================
// Artifact (design §3.2 — the 14-field investigation record)
// =========================================================================

message InvestigationArtifact {
  string id                       = 1;
  optional string parent_id       = 2;
  Status status                   = 3;
  ResolutionResult resolution     = 4;
  PlanDag plan                    = 5;
  repeated StepRecord steps       = 6;
  repeated Hypothesis hypotheses  = 7;
  repeated Finding findings        = 8;
  repeated LooseEnd loose_ends    = 9;
  optional Conclusion conclusion  = 10;
  ResourceUsage resource_usage    = 11;
  repeated string warnings        = 12;
  string created_at               = 13;
  optional string finalised_at    = 14;

  repeated org.tatrman.kantheon.common.v1.ResponseMessage messages = 99;  // Rule 6
}

// Inbox list row (contracts §2, PD-2) — the per-user GET /v1/investigations row.
message InvestigationSummary {
  string id              = 1;
  string question        = 2;
  Status status          = 3;
  string created_at      = 4;
  string updated_at      = 5;
  ResourceUsage resource_usage = 6;
  Caller.Kind caller_kind = 7;
}

// =========================================================================
// Event stream (design §3.3) — one message per event kind, a single oneof.
// =========================================================================

message InvestigationEvent {
  reserved 99;  // Rule-6 ResponseMessage slot reserved across the board (CLAUDE.md §4)
  string investigation_id = 1;
  int64 sequence          = 2;   // per-investigation monotone; PG-assigned
  string emitted_at       = 3;
  oneof event {
    // lifecycle (3)
    InvestigationSubmitted investigation_submitted = 10;
    StatusChanged status_changed                   = 11;
    InvestigationDone investigation_done           = 12;
    // resolution (4)
    ResolutionStarted resolution_started                       = 13;
    ResolutionClarificationNeeded resolution_clarification_needed = 14;
    ResolutionClarificationAnswered resolution_clarification_answered = 15;
    ResolutionCompleted resolution_completed                   = 16;
    // planning (4)
    PlanDrafted plan_drafted   = 17;
    PlanApproved plan_approved = 18;
    PlanRejected plan_rejected = 19;
    PlanRevised plan_revised   = 20;
    // hypotheses (6)
    HypothesisProposed hypothesis_proposed       = 21;
    HypothesisUnderTest hypothesis_under_test     = 22;
    HypothesisSupported hypothesis_supported     = 23;
    HypothesisRefuted hypothesis_refuted         = 24;
    HypothesisInconclusive hypothesis_inconclusive = 25;
    HypothesisAbandoned hypothesis_abandoned     = 26;
    // prioritisation (2)
    HypothesesPrioritized hypotheses_prioritized = 27;
    DeepeningDecision deepening_decision         = 28;
    // execution (6)
    BatchLaunched batch_launched   = 29;
    StepStarted step_started       = 30;
    StepRetrying step_retrying     = 31;
    StepCompleted step_completed   = 32;
    StepFailed step_failed         = 33;
    BatchCompleted batch_completed = 34;
    // suspicion / findings (2)
    SuspicionRaised suspicion_raised = 35;
    FindingRecorded finding          = 36;
    // loose ends (2)
    LooseEndDeclared loose_end_declared   = 37;
    LooseEndGenerated loose_end_generated = 38;
    // budget (3)
    BudgetThreshold budget_threshold = 39;
    BudgetExhausted budget_exhausted = 40;
    SchedulerDrained scheduler_drained = 41;
    // synthesis (4)
    SynthesizerBlockStarted synthesizer_block_started     = 42;
    SynthesizerBlockStreaming synthesizer_block_streaming = 43;
    SynthesizerBlockCompleted synthesizer_block_completed = 44;
    SynthesizerDone synthesizer_done                      = 45;
    // conclusion (1)
    ConclusionReached conclusion = 46;
  }
}

// ---- lifecycle ----
message InvestigationSubmitted { Investigation request = 1; }
message StatusChanged { Status from = 1; Status to = 2; optional string reason = 3; }
message InvestigationDone { Status status = 1; ResourceUsage resource_usage = 2; }

// ---- resolution ----
message ResolutionStarted { string question = 1; }
message ResolutionClarificationNeeded { string clarification_request_json = 1; }
message ResolutionClarificationAnswered { string answers_json = 1; }
message ResolutionCompleted { ResolvedIntent resolved_intent = 1; repeated Assumption assumptions = 2; }

// ---- planning ----
message PlanDrafted { PlanDag plan = 1; bool awaiting_approval = 2; }
message PlanApproved { PlanDag plan = 1; }
message PlanRejected { string reason = 1; optional string rejection_comment = 2; }
message PlanRevised { PlanDag plan = 1; RevisionKind revision_kind = 2; string trigger = 3; }

// ---- hypotheses ----
message HypothesisProposed { Hypothesis hypothesis = 1; }
message HypothesisUnderTest { string hyp_id = 1; repeated string step_ids = 2; }
message HypothesisSupported { string hyp_id = 1; repeated string evidence_step_ids = 2; double confidence = 3; }
message HypothesisRefuted { string hyp_id = 1; string refuting_step_id = 2; string reasoning = 3; }
message HypothesisInconclusive { string hyp_id = 1; string reason = 2; }
message HypothesisAbandoned { string hyp_id = 1; string reason = 2; }

// ---- prioritisation ----
message HypothesesPrioritized { repeated PrioritizedHyp ordered = 1; }
message PrioritizedHyp { string hyp_id = 1; double score = 2; string rationale = 3; }
message DeepeningDecision {
  string chose_hyp_id      = 1;
  double score             = 2;
  string rationale         = 3;
  repeated string alternates = 4;
  bool tie_break_used      = 5;
}

// ---- execution ----
message BatchLaunched { string batch_id = 1; repeated string step_ids = 2; double projected_cost_usd = 3; int32 max_parallelism = 4; }
message StepStarted { string step_id = 1; string node_kind = 2; string summary = 3; }
message StepRetrying { string step_id = 1; int32 attempt = 2; string reason = 3; }
message StepCompleted { string step_id = 1; string output_handle_id = 2; int64 row_count = 3; StepCost cost = 4; }
message StepFailed { string step_id = 1; string error_code = 2; string message = 3; bool recoverable = 4; }
message BatchCompleted {
  string batch_id              = 1;
  repeated string succeeded     = 2;
  repeated string failed        = 3;
  repeated string inconclusive  = 4;
  double actual_cost_usd       = 5;
}

// ---- suspicion / findings ----
message SuspicionRaised { string step_id = 1; string kind = 2; string severity = 3; string message = 4; }
message FindingRecorded { Finding finding = 1; }

// ---- loose ends ----
message LooseEndDeclared { LooseEnd loose_end = 1; }
message LooseEndGenerated { LooseEnd loose_end = 1; }

// ---- budget ----
message BudgetThreshold { double used_usd = 1; double remaining_usd = 2; double projected_next_batch_usd = 3; string severity = 4; }
message BudgetExhausted { string triggered_action = 1; repeated string remaining_planned_steps = 2; }
message SchedulerDrained { string reason = 1; }

// ---- synthesis ----
message SynthesizerBlockStarted { int32 block_index = 1; string kind = 2; }
message SynthesizerBlockStreaming { int32 block_index = 1; string partial_content = 2; }
message SynthesizerBlockCompleted { int32 block_index = 1; org.tatrman.kantheon.envelope.v1.Block block = 2; }
message SynthesizerDone { int32 total_blocks = 1; }

// ---- conclusion ----
message ConclusionReached { Conclusion conclusion = 1; }

// =========================================================================
// Coarse lifecycle subject (contracts §3, PD-2) — published on every status
// transition to pythia.lifecycle.{user_id}. Status-only by design (no payload).
// =========================================================================
message InvestigationLifecycleEvent {
  reserved 99;  // Rule-6 ResponseMessage slot reserved across the board (CLAUDE.md §4)
  string investigation_id = 1;
  string user_id          = 2;
  Status old_status       = 3;
  Status new_status       = 4;
  string ts               = 5;
}
