// SPDX-License-Identifier: Apache-2.0
// =============================================================================
// Kantheon — Query service (the query orchestrator)
//
// Forked from ai-platform `com/tatrman/runner/v1/query_runner.proto`
// (ai-platform@2575b923, tag kantheon-fork-point) at fork Stage 3.5. Renamed
// into the constellation: QueryRunnerService -> QueryService.
//
// Query is the agent's single entry point for query execution. A thin
// orchestrator that chains Translate (translate) → Validate (validate) → Dispatch
// (dispatch) → a worker (Mssql / Polars) and pipes Arrow IPC streams back
// upstream. It owns the LRU compiled-RelNode cache so repeated identical
// queries skip parse/translate. (Validate and Dispatch are reached via their gRPC
// clients in Kotlin; this proto only references the wire types that cross
// Query's own surface — plan, worker, translate.)
//
// Per Round 7 decisions (inherited):
//   - Single agent-facing entry point for query execution.
//   - End-to-end gRPC server-streaming for results; Query does not
//     transform Arrow bytes.
//   - Back-pressure via gRPC HTTP/2 flow control; cancellation via gRPC context.
//   - LRU compiled-RelNode cache keyed by
//     (modelVersion, sourceHash, sourceLanguage, paramSignature).
//     Per-request opt-out via bypass_cache=true.
//   - Translate is offered as a passthrough to Translate.Translate.
//   - Compile returns predicted_schema_fingerprint; runtime check at first
//     ResultBatch logs WARNING on mismatch but does not fail.
// =============================================================================

syntax = "proto3";

package org.tatrman.query.v1;

import "org/tatrman/plan/v1/plan.proto";
import "org/tatrman/plan/v1/context.proto";
import "org/tatrman/plan/v1/parameters.proto";
import "org/tatrman/meta/v1/meta.proto";
import "org/tatrman/worker/v1/worker.proto";
import "org/tatrman/translate/v1/translate.proto";
import "org/tatrman/translate/v1/translator.proto";
import "org/tatrman/common/v1/response_message.proto";

option java_package = "org.tatrman.query.v1";
option java_multiple_files = true;
option java_outer_classname = "QueryProto";

// =============================================================================
// Service
// =============================================================================

service QueryService {
  // Submit a query in any source language and stream Arrow IPC results back.
  // Internal pipeline: Translate.ParseToRelNode → Validate.Validate →
  // (cache hit short-circuits both above) → Dispatch.Dispatch → worker
  // (the worker calls Translate.UnparseFromRelNode and executes; ResultBatches
  // stream back through the chain unchanged).
  //
  // Agent-facing entry point for "run this query, give me data".
  rpc Run(RunRequest) returns (stream org.tatrman.worker.v1.ResultBatch);

  // Run the front of the pipeline (Translate + Validate) without executing. Returns
  // the validated PlanNode + parameter requirements + predicted schema
  // fingerprint that execution would produce.
  rpc Compile(RunRequest) returns (CompileResponse);

  // One-shot any-to-any language conversion. Pure passthrough to
  // Translate.Translate; offered here so agents have a single endpoint for
  // query-related concerns. Does not validate or execute.
  rpc Translate(org.tatrman.translate.v1.TranslateRequest)
      returns (org.tatrman.translate.v1.TranslateResponse);

  // Service-level status (mirrors veles / dispatch / worker shape).
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}

// =============================================================================
// Run / Compile shared request shape
// =============================================================================

message RunRequest {
  // The query to run, in some source language. For pre-compiled PlanNodes,
  // pass source_language = REL_NODE with the proto-encoded PlanNode in
  // source (see Translate Language enum).
  string source = 1;
  org.tatrman.translate.v1.Language source_language = 2;

  // Caller's PipelineContext. Notable fields:
  //   - user_id: required for security-bearing queries
  //   - auth_roles: caller roles forwarded from the bearer (Validate reads these)
  //   - session_id: empty for stateless one-shot queries; non-empty for
  //     conversational sessions (Dispatch sticky-routes when the selected worker
  //     advertises supports_stateful_sessions = true)
  //   - correlation_id: caller-provided or generated by Query
  //   - parameters: bound parameter values; unbound parameters cause
  //     validation failure with code "parameter_unbound"
  //   - model_version: may be empty; Query fills from current Veles snapshot
  org.tatrman.plan.v1.PipelineContext context = 3;

  // Execution options forwarded to the worker.
  org.tatrman.worker.v1.ExecutionOptions execution_options = 4;

  // Cache control. Default false → consult LRU compiled-RelNode cache.
  // Cache key: (modelVersion, SHA-256(source), sourceLanguage, paramSignature).
  // paramSignature is a hash of parameter NAMES + TYPES (not values) so the
  // same compiled plan is reusable across executions with different values.
  bool bypass_cache = 5;

  // Schema the caller's `source` identifiers are written in (UNSPECIFIED =
  // autodetect from the model catalog; DB/ER = caller asserts).
  org.tatrman.plan.v1.SchemaCode source_schema = 6;

  reserved 7 to 10;
}

// =============================================================================
// Compile response
// =============================================================================

message CompileResponse {
  // The validated PlanNode ready to dispatch. Caller may keep this and submit
  // it directly to Run on a subsequent call by encoding as REL_NODE in source.
  org.tatrman.plan.v1.PlanNode plan = 1;

  org.tatrman.plan.v1.PipelineContext context = 2;

  // Parameters discovered during compilation. Each entry's `value` is unset for
  // parameters the caller did not bind; caller supplies values before Run.
  repeated org.tatrman.plan.v1.ParameterBinding required_parameters = 3;

  // SHA-256 (lowercase hex) of the canonical Arrow IPC schema bytes that
  // execution would produce; matches the worker's first
  // ResultBatch.schema_fingerprint. Runtime mismatch logs at WARNING, never fails.
  string predicted_schema_fingerprint = 4;

  repeated org.tatrman.common.v1.ResponseMessage messages = 99;
  reserved 100 to 104;
}

// =============================================================================
// GetStatus
// =============================================================================

message GetStatusRequest {}

message GetStatusResponse {
  bool ready = 1;
  int32 active_runs = 2;
  CacheStatus compiled_cache = 3;
  // Per-dependency health, mirroring the veles status shape.
  repeated org.tatrman.meta.v1.DependencyStatus dependencies = 4;
  org.tatrman.meta.v1.OverallStatus overall_status = 5;
  repeated org.tatrman.common.v1.ResponseMessage messages = 99;
  reserved 100 to 104;
}

message CacheStatus {
  int64 entries = 1;
  int64 max_entries = 2;
  int64 hits = 3;                  // since process start
  int64 misses = 4;
  int64 invalidations = 5;          // due to model_version change
  int64 evictions = 6;              // LRU
  string current_model_version = 7;
  reserved 8 to 12;
}
