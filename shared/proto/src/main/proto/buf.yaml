# Buf module anchor for the kantheon proto tree.
#
# Sole consumer: the envelope-ts TS codegen (shared/libs/ts/envelope-ts —
# Iris Stage 1.1), which runs ts-proto via buf with this directory as the
# module root so proto imports (`org/tatrman/kantheon/...`) resolve. The
# Kotlin/Python legs use the Gradle protobuf plugin's own protoc and ignore
# this file. Lint/breaking checks are intentionally minimal — buf is a
# codegen driver here, not the contract gate.
version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  # The protos here are forked/derived (envelope/v1 mirrors FormatEnvelope v2
  # field order; pipeline protos carry inherited shapes) — buf lint is not the
  # authority. Disable the rules that fight derived contracts.
  except:
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - FIELD_LOWER_SNAKE_CASE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    - SERVICE_SUFFIX
breaking:
  use:
    - FILE
