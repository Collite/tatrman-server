---
# The Kantheon constellation, as a Backstage software catalog. Replaces the upstream example
# catalog (fork Phase 5 Stage 5.5). Components describe the pantheon — the speaking-god agents,
# the platform services that serve them, the Dispatchs workers, the MCP wrappers, and the
# off-constellation technical-wave infrastructure. Owned by the `kantheon` group.
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: kantheon
  description: The Kantheon constellation team.
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: kantheon
  description: The Kantheon constellation — the agent constellation and platform.
spec:
  owner: kantheon
---
# ── Agents (the speaking gods) ──────────────────────────────────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: iris-bff
  description: Dispatch BFF — conversation state, Themis dispatch, stream multiplex (Kotlin/Ktor).
spec: { type: service, lifecycle: production, owner: kantheon, system: kantheon }
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: themis
  description: Question understanding + agent routing (Kotlin/Koog).
spec: { type: service, lifecycle: production, owner: kantheon, system: kantheon }
---
apiVersion: backstage.io/v1alpha1
