apiVersion: v2
name: backstage
description: |
  The Kantheon developer portal (Backstage — a Node app, NOT an nginx/Vue SPA) — an
  env-agnostic Helm chart. Uses the kantheon-service library's BACKEND Deployment/Service
  shape (single HTTP port) plus a Gateway API HTTPRoute for external exposure. Holds no
  cluster knowledge: image, replicas, resources, the app/backend base URLs, the Postgres
  wiring and the Keycloak OIDC client are all values (secrets via secretKeyRef). The
  Backstage backend listens on :7007 (hardcoded in app-config.yaml). Per-environment
  values live in the deploying GitOps repo (Olymp).
type: application
version: 0.1.0
appVersion: "dev"
# Backend Deployment/Service shape from the kantheon-service library chart (D1);
# the FE-family configmap is not used (Backstage reads env directly).
dependencies:
  - name: kantheon-service
    version: 0.1.0
    repository: "file://../../../shared/charts/kantheon-service"
