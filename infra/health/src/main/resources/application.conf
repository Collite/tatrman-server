    }

    arges {
      type = native
      type = ${?HEALTH_ARGES_TYPE}
      url = "http://arges:7302"
      url = ${?HEALTH_ARGES_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_ARGES_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_ARGES_TIMEOUT}
    }

    # ---------------------------------------------------------------- MCP wrappers (tools)
    capabilities-mcp {
      type = native
      type = ${?HEALTH_CAPABILITIES_MCP_TYPE}
      url = "http://capabilities-mcp:7501"
      url = ${?HEALTH_CAPABILITIES_MCP_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_CAPABILITIES_MCP_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_CAPABILITIES_MCP_TIMEOUT}
    }

    ariadne-mcp {
      type = native
      type = ${?HEALTH_ARIADNE_MCP_TYPE}
      url = "http://ariadne-mcp:7262"
      url = ${?HEALTH_ARIADNE_MCP_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_ARIADNE_MCP_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_ARIADNE_MCP_TIMEOUT}
    }

    theseus-mcp {
      type = native
      type = ${?HEALTH_THESEUS_MCP_TYPE}
      url = "http://theseus-mcp:7307"
      url = ${?HEALTH_THESEUS_MCP_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_THESEUS_MCP_ENDPOINT}
      timeout = 5000
