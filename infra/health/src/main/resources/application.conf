    # ---------------------------------------------------------------- Technical wave (infra/)
    whois {
      type = native
      type = ${?HEALTH_WHOIS_TYPE}
      url = "http://whois:7110"
      url = ${?HEALTH_WHOIS_URL}
      healthEndpoint = "/health"
