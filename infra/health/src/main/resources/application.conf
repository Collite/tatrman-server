      url = "http://theseus:7305"
      url = ${?HEALTH_THESEUS_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_THESEUS_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_THESEUS_TIMEOUT}
    }

    echo {
      type = native
      type = ${?HEALTH_ECHO_TYPE}
      url = "http://echo:7265"
      url = ${?HEALTH_ECHO_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_ECHO_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_ECHO_TIMEOUT}
    }

    kadmos {
      type = native
      type = ${?HEALTH_KADMOS_TYPE}
      url = "http://kadmos:7270"
      url = ${?HEALTH_KADMOS_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_KADMOS_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_KADMOS_TIMEOUT}
    }

    proteus {
      type = native
      type = ${?HEALTH_PROTEUS_TYPE}
      url = "http://proteus:7275"
      url = ${?HEALTH_PROTEUS_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_PROTEUS_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_PROTEUS_TIMEOUT}
    }

    prometheus-gateway {
      type = native
      type = ${?HEALTH_PROMETHEUS_GATEWAY_TYPE}
      # Prometheus the LLM gateway (not the metrics store) — Spring Boot health under /actuator.
      url = "http://prometheus:7280"
      url = ${?HEALTH_PROMETHEUS_GATEWAY_URL}
      healthEndpoint = "/actuator/health"
      healthEndpoint = ${?HEALTH_PROMETHEUS_GATEWAY_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_PROMETHEUS_GATEWAY_TIMEOUT}
    }

    argos {
      type = native
      type = ${?HEALTH_ARGOS_TYPE}
      url = "http://argos:7285"
      url = ${?HEALTH_ARGOS_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_ARGOS_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_ARGOS_TIMEOUT}
    }

    kyklop {
      type = native
      type = ${?HEALTH_KYKLOP_TYPE}
      url = "http://kyklop:7290"
      url = ${?HEALTH_KYKLOP_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_KYKLOP_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_KYKLOP_TIMEOUT}
    }

    charon {
      type = native
      type = ${?HEALTH_CHARON_TYPE}
      url = "http://charon:7250"
      url = ${?HEALTH_CHARON_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_CHARON_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_CHARON_TIMEOUT}
    }

    metis {
      type = native
      type = ${?HEALTH_METIS_TYPE}
      url = "http://metis:7255"
      url = ${?HEALTH_METIS_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_METIS_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_METIS_TIMEOUT}
    }

    # ---------------------------------------------------------------- Workers (the Kyklops)
    brontes {
      type = native
      type = ${?HEALTH_BRONTES_TYPE}
      url = "http://brontes:7295"
      url = ${?HEALTH_BRONTES_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_BRONTES_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_BRONTES_TIMEOUT}
    }

    steropes {
      type = native
      type = ${?HEALTH_STEROPES_TYPE}
      url = "http://steropes:7300"
      url = ${?HEALTH_STEROPES_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_STEROPES_ENDPOINT}
      timeout = 5000
