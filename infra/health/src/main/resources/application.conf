      url = "http://backstage:7007"
      url = ${?HEALTH_BACKSTAGE_URL}
      healthEndpoint = "/.backstage/health/v1/readiness"
      healthEndpoint = ${?HEALTH_BACKSTAGE_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_BACKSTAGE_TIMEOUT}
    }
  }
}
