ktor {
    deployment {
        port = 7000
        port = ${?HEALTH_CHECK_SERVICE_PORT}
    }
}

telemetry {
    enabled = false
    enabled = ${?OTEL_ENABLED_HEALTH}
    otlp {
        endpoint = "http://localhost:4317"
        endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    }
}

# FO-P5.S2 (FO-28): the open-tier status page reads the model fingerprint (model_version) from veles's
# /status. Retunable per estate via the env override (olymp ConfigMap), like every health target below.
status-page {
  model-fingerprint-url = "http://veles:7260/status"
  model-fingerprint-url = ${?VELES_STATUS_URL}
}

# Health checks for every technology shown on the Kantheon landing "Cluster Dashboard".
#
# Each entry is one of three checker types:
#   native     - HTTP GET <url><healthEndpoint>; healthy on 2xx.
#   tcp        - plain TCP connect to <host>:<port>; healthy if it connects
#                (used for services that don't speak HTTP, e.g. PostgreSQL).
#   prometheus - PromQL `up{job="<job>"}` against <prometheusUrl>; healthy if == 1.
#
# Two estates: the **kantheon** constellation (forked Phase 1-5 — agents, platform services,
# workers, MCP wrappers, technical-wave services), addressed by bare in-namespace service
# names; and the shared **fabric-infra** (data / monitoring / auth / gateway / middleware
# namespaces), namespace-qualified. Every field carries a `${?HEALTH_*}` env override so the
# deploying repo (olymp) retunes DNS/ports/paths via a ConfigMap without rebuilding the image.
health-check-service {
  prometheus {
    url = "http://mon-prometheus-server.monitoring"
    url = ${?HEALTH_LLM_GATEWAY_URL}
    timeout = 5000
    timeout = ${?HEALTH_LLM_GATEWAY_TIMEOUT}
    # Result cache TTL (seconds); checks within this window are served from cache.
    queryInterval = 30
    queryInterval = ${?HEALTH_CACHE_TTL_SECONDS}
  }

  technologies {

    # ============================ fabric-infra (shared cluster) ============================
    # ---------------------------------------------------------------- Data
    seaweed {
      type = native
      type = ${?HEALTH_SEAWEED_TYPE}
      url = "http://seaweedfs-master.data:9333"
      url = ${?HEALTH_SEAWEED_URL}
      healthEndpoint = "/cluster/healthz"
      healthEndpoint = ${?HEALTH_SEAWEED_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_SEAWEED_TIMEOUT}
    }

    kantheon-postgres {
      type = tcp
      type = ${?HEALTH_KANTHEON_POSTGRES_TYPE}
      host = "data-postgres.data"
      host = ${?HEALTH_KANTHEON_POSTGRES_HOST}
      port = 5432
      port = ${?HEALTH_KANTHEON_POSTGRES_PORT}
      timeout = 3000
      timeout = ${?HEALTH_KANTHEON_POSTGRES_TIMEOUT}
    }

    keycloak-postgres {
      type = tcp
      type = ${?HEALTH_KEYCLOAK_POSTGRES_TYPE}
      host = "auth-postgres.auth"
      host = ${?HEALTH_KEYCLOAK_POSTGRES_HOST}
      port = 5432
      port = ${?HEALTH_KEYCLOAK_POSTGRES_PORT}
      timeout = 3000
      timeout = ${?HEALTH_KEYCLOAK_POSTGRES_TIMEOUT}
    }

    redis {
      type = tcp
      type = ${?HEALTH_REDIS_TYPE}
      host = "redis.data"
      host = ${?HEALTH_REDIS_HOST}
      port = 6379
      port = ${?HEALTH_REDIS_PORT}
      timeout = 3000
      timeout = ${?HEALTH_REDIS_TIMEOUT}
    }

    opensearch {
      type = native
      type = ${?HEALTH_OPENSEARCH_TYPE}
      url = "http://opensearch.data:9200"
      url = ${?HEALTH_OPENSEARCH_URL}
      healthEndpoint = "/_cluster/health"
      healthEndpoint = ${?HEALTH_OPENSEARCH_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_OPENSEARCH_TIMEOUT}
    }

    qdrant {
      type = native
      type = ${?HEALTH_QDRANT_TYPE}
      url = "http://qdrant.data:6333"
      url = ${?HEALTH_QDRANT_URL}
      healthEndpoint = "/healthz"
      healthEndpoint = ${?HEALTH_QDRANT_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_QDRANT_TIMEOUT}
    }

    neo4j {
      type = native
      type = ${?HEALTH_NEO4J_TYPE}
      url = "http://neo4j-onto.data:7474"
      url = ${?HEALTH_NEO4J_URL}
      healthEndpoint = "/"
      healthEndpoint = ${?HEALTH_NEO4J_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_NEO4J_TIMEOUT}
    }

    # ---------------------------------------------------------------- Infra
    keycloak {
      type = native
      type = ${?HEALTH_KEYCLOAK_TYPE}
      # Keycloak serves health on its management port (9000), not the public HTTP port.
      url = "http://auth-keycloak-keycloakx-http.auth:9000"
      url = ${?HEALTH_KEYCLOAK_URL}
      healthEndpoint = "/health/ready"
      healthEndpoint = ${?HEALTH_KEYCLOAK_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_KEYCLOAK_TIMEOUT}
    }

    opa {
      type = native
      type = ${?HEALTH_OPA_TYPE}
      url = "http://opa.auth:8181"
      url = ${?HEALTH_OPA_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_OPA_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_OPA_TIMEOUT}
    }

    sealed-secrets {
