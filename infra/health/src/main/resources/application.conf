    }

    echo-mcp {
      type = native
      type = ${?HEALTH_ECHO_MCP_TYPE}
      url = "http://echo-mcp:7267"
      url = ${?HEALTH_ECHO_MCP_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_ECHO_MCP_ENDPOINT}
      timeout = 5000
      timeout = ${?HEALTH_ECHO_MCP_TIMEOUT}
    }

    kadmos-mcp {
      type = native
      type = ${?HEALTH_KADMOS_MCP_TYPE}
      url = "http://kadmos-mcp:7272"
      url = ${?HEALTH_KADMOS_MCP_URL}
      healthEndpoint = "/health"
      healthEndpoint = ${?HEALTH_KADMOS_MCP_ENDPOINT}
      timeout = 5000
