# Source: tatrman-server/charts/llm-gateway/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  labels:
    app.kubernetes.io/name: llm-gateway
    app.kubernetes.io/instance: tatrman-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: llm-gateway-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-gateway
      app.kubernetes.io/instance: tatrman-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-gateway
        app.kubernetes.io/instance: tatrman-server
    spec:
      containers:
        - name: llm-gateway
          image: "ghcr.io/collite/ttr-llm-gateway:0.9.4"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7280
            - name: grpc
              containerPort: 9090
          env:
            - name: SERVER_PORT
              value: "7280"
            - name: POSTGRESQL_HOST
              value: "postgres"
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: OTEL_SERVICE_NAME
              value: "llm-gateway"
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: azure-openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: anthropic-api-key
                  optional: true
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 7280
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 7280
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 7280
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            limits:
              cpu: "1"
              memory: 1536Mi
            requests:
              cpu: 250m
              memory: 768Mi

