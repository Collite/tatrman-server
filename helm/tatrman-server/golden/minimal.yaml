# Source: tatrman-server/charts/dispatch/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch
  labels:
    app.kubernetes.io/name: dispatch
    app.kubernetes.io/instance: tatrman-server
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "dev"
    helm.sh/chart: dispatch-0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dispatch
      app.kubernetes.io/instance: tatrman-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dispatch
        app.kubernetes.io/instance: tatrman-server
    spec:
      containers:
        - name: dispatch
          image: "ghcr.io/collite/ttr-dispatch:0.9.4"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7290
            - name: grpc
              containerPort: 7291
          env:
            - name: DISPATCH_SERVER_PORT
              value: "7290"
            - name: DISPATCH_SERVER_GRPC_PORT
              value: "7291"
            - name: OTEL_SERVICE_NAME
              value: "dispatch"
            - name: OTEL_ENABLED_DISPATCH
              value: "false"
            - name: DISPATCH_WORKER_MSSQL_ENDPOINT
              value: mssql:7296
            - name: DISPATCH_WORKER_POLARS_ENDPOINT
              value: polars:7301
            - name: DISPATCH_WORKER_POSTGRES_ENDPOINT
              value: postgres:7303
          readinessProbe:
            httpGet:
              path: /ready
              port: 7290
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 7290
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi

