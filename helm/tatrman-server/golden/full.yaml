# Source: tatrman-server/templates/dev-idp.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: tatrman-server-keycloak-realm
  labels:
    app.kubernetes.io/name: tatrman-server-keycloak
    app.kubernetes.io/part-of: tatrman-server
    app.kubernetes.io/component: dev-idp
data:
  tatrman-realm.json: |
    {
      "realm": "tatrman",
      "enabled": true,
      "sslRequired": "none",
      "roles": { "realm": [ { "name": "user" }, { "name": "admin" } ] },
      "clients": [
        {
          "clientId": "tatrman-agent",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": [ "*" ],
          "webOrigins": [ "*" ]
        }
      ],
      "users": [
        {
          "username": "demo",
          "enabled": true,
          "emailVerified": true,
          "credentials": [ { "type": "password", "value": "demo", "temporary": false } ],
          "realmRoles": [ "user" ]
        }
      ]
    }
