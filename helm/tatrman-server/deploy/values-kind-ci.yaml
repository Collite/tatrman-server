# SV-P4·S2·T7 — kind CI install-gate overlay (the `helm-install` job).
#
# A light, backing-free subset that reaches Ready on a fresh throwaway kind cluster,
# proving the umbrella actually installs and comes up (not just templates): veles
# (serves its built-in classpath model — no external model repo needed), the query
# spine sample, identity, health, and the dev IdP. Low requests keep it inside a
# 2-CPU CI runner.
#
# OFF (need external backing / registries the product doesn't ship): the workers
# (→ DBs), llm-gateway (→ provider), the MCP doors (→ kantheon capabilities-mcp), and
# the full understanding layer (→ UFAL models + real data). Those belong to the S7
# outsider dry-run, not a CI smoke.

devIdp:
  enabled: true
  resources: { requests: { cpu: 100m, memory: 512Mi } }

veles:     { enabled: true, resources: { requests: { cpu: 50m, memory: 384Mi } } }
query:     { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }
translate: { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }
validate:  { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }
whois:     { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }
health:    { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }

dispatch: { enabled: false }
llm-gateway: { enabled: false }
mssql: { enabled: false }
postgres: { enabled: false }
polars: { enabled: false }
fuzzy: { enabled: false }
nlp: { enabled: false }
chrono: { enabled: false }
geo: { enabled: false }
money: { enabled: false }
ttr-resolver: { enabled: false }
query-mcp: { enabled: false }
veles-mcp: { enabled: false }
fuzzy-mcp: { enabled: false }
nlp-mcp: { enabled: false }
ttr-grounding-mcp: { enabled: false }
