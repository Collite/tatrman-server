# SV-P4·S2·T7 — bp-dsk install SMOKE overlay (NOT part of the values contract).
#
# The pragmatic T7 gate: prove the umbrella chart installs and a coherent subset
# reaches Ready on bp-dsk. Install into a FRESH namespace (not the ArgoCD-managed
# `ttr-server`) so it can't collide with the F1 pilot. Real per-environment values
# belong in the deploy repo (olymp); this file is a documented smoke recipe.
#
#   helm upgrade --install ttr helm/tatrman-server -n ttr-umbrella --create-namespace \
#     -f helm/tatrman-server/deploy/values-bp-dsk-smoke.yaml --kube-context dsk
#
# Node reality: bp-dsk is a single 8-CPU node whose CPU is largely RESERVED (not used)
# by the running F1 pilot, so pods at the chart's default 250m requests don't schedule.
# This overlay drops requests to the olymp bp-dsk floor (25m / 256Mi) so the subset fits.
#
# Subset = the light query spine + identity/health + the dev IdP — the "installs and
# comes up" proof. OFF for the smoke: the heavy/UFAL NLP + understanding layer (F1
# already proved it live here), the workers/llm-gateway (need DBs), and the MCP doors
# (register with the kantheon capabilities-mcp — the flagged standalone ⚑). Full
# governed round-trip → S7 on a non-capacity-bound cluster.

devIdp:
  enabled: true
  resources:
    requests: { cpu: 100m, memory: 512Mi }

# ── Enabled subset — low requests so they schedule alongside the pilot ─────────
veles:     { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }
query:     { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }
translate: { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }
validate:  { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }
whois:     { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }
health:    { enabled: true, resources: { requests: { cpu: 25m, memory: 256Mi } } }
# dispatch OFF: its readiness connects to the workers (disabled here) — can't be Ready
# in a worker-less smoke. Part of the query spine; exercised with workers in S7.
dispatch:  { enabled: false }

# ── OFF for the smoke ─────────────────────────────────────────────────────────
fuzzy: { enabled: false }
nlp: { enabled: false }
chrono: { enabled: false }
geo: { enabled: false }
money: { enabled: false }
ttr-resolver: { enabled: false }
mssql: { enabled: false }
postgres: { enabled: false }
polars: { enabled: false }
llm-gateway: { enabled: false }
query-mcp: { enabled: false }
veles-mcp: { enabled: false }
fuzzy-mcp: { enabled: false }
nlp-mcp: { enabled: false }
ttr-grounding-mcp: { enabled: false }
