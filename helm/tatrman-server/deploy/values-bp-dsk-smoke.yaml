# SV-P4·S2·T7 — bp-dsk install SMOKE overlay (NOT part of the values contract).
#
# A cluster-specific overlay for the pragmatic T7 gate: prove the umbrella chart
# installs and a coherent subset reaches Ready on bp-dsk, plus the dev IdP. Install
# into a FRESH namespace (not the ArgoCD-managed `ttr-server`) so it can't collide
# with the F1 pilot. Real per-environment values belong in the deploy repo (olymp);
# this file is a documented smoke recipe.
#
#   helm install ttr helm/tatrman-server -n ttr-umbrella --create-namespace \
#     -f helm/tatrman-server/deploy/values-bp-dsk-smoke.yaml
#
# Expected Ready: veles, query, translate, validate, dispatch, whois, health, the
# understanding layer (fuzzy, nlp + UFAL backends, chrono, geo, money, resolver),
# and the dev Keycloak. Deliberately OFF for the smoke (need external backing the
# chart can't self-provide, or the kantheon capabilities-mcp registry):
#   - workers (mssql/postgres/polars) + llm-gateway → need target DBs / an LLM provider
#   - the MCP doors → register with capabilities-mcp (a kantheon service, not in the
#     product) — the standalone-registration story is the flagged T7 ⚑ (→ S7).

# Dev Keycloak (quickstart IdP) — on for the smoke.
devIdp:
  enabled: true

# UFAL backends ON (bp-dsk is private — FI-4 waived) so Czech NLP actually works,
# matching the F1 live proof.
nlp:
  backends:
    morphodita: { enabled: true }
    nametag3: { enabled: true }

# ── OFF for the smoke (external backing / capabilities-mcp) ────────────────────
mssql: { enabled: false }
postgres: { enabled: false }
polars: { enabled: false }
llm-gateway: { enabled: false }
query-mcp: { enabled: false }
veles-mcp: { enabled: false }
fuzzy-mcp: { enabled: false }
nlp-mcp: { enabled: false }
ttr-grounding-mcp: { enabled: false }

# NOTE: veles loads its model from METADATA_GIT_REMOTE_URI (default
# github.com/Tatrman/ai-models.git). If veles stays 503 (no model), set
# `veles.metadata.gitRemoteUri` + a PAT via `veles.secretEnv` to the same source
# the F1 pilot uses. geo stays dark (no nominatim.baseUrl) — that's honest, not a
# boot failure.
