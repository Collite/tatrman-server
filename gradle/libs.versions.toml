# ── Hebe (P1 Stage 1.1 — gradle merge) ───────────────────────────────────────
# Hebe alias names, added so the 21 Hebe module build files keep their existing
# `libs.*` references unchanged. Where Hebe and kantheon share an artifact, the
# Hebe alias points at the same module/version-ref kantheon already uses.
kotlinx-datetime                    = { module = "org.jetbrains.kotlinx:kotlinx-datetime",                  version.ref = "datetime" }
kotlinx-io                          = { module = "org.jetbrains.kotlinx:kotlinx-io-core-jvm",               version.ref = "kotlinx-io" }
koog-utils                          = { module = "ai.koog:utils-jvm",                                       version.ref = "koog" }
koog-utils-common                   = { module = "ai.koog:utils",                                           version.ref = "koog" }
mcp-kotlin-sdk                      = { module = "io.modelcontextprotocol:kotlin-sdk",                      version.ref = "kotlin-mcp-sdk" }
# Hebe ktor aliases (the non-`-jvm` names Hebe's build files use → the `-jvm`
# platform artifacts, matching kantheon's existing ktor entries).
ktor-serialization-json             = { module = "io.ktor:ktor-serialization-kotlinx-json-jvm",             version.ref = "ktor" }
ktor-server-cnegot                  = { module = "io.ktor:ktor-server-content-negotiation-jvm",             version.ref = "ktor" }
ktor-server-websockets              = { module = "io.ktor:ktor-server-websockets-jvm",                      version.ref = "ktor" }
ktor-server-auth                    = { module = "io.ktor:ktor-server-auth-jvm",                            version.ref = "ktor" }
ktor-client-logging                 = { module = "io.ktor:ktor-client-logging-jvm",                         version.ref = "ktor" }
sqlite-jdbc                         = { module = "org.xerial:sqlite-jdbc",                                  version.ref = "sqliteJdbc" }
telegrambots-longpolling            = { module = "org.telegram:telegrambots-longpolling",                  version.ref = "telegram" }
telegrambots-client-jetty           = { module = "org.telegram:telegrambots-client-jetty-adapter",         version.ref = "telegram" }
bouncycastle                        = { module = "org.bouncycastle:bcprov-jdk18on",                         version.ref = "bouncycastle" }
pf4j                                = { module = "org.pf4j:pf4j",                                           version.ref = "pf4j" }
oras-sdk                            = { module = "land.oras:oras-java-sdk",                                 version.ref = "oras" }
tomlj                               = { module = "org.tomlj:tomlj",                                         version.ref = "tomlj" }
clikt                               = { module = "com.github.ajalt.clikt:clikt",                            version.ref = "clikt" }
jline                               = { module = "org.jline:jline",                                         version.ref = "jline" }
otel-api                            = { module = "io.opentelemetry:opentelemetry-api",                      version.ref = "otel" }
otel-sdk                            = { module = "io.opentelemetry:opentelemetry-sdk",                      version.ref = "otel" }
otel-exporter-otlp                  = { module = "io.opentelemetry:opentelemetry-exporter-otlp",            version.ref = "otel" }
otel-autoconfigure                  = { module = "io.opentelemetry:opentelemetry-sdk-extension-autoconfigure", version.ref = "otel" }
junit-jupiter                       = { module = "org.junit.jupiter:junit-jupiter",                         version.ref = "junit" }
junit-platform-launcher             = { module = "org.junit.platform:junit-platform-launcher" }
kotest-assertions                   = { module = "io.kotest:kotest-assertions-core",                        version.ref = "kotest" }
kotest-framework-engine             = { module = "io.kotest:kotest-framework-engine",                       version.ref = "kotest" }
kotest-junit-platform-runner        = { module = "io.kotest:kotest-runner-junit5-jvm",                      version.ref = "kotest" }
detekt-api                          = { module = "io.gitlab.arturbosch.detekt:detekt-api",                  version.ref = "detekt" }
detekt-test                         = { module = "io.gitlab.arturbosch.detekt:detekt-test",                version.ref = "detekt" }


[bundles]
kotest      = ["kotest-runner-junit5", "kotest-assertions-core", "kotest-property"]

# ── Hebe (P1 Stage 1.1 — gradle merge) ───────────────────────────────────────
ktor-server = [
    "ktor-server-core",
    "ktor-server-netty",
    "ktor-server-cnegot",
    "ktor-server-sse",
    "ktor-server-websockets",
    "ktor-server-auth",
    "ktor-server-cors",
    "ktor-server-test-host",
    "ktor-serialization-json",
]
ktor-client = ["ktor-client-core", "ktor-client-cio", "ktor-client-content-negotiation", "ktor-client-logging", "ktor-serialization-json"]
logging     = ["kotlin-logging", "logback-classic"]
testing     = ["junit-jupiter", "kotest-assertions", "kotest-property", "mockk"]


[plugins]
kotlin-jvm                = { id = "org.jetbrains.kotlin.jvm",                  version.ref = "kotlin" }
kotlin-serialization      = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
protobuf                  = { id = "com.google.protobuf",                       version.ref = "protobuf-plugin" }
jib                       = { id = "com.google.cloud.tools.jib",                version.ref = "jib" }
ktlint                    = { id = "org.jlleitschuh.gradle.ktlint",             version.ref = "ktlint-plugin" }
ktor                      = { id = "io.ktor.plugin",                            version.ref = "ktor" }

# LLM gateway (Spring Boot) — fork Stage 2.5.
kotlin-spring             = { id = "org.jetbrains.kotlin.plugin.spring",        version.ref = "kotlin" }
spring-boot               = { id = "org.springframework.boot",                  version.ref = "spring-boot" }
spring-dep                = { id = "io.spring.dependency-management",           version.ref = "spring-dep" }

# ── Hebe (P1 Stage 1.1 — gradle merge) ───────────────────────────────────────
detekt                    = { id = "io.gitlab.arturbosch.detekt",               version.ref = "detekt" }
shadow                    = { id = "com.gradleup.shadow",                       version.ref = "shadow" }
