pdfbox                              = { module = "org.apache.pdfbox:pdfbox",                             version.ref = "pdfbox" }
pgvector                            = { module = "com.pgvector:pgvector",                                version.ref = "pgvector" }

# Apache Arrow Java — workers/MSSQL JDBC ResultSet → Arrow IPC; Charon's
# `services/charon` `MovePlanner` → `ArrowPipe` (P1 Stage 1.2) uses
# `arrow-vector` + `arrow-memory-netty`. The IPC reader/writer classes
# (ArrowStreamReader/Writer, ArrowFileReader/Writer) ship INSIDE
# `arrow-vector` in 18.x — no separate `arrow-ipc` artifact exists at this
# major (it was a separate jar pre-15.x; merged upstream). Version stays in
# lockstep with `arrow-java` (18.3.0) so the schema-fingerprint bytes are
# stable across the move pipe and the worker (workers/polars
# `_schema_fingerprint` reference impl — charon/contracts.md §6). P2 Stage 2.1
# adds `arrow-jdbc` + the ADBC drivers when the spike gate runs.
arrow-vector                        = { module = "org.apache.arrow:arrow-vector",                         version.ref = "arrow-java" }
arrow-memory-netty                  = { module = "org.apache.arrow:arrow-memory-netty",                   version.ref = "arrow-java" }

