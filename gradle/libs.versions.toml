# Version catalog — single source of truth for dependency versions.
# Module build.gradle.kts files MUST reference these via libs.* — never hardcode versions.
# https://docs.gradle.org/current/userguide/version_catalogs.html

[versions]
tatrman-modeler           = "0.8.6"
tatrman-ttr-metadata      = "0.8.6"
tatrman-translator        = "0.8.5"

# Kotlin / coroutines / serialization
kotlin                    = "2.3.0"
kotlinx-coroutines        = "1.9.0"
kotlinx-serialization     = "1.10.0"

# Ktor
ktor                      = "3.2.3"

# Agent + MCP frameworks
koog                      = "0.8.0"
kotlin-mcp-sdk            = "0.12.0"

# Protobuf
protobuf                  = "4.33.4"
protobuf-plugin           = "0.9.5"

# Logging
slf4j                     = "2.0.17"
logback                   = "1.5.26"
logstash                  = "8.0"
kotlin-logging            = "7.0.0"

# Config (HOCON)
typesafe-config           = "1.4.3"

# YAML / Jackson
# Held at 2.18.1: ai-platform moved to Jackson 3.0.4, but 3.0 also relocated
# `jackson-module-kotlin` to group `tools.jackson.module` and reorganises
# databind/yaml under `tools.jackson.*`. Bumping the version alone would break
# the module coordinates below — treat as a separate migration decision.
jackson                   = "2.18.1"

# Test stack
kotest                    = "6.1.2"
mockk                     = "1.14.9"
wiremock                  = "3.13.2"
testcontainers            = "2.0.3"
# fabric8 k8s client — READ-ONLY cluster status reads for the integration
# readiness gate (testing arc Phase 2 Stage 2.1). No apply/delete on the
# kantheon side; all bring-up/teardown is olymp's (testing architecture §3).
fabric8                   = "7.7.0"

# OTel (kept lean; full stack pulled via ai-platform.otel.config)
otel                      = "1.58.0"
otel-semconv              = "1.38.0"
# Used by otel-logback-appender-1.0; align with ktor-otel 2.18.1-alpha transitively.
otel-instrumentation-base = "2.18.1-alpha"
# Aligns opentelemetry-ktor-3.0 with ai-platform.
ktor-otel                 = "2.18.1-alpha"

# Caches
caffeine                  = "3.2.3"

# Algorithm — used by the fuzzy matcher (Stage 2.2) for the LEVENSHTEIN / JARO_WINKLER /
# DAMERAU_LEVENSHTEIN branches of the cascade (TATRMAN is in-house).
java-string-similarity    = "2.0.0"

# Build / deploy
jib                       = "3.4.4"
ktlint-plugin             = "14.0.1"

# Engine
calcite                   = "1.41.0"
exposed                   = "1.0.0"
hikaricp                  = "7.0.2"
pgsql                    = "42.7.9"
mssql                    = "13.2.1.jre11"
arrow-java                = "18.3.0"
apache-poi                = "5.5.1"
apache-parquet            = "1.14.3"
hadoop                    = "3.3.6"

# Charon (Stage 1.1 P1 — services/charon). AWS SDK S3 + Lettuce for the
# Seaweed/Redis object-store movers (P1). ADBC + arrow-jdbc land in P2
# Stage 2.1 (charon/plan.md §2.1 T3 spike gate decides ADBC-JDBC vs
# `arrow-jdbc` per dialect); pinned at that stage, not here. Arrow IPC
# classes (ArrowStreamReader/Writer, ArrowFileReader/Writer) ship INSIDE
# `arrow-vector` in 18.x (no separate `arrow-ipc` artifact), so they're
# already on the classpath via the existing `arrow-vector` pin.
aws-sdk-s3                = "2.32.5"
lettuce                   = "6.8.0.RELEASE"

# gRPC — kantheon v1 prefers MCP over gRPC for new services, but `logging-config`
# carries gRPC interceptors for cross-service reuse. Only the kotlin-stub is exposed
# in the catalog; full netty/protobuf/grpc transitives are added by the gRPC-using
# service modules themselves.
grpc                                 = "1.78.0"
grpc-kotlin                          = "1.5.0"

# Algorithm + graph + VCS — the metadata service (Stage 2.1) uses jgrapht for the model graph + jgit for the GitArchiveStorage backend.
jgrapht                              = "1.5.2"
jgit                                 = "6.8.0.202311291450-r"
apache-commons-compress              = "1.24.0"
micrometer                           = "1.16.2"

# (fork Stage 2.6) The last ai-platform Maven coordinate — com.tatrman:shared-proto
# (Themis's residual nlp.v1) — was removed here. Themis now consumes only in-repo
# protos via :shared:proto. No com.tatrman Maven artifact remains.

# LLM gateway (Spring Boot) — fork Stage 2.5. The repo's only
# Spring module; resolved from mavenCentral (incl. Spring AI 2.0.0-M2, as
# ai-platform did — no milestone repo needed).
spring-boot               = "4.0.2"
spring-dep                = "1.1.7"
spring-ai                 = "2.0.0-M2"
spring-grpc               = "1.0.1"
springdoc                 = "3.0.1"
kaml                      = "0.61.0"
flyway                    = "11.20.3"
nats                      = "0.6.2+3.5"
h2                        = "2.4.240"
otel-instrumentation-bom  = "2.25.0"

# ── Hebe (P1 Stage 1.1 — gradle merge) ───────────────────────────────────────
# Hebe-only pins. Conflicting keys (kotlin, coroutines, serialization, koog,
# ktor, kotest, mockk, flyway, otel, logback, logstash, kotlin-logging, jgit,
# ktlint) resolve through kantheon's existing pins — kantheon wins (arch §4.2;
# see docs/implementation/v1/hebe/notes/s1.1-catalog-conflicts.md). detekt is
# added here but applied **scoped to the Hebe subtree** (root build, T4).
datetime                  = "0.7.1"
kotlinx-io                = "0.8.2"
sqliteJdbc                = "3.53.0.0"
sqliteVec                 = "0.1.8"
telegram                  = "9.6.0"
bouncycastle              = "1.84"
pf4j                      = "3.15.0"
oras                      = "0.6.0"
tomlj                     = "1.1.1"
clikt                     = "5.0.0"
jline                     = "4.1.0"
junit                     = "5.11.0"
detekt                    = "1.23.8"
shadow                    = "9.4.1"

# ── Kleio / DocWH (P1 Stage 1.1 — services/kallimachos + services/pinakes) ────
# Ingestion parsers ported from ~/Dev/doc-store (faithful versions — the
# doc-store test corpus is the parity oracle, so the parser versions match).
jsoup                     = "1.17.2"     # HTML → DocNode (html handler)
flexmark                  = "0.64.8"     # Markdown → DocNode (md handler)
pdfbox                    = "3.0.2"      # PDF text extraction (pdf handler)
# pgvector Java helper — VECTOR plane binding. Wired P2 Stage 2.1; pinned now
# (catalog drift is a planning bug, AGENTS.md §5). pgvector dim N is set by the
# pipeline EmbedConfig.dimensions (contracts §10), not here.
pgvector                  = "0.1.6"
# AGE plane (P2 Stage 2.2) rides the existing `postgresql` JDBC pin via the
# `cypher()` SQL function — Apache AGE ships NO separate JVM driver; openCypher
# is issued as SQL over the standard pgsql driver. Recorded here so the P2
# adapter doesn't reach for a phantom coordinate. `vector` + `age` themselves
# are PG *extensions* (infra), not JVM deps.


